# apps/counselconduit/cloudbuild.yaml
# Auto-deploy CounselConduit to Cloud Run on push to main.
# Triggered by Cloud Build GitHub trigger.

steps:
  # Step 1: Run tests
  - name: 'python:3.13-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd apps/counselconduit
        pip install -r requirements.txt -q
        pip install pytest -q
        python -m pytest tests/ -x --tb=short -q

  # Step 2: Deploy to Cloud Run (source-based, no Docker)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy counselconduit \
          --source=apps/counselconduit \
          --region=us-central1 \
          --project=$PROJECT_ID \
          --service-account=counselconduit-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=1 \
          --max-instances=10 \
          --concurrency=80 \
          --port=8080 \
          --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID" \
          --labels="managed_by=cloudbuild,environment=production" \
          --quiet

  # Step 3: Apply Cloud Armor policy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Applying Cloud Armor policy..."
        gcloud compute security-policies describe counselconduit-waf --project=$PROJECT_ID 2>/dev/null && \
          echo "✅ Cloud Armor policy exists" || \
          echo "⚠️ Cloud Armor policy not found (non-blocking)"

  # Step 4: Verify deployment health via /readyz
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        URL=$(gcloud run services describe counselconduit --region=us-central1 --project=$PROJECT_ID --format='value(status.url)')
        echo "Verifying deployment at $URL/readyz..."
        # Retry loop: wait up to 60s for healthy response
        for i in $(seq 1 12); do
          HTTP_CODE=$(curl -s -o /tmp/readyz_body -w "%{http_code}" "$URL/readyz")
          BODY=$(cat /tmp/readyz_body)
          echo "Attempt $i: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q '"healthy"'; then
            echo "✅ Deployment verified: $BODY"
            exit 0
          fi
          sleep 5
        done
        echo "ERROR: Health check failed after 60s!"
        exit 1

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '600s'

substitutions:
  _DEPLOY_REGION: 'us-central1'
