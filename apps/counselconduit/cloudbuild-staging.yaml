# apps/counselconduit/cloudbuild-staging.yaml
# PR-based preview deployment to Cloud Run staging service.
# Triggered by Cloud Build GitHub trigger on pull_request events.

steps:
  # Step 1: Run tests
  - name: 'python:3.13-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd apps/counselconduit
        pip install -r requirements.txt -q
        pip install pytest -q
        python -m pytest tests/ -x --tb=short -q

  # Step 2: Deploy to Cloud Run staging (ephemeral per-PR service)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        PR_NUM="${_PR_NUMBER:-preview}"
        SERVICE_NAME="counselconduit-pr-${PR_NUM}"
        echo "Deploying staging service: $SERVICE_NAME"
        gcloud run deploy "$SERVICE_NAME" \
          --source=apps/counselconduit \
          --region=us-central1 \
          --project=$PROJECT_ID \
          --service-account=counselconduit-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --memory=256Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=2 \
          --concurrency=80 \
          --port=8080 \
          --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,APP_ENV=staging" \
          --labels="managed_by=cloudbuild,environment=staging,pr=${PR_NUM}" \
          --tag="pr-${PR_NUM}" \
          --no-traffic \
          --quiet

  # Step 3: Verify staging health
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        PR_NUM="${_PR_NUMBER:-preview}"
        SERVICE_NAME="counselconduit-pr-${PR_NUM}"
        URL=$(gcloud run services describe "$SERVICE_NAME" --region=us-central1 --project=$PROJECT_ID --format='value(status.url)')
        echo "Verifying staging at $URL/readyz..."
        for i in $(seq 1 6); do
          HTTP_CODE=$(curl -s -o /tmp/readyz_body -w "%{http_code}" "$URL/readyz")
          BODY=$(cat /tmp/readyz_body)
          echo "Attempt $i: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q '"healthy"'; then
            echo "✅ Staging verified: $BODY"
            echo "Preview URL: $URL"
            exit 0
          fi
          sleep 5
        done
        echo "WARNING: Staging health check inconclusive (non-blocking)"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'

timeout: '600s'

substitutions:
  _PR_NUMBER: 'preview'
  _DEPLOY_REGION: 'us-central1'
