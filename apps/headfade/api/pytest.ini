[pytest]
# HeadFade API — isolated test config.
# Overrides monorepo pytest.ini to prevent pythonpath collision
# with apps/aiyou_stack/aiyou-fastapi-services/apps/main.py.
testpaths = tests
pythonpath = .

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    -l
    --strict-markers
    --import-mode=importlib
    -ra
    --asyncio-mode=auto

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, external services)
