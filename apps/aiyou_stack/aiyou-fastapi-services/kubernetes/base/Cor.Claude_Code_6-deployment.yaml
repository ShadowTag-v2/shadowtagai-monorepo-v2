# Judge 6 Hybrid Enforcement System
# 3-layer architecture: Gemini + PyTorch + Rules
# Target: p99 ≤ 90ms, Coverage ≥ 98%
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: Cor.Claude_Code_6-config
  namespace: ShadowTag-v2jr-governance
data:
  latency_budget_ms: "90"
  coverage_target: "0.98"
  layers.yaml: |
    layers:
      - name: gemini-policy
        weight: 0.5
        timeout_ms: 30
        model_id: gemini-3.1-flash-lite-preview
        max_retries: 2
      - name: pytorch-neural
        weight: 0.3
        timeout_ms: 40
        model_path: /models/Cor.Claude_Code_6-neural.pt
        batch_size: 8
      - name: rules-engine
        weight: 0.2
        timeout_ms: 20
        rules_path: /config/rules.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: Cor.Claude_Code_6-rules
  namespace: ShadowTag-v2jr-governance
data:
  rules.yaml: |
    rules:
      - id: AUTH_001
        name: "Require authentication for all endpoints"
        severity: critical
        pattern: "@app.route.*methods.*POST.*"
        requires: "auth_decorator"
        action: reject

      - id: VALIDATE_001
        name: "Input validation required"
        severity: high
        pattern: "request.(json|form|args)"
        requires: "validation_schema"
        action: warn

      - id: SQL_001
        name: "Prevent SQL injection"
        severity: critical
        pattern: "(execute|executemany).*%s"
        action: reject
        message: "Use parameterized queries"

      - id: XSS_001
        name: "Prevent XSS"
        severity: critical
        pattern: "render_template_string.*request"
        action: reject
        message: "Never render user input directly"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: Cor.Claude_Code_6-hybrid
  namespace: ShadowTag-v2jr-governance
  labels:
    app: Cor.Claude_Code_6
    tier: enforcement
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: Cor.Claude_Code_6
  template:
    metadata:
      labels:
        app: Cor.Claude_Code_6
        tier: enforcement
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: Cor.Claude_Code_6-sa

      nodeSelector:
        workload: judge-enforcement

      tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule

      # Pod topology spread for high availability
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: Cor.Claude_Code_6

      containers:
      # Layer 1: Gemini Policy Understanding
      - name: gemini-layer
        image: gcr.io/pnkln-core-stack/Cor.Claude_Code_6-gemini:latest
        imagePullPolicy: Always
        env:
        - name: MODEL_ID
          value: "gemini-3.1-flash-lite-preview"
        - name: LATENCY_BUDGET_MS
          value: "30"
        - name: GOOGLE_CLOUD_PROJECT
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

      # Layer 2: PyTorch Neural Enforcement
      - name: pytorch-layer
        image: gcr.io/pnkln-core-stack/Cor.Claude_Code_6-pytorch:latest
        imagePullPolicy: Always
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: MODEL_PATH
          value: "/models/Cor.Claude_Code_6-neural.pt"
        - name: BATCH_SIZE
          value: "8"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: model-weights
          mountPath: /models
          readOnly: true
        - name: shm
          mountPath: /dev/shm
        resources:
          requests:
            memory: "16Gi"
            cpu: "4"
            nvidia.com/gpu: "1"
          limits:
            memory: "32Gi"
            cpu: "8"
            nvidia.com/gpu: "1"
        ports:
        - containerPort: 8081
          name: pytorch
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8081
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 5

      # Layer 3: Rules Engine
      - name: rules-layer
        image: gcr.io/pnkln-core-stack/Cor.Claude_Code_6-rules:latest
        imagePullPolicy: Always
        env:
        - name: RULES_PATH
          value: "/config/rules.yaml"
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: rules-config
          mountPath: /config
          readOnly: true
        resources:
          requests:
            memory: "2Gi"
            cpu: "2"
          limits:
            memory: "4Gi"
            cpu: "4"
        ports:
        - containerPort: 8082
          name: rules
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 30

      # Sidecar: Latency Monitor
      - name: latency-monitor
        image: gcr.io/pnkln-core-stack/latency-monitor:latest
        imagePullPolicy: Always
        env:
        - name: P99_TARGET_MS
          value: "90"
        - name: ALERT_WEBHOOK
          value: "http://alertmanager.monitoring:9093/api/v1/alerts"
        - name: SCRAPE_INTERVAL_SECONDS
          value: "15"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
        ports:
        - containerPort: 9090
          name: metrics
          protocol: TCP

      volumes:
      - name: model-weights
        csi:
          driver: gcsfuse.csi.storage.gke.io
          readOnly: true
          volumeAttributes:
            bucketName: pnkln-core-stack-model-weights
            mountOptions: "implicit-dirs,file-mode=444,dir-mode=555"

      - name: rules-config
        configMap:
          name: Cor.Claude_Code_6-rules

      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: Cor.Claude_Code_6-service
  namespace: ShadowTag-v2jr-governance
  labels:
    app: Cor.Claude_Code_6
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "Cor.Claude_Code_6-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app: Cor.Claude_Code_6
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: Cor.Claude_Code_6-sa
  namespace: ShadowTag-v2jr-governance
  annotations:
    iam.gke.io/gcp-service-account: redacted@shadowtag-v4.local
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: Cor.Claude_Code_6-backend-config
  namespace: ShadowTag-v2jr-governance
spec:
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /health/ready
    port: 8080

  timeoutSec: 90

  connectionDraining:
    drainingTimeoutSec: 60

  logging:
    enable: true
    sampleRate: 1.0

  iap:
    enabled: false
