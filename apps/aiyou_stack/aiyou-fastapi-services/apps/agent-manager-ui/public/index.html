<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Manager UI</title>
    <script src="a2ui_renderer.js"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        #app { max-width: 800px; margin: 40px auto; padding: 20px; border: 1px solid #1e293b; border-radius: 8px; background: #1e293b; }
        .loading { text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">Loading Agent Context...</div>
    </div>

    <script>
        const renderer = new A2UIRenderer(document.getElementById('app'));

        async function refresh() {
            try {
                const response = await fetch('/memory/firestore');
                const data = await response.json();
                
                if (data && data.data && data.data.ui_payload) {
                    renderer.render(data.data.ui_payload);
                } else {
                    document.getElementById('app').innerHTML = '<div style="padding:20px">No active UI payload in memory. Use /agent/dispatch to trigger a task.</div>';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('app').innerHTML = '<div style="padding:20px;color:#f87171">Error connecting to Sovereign Bridge.</div>';
            }
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
