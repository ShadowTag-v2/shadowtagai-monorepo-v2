apiVersion: v1
kind: Service
metadata:
  name: media-edge
  namespace: pnkln-production
  labels:
    app: pnkln
    component: media-edge
  annotations:
    # Enable Network Endpoint Groups for GCP LB
    cloud.google.com/neg: '{"ingress": true}'
    # Link to backend config for Cloud CDN
    cloud.google.com/backend-config: '{"default": "media-edge-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app: pnkln
    component: media-edge
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: 9090
      targetPort: metrics
      protocol: TCP
      name: metrics
  sessionAffinity: None
