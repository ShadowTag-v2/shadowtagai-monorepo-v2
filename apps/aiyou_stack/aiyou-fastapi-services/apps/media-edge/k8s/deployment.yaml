apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-edge
  namespace: pnkln-production
  labels:
    app: pnkln
    component: media-edge
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pnkln
      component: media-edge
  template:
    metadata:
      labels:
        app: pnkln
        component: media-edge
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: media-edge

      # Use Spot VMs (matches existing pattern)
      nodeSelector:
        cloud.google.com/gke-spot: "true"

      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule

      # Security context (non-root)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: media-edge
          image: us-central1-docker.pkg.dev/PROJECT_ID/pnkln/media-edge:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          env:
            - name: EDGE_LISTEN_ADDR
              value: "0.0.0.0:8080"
            - name: EDGE_METRICS_ADDR
              value: "0.0.0.0:9090"
            - name: EDGE_GCS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: media-edge-config
                  key: GCS_BUCKET
            - name: EDGE_GCS_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: media-edge-config
                  key: GCS_PREFIX
            - name: EDGE_CACHE_SIZE_MB
              valueFrom:
                configMapKeyRef:
                  name: media-edge-config
                  key: CACHE_SIZE_MB
            - name: EDGE_CACHE_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: media-edge-config
                  key: CACHE_TTL_SECONDS
            - name: EDGE_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: media-edge-secrets
                  key: jwt-secret
            - name: EDGE_JWT_ALGORITHM
              value: "HS256"
            - name: EDGE_POP_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: RUST_LOG
              value: "info,media_edge=debug"

          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          # Startup probe for slow starts
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: cache
              mountPath: /tmp

      volumes:
        - name: cache
          emptyDir:
            sizeLimit: 2Gi
