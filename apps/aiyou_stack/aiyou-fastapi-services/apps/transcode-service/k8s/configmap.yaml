apiVersion: v1
kind: ConfigMap
metadata:
  name: transcode-config
  namespace: pnkln-production
  labels:
    app: pnkln
    component: transcode-service
data:
  # GCS configuration
  GCS_BUCKET: "cineverse-media-prod"
  OUTPUT_PREFIX: "hls/"

  # Pub/Sub configuration
  PUBSUB_SUBSCRIPTION: "transcode-jobs-sub"
  GCP_PROJECT_ID: "acquired-jet-478701-b3"

  # Transcoding settings
  SEGMENT_DURATION: "6"
  MAX_CONCURRENT_JOBS: "2"
