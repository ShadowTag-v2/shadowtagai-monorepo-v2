apiVersion: apps/v1
kind: Deployment
metadata:
  name: transcode-service
  namespace: pnkln-production
  labels:
    app: pnkln
    component: transcode-service
spec:
  replicas: 1  # Start with 1 for GPU jobs
  selector:
    matchLabels:
      app: pnkln
      component: transcode-service
  template:
    metadata:
      labels:
        app: pnkln
        component: transcode-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: transcode-service

      # GPU node selector
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4

      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      containers:
        - name: transcode-service
          image: us-central1-docker.pkg.dev/PROJECT_ID/pnkln/transcode-service:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          resources:
            requests:
              cpu: "2000m"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "8Gi"
              nvidia.com/gpu: "1"

          env:
            - name: TRANSCODE_GCS_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: transcode-config
                  key: GCS_BUCKET
            - name: TRANSCODE_OUTPUT_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: transcode-config
                  key: OUTPUT_PREFIX
            - name: TRANSCODE_PUBSUB_SUBSCRIPTION
              valueFrom:
                configMapKeyRef:
                  name: transcode-config
                  key: PUBSUB_SUBSCRIPTION
            - name: TRANSCODE_GCP_PROJECT_ID
              valueFrom:
                configMapKeyRef:
                  name: transcode-config
                  key: GCP_PROJECT_ID
            - name: TRANSCODE_ENABLE_NVENC
              value: "true"
            - name: TRANSCODE_SEGMENT_DURATION
              value: "6"
            - name: TRANSCODE_MAX_CONCURRENT_JOBS
              value: "2"
            - name: RUST_LOG
              value: "transcode_service=info"

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: temp-storage
              mountPath: /tmp/transcode

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Need write for temp files
            capabilities:
              drop:
                - ALL

      volumes:
        - name: temp-storage
          emptyDir:
            sizeLimit: 50Gi  # Temp storage for transcoding

      terminationGracePeriodSeconds: 600  # 10 min for job completion
