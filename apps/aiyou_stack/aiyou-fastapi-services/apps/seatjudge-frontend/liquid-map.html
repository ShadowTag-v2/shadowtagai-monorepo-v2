<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeatJudge: Liquid Map (Pilot)</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        #venue {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            max-width: 600px;
            margin-top: 20px;
        }

        .seat {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .seat:hover {
            transform: scale(1.1);
            z-index: 10;
            border-color: #fff;
        }

        .AVAILABLE {
            background: #10b981;
            color: #000;
        }

        .BOOKED {
            background: #ef4444;
            color: #fff;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .LOCKED {
            background: #6b7280;
            color: #d1d5db;
            border: 2px solid #ef4444;
        }

        /* Judge #6 Block */

        #stats {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        .stat-box {
            background: #222;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.5em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>

<body>
    <h1>🏟️ SeatJudge Pilot: Austin</h1>
    <div id="stats">
        <div class="stat-box">
            <div class="stat-val" id="capacity">0</div>
            <div class="stat-label">Capacity</div>
        </div>
        <div class="stat-box">
            <div class="stat-val" id="yield">$0.00</div>
            <div class="stat-label">Yield/Min</div>
        </div>
        <div class="stat-box">
            <div class="stat-val" id="risk">LOW</div>
            <div class="stat-label">Risk Level</div>
        </div>
    </div>

    <div id="venue">
        <!-- Seats injected here -->
    </div>

    <script>
        const API_URL = "https://seatjudge-api-227823808819.us-central1.run.app"; // Active Production URL
        const VENUE_ID = "pilot-austin-01";

        async function loadMap() {
            const venueDiv = document.getElementById('venue');
            venueDiv.innerHTML = '<p>Loading Liquid Inventory...</p>';

            try {
                // Mock fetch for now until API is confirmed live and CORS enabled
                // const res = await fetch(`${API_URL}/map/${VENUE_ID}`);
                // const seats = await res.json();

                // MOCK DATA (Simulating API response)
                const seats = Array.from({ length: 50 }, (_, i) => ({
                    id: i,
                    status: Math.random() > 0.8 ? 'BOOKED' : (Math.random() > 0.9 ? 'LOCKED' : 'AVAILABLE'),
                    price: (50 + Math.random() * 50).toFixed(2)
                }));

                renderSeats(seats);
                updateStats(seats);
            } catch (e) {
                console.error(e);
                venueDiv.innerHTML = '<p style="color:red">Connection Failed (Is API Awake?)</p>';
            }
        }

        function renderSeats(seats) {
            const venueDiv = document.getElementById('venue');
            venueDiv.innerHTML = '';
            seats.forEach(seat => {
                const el = document.createElement('div');
                el.className = `seat ${seat.status}`;
                el.innerText = `$${seat.price}`;
                el.title = `Seat ${seat.id} (${seat.status})`;
                el.onclick = () => alert(`Seat ${seat.id}\nStatus: ${seat.status}\nPrice: $${seat.price}`);
                venueDiv.appendChild(el);
            });
        }

        function updateStats(seats) {
            document.getElementById('capacity').innerText = seats.length;
            const revenue = seats.filter(s => s.status === 'BOOKED').reduce((acc, s) => acc + parseFloat(s.price), 0);
            document.getElementById('yield').innerText = `$${revenue.toFixed(2)}`;
        }

        // Auto-refresh every 5s (High Frequency)
        // setInterval(loadMap, 5000);
        loadMap();
    </script>
</body>

</html>
