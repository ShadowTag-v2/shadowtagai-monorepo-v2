axes:
  - name: correctness
    weight: 0.35
    must: ["unit_pass", "integration_pass"]
  - name: safety_compliance
    weight: 0.25
    must: ["policy_gate_pass"]
  - name: robustness
    weight: 0.15
  - name: cost_latency
    weight: 0.15
  - name: maintainability
    weight: 0.10
thresholds:
  approve_score: 0.80
  require_human_review_score: 0.70
  auto_reject_conditions:
    - "policy_gate_pass == false"
    - "evidence.hash_mismatch == true"
