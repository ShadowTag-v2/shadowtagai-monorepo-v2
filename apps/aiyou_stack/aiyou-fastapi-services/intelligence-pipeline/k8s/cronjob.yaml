# PNKLN Intelligence Pipeline - Nightly CronJob
# Executes complete intelligence pipeline at 2 AM PST daily
# ATP 5-19 RA-1 Compliant | Ethical Scraping | Business Impact Analysis

apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-intel-pipeline
  namespace: intelligence-pipeline
  labels:
    app: intel-pipeline
    version: v1.0.0
    component: intelligence
  annotations:
    description: "Nightly intelligence pipeline with ethical scraping and tiered classification"
    cost: "$370/month"
    roi: "3.3x in 18 months"
spec:
  # Schedule: 2 AM PST daily
  schedule: "0 2 * * *"
  timeZone: "America/Los_Angeles"

  # Only one job at a time
  concurrencyPolicy: Forbid

  # Keep last 7 successful jobs, last 3 failed jobs
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      # Allow 2 retries on failure
      backoffLimit: 2

      # Clean up completed jobs after 24 hours
      ttlSecondsAfterFinished: 86400

      template:
        metadata:
          labels:
            app: intel-pipeline
            version: v1.0.0
          annotations:
            sidecar.istio.io/inject: "false"  # Disable Istio for batch job
        spec:
          serviceAccountName: intelligence-runner
          restartPolicy: OnFailure

          containers:
          - name: pipeline
            image: gcr.io/PROJECT_ID/intelligence-pipeline:latest
            imagePullPolicy: Always

            env:
            # GCP Configuration
            - name: PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: PROJECT_ID

            - name: BIGQUERY_DATASET
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: BIGQUERY_DATASET

            - name: GCS_BUCKET
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: GCS_BUCKET

            # Anthropic API Key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: ANTHROPIC_API_KEY

            # Optional: GitHub Token
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: GITHUB_TOKEN
                  optional: true

            # Optional: Slack Webhook
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: SLACK_WEBHOOK_URL
                  optional: true

            # Optional: Email Configuration
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: SMTP_HOST
                  optional: true

            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: SMTP_PORT
                  optional: true

            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: SMTP_USER
                  optional: true

            - name: SMTP_PASSWORD
              [VAPORIZED_PWD]:
                secretKeyRef:
                  name: api-keys
                  key: SMTP_PASSWORD
                  [VAPORIZED_PWD]: true

            - name: CEO_EMAIL
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: CEO_EMAIL
                  optional: true

            # Ethical Scraping Configuration
            - name: SCRAPER_USER_AGENT
              value: "PNKLN-Intelligence-Bot/1.0 (+https://pnkln.ai/bot-policy)"

            - name: SCRAPER_CONTACT
              value: "redacted@shadowtag-v4.local"

            - name: RESPECT_ROBOTS_TXT
              value: "true"

            - name: DEFAULT_CRAWL_DELAY
              value: "3.0"

            # Resource Requests and Limits
            resources:
              requests:
                cpu: "2"
                memory: "8Gi"
              limits:
                cpu: "4"
                memory: "16Gi"

            # Main Pipeline Execution
            command: ["/bin/bash", "-c"]
            args:
            - |
              #!/bin/bash
              set -e

              echo "╔══════════════════════════════════════════════════════════════╗"
              echo "║  🧠 PNKLN NIGHTLY INTELLIGENCE PIPELINE                      ║"
              echo "║  GKE-Native | 5th Namespace | ATP 5-19 RA-1 Compliant       ║"
              echo "╚══════════════════════════════════════════════════════════════╝"
              echo ""
              echo "Started: $(date -Iseconds)"
              echo ""

              # Navigate to app directory
              cd /app

              # Step 1: Ingestion (ethical scraping)
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📥 STEP 1: Intelligence Ingestion"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              python -m src.pipeline.ingestion
              echo ""

              # Step 2: JR Engine scoring
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🎯 STEP 2: JR Engine Scoring"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              python -m src.pipeline.jr_scoring
              echo ""

              # Step 3: Tier classification
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📊 STEP 3: Tier Classification"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              python -m src.pipeline.tier_classification
              echo ""

              # Step 4: Cor Brain synthesis (Tier 1 only)
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🧠 STEP 4: Cor Brain Synthesis (Tier 1 Items)"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              python -m src.pipeline.cor_synthesis
              echo ""

              # Step 5: Tier 2 auto-actions
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "⚙️  STEP 5: Tier 2 Auto-Actions"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              python -m src.pipeline.tier2_actions
              echo ""

              # Step 6: BigQuery storage
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "💾 STEP 6: BigQuery Storage"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              python -m src.pipeline.bigquery_storage
              echo ""

              # Step 7: Deliver AM briefing
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "📧 STEP 7: Morning Briefing Delivery"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              python -m src.pipeline.briefing_delivery
              echo ""

              echo "╔══════════════════════════════════════════════════════════════╗"
              echo "║  ✅ PIPELINE COMPLETE                                        ║"
              echo "╚══════════════════════════════════════════════════════════════╝"
              echo "Completed: $(date -Iseconds)"
              echo ""
              echo "ATP 5-19 Risk Status: RA-1 (Low - Compliant)"
              echo "Ethical Scraping: ✓ robots.txt respected"
              echo "Rate Limiting: ✓ Domain-specific delays applied"
              echo "Circuit Breakers: ✓ Failure protection enabled"
              echo ""

          # Pod-level settings
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000

          # Node affinity for cost optimization (preemptible nodes acceptable for nightly batch)
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                  - key: cloud.google.com/gke-preemptible
                    operator: In
                    values:
                    - "true"
