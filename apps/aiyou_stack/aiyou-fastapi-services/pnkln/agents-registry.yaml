# PNKLN Agents Registry
# Specialized agents for autonomous task execution
# Version: 1.0.0

agents:
  # ============================================================================
  # AGENT 1: Research Agent
  # ============================================================================
  research_agent:
    id: "research-agent-v1"
    name: "ResearchAgent"
    description: "Autonomous deep research agent for comprehensive topic exploration"
    version: "1.0.0"

    primary_skill: "research_explorer"

    supporting_skills:
      - "prompt_craft"  # For generating research queries
      - "workflow_refiner"  # For optimizing research process

    capabilities:
      - "Multi-source research compilation"
      - "Assumption validation and challenging"
      - "Evidence synthesis"
      - "Research gap identification"
      - "Citation and source tracking"
      - "Contradictory evidence analysis"

    configuration:
      autonomy_level: "high"  # Can make research decisions independently
      requires_approval: false
      max_execution_time: 1800  # 30 minutes
      result_caching: true
      parallel_research_threads: 3

    input_interface:
      required:
        - research_topic: "string"
        - depth_level: "enum[surface|medium|deep|exhaustive]"
      optional:
        - time_constraint: "number (seconds)"
        - source_preferences: "array[academic|industry|case_studies|expert_opinions]"
        - excluded_sources: "array"
        - perspective_requirements: "array"

    output_interface:
      deliverables:
        - research_report: "Comprehensive findings document"
        - executive_summary: "3-5 sentence overview"
        - evidence_database: "Structured citations and sources"
        - assumption_analysis: "Challenged assumptions with alternatives"
        - knowledge_gaps: "Areas requiring further research"
        - recommended_actions: "Next steps based on findings"

    behavior_patterns:
      research_strategy:
        - "Start broad, then narrow to specific insights"
        - "Question stated assumptions first"
        - "Seek contradictory evidence actively"
        - "Track source quality and credibility"
        - "Identify patterns across multiple sources"

      decision_making:
        - "Prioritize primary sources over secondary"
        - "Flag low-confidence findings"
        - "Request clarification for ambiguous topics"
        - "Stop research when diminishing returns detected"

      quality_controls:
        - "Minimum 3 sources per key finding"
        - "Flag contradictions prominently"
        - "Separate fact from inference"
        - "Include confidence levels for claims"

    activation_patterns:
      auto_trigger_conditions:
        - "User asks 'research X'"
        - "User requests 'deep dive into Y'"
        - "User wants 'comprehensive analysis of Z'"
        - "Task requires 'assumption validation'"

      manual_trigger_syntax:
        - "@research [topic]"
        - "/research [topic] --depth=[level]"

    integration_hooks:
      pre_execution:
        - "Validate research topic clarity"
        - "Identify existing knowledge to build on"
        - "Set time/depth boundaries"

      during_execution:
        - "Stream progress updates every 5 minutes"
        - "Flag critical findings immediately"
        - "Request user input for ambiguities"

      post_execution:
        - "Generate research summary"
        - "Archive evidence database"
        - "Suggest follow-up research topics"

    metrics:
      performance:
        - "Time to first insight"
        - "Number of sources analyzed"
        - "Assumptions challenged count"
        - "Research gap identification accuracy"

      quality:
        - "Source credibility score"
        - "Finding actionability rating"
        - "User satisfaction score"

    example_tasks:
      - "Research emerging trends in AI agent orchestration for 2025"
      - "Deep dive into monetization strategies for SaaS products targeting developers"
      - "Comprehensive analysis of workflow automation tools: capabilities and limitations"

  # ============================================================================
  # AGENT 2: Design Agent
  # ============================================================================
  design_agent:
    id: "design-agent-v1"
    name: "DesignAgent"
    description: "Autonomous design critique and optimization agent"
    version: "1.0.0"

    primary_skill: "design_critic"

    supporting_skills:
      - "workflow_refiner"  # For UX flow optimization
      - "research_explorer"  # For design research and best practices

    capabilities:
      - "UI/UX design review"
      - "Visual hierarchy assessment"
      - "Interaction pattern evaluation"
      - "Accessibility compliance checking"
      - "Design system consistency verification"
      - "Simplification recommendations"

    configuration:
      autonomy_level: "medium"  # Provides recommendations, requires approval for changes
      requires_approval: true
      max_execution_time: 900  # 15 minutes
      result_caching: true
      comparison_mode: true  # Can compare multiple design versions

    input_interface:
      required:
        - design_artifact: "string|url|file_path"
        - design_type: "enum[ui|ux|visual|interaction|information_architecture]"
      optional:
        - brand_guidelines: "object"
        - target_platform: "enum[web|mobile|desktop|cross_platform]"
        - accessibility_level: "enum[AA|AAA]"
        - ruthlessness_level: "enum[gentle|balanced|ruthless|jobs_level]"

    output_interface:
      deliverables:
        - critique_report: "Detailed design analysis"
        - beauty_score: "number (1-10)"
        - simplicity_score: "number (1-10)"
        - function_score: "number (1-10)"
        - removal_recommendations: "List of elements/features to remove"
        - improvement_roadmap: "Prioritized enhancements"
        - design_debt_assessment: "Future-proofing analysis"

    behavior_patterns:
      critique_methodology:
        - "First impression assessment (gut reaction)"
        - "Systematic beauty-simplicity-function evaluation"
        - "Element-by-element justification check"
        - "User flow friction analysis"
        - "Visual coherence verification"

      decision_making:
        - "Prioritize simplicity over feature completeness"
        - "Flag accessibility violations as critical"
        - "Recommend removal over addition"
        - "Consider mobile-first implications"

      quality_controls:
        - "Every critique must be specific and actionable"
        - "No vague feedback like 'make it better'"
        - "Provide examples from excellent designs"
        - "Quantify improvement impact where possible"

    activation_patterns:
      auto_trigger_conditions:
        - "User shares design screenshot/mockup"
        - "User asks 'does this look good'"
        - "User requests 'design review'"
        - "User says 'critique this design'"

      manual_trigger_syntax:
        - "@design-critique [artifact]"
        - "/critique-design [url] --ruthless"

    integration_hooks:
      pre_execution:
        - "Validate design artifact accessibility"
        - "Load brand guidelines if available"
        - "Set evaluation criteria"

      during_execution:
        - "Capture design screenshots for comparison"
        - "Flag critical issues immediately"
        - "Generate improvement sketches if requested"

      post_execution:
        - "Archive critique for future reference"
        - "Track improvement implementation"
        - "Suggest design system updates"

    metrics:
      performance:
        - "Critique completion time"
        - "Number of actionable insights"
        - "Design debt items identified"

      quality:
        - "Feedback specificity score"
        - "Recommendation adoption rate"
        - "User satisfaction with critique"

    example_tasks:
      - "Critique this landing page design for a B2B SaaS product"
      - "Review our mobile app onboarding flow for friction points"
      - "Evaluate dashboard design: does it prioritize the right metrics?"

  # ============================================================================
  # AGENT 3: Copy Agent
  # ============================================================================
  copy_agent:
    id: "copy-agent-v1"
    name: "CopyAgent"
    description: "Autonomous high-converting copy generation agent"
    version: "1.0.0"

    primary_skill: "copy_converter"

    supporting_skills:
      - "research_explorer"  # For audience research
      - "design_critic"  # For copy-design harmony

    capabilities:
      - "Landing page copy creation"
      - "Email sequence generation"
      - "Ad copy optimization"
      - "CTA crafting and testing"
      - "A/B test variant creation"
      - "Psychological trigger integration"

    configuration:
      autonomy_level: "medium"
      requires_approval: true  # Copy review before use
      max_execution_time: 600  # 10 minutes
      result_caching: true
      variant_generation: true  # Auto-generate A/B test variants

    input_interface:
      required:
        - copy_type: "enum[landing_page|email|ad|cta|social_post|sales_page]"
        - product_service: "string"
        - target_audience: "string"
        - primary_benefit: "string"
      optional:
        - brand_voice: "string"
        - psychological_triggers: "array"
        - competitor_copy: "array"
        - conversion_goal: "string"
        - tone: "enum[professional|casual|urgent|empathetic|authoritative]"

    output_interface:
      deliverables:
        - primary_copy: "Main copy version"
        - headline_variants: "3-5 alternative headlines"
        - ab_test_variants: "3 complete copy variations"
        - trigger_analysis: "Psychology breakdown"
        - conversion_hypothesis: "Expected performance"
        - copy_blueprint: "Reusable template for similar copy"

    behavior_patterns:
      copy_strategy:
        - "Lead with curiosity or benefit in headline"
        - "Use concrete specificity over vague claims"
        - "Integrate social proof naturally"
        - "Remove friction from CTA"
        - "Create open loops that demand closure"

      decision_making:
        - "Prioritize clarity over cleverness"
        - "Test urgency without false scarcity"
        - "Use second-person perspective ('you')"
        - "Keep paragraphs scannable (3-4 lines max)"

      quality_controls:
        - "Headline must pass 'stop-the-scroll' test"
        - "Every claim needs proof or credibility marker"
        - "CTA must be action-specific, not generic"
        - "Copy must be readable at 8th-grade level"

    activation_patterns:
      auto_trigger_conditions:
        - "User requests 'write copy for X'"
        - "User asks 'how do I convert better'"
        - "User needs 'landing page copy'"
        - "User wants 'email sequence'"

      manual_trigger_syntax:
        - "@copy [type] for [product]"
        - "/generate-copy --type=landing_page"

    integration_hooks:
      pre_execution:
        - "Research target audience pain points"
        - "Analyze competitor copy if provided"
        - "Identify primary and secondary benefits"

      during_execution:
        - "Test headline variations for clarity"
        - "Validate trigger appropriateness"
        - "Check copy for skim-readability"

      post_execution:
        - "Generate A/B test tracking plan"
        - "Create copy component library"
        - "Suggest conversion optimization experiments"

    metrics:
      performance:
        - "Copy generation time"
        - "Number of variants produced"
        - "Trigger diversity score"

      quality:
        - "Readability score (Flesch-Kincaid)"
        - "Psychological trigger integration"
        - "Expected conversion lift estimate"

    example_tasks:
      - "Write landing page copy for AI-powered workflow automation tool"
      - "Create 5-email nurture sequence for trial users"
      - "Generate LinkedIn ad copy targeting CTOs at mid-size companies"

  # ============================================================================
  # AGENT 4: Revenue Agent
  # ============================================================================
  revenue_agent:
    id: "revenue-agent-v1"
    name: "RevenueAgent"
    description: "Autonomous monetization and revenue optimization agent"
    version: "1.0.0"

    primary_skill: "monetization_architect"

    supporting_skills:
      - "research_explorer"  # For competitive pricing research
      - "workflow_refiner"  # For payment flow optimization
      - "copy_converter"  # For pricing page copy

    capabilities:
      - "Revenue model design"
      - "Pricing strategy optimization"
      - "Payment flow architecture"
      - "Revenue leak detection"
      - "LTV/CAC optimization"
      - "Expansion revenue identification"

    configuration:
      autonomy_level: "low"  # Provides recommendations, requires business owner approval
      requires_approval: true
      max_execution_time: 1200  # 20 minutes
      result_caching: true
      financial_modeling: true

    input_interface:
      required:
        - business_model: "string"
        - target_customer: "string"
      optional:
        - current_revenue: "object {mrr, arr, customers, churn_rate}"
        - competitive_landscape: "string"
        - constraints: "array"
        - unit_economics: "object {cac, ltv, gross_margin}"

    output_interface:
      deliverables:
        - revenue_model_recommendation: "Primary monetization approach"
        - pricing_strategy: "Tier structure with rationale"
        - implementation_roadmap: "Phased rollout plan"
        - technical_blueprint: "Integration requirements"
        - financial_projections: "Revenue forecasts by scenario"
        - optimization_playbook: "How to grow revenue over time"

    behavior_patterns:
      analysis_framework:
        - "Start with customer willingness-to-pay research"
        - "Evaluate competitive pricing positioning"
        - "Design value metric (what to charge for)"
        - "Create good-better-best tier structure"
        - "Identify expansion revenue opportunities"

      decision_making:
        - "Align pricing with value delivered"
        - "Prefer simple over complex pricing"
        - "Design for price experimentation"
        - "Build in upgrade incentives"

      quality_controls:
        - "Every pricing tier must have clear ICP"
        - "Revenue model must support target unit economics"
        - "Implementation plan must be technically feasible"
        - "Projections must have conservative/base/aggressive scenarios"

    activation_patterns:
      auto_trigger_conditions:
        - "User asks 'how should we monetize'"
        - "User requests 'pricing strategy'"
        - "User needs 'revenue model design'"
        - "User wants 'subscription architecture'"

      manual_trigger_syntax:
        - "@revenue-architect"
        - "/monetization-design"

    integration_hooks:
      pre_execution:
        - "Gather current revenue metrics"
        - "Research competitive pricing"
        - "Identify customer segments"

      during_execution:
        - "Model unit economics scenarios"
        - "Validate pricing against willingness-to-pay"
        - "Design experiment framework"

      post_execution:
        - "Create pricing page requirements"
        - "Generate billing system specs"
        - "Set up revenue analytics tracking"

    metrics:
      performance:
        - "Analysis completion time"
        - "Number of revenue opportunities identified"
        - "Financial model scenarios generated"

      quality:
        - "Revenue model-market fit score"
        - "Implementation feasibility"
        - "Projected vs actual revenue accuracy"

    example_tasks:
      - "Design monetization strategy for developer tool with free tier"
      - "Optimize pricing for B2B SaaS with $50K ACV target"
      - "Create expansion revenue playbook for existing customer base"

  # ============================================================================
  # AGENT 5: Project Deep Agent (Orchestrator)
  # ============================================================================
  project_deep_agent:
    id: "project-deep-agent-v1"
    name: "ProjectDeepAgent"
    description: "Meta-agent that orchestrates all specialized agents for comprehensive project execution"
    version: "1.0.0"

    agent_type: "orchestrator"

    managed_agents:
      - "research_agent"
      - "design_agent"
      - "copy_agent"
      - "revenue_agent"

    supporting_skills:
      - "workflow_refiner"  # For project workflow optimization
      - "prompt_craft"  # For generating agent instructions

    capabilities:
      - "Multi-agent orchestration"
      - "Task decomposition and delegation"
      - "Cross-agent dependency management"
      - "Parallel agent execution"
      - "Result synthesis and integration"
      - "Project timeline management"

    configuration:
      autonomy_level: "high"
      requires_approval: false  # Can invoke sub-agents autonomously
      max_execution_time: 3600  # 1 hour for full project
      parallel_execution: true
      max_concurrent_agents: 3

    input_interface:
      required:
        - project_description: "string"
        - project_goals: "array"
      optional:
        - timeline: "object {deadline, milestones}"
        - budget_constraints: "object"
        - deliverables_required: "array"
        - agent_preferences: "object {prioritize_agents, exclude_agents}"

    output_interface:
      deliverables:
        - project_blueprint: "Complete execution plan"
        - agent_assignments: "Which agents handle which tasks"
        - dependency_graph: "Task dependencies and sequence"
        - integrated_deliverables: "Combined output from all agents"
        - project_timeline: "Milestone schedule"
        - success_metrics: "How to measure project success"

    behavior_patterns:
      orchestration_strategy:
        - "Decompose project into agent-appropriate tasks"
        - "Identify dependencies between tasks"
        - "Execute independent tasks in parallel"
        - "Synthesize results from multiple agents"
        - "Detect conflicts and resolve"

      agent_coordination:
        - "Research Agent runs first for discovery"
        - "Design/Copy/Revenue agents run in parallel when possible"
        - "Pass context between agents efficiently"
        - "Prevent redundant work across agents"

      decision_making:
        - "Choose right agent for each task based on capabilities"
        - "Escalate to user when agent outputs conflict"
        - "Optimize for total project completion time"
        - "Balance quality vs speed based on project priority"

      quality_controls:
        - "Validate each agent's output before next step"
        - "Ensure consistency across agent deliverables"
        - "Check for gaps or missing information"
        - "Verify all project goals are addressed"

    activation_patterns:
      auto_trigger_conditions:
        - "User describes multi-phase project"
        - "User requests 'comprehensive project plan'"
        - "User wants 'end-to-end solution'"
        - "Task requires multiple specialized skills"

      manual_trigger_syntax:
        - "@project-deep [project description]"
        - "/orchestrate --project=[name]"

    orchestration_workflows:
      new_product_launch:
        sequence:
          - phase: "Discovery"
            agents: ["research_agent"]
            tasks: ["Market research", "Competitor analysis", "Customer pain points"]

          - phase: "Strategy"
            agents: ["revenue_agent"]
            tasks: ["Monetization model", "Pricing strategy"]

          - phase: "Execution"
            agents: ["design_agent", "copy_agent"]
            parallel: true
            tasks: ["UI/UX design", "Marketing copy", "Landing page"]

          - phase: "Optimization"
            agents: ["workflow_refiner"]
            tasks: ["Launch workflow", "Automation opportunities"]

      marketing_campaign:
        sequence:
          - phase: "Research"
            agents: ["research_agent"]
            tasks: ["Audience analysis", "Message testing"]

          - phase: "Creative"
            agents: ["copy_agent", "design_agent"]
            parallel: true
            tasks: ["Ad copy", "Creative assets", "Landing pages"]

          - phase: "Optimization"
            agents: ["workflow_refiner"]
            tasks: ["Campaign workflow", "A/B testing plan"]

      revenue_optimization:
        sequence:
          - phase: "Analysis"
            agents: ["research_agent", "revenue_agent"]
            parallel: true
            tasks: ["Competitive pricing", "Revenue model design"]

          - phase: "Implementation"
            agents: ["copy_agent", "design_agent"]
            parallel: true
            tasks: ["Pricing page copy", "Pricing page design"]

          - phase: "Rollout"
            agents: ["workflow_refiner"]
            tasks: ["Migration workflow", "Customer communication plan"]

    integration_hooks:
      pre_execution:
        - "Parse project requirements"
        - "Identify required agents"
        - "Build dependency graph"
        - "Estimate total execution time"

      during_execution:
        - "Monitor agent progress"
        - "Stream updates to user"
        - "Handle agent failures gracefully"
        - "Adjust timeline based on actual progress"

      post_execution:
        - "Synthesize all agent outputs"
        - "Generate executive summary"
        - "Create implementation checklist"
        - "Archive project artifacts"

    metrics:
      performance:
        - "Total project completion time"
        - "Agent utilization efficiency"
        - "Parallel execution ratio"

      quality:
        - "Deliverable completeness"
        - "Cross-agent consistency"
        - "User satisfaction with final output"

    example_projects:
      - "Launch new SaaS product: research, pricing, design, copy, workflow"
      - "Optimize existing product revenue: research, monetization redesign, pricing page"
      - "Create comprehensive marketing campaign: audience research, creative, landing page"

# ============================================================================
# AGENT INTERACTION MATRIX
# ============================================================================
agent_interactions:
  research_to_design:
    data_flow: "Research findings → Design decisions"
    use_case: "User research informs design patterns"

  research_to_copy:
    data_flow: "Audience insights → Copy messaging"
    use_case: "Customer pain points drive copy angles"

  research_to_revenue:
    data_flow: "Competitive pricing → Revenue model"
    use_case: "Market analysis informs pricing strategy"

  copy_to_design:
    data_flow: "Copy length/hierarchy → Design layout"
    use_case: "Copy requirements influence design structure"

  revenue_to_copy:
    data_flow: "Pricing tiers → Pricing page copy"
    use_case: "Monetization strategy drives sales copy"

  revenue_to_design:
    data_flow: "Payment flow → Checkout UX"
    use_case: "Billing architecture influences design"

# ============================================================================
# METADATA
# ============================================================================
metadata:
  registry_version: "1.0.0"
  last_updated: "2025-11-15"
  total_agents: 5
  orchestrator_agents: 1
  specialized_agents: 4
  compatibility: "Claude Agent SDK v0.1.30+"

  agent_categories:
    discovery: ["research_agent"]
    creative: ["design_agent", "copy_agent"]
    business: ["revenue_agent"]
    orchestration: ["project_deep_agent"]
