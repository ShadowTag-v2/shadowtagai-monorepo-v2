# Boy Scout Rule Metadata Registry
# Philosophy: Leave everything cleaner than you found it - and prove it
# Version: 1.0.0

version: "1.0.0"
description: "Boy Scout Rule Metadata Registry - Skills and Agents with cleanup tracking"
philosophy: "Leave everything cleaner than you found it - and prove it"

skills:
  - name: ResearchExplorerSkill
    description: "Perform deep topic exploration: web search, assumption-challenging, opportunity spotting."
    triggers:
      - "topic is ambiguous"
      - "what are we missing"
    version: "1.0"

  - name: DesignCriticSkill
    description: "Review designs/artifacts (UI, flows, code structure) with Jobs-style criteria: beauty, simplicity, function."
    triggers:
      - "review design"
      - "critique UX"
      - "architectural clean-up"
    version: "1.0"

  - name: CopyConverterSkill
    description: "Given audience + offer + insights → generate high-converting copy, funnel assets, messaging."
    triggers:
      - "write copy"
      - "funnel script"
      - "positioning"
    version: "1.0"

  - name: MonetizationArchitectSkill
    description: "Given content + audience + offer → design backend revenue systems: upsell, continuity, premium tiers."
    triggers:
      - "monetization plan"
      - "increase lifetime value"
      - "scale revenue"
    version: "1.0"

  - name: WorkflowRefinerSkill
    description: "Take existing workflow/architecture and simplify ruthlessly: merge/remove steps, increase leverage."
    triggers:
      - "optimize flow"
      - "simplify process"
      - "remove complexity"
    version: "1.0"

  - name: PromptCraftSkill
    description: "Generate elegant, structured prompts for tasks, embedding our voice & frameworks (RTF, TAG, etc.)."
    triggers:
      - "build prompt"
      - "agent template"
      - "prompt engineering"
    version: "1.0"

agents:
  - name: ResearchAgent
    skills:
      - ResearchExplorerSkill
    description: "Agent that conducts broad/deep research, surfaces hidden assumptions & 10× opportunities."
    metadataTemplate:
      boyScoutRuleMetadata:
        filesTouched: []
        cleanupActions: []
        cleanerThanFound: true
        baselineState: ""
        newState: ""

  - name: DesignAgent
    skills:
      - DesignCriticSkill
    description: "Agent that reviews design/artifact flows, asks 'why must it be so?', proposes improvement + Boy Scout rule clean-up."
    metadataTemplate:
      boyScoutRuleMetadata:
        filesTouched: []
        cleanupActions: []
        cleanerThanFound: true
        baselineState: ""
        newState: ""

  - name: CopyAgent
    skills:
      - CopyConverterSkill
    description: "Agent that writes high-leverage copy: funnel scripts, landing pages, positioning, voice aligned with brand."
    metadataTemplate:
      boyScoutRuleMetadata:
        filesTouched: []
        cleanupActions: []
        cleanerThanFound: true
        baselineState: ""
        newState: ""

  - name: RevenueAgent
    skills:
      - MonetizationArchitectSkill
    description: "Agent that maps offers to scalable revenue systems: core offer, upsell, continuity, premium tier, lifetime value."
    metadataTemplate:
      boyScoutRuleMetadata:
        filesTouched: []
        cleanupActions: []
        cleanerThanFound: true
        baselineState: ""
        newState: ""

  - name: PromptAgent
    skills:
      - PromptCraftSkill
    description: "Agent that constructs internal prompt templates and agent system prompts, our backbone for prompt engineering."
    metadataTemplate:
      boyScoutRuleMetadata:
        filesTouched: []
        cleanupActions: []
        cleanerThanFound: true
        baselineState: ""
        newState: ""

  - name: ProjectDeepAgent
    skills:
      - ResearchExplorerSkill
      - DesignCriticSkill
      - CopyConverterSkill
      - MonetizationArchitectSkill
      - WorkflowRefinerSkill
      - PromptCraftSkill
    description: "Deep orchestration agent: runs full project flows, orchestrates sub-agents, ensures high-craft standard."
    metadataTemplate:
      boyScoutRuleMetadata:
        filesTouched: []
        cleanupActions: []
        cleanerThanFound: true
        baselineState: ""
        newState: ""
