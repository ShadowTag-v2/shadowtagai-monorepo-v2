version: '3.8'

services:
  # Infrastructure Builder API (Development)
  infrastructure-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infrastructure-builder-dev
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - AWS_REGION=us-east-1
    volumes:
      - ./app:/app/app
      - ./terraform:/app/terraform:ro
    networks:
      - dev-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

networks:
  dev-network:
    driver: bridge
