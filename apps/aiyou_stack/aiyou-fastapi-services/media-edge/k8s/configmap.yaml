apiVersion: v1
kind: ConfigMap
metadata:
  name: media-edge-config
  namespace: pnkln-production
  labels:
    app: pnkln
    component: media-edge
data:
  # GCS configuration
  GCS_BUCKET: "cineverse-media-prod"
  GCS_PREFIX: "hls/"

  # Cache configuration (MVP: 512MB)
  CACHE_SIZE_MB: "512"
  CACHE_TTL_SECONDS: "3600"

  # Server configuration
  LISTEN_ADDR: "0.0.0.0:8080"
  METRICS_ADDR: "0.0.0.0:9090"
