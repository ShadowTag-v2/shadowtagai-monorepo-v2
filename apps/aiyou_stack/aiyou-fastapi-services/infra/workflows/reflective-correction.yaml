main:
  params: [input] # Expects input like: { "original_code": "...", "error_message": "..." }
  steps:
    - init:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - location: "us-central1"
          - fixer_agent_url: "https://fixer-agent-abc123xyz-uc.a.run.app" 
          - reviewer_agent_url: "https://reviewer-agent-abc123xyz-uc.a.run.app"
          - max_attempts: 3
          - last_rejection_reason: ""
          - fix_approved: false
          - final_fix: ""

    - prepare_inputs_from_string:
         assign:
            - original_code: ${input.original_code}
            - error_message: ${input.error_message}

    - fix_and_review_loop:
        for:
            value: attempt
            range: [1, 3]
            steps:
                - check_approval:
                    switch:
                        - condition: ${fix_approved}
                          next: break_loop

                - call_fixer:
                    call: http.post
                    args:
                        url: ${fixer_agent_url}
                        auth:
                            type: OIDC
                        body:
                            original_code: ${original_code}
                            error_message: ${error_message}
                            rejection_reason: ${last_rejection_reason}
                    result: fixer_response

                - assign_fix:
                    assign:
                        - proposed_fix: ${fixer_response.body.proposed_fix}

                - call_reviewer:
                    call: http.post
                    args:
                        url: ${reviewer_agent_url}
                        auth:
                            type: OIDC
                        body:
                            original_code: ${original_code}
                            error_message: ${error_message}
                            proposed_fix: ${proposed_fix}
                    result: reviewer_response

                - evaluate_review:
                    assign:
                        - fix_approved: ${reviewer_response.body.approved}
                        - last_rejection_reason: ${reviewer_response.body.reason}
                        - final_fix: ${proposed_fix}

    - final_check:
        switch:
            - condition: ${fix_approved}
              return:
                  status: "SUCCESS"
                  fix: ${final_fix}
            - condition: true
              return:
                  status: "FAILED"
                  reason: "Max retries exceeded"
