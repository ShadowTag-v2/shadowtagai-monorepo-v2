# Example Training Job on A100 2-GPU
# Fine-tunes a model using PyTorch

apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: llama-finetune-job
  namespace: ml-training
  labels:
    app: training
    model: llama
    task: fine-tuning
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: training
            role: master
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          serviceAccountName: training-sa

          # Node selection for A100 2-GPU nodes
          nodeSelector:
            workload: fine-tuning
            gpu: a100

          # Tolerate GPU taint
          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule

          containers:
            - name: pytorch
              image: gcr.io/omega-production/pytorch-training:latest
              imagePullPolicy: Always

              command:
                - python
                - /workspace/train.py

              args:
                - --model=llama-7b
                - --dataset=gs://omega-data/fine-tune-dataset
                - --output=gs://omega-models/llama-7b-finetuned
                - --epochs=3
                - --batch-size=32
                - --learning-rate=2e-5
                - --warmup-steps=500
                - --gradient-accumulation-steps=4
                - --fp16
                - --deepspeed=ds_config.json

              env:
                - name: WORLD_SIZE
                  value: "4"  # 1 master + 3 workers
                - name: RANK
                  value: "0"
                - name: MASTER_ADDR
                  value: "llama-finetune-job-master-0"
                - name: MASTER_PORT
                  value: "23456"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: CUDA_VISIBLE_DEVICES
                  value: "0,1"
                - name: PYTHONUNBUFFERED
                  value: "1"

              resources:
                requests:
                  nvidia.com/gpu: "2"
                  memory: "64Gi"
                  cpu: "16"
                limits:
                  nvidia.com/gpu: "2"
                  memory: "128Gi"
                  cpu: "32"

              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm
                - name: checkpoint-storage
                  mountPath: /workspace/checkpoints
                - name: cache
                  mountPath: /root/.cache

          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: "32Gi"
            - name: checkpoint-storage
              persistentVolumeClaim:
                claimName: training-checkpoints-pvc
            - name: cache
              emptyDir:
                sizeLimit: "100Gi"

          # Init container to download model
          initContainers:
            - name: download-model
              image: google/cloud-sdk:alpine
              command:
                - gsutil
                - -m
                - cp
                - -r
                - gs://omega-models/llama-7b
                - /workspace/models/
              volumeMounts:
                - name: cache
                  mountPath: /workspace/models

    Worker:
      replicas: 3
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: training
            role: worker
        spec:
          serviceAccountName: training-sa

          nodeSelector:
            workload: fine-tuning
            gpu: a100

          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule

          containers:
            - name: pytorch
              image: gcr.io/omega-production/pytorch-training:latest
              imagePullPolicy: Always

              command:
                - python
                - /workspace/train.py

              args:
                - --model=llama-7b
                - --dataset=gs://omega-data/fine-tune-dataset
                - --output=gs://omega-models/llama-7b-finetuned
                - --epochs=3
                - --batch-size=32
                - --learning-rate=2e-5
                - --warmup-steps=500
                - --gradient-accumulation-steps=4
                - --fp16
                - --deepspeed=ds_config.json

              env:
                - name: WORLD_SIZE
                  value: "4"
                - name: MASTER_ADDR
                  value: "llama-finetune-job-master-0"
                - name: MASTER_PORT
                  value: "23456"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: CUDA_VISIBLE_DEVICES
                  value: "0,1"
                - name: PYTHONUNBUFFERED
                  value: "1"

              resources:
                requests:
                  nvidia.com/gpu: "2"
                  memory: "64Gi"
                  cpu: "16"
                limits:
                  nvidia.com/gpu: "2"
                  memory: "128Gi"
                  cpu: "32"

              volumeMounts:
                - name: dshm
                  mountPath: /dev/shm
                - name: checkpoint-storage
                  mountPath: /workspace/checkpoints
                - name: cache
                  mountPath: /root/.cache

          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: "32Gi"
            - name: checkpoint-storage
              persistentVolumeClaim:
                claimName: training-checkpoints-pvc
            - name: cache
              emptyDir:
                sizeLimit: "100Gi"

---
# PersistentVolumeClaim for checkpoints
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-checkpoints-pvc
  namespace: ml-training
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 500Gi
