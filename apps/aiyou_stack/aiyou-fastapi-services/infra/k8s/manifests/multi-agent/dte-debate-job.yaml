# DTE (Debate-Test-Evolve) Multi-Agent Job
# Runs parallel agent debates with automatic evolution

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dte-config
  namespace: pinkln-system
data:
  config.yaml: |
    debate:
      group_size: 8
      rounds: 3
      timeout_seconds: 300

    kernels:
      available:
        - cot
        - tot
        - rcr
        - rtf
        - tag
        - bab
        - care
        - rise
      default_chain: "cot-tot-rcr"

    evolution:
      enabled: true
      mutation_rate: 0.1
      crossover_rate: 0.3
      elite_size: 2

    glicko:
      service_url: "http://glicko-service:8080"
      update_after_debate: true

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-shared-memory-pvc
  namespace: pinkln-system
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard-rwx
  resources:
    requests:
      storage: 100Gi

---
apiVersion: batch/v1
kind: Job
metadata:
  name: dte-debate-humaneval
  namespace: pinkln-system
  labels:
    app: pinkln-dte
    workload: multi-agent
    benchmark: humaneval
spec:
  parallelism: 8
  completions: 8
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: pinkln-dte
        phase: debate
    spec:
      serviceAccountName: training-sa
      restartPolicy: Never

      # Target multi-agent node pool
      nodeSelector:
        workload: multi-agent
        gpu: a100

      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

      initContainers:
        # Download models and setup environment
        - name: setup
          image: google/cloud-sdk:alpine
          command:
            - /bin/sh
            - -c
            - |
              echo "Setting up agent environment..."
              mkdir -p /workspace/shared/models
              mkdir -p /workspace/shared/results
              echo "Setup complete"
          volumeMounts:
            - name: agent-shared-memory
              mountPath: /workspace/shared

      containers:
        - name: agent
          image: gcr.io/omega-production/pinkln-agent:latest
          imagePullPolicy: Always

          command:
            - python
            - /app/dte_runner.py

          args:
            - --mode=debate
            - --benchmark=humaneval
            - --kernel-chain=cot-tot-rcr
            - --group-size=8
            - --output=gs://omega-models/dte-results/

          env:
            - name: AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: GLICKO_SERVICE_URL
              value: "http://glicko-service:8080"
            - name: REDIS_HOST
              value: "redis-master"
            - name: REDIS_PORT
              value: "6379"
            - name: GRPO_ENABLED
              value: "true"
            - name: GROUP_SIZE
              value: "8"
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: PYTHONUNBUFFERED
              value: "1"

          resources:
            requests:
              nvidia.com/gpu: "1"
              memory: "32Gi"
              cpu: "8"
            limits:
              nvidia.com/gpu: "1"
              memory: "64Gi"
              cpu: "16"

          volumeMounts:
            - name: agent-shared-memory
              mountPath: /workspace/shared
            - name: dshm
              mountPath: /dev/shm
            - name: dte-config
              mountPath: /etc/dte
              readOnly: true

      volumes:
        - name: agent-shared-memory
          persistentVolumeClaim:
            claimName: agent-shared-memory-pvc
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "16Gi"
        - name: dte-config
          configMap:
            name: dte-config

---
# CronJob for continuous DTE debates
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dte-debate-continuous
  namespace: pinkln-system
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      parallelism: 8
      completions: 8
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: pinkln-dte
            phase: debate
            continuous: "true"
        spec:
          serviceAccountName: training-sa
          restartPolicy: Never

          nodeSelector:
            workload: multi-agent
            gpu: a100

          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule

          containers:
            - name: agent
              image: gcr.io/omega-production/pinkln-agent:latest
              command:
                - python
                - /app/dte_runner.py
              args:
                - --mode=debate
                - --benchmark=humaneval
                - --kernel-chain=auto
                - --group-size=8
                - --evolution=true
              env:
                - name: AGENT_ID
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: GLICKO_SERVICE_URL
                  value: "http://glicko-service:8080"
                - name: REDIS_HOST
                  value: "redis-master"
              resources:
                requests:
                  nvidia.com/gpu: "1"
                  memory: "32Gi"
                  cpu: "8"
                limits:
                  nvidia.com/gpu: "1"
                  memory: "64Gi"
                  cpu: "16"
              volumeMounts:
                - name: agent-shared-memory
                  mountPath: /workspace/shared
                - name: dshm
                  mountPath: /dev/shm
          volumes:
            - name: agent-shared-memory
              persistentVolumeClaim:
                claimName: agent-shared-memory-pvc
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: "16Gi"
