---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pnkln-api
  labels:
    app: pnkln-api
    version: v1.0.0
    component: ultrathink-framework
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pnkln-api
  template:
    metadata:
      labels:
        app: pnkln-api
        version: v1.0.0
    spec:
      containers:
      - name: pnkln-api
        image: us-central1-docker.pkg.dev/PROJECT_ID/pnkln-repo/pnkln-api:v1.0.0
        ports:
        - containerPort: 8000
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        volumeMounts:
        - name: data-volume
          mountPath: /app/data
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: pnkln-data-pvc
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: pnkln-api-service
  labels:
    app: pnkln-api
spec:
  type: LoadBalancer
  selector:
    app: pnkln-api
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pnkln-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard-rwo
