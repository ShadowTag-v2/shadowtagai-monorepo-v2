---
# ==============================================================================
# ATP519 Rules ConfigMap
# ==============================================================================
# This ConfigMap contains the enforcement rules for the Judge6 system
# Apply this BEFORE deploying judge6_deployment.yaml
#
# Usage:
#   kubectl apply -f atp519_configmap.yaml
# ==============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: atp519-rules
  namespace: judge6-system
  labels:
    app: judge6
    component: rules
data:
  rules.json: |
    {
      "version": "1.0",
      "rules": [
        {
          "id": "atp519-001",
          "name": "Request Size Limit",
          "description": "Enforce maximum request payload size",
          "type": "size_limit",
          "max_bytes": 1048576,
          "action": "reject",
          "enabled": true
        },
        {
          "id": "atp519-002",
          "name": "Rate Limiting",
          "description": "Limit requests per client IP",
          "type": "rate_limit",
          "requests_per_second": 100,
          "burst": 200,
          "action": "throttle",
          "enabled": true
        },
        {
          "id": "atp519-003",
          "name": "Content Validation",
          "description": "Validate request content type and structure",
          "type": "content_validation",
          "allowed_content_types": ["application/json"],
          "required_fields": ["model", "prompt"],
          "action": "reject",
          "enabled": true
        },
        {
          "id": "atp519-004",
          "name": "Token Budget",
          "description": "Enforce maximum token limits per request",
          "type": "token_limit",
          "max_input_tokens": 100000,
          "max_output_tokens": 4096,
          "action": "reject",
          "enabled": true
        },
        {
          "id": "atp519-005",
          "name": "Malicious Pattern Detection",
          "description": "Block known malicious patterns in prompts",
          "type": "pattern_detection",
          "patterns": [
            "(?i)\\bignore previous instructions\\b",
            "(?i)\\bjailbreak\\b",
            "(?i)\\bDAN mode\\b"
          ],
          "action": "reject",
          "enabled": true
        },
        {
          "id": "atp519-006",
          "name": "Latency Budget",
          "description": "Enforce p99 latency budget",
          "type": "latency_budget",
          "p99_ms": 50,
          "action": "alert",
          "enabled": true
        }
      ],
      "global_settings": {
        "default_action": "reject",
        "log_level": "info",
        "metrics_enabled": true,
        "circuit_breaker": {
          "enabled": true,
          "failure_threshold": 5,
          "timeout_seconds": 60,
          "half_open_max_requests": 3
        }
      }
    }
