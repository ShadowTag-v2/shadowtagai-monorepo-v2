apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: shadowtagai-backend-config
  namespace: shadowtagai-production
spec:
  # Health check configuration
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /health
    port: 8080

  # Connection draining
  connectionDraining:
    drainingTimeoutSec: 60

  # Session affinity
  sessionAffinity:
    affinityType: "NONE"

  # Timeout
  timeoutSec: 30

  # Security policy
  securityPolicy:
    name: "shadowtagai-security-policy"

  # Cloud CDN (if needed)
  cdn:
    enabled: false
    cachePolicy:
      includeHost: true
      includeProtocol: true
      includeQueryString: false

  # IAP (Identity-Aware Proxy) - optional
  iap:
    enabled: false
    oauthclientCredentials:
      secretName: shadowtagai-iap-secret
