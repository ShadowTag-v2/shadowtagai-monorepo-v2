steps:
  # 1. DOCTRINE INJECTION (Retrieve RoT Templates)
  - name: 'gcr.io/cloud-builders/git'
    args: ['clone', 'https://github.com/pnkln/doctrine-store.git', 'doctrine']

  # 2. CODEPMCS SCAN (The "Walk" Phase)
  - name: 'python:3.11'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        python3 codepmcs_gate.py --scan_mode=AGGRESSIVE

  # 3. BUILD THE SWARM IMAGE
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/antigravity-swarm', '.']

  # 4. DEPLOY TO CLOUD RUN (The "Run" Phase)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'antigravity-swarm'
      - '--image'
      - 'gcr.io/$PROJECT_ID/antigravity-swarm'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated' # Secured via internal Judge 6 logic
      - '--set-env-vars'
      - 'IQ_LOCK=160,MODE=COMBAT,JUDGE_LEVEL=6'

timeout: '1200s'
