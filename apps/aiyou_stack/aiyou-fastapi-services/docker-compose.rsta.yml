# ANTIGRAVITY // OPORD 2511-ALPHA
# 650-Agent RSTA Squadron - ATP 3-20.96 Aligned
# DATE: 29 NOV 2025
# REF: arXiv:2511.02824 // ATP 3-20.96

version: '3.9'

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-common-env: &common-env
  IQ_LOCK: "160"
  DECISION_PROTOCOL: "SOP-C-ENTROPY"
  CONFIDENCE_THRESHOLD: "0.75"
  DOCTRINE_REF: "ATP-3-20.96"

services:
  # ===========================================================================
  # HHT "HEADHUNTERS" - COMMAND & CONTROL (90 Agents)
  # Role: Superego & Orchestration Layer
  # Commander: Gemini 3 Pro | SJA: Judge #6
  # ===========================================================================
  hht-command:
    image: us-central1-docker.pkg.dev/acquired-jet-478701-b3/n-autoresearch/Kosmos/BioAgents/server:gemini25flash
    container_name: HHT_COMMAND_NODE
    hostname: hht.n-autoresearch/Kosmos/BioAgents.internal
    ports:
      - "8600:8080"   # Main Command Interface
      - "8601:9090"   # Judge #6 Audit Log
    environment:
      <<: *common-env
      ROLE: "COMMAND_AND_CONTROL"
      TROOP: "HHT"
      CALLSIGN: "HEADHUNTER-6"
      AGENT_COUNT: "90"
      MODEL_STRATEGIC: "gemini-3-pro-preview"
      MODEL_TACTICAL: "gemini-2.5-flash"
      # Staff Sections
      S2_INTEL_AGENTS: "20"
      S3_OPS_AGENTS: "20"
      S6_COMMS_AGENTS: "15"
      FSE_FIRES_AGENTS: "15"
      COMMAND_AGENTS: "10"
      TACP_AGENTS: "5"
      MEDICAL_AGENTS: "5"
      # Judge #6 Config
      JUDGE_ENABLED: "true"
      JUDGE_THRESHOLD: "0.75"
      JUDGE_POLICY_PATH: "/opt/policy"
    volumes:
      - ./mission_data:/opt/mission
      - ./judge_policy:/opt/policy
      - ./transcripts:/opt/transcripts
      - ./.whiteboard:/opt/whiteboard
    networks:
      - tactical-net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ===========================================================================
  # TROOP A "APACHE" - RSTA / INTEL (120 Agents)
  # Model: SuperGrok / Perplexity
  # Mission: Deep Reconnaissance & Market Intelligence
  # ===========================================================================
  troop-a-recon:
    image: us-central1-docker.pkg.dev/acquired-jet-478701-b3/n-autoresearch/Kosmos/BioAgents/server:gemini25flash
    hostname: apache.n-autoresearch/Kosmos/BioAgents.internal
    environment:
      <<: *common-env
      ROLE: "RSTA"
      TROOP: "A"
      CALLSIGN: "APACHE"
      AGENT_COUNT: "30"  # Per replica (4 replicas = 120)
      MODEL_PRIMARY: "grok-beta"
      MODEL_SECONDARY: "llama-3.1-sonar-large-128k-online"
      SCAN_MODE: "DEEP_DIVE"
      TARGET_TYPE: "revenue_gap"
      # Reconnaissance Tasks (ATP Ch.3)
      RECON_ZONE: "true"      # Find ALL info in zone
      RECON_AREA: "true"      # Detailed info on specific area
      RECON_ROUTE: "true"     # Route trafficability
      RECON_FORCE: "true"     # Test enemy strength
      # Protocol 2511
      ENTROPY_CHECK: "true"
      ESCALATE_THRESHOLD: "0.75"
    volumes:
      - ./transcripts:/opt/transcripts
      - ./.whiteboard:/opt/whiteboard
    networks:
      - tactical-net
    logging: *default-logging
    depends_on:
      hht-command:
        condition: service_healthy
    deploy:
      replicas: 4
      resources:
        limits:
          memory: 2G

  # ===========================================================================
  # TROOP B "BRAVO" - HEAVY ARMOR / BACKEND (130 Agents)
  # Model: Gemini 1.5 Pro / Ultra
  # Mission: Heavy Lift Engineering
  # ===========================================================================
  troop-b-armor:
    image: us-central1-docker.pkg.dev/acquired-jet-478701-b3/n-autoresearch/Kosmos/BioAgents/server:gemini25flash
    hostname: bravo.n-autoresearch/Kosmos/BioAgents.internal
    environment:
      <<: *common-env
      ROLE: "HEAVY_ENGINEERING"
      TROOP: "B"
      CALLSIGN: "BRAVO"
      AGENT_COUNT: "32"  # Per replica (4 replicas ≈ 130)
      MODEL_PRIMARY: "gemini-3.1-flash-lite-preview"
      MODEL_SECONDARY: "gemini-2.5-flash"
      COMPUTE_PROFILE: "HIGH_MEMORY"
      # Engineering Tasks
      BUILD_BACKEND: "true"
      BUILD_DATABASE: "true"
      BUILD_BRIDGES: "true"
      # MCP Integration
      MCP_ENABLED: "true"
      MCP_BRIDGE: "GEMINI_ANTHROPIC"
      # Context Window
      MAX_CONTEXT: "1000000"
    volumes:
      - ./transcripts:/opt/transcripts
      - ./.whiteboard:/opt/whiteboard
    networks:
      - tactical-net
    logging: *default-logging
    depends_on:
      - troop-a-recon
    deploy:
      replicas: 4
      resources:
        limits:
          memory: 4G

  # ===========================================================================
  # TROOP C "COBRA" - STRYKER / FRONTEND (130 Agents)
  # Model: Claude 3.5 Sonnet / Haiku
  # Mission: Frontend & User Experience
  # ===========================================================================
  troop-c-stryker:
    image: us-central1-docker.pkg.dev/acquired-jet-478701-b3/n-autoresearch/Kosmos/BioAgents/server:gemini25flash
    hostname: cobra.n-autoresearch/Kosmos/BioAgents.internal
    environment:
      <<: *common-env
      ROLE: "RAPID_DEPLOYMENT"
      TROOP: "C"
      CALLSIGN: "COBRA"
      AGENT_COUNT: "32"  # Per replica (4 replicas ≈ 130)
      MODEL_PRIMARY: "claude-sonnet-4-5-20250929"
      MODEL_SECONDARY: "claude-3-5-haiku-20241022"
      FRAMEWORK: "REACT_NATIVE_BANA"
      # Frontend Tasks
      BUILD_FRONTEND: "true"
      BUILD_DASHBOARD: "true"
      BUILD_ARTIFACTS: "true"
      # CodePMCS Integration
      CODEPMCS: "ACTIVE"
      LINT_ENABLED: "true"
      ZERO_TECH_DEBT: "true"
    volumes:
      - ./transcripts:/opt/transcripts
      - ./.whiteboard:/opt/whiteboard
    networks:
      - tactical-net
    logging: *default-logging
    depends_on:
      - troop-b-armor
    deploy:
      replicas: 4
      resources:
        limits:
          memory: 2G

  # ===========================================================================
  # TROOP D "DELTA" - SHADOW OPS / OPTIMIZATION (130 Agents)
  # Model: MoE / Custom Fine-Tunes
  # Mission: Optimization & Exploitation
  # ===========================================================================
  troop-d-shadow:
    image: us-central1-docker.pkg.dev/acquired-jet-478701-b3/n-autoresearch/Kosmos/BioAgents/server:gemini25flash
    hostname: delta.n-autoresearch/Kosmos/BioAgents.internal
    ports:
      - "8650:8000"  # Shadow Ops Interface
    environment:
      <<: *common-env
      ROLE: "EXPLOITATION"
      TROOP: "D"
      CALLSIGN: "DELTA"
      AGENT_COUNT: "32"  # Per replica (4 replicas ≈ 130)
      MODEL_PRIMARY: "gemini-2.5-flash"
      MODEL_SECONDARY: "grok-beta"
      # Shadow Operations
      SHADOWTAG_ENABLED: "true"
      SHADOWTAG_LEVEL: "L4"
      WATERMARK_ENABLED: "true"
      # Optimization
      LOOP_OPTIMIZATION: "true"
      COST_REDUCTION_TARGET: "0.10"
      # Security
      SECURITY_LEVEL: "HIGH"
    volumes:
      - ./transcripts:/opt/transcripts
      - ./.whiteboard:/opt/whiteboard
    networks:
      - tactical-net
    logging: *default-logging
    depends_on:
      - troop-c-stryker
    deploy:
      replicas: 4
      resources:
        limits:
          memory: 2G

  # ===========================================================================
  # FSC "FORWARD SUPPORT" - LOGISTICS (50 Agents)
  # Role: CI/CD Pipelines, GitHub Actions, Cloud Run
  # Mission: Keep the "ammo" (code) flowing
  # ===========================================================================
  fsc-logistics:
    image: us-central1-docker.pkg.dev/acquired-jet-478701-b3/n-autoresearch/Kosmos/BioAgents/server:gemini25flash
    hostname: fsc.n-autoresearch/Kosmos/BioAgents.internal
    ports:
      - "8655:8080"  # Logistics Dashboard
    environment:
      <<: *common-env
      ROLE: "LOGISTICS"
      TROOP: "FSC"
      CALLSIGN: "SUPPLY"
      AGENT_COUNT: "50"
      MODEL_PRIMARY: "gemini-2.5-flash"
      # CI/CD Config
      CICD_ENABLED: "true"
      GITHUB_ACTIONS: "true"
      CLOUD_RUN_DEPLOY: "true"
      # Token Management
      TOKEN_BUDGET_ENABLED: "true"
      MAX_TOKENS_PER_CYCLE: "1000000"
    volumes:
      - ./transcripts:/opt/transcripts
      - ./.whiteboard:/opt/whiteboard
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - tactical-net
    logging: *default-logging
    depends_on:
      - hht-command
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  # SUPPORT BATTALION - INFRASTRUCTURE
  # ===========================================================================

  # GPTRAM Memory (Redis)
  gptram-memory:
    image: redis:7-alpine
    container_name: GPTRAM_CACHE
    hostname: gptram.n-autoresearch/Kosmos/BioAgents.internal
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - gptram-data:/data
    networks:
      - tactical-net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Vector DB (Weaviate)
  vector-db:
    image: semitechnologies/weaviate:latest
    container_name: VECTOR_DB
    hostname: vectordb.n-autoresearch/Kosmos/BioAgents.internal
    ports:
      - "8660:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "vectordb"
    volumes:
      - weaviate-data:/var/lib/weaviate
    networks:
      - tactical-net
    logging: *default-logging

# ===========================================================================
# NETWORKS
# ===========================================================================
networks:
  tactical-net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

# ===========================================================================
# VOLUMES
# ===========================================================================
volumes:
  gptram-data:
    driver: local
  weaviate-data:
    driver: local
