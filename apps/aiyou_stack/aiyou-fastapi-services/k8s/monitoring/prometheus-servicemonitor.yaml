apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: judge-6-monitor
  namespace: pnkln-monitoring
  labels:
    app: judge-6
    release: prometheus
spec:
  selector:
    matchLabels:
      app: judge-6
  namespaceSelector:
    matchNames:
    - pnkln-core
  endpoints:
  - port: metrics
    interval: 10s
    path: /metrics
    scheme: http
    scrapeTimeout: 5s
