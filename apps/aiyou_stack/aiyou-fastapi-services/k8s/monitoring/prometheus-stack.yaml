# Prometheus Stack for PNKLN Inference Monitoring
# Managed Prometheus + Grafana + Alertmanager
# Key metrics: p99 latency, QPS, GPU utilization, cost tracking
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'pnkln-inference-prod'
        environment: 'production'

    # Alertmanager configuration
    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager:9093

    # Rule files
    rule_files:
    - /etc/prometheus/rules/*.yml

    # Scrape configurations
    scrape_configs:
    # Judge #6 Layer 1 (Gemini)
    - job_name: 'judge-layer1'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - ShadowTag-v2jr-governance
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: judge-layer1
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex: (.+):(.+)
        replacement: $1:9090

    # Judge #6 Layer 2 (PyTorch)
    - job_name: 'judge-layer2'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - ShadowTag-v2jr-governance
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: judge-layer2

    # Judge #6 Layer 3 (Rules)
    - job_name: 'judge-layer3'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - ShadowTag-v2jr-governance
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: judge-layer3

    # LLM Router
    - job_name: 'llm-router'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - llm-inference
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: llm-router

    # vLLM
    - job_name: 'vllm'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - llm-inference
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: vllm

    # NVIDIA DCGM Exporter (GPU metrics)
    - job_name: 'nvidia-dcgm'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: nvidia-dcgm-exporter

    # Kubelet metrics
    - job_name: 'kubelet'
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      kubernetes_sd_configs:
      - role: node
      relabel_configs:
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics

  # Alert Rules
  alerts.yml: |
    groups:
    - name: inference_latency
      interval: 30s
      rules:
      # P99 latency SLA violation (>90ms)
      - alert: InferenceP99LatencyHigh
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.090
        for: 5m
        labels:
          severity: critical
          component: inference
        annotations:
          summary: "Inference p99 latency exceeds 90ms SLA"
          description: "p99 latency is {{ $value }}s (threshold: 0.090s)"

      # P95 latency warning (>60ms)
      - alert: InferenceP95LatencyHigh
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.060
        for: 5m
        labels:
          severity: warning
          component: inference
        annotations:
          summary: "Inference p95 latency exceeds 60ms"
          description: "p95 latency is {{ $value }}s (threshold: 0.060s)"

    - name: judge_coverage
      interval: 30s
      rules:
      # Judge #6 coverage below 98%
      - alert: JudgeCoverageLow
        expr: (sum(rate(judge_requests_total[5m])) / sum(rate(http_requests_total[5m]))) < 0.98
        for: 5m
        labels:
          severity: critical
          component: governance
        annotations:
          summary: "Judge #6 coverage below 98% SLA"
          description: "Current coverage: {{ $value | humanizePercentage }}"

      # Judge layer 1 failure rate high
      - alert: JudgeLayer1FailureRateHigh
        expr: rate(judge_layer1_errors_total[5m]) / rate(judge_layer1_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          component: governance
        annotations:
          summary: "Judge Layer 1 failure rate exceeds 5%"
          description: "Failure rate: {{ $value | humanizePercentage }}"

    - name: gpu_utilization
      interval: 30s
      rules:
      # GPU utilization below 70% (underutilization)
      - alert: GPUUtilizationLow
        expr: avg(DCGM_FI_DEV_GPU_UTIL) < 70
        for: 10m
        labels:
          severity: warning
          component: cost-optimization
        annotations:
          summary: "GPU utilization below 70% target"
          description: "Current utilization: {{ $value }}%"

      # GPU memory utilization above 95% (risk of OOM)
      - alert: GPUMemoryHigh
        expr: avg(DCGM_FI_DEV_FB_USED / DCGM_FI_DEV_FB_FREE) > 0.95
        for: 5m
        labels:
          severity: critical
          component: inference
        annotations:
          summary: "GPU memory utilization above 95%"
          description: "Current memory usage: {{ $value | humanizePercentage }}"

    - name: cost_tracking
      interval: 60s
      rules:
      # Monthly cost projection exceeds budget
      - alert: MonthlyCostProjectionHigh
        expr: |
          (
            sum(rate(llm_router_cost_usd[1h])) * 730
          ) > 65000
        for: 1h
        labels:
          severity: critical
          component: cost
        annotations:
          summary: "Monthly cost projection exceeds $65K budget"
          description: "Projected monthly cost: ${{ $value }}"

      # Cost burn rate 50% above expected
      - alert: CostBurnRateHigh
        expr: |
          (
            sum(rate(llm_router_cost_usd[1h])) * 730
          ) > (65000 * 1.5)
        for: 30m
        labels:
          severity: warning
          component: cost
        annotations:
          summary: "Cost burn rate 50% above budget"
          description: "Current burn rate: ${{ $value }}/mo"

    - name: availability
      interval: 30s
      rules:
      # Service availability below 99.95% (3-9s target)
      - alert: ServiceAvailabilityLow
        expr: |
          (
            sum(rate(http_requests_total{code=~"2.."}[5m])) /
            sum(rate(http_requests_total[5m]))
          ) < 0.9995
        for: 5m
        labels:
          severity: critical
          component: availability
        annotations:
          summary: "Service availability below 99.95% SLA"
          description: "Current availability: {{ $value | humanizePercentage }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus-sa
      containers:
      - name: prometheus
        image: prom/prometheus:v2.48.0
        args:
        - '--config.file=/etc/prometheus/prometheus.yml'
        - '--storage.tsdb.path=/prometheus'
        - '--storage.tsdb.retention.time=30d'
        - '--web.enable-lifecycle'
        - '--web.enable-admin-api'
        ports:
        - containerPort: 9090
          name: web
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
          limits:
            cpu: "4"
            memory: "16Gi"
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: rules
          mountPath: /etc/prometheus/rules
        - name: storage
          mountPath: /prometheus
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: rules
        configMap:
          name: prometheus-config
      - name: storage
        persistentVolumeClaim:
          claimName: prometheus-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: monitoring
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
  - name: web
    port: 9090
    targetPort: 9090
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-role
rules:
- apiGroups: [""]
  resources:
  - nodes
  - nodes/proxy
  - services
  - endpoints
  - pods
  verbs: ["get", "list", "watch"]
- apiGroups:
  - extensions
  resources:
  - ingresses
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-role
subjects:
- kind: ServiceAccount
  name: prometheus-sa
  namespace: monitoring
---
# NVIDIA DCGM Exporter for GPU metrics
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-dcgm-exporter
  namespace: monitoring
  labels:
    app: nvidia-dcgm-exporter
spec:
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter
  template:
    metadata:
      labels:
        app: nvidia-dcgm-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9400"
    spec:
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      nodeSelector:
        gpu_type: nvidia-l4
      containers:
      - name: dcgm-exporter
        image: nvcr.io/nvidia/k8s/dcgm-exporter:3.2.0-3.1.8-ubuntu22.04
        env:
        - name: DCGM_EXPORTER_LISTEN
          value: ":9400"
        - name: DCGM_EXPORTER_KUBERNETES
          value: "true"
        ports:
        - containerPort: 9400
          name: metrics
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
          capabilities:
            add:
            - SYS_ADMIN
        volumeMounts:
        - name: pod-resources
          mountPath: /var/lib/kubelet/pod-resources
          readOnly: true
      volumes:
      - name: pod-resources
        hostPath:
          path: /var/lib/kubelet/pod-resources
