---
# ==============================================================================
# Gemini Ingestion Layer - Nightly Intelligence Collection CronJob
# ==============================================================================
#
# ARCHITECTURE: GKE CronJob Multi-Container
# SCHEDULE: Nightly at 2:00 AM UTC (~45 min runtime)
# COST: ~$77/month operational
# ROLE: Upstream intelligence collection (called BY services)
#
# KEY METRICS:
# - Items/Day: Daily intelligence items ingested
# - Sources: YouTube, Twitter, News, RSS feeds
# - Cost/Item: Per-item operational cost
# - Tier Distribution: Tier 1/2/3 classification
# - Quality Gates: Relevance, Timeliness, Completeness
#
# UNIQUE FEATURES:
# - Ethical crawling (robots.txt compliance, rate limiting)
# - Multi-source coverage analysis
# - Tier classification for prioritization
# - AM briefing delivery integration
# ==============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: ingestion-system
  labels:
    name: ingestion-system
    component: intelligence-collection

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-config
  namespace: ingestion-system
data:
  # Gemini Configuration
  GEMINI_MODEL: "gemini-2.0-flash-exp"
  GEMINI_TEMPERATURE: "0.1"
  GEMINI_MAX_TOKENS: "2048"

  # Runtime Configuration
  TARGET_RUNTIME_MINUTES: "45"
  CONCURRENCY_LIMIT: "10"

  # Quality Gates
  MIN_ITEMS_PER_DAY: "100"
  MIN_SOURCE_DIVERSITY: "5"
  MAX_COST_PER_ITEM: "0.01"
  MIN_RELEVANCE_SCORE: "0.7"

  # Tier Classification Thresholds
  TIER1_THRESHOLD: "0.9"  # High-value intelligence
  TIER2_THRESHOLD: "0.7"  # Medium-value
  # Tier3: Below 0.7 (low-value)

  # Source Configuration
  ENABLED_SOURCES: "youtube,twitter,news,rss,reddit,hackernews"

  # Ethical Compliance
  RESPECT_ROBOTS_TXT: "true"
  RATE_LIMIT_REQUESTS_PER_SECOND: "2"
  USER_AGENT: "PNKLN-Ingestion-Bot/1.0 (+https://pnkln.ai/bot)"

  # Output Configuration
  OUTPUT_BUCKET: "gs://pnkln-core-stack-intelligence"
  AM_BRIEFING_ENABLED: "true"
  AM_BRIEFING_TIME: "07:00"

---
apiVersion: v1
kind: Secret
metadata:
  name: ingestion-secrets
  namespace: ingestion-system
type: Opaque
stringData:
  # API Keys (replace with actual values or use Secret Manager)
  youtube-api-key = "REDACTED_API_KEY"
  twitter-bearer-token = "REDACTED_API_KEY"
  newsapi-key: "YOUR_NEWSAPI_KEY"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingestion-sa
  namespace: ingestion-system
  annotations:
    iam.gke.io/gcp-service-account: redacted@shadowtag-v4.local

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gemini-ingestion-nightly
  namespace: ingestion-system
  labels:
    app: gemini-ingestion
    component: intelligence-collector
spec:
  # Run nightly at 2:00 AM UTC
  schedule: "0 2 * * *"

  # Keep last 3 successful and 1 failed job for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  # Don't run concurrent jobs
  concurrencyPolicy: Forbid

  # Start deadline: 10 minutes
  startingDeadlineSeconds: 600

  jobTemplate:
    metadata:
      labels:
        app: gemini-ingestion
        component: intelligence-collector
    spec:
      # Give job 60 minutes to complete (runtime target: 45 min)
      activeDeadlineSeconds: 3600

      # Retry once on failure
      backoffLimit: 1

      template:
        metadata:
          labels:
            app: gemini-ingestion
            component: intelligence-collector
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "9091"
        spec:
          restartPolicy: OnFailure
          serviceAccountName: ingestion-sa

          # Security context
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 3000
            fsGroup: 2000
            seccompProfile:
              type: RuntimeDefault

          # Init container: Validate configuration
          initContainers:
            - name: config-validator
              image: gcr.io/pnkln-core-stack/ingestion-validator:latest
              imagePullPolicy: Always
              command:
                - /bin/sh
                - -c
                - |
                  echo "Validating ingestion configuration..."
                  # Check required env vars
                  required_vars="GEMINI_MODEL ENABLED_SOURCES OUTPUT_BUCKET"
                  for var in $required_vars; do
                    eval value=\$$var
                    if [ -z "$value" ]; then
                      echo "ERROR: Missing required variable: $var"
                      exit 1
                    fi
                  done
                  echo "✓ Configuration valid"
              envFrom:
                - configMapRef:
                    name: ingestion-config
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true

          containers:
            # Main container: Gemini-powered ingestion orchestrator
            - name: gemini-orchestrator
              image: gcr.io/pnkln-core-stack/gemini-ingestion:latest
              imagePullPolicy: Always

              command:
                - python
                - -u
                - /app/ingestion_orchestrator.py

              env:
                - name: JOB_START_TIME
                  value: "{{ .JobStartTime }}"
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace

              envFrom:
                - configMapRef:
                    name: ingestion-config
                - secretRef:
                    name: ingestion-secrets

              resources:
                requests:
                  memory: "2Gi"
                  cpu: "1"
                limits:
                  memory: "4Gi"
                  cpu: "2"

              volumeMounts:
                - name: workdir
                  mountPath: /workspace
                - name: cache
                  mountPath: /cache

              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: false

            # Sidecar: Source collector (YouTube)
            - name: youtube-collector
              image: gcr.io/pnkln-core-stack/youtube-collector:latest
              imagePullPolicy: Always

              env:
                - name: COLLECTOR_TYPE
                  value: "youtube"
                - name: API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ingestion-secrets
                      key: youtube-api-key

              envFrom:
                - configMapRef:
                    name: ingestion-config

              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"

              volumeMounts:
                - name: workdir
                  mountPath: /workspace

              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true

            # Sidecar: Source collector (Twitter/X)
            - name: twitter-collector
              image: gcr.io/pnkln-core-stack/twitter-collector:latest
              imagePullPolicy: Always

              env:
                - name: COLLECTOR_TYPE
                  value: "twitter"
                - name: BEARER_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: ingestion-secrets
                      key: twitter-bearer-token

              envFrom:
                - configMapRef:
                    name: ingestion-config

              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"

              volumeMounts:
                - name: workdir
                  mountPath: /workspace

              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true

            # Sidecar: Source collector (News/RSS)
            - name: news-collector
              image: gcr.io/pnkln-core-stack/news-collector:latest
              imagePullPolicy: Always

              env:
                - name: COLLECTOR_TYPE
                  value: "news"
                - name: NEWS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ingestion-secrets
                      key: newsapi-key

              envFrom:
                - configMapRef:
                    name: ingestion-config

              resources:
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"

              volumeMounts:
                - name: workdir
                  mountPath: /workspace

              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true

            # Sidecar: Metrics exporter
            - name: metrics-exporter
              image: gcr.io/pnkln-core-stack/ingestion-metrics:latest
              imagePullPolicy: Always

              ports:
                - name: metrics
                  containerPort: 9091
                  protocol: TCP

              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"

              volumeMounts:
                - name: workdir
                  mountPath: /workspace
                  readOnly: true

              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true

          volumes:
            - name: workdir
              emptyDir:
                sizeLimit: 5Gi
            - name: cache
              emptyDir:
                sizeLimit: 2Gi

---
# PodMonitor for Prometheus metrics collection
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: gemini-ingestion-metrics
  namespace: ingestion-system
spec:
  selector:
    matchLabels:
      app: gemini-ingestion
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      path: /metrics
