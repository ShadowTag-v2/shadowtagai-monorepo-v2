# LLM Router - Google Hypercomputer Allocation Strategy
# Multi-model routing: Gemini 40%, Claude 35%, GPT-5 15%, Grok 5%, Local vLLM 5%
# Target: p99 ≤90ms end-to-end latency
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-router-config
  namespace: llm-inference
data:
  config.yaml: |
    # Routing strategy
    routing:
      strategy: "weighted"  # weighted | least-latency | round-robin

      # Model allocation (must sum to 100%)
      allocation:
        - model: "gemini-3.1-flash-lite-preview"
          provider: "vertex-ai"
          weight: 40
          endpoint: "us-central1-aiplatform.googleapis.com"
          max_qps: 100
          timeout_ms: 3000

        - model: "claude-3-5-sonnet-20241022"
          provider: "anthropic"
          weight: 35
          endpoint: "api.anthropic.com"
          max_qps: 80
          timeout_ms: 3000

        - model: "gpt-4"
          provider: "openai"
          weight: 15
          endpoint: "api.openai.com"
          max_qps: 50
          timeout_ms: 3000

        - model: "grok-beta"
          provider: "xai"
          weight: 5
          endpoint: "api.x.ai"
          max_qps: 20
          timeout_ms: 3000

        - model: "llama-3.1-70b"
          provider: "vllm-local"
          weight: 5
          endpoint: "http://vllm-service.llm-inference.svc.cluster.local:8000"
          max_qps: 30
          timeout_ms: 2000

      # Failover cascade
      failover:
        - primary: "gemini-3.1-flash-lite-preview"
          fallback: "claude-3-5-sonnet-20241022"
        - primary: "claude-3-5-sonnet-20241022"
          fallback: "gpt-4"
        - primary: "gpt-4"
          fallback: "llama-3.1-70b"
        - primary: "grok-beta"
          fallback: "gemini-3.1-flash-lite-preview"

    # Performance targets
    sla:
      p99_latency_ms: 90
      p95_latency_ms: 60
      p50_latency_ms: 30
      target_qps: 200
      timeout_ms: 5000

    # Caching strategy
    cache:
      enabled: true
      backend: "redis"
      redis_endpoint: "redis-service.llm-inference.svc.cluster.local:6379"
      ttl_seconds: 3600
      key_prefix: "llm-cache:"

    # Judge 6 integration
    governance:
      enabled: true
      judge_endpoint: "http://judge-webhook.ShadowTag-v2jr-governance.svc.cluster.local:443"
      enforcement_mode: "enforce"  # enforce | audit | off
      timeout_ms: 100

    # Cost tracking
    cost_tracking:
      enabled: true
      budget_usd_per_month: 65000
      alert_thresholds: [0.5, 0.75, 0.9, 1.0]
      cost_per_1k_tokens:
        gemini-3.1-flash-lite-preview: 0.0025
        claude-3-5-sonnet-20241022: 0.003
        gpt-4: 0.006
        grok-beta: 0.004
        llama-3.1-70b: 0.0005
---
apiVersion: v1
kind: Secret
metadata:
  name: llm-router-secrets
  namespace: llm-inference
type: Opaque
stringData:
  # API keys (replace with actual values from Secret Manager)
  ANTHROPIC_API_KEY: "sk-ant-xxx"
  OPENAI_API_KEY: "sk-xxx"
  XAI_API_KEY: "xai-xxx"
  REDIS_PASSWORD: "[VAPORIZED_PWD]"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-router-sa
  namespace: llm-inference
  annotations:
    iam.gke.io/gcp-service-account: "llm-router@${PROJECT_ID}.iam.gserviceaccount.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-router
  namespace: llm-inference
  labels:
    app: llm-router
    component: inference
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  selector:
    matchLabels:
      app: llm-router
      component: inference
  template:
    metadata:
      labels:
        app: llm-router
        component: inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: llm-router-sa

      # Node affinity for inference pool
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: pool
                operator: In
                values:
                - cognitive
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - llm-router
            topologyKey: kubernetes.io/hostname

      tolerations:
      - key: "workload"
        operator: "Equal"
        value: "cognitive"
        effect: "NoSchedule"

      containers:
      - name: router
        image: gcr.io/${PROJECT_ID}/llm-router:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: grpc
          containerPort: 9000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP

        env:
        - name: CONFIG_PATH
          value: "/etc/llm-router/config.yaml"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-router-secrets
              key: ANTHROPIC_API_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-router-secrets
              key: OPENAI_API_KEY
        - name: XAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-router-secrets
              key: XAI_API_KEY
        - name: REDIS_PASSWORD
          [VAPORIZED_PWD]:
            secretKeyRef:
              name: llm-router-secrets
              key: REDIS_PASSWORD
        - name: GOOGLE_CLOUD_PROJECT
          value: "${PROJECT_ID}"
        - name: LOG_LEVEL
          value: "info"
        - name: ENABLE_TRACING
          value: "true"
        - name: JAEGER_ENDPOINT
          value: "http://jaeger-collector.monitoring.svc.cluster.local:14268/api/traces"

        resources:
          requests:
            cpu: "4"
            memory: "8Gi"
          limits:
            cpu: "8"
            memory: "16Gi"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 2

        volumeMounts:
        - name: config
          mountPath: /etc/llm-router
          readOnly: true

      volumes:
      - name: config
        configMap:
          name: llm-router-config
---
apiVersion: v1
kind: Service
metadata:
  name: llm-router
  namespace: llm-inference
  labels:
    app: llm-router
    component: inference
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "llm-router-backendconfig"}'
spec:
  type: ClusterIP
  selector:
    app: llm-router
    component: inference
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: grpc
    port: 9000
    targetPort: 9000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llm-router-hpa
  namespace: llm-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llm-router
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  - type: Pods
    pods:
      metric:
        name: p99_latency_milliseconds
      target:
        type: AverageValue
        averageValue: "90"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: llm-router-pdb
  namespace: llm-inference
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: llm-router
      component: inference
---
# Redis for caching
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: llm-inference
  labels:
    app: redis
    component: cache
spec:
  serviceName: redis-service
  replicas: 3
  selector:
    matchLabels:
      app: redis
      component: cache
  template:
    metadata:
      labels:
        app: redis
        component: cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        command:
        - redis-server
        - --requirepass
        - "$(REDIS_PASSWORD)"
        - --appendonly
        - "yes"
        ports:
        - containerPort: 6379
          name: redis
        env:
        - name: REDIS_PASSWORD
          [VAPORIZED_PWD]:
            secretKeyRef:
              name: llm-router-secrets
              key: REDIS_PASSWORD
        [VAPORIZED_PWD]:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "1"
            memory: "4Gi"
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: "standard-rwo"
      resources:
        requests:
          storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: llm-inference
  labels:
    app: redis
    component: cache
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: redis
    component: cache
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
