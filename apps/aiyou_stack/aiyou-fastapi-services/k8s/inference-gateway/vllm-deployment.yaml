# vLLM Deployment for Local LLM Serving
# Model: Llama 3.1 70B on NVIDIA L4 GPUs
# Target: 5% of inference requests (failover, cost optimization)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
  namespace: llm-inference
data:
  config.json: |
    {
      "model": "meta-llama/Meta-Llama-3.1-70B-Instruct",
      "tensor_parallel_size": 2,
      "max_model_len": 8192,
      "gpu_memory_utilization": 0.9,
      "enforce_eager": false,
      "enable_prefix_caching": true,
      "disable_log_stats": false,
      "dtype": "half",
      "quantization": null
    }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm-sa
  namespace: llm-inference
  annotations:
    iam.gke.io/gcp-service-account: "vllm@${PROJECT_ID}.iam.gserviceaccount.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-llama
  namespace: llm-inference
  labels:
    app: vllm
    model: llama-3.1-70b
    component: inference
spec:
  replicas: 2
  strategy:
    type: Recreate  # GPU resources can't share
  selector:
    matchLabels:
      app: vllm
      model: llama-3.1-70b
  template:
    metadata:
      labels:
        app: vllm
        model: llama-3.1-70b
        component: inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: vllm-sa

      # Node affinity for L4 GPU pool
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: pool
                operator: In
                values:
                - inference-l4
              - key: gpu_type
                operator: In
                values:
                - nvidia-l4

      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "l4"
        effect: "NoSchedule"

      initContainers:
      - name: model-loader
        image: gcr.io/google.com/cloudsdktool/cloud-sdk:alpine
        command:
        - sh
        - -c
        - |
          echo "Downloading Llama 3.1 70B from Hugging Face Hub..."
          # In production, use GCS mirror for faster downloads
          # gsutil -m rsync -r gs://${PROJECT_ID}-models/llama-3.1-70b /models
          echo "Model download complete (placeholder - implement actual download)"
        volumeMounts:
        - name: model-cache
          mountPath: /models

      containers:
      - name: vllm-server
        image: vllm/vllm-openai:latest
        command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        - --model
        - meta-llama/Meta-Llama-3.1-70B-Instruct
        - --tensor-parallel-size
        - "2"
        - --max-model-len
        - "8192"
        - --gpu-memory-utilization
        - "0.9"
        - --enable-prefix-caching
        - --host
        - "0.0.0.0"
        - --port
        - "8000"

        ports:
        - name: http
          containerPort: 8000
          protocol: TCP

        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: llm-router-secrets
              key: HF_TOKEN
              optional: true
        - name: CUDA_VISIBLE_DEVICES
          value: "0,1"
        - name: NCCL_DEBUG
          value: "INFO"

        resources:
          requests:
            cpu: "8"
            memory: "64Gi"
            nvidia.com/gpu: "2"
          limits:
            cpu: "16"
            memory: "96Gi"
            nvidia.com/gpu: "2"

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300  # Model loading takes time
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 2

        volumeMounts:
        - name: model-cache
          mountPath: /root/.cache/huggingface
        - name: shm
          mountPath: /dev/shm

      volumes:
      - name: model-cache
        emptyDir:
          sizeLimit: 200Gi
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 32Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: llm-inference
  labels:
    app: vllm
    model: llama-3.1-70b
spec:
  type: ClusterIP
  selector:
    app: vllm
    model: llama-3.1-70b
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
---
# GKE Inference Gateway Configuration
apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: inference-gateway
  namespace: llm-inference
  annotations:
    networking.gke.io/enable-inference: "true"
    networking.gke.io/inference-backend-config: "inference-backend-config"
spec:
  gatewayClassName: gke-l7-gxlb
  listeners:
  - name: http
    protocol: HTTP
    port: 80
  - name: https
    protocol: HTTPS
    port: 443
    tls:
      mode: Terminate
      certificateRefs:
      - name: inference-tls-cert
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: llm-router-route
  namespace: llm-inference
spec:
  parentRefs:
  - name: inference-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/chat/completions
    backendRefs:
    - name: llm-router
      port: 8080
      weight: 90
    - name: vllm-service
      port: 8000
      weight: 10
  - matches:
    - path:
        type: PathPrefix
        value: /v1/completions
    backendRefs:
    - name: llm-router
      port: 8080
      weight: 90
    - name: vllm-service
      port: 8000
      weight: 10
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: inference-backend-config
  namespace: llm-inference
spec:
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /health
    port: 8080

  timeoutSec: 30

  connectionDraining:
    drainingTimeoutSec: 60

  customRequestHeaders:
    headers:
    - "X-Inference-Gateway: GKE"
    - "X-Trace-Id: {client_trace_id}"

  # KV-cache aware load balancing
  sessionAffinity:
    affinityType: "CLIENT_IP"
    affinityCookieTtlSec: 3600

  cdn:
    enabled: false
    cachePolicy:
      includeHost: true
      includeProtocol: true
      includeQueryString: false

  iap:
    enabled: false

  logging:
    enable: true
    sampleRate: 1.0
