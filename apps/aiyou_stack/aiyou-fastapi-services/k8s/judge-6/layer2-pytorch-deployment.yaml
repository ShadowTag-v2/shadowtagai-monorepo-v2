# Judge #6 Layer 2: PyTorch Fine-Tuned Policy Validation
# Target: p99 <40ms via Vertex AI custom-trained model
# Allocation: 35% of inference requests (escalated from Layer 1)
# Use case: Complex ATP 5-19 compliance, multi-policy intersection
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: judge-layer2-config
  namespace: ShadowTag-v2jr-governance
data:
  config.yaml: |
    layer: 2
    model: "prb-policy-validator-pytorch-v2"
    model_path: "gs://${PROJECT_ID}-models/judge-layer2/model.pt"
    checkpoint_path: "gs://${PROJECT_ID}-models/judge-layer2/checkpoints"

    # Model configuration
    model_config:
      architecture: "transformers"
      base_model: "google/flan-t5-xxl"
      fine_tuned_on: "prb-policy-corpus"
      quantization: "int8"
      batch_size: 8
      max_sequence_length: 2048

    # Performance targets
    sla:
      p99_latency_ms: 40
      target_qps: 50
      timeout_ms: 80

    # Advanced policy validation
    policies:
      - id: "atp-5-19-composite"
        description: "Multi-factor ATP 5-19 compliance check"
        enabled: true
        severity: "critical"
        requires_context: true

      - id: "regulatory-intersection"
        description: "GDPR + CCPA + EU AI Act intersection"
        enabled: true
        severity: "critical"

      - id: "export-control-advanced"
        description: "ITAR + EAR + Wassenaar Arrangement"
        enabled: true
        severity: "critical"

      - id: "risk-scoring"
        description: "ATP 5-19 risk scoring (0-100)"
        enabled: true
        severity: "high"
        output_format: "risk_score"

    # Fallback to Layer 3 conditions
    fallback:
      - condition: "latency_p99 > 40ms"
        action: "escalate_to_layer3"
      - condition: "risk_score > 80"
        action: "parallel_layer3_validation"
      - condition: "regulatory_intersection == true"
        action: "escalate_to_layer3"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: judge-layer2-sa
  namespace: ShadowTag-v2jr-governance
  annotations:
    iam.gke.io/gcp-service-account: "judge-layer2@${PROJECT_ID}.iam.gserviceaccount.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge-layer2-pytorch
  namespace: ShadowTag-v2jr-governance
  labels:
    app: judge-layer2
    component: judge-6
    layer: "2"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: judge-layer2
      component: judge-6
  template:
    metadata:
      labels:
        app: judge-layer2
        component: judge-6
        layer: "2"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: judge-layer2-sa

      # Node affinity for governance pool
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: pool
                operator: In
                values:
                - governance
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - judge-layer2
              topologyKey: kubernetes.io/hostname

      tolerations:
      - key: "workload"
        operator: "Equal"
        value: "governance"
        effect: "NoSchedule"

      initContainers:
      - name: model-loader
        image: gcr.io/google.com/cloudsdktool/cloud-sdk:alpine
        command:
        - sh
        - -c
        - |
          echo "Downloading PyTorch model from GCS..."
          gsutil -m rsync -r gs://${PROJECT_ID}-models/judge-layer2 /models
          echo "Model download complete"
        volumeMounts:
        - name: model-cache
          mountPath: /models

      containers:
      - name: judge-pytorch
        image: gcr.io/${PROJECT_ID}/judge-pytorch:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP

        env:
        - name: LAYER
          value: "2"
        - name: MODEL_PATH
          value: "/models/model.pt"
        - name: CHECKPOINT_PATH
          value: "/models/checkpoints"
        - name: PROJECT_ID
          value: "${PROJECT_ID}"
        - name: P99_LATENCY_TARGET_MS
          value: "40"
        - name: BATCH_SIZE
          value: "8"
        - name: QUANTIZATION
          value: "int8"
        - name: LOG_LEVEL
          value: "info"

        resources:
          requests:
            cpu: "4"
            memory: "16Gi"
          limits:
            cpu: "8"
            memory: "32Gi"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        volumeMounts:
        - name: config
          mountPath: /etc/judge
          readOnly: true
        - name: model-cache
          mountPath: /models
          readOnly: true
        - name: google-cloud-key
          mountPath: /var/secrets/google
          readOnly: true

      volumes:
      - name: config
        configMap:
          name: judge-layer2-config
      - name: model-cache
        emptyDir:
          sizeLimit: 50Gi
      - name: google-cloud-key
        secret:
          secretName: judge-layer2-gcp-key
---
apiVersion: v1
kind: Service
metadata:
  name: judge-layer2
  namespace: ShadowTag-v2jr-governance
  labels:
    app: judge-layer2
    component: judge-6
spec:
  type: ClusterIP
  selector:
    app: judge-layer2
    component: judge-6
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: judge-layer2-hpa
  namespace: ShadowTag-v2jr-governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: judge-layer2-pytorch
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: judge-layer2-pdb
  namespace: ShadowTag-v2jr-governance
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: judge-layer2
      component: judge-6
