# Disaggregated LLM Serving Architecture
# Separates prefill (parallel processing) and decode (generation) phases
# Achieves 60% throughput improvement per Google's benchmarks

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-vllm-config
  namespace: cognitive-stack-v5
data:
  # Common vLLM configuration
  MODEL_NAME: "meta-llama/Meta-Llama-3-8B-Instruct"
  TENSOR_PARALLEL_SIZE: "2"
  MAX_MODEL_LEN: "8192"
  GPU_MEMORY_UTILIZATION: "0.95"
  ENABLE_PREFIX_CACHING: "true"
  ENABLE_CHUNKED_PREFILL: "true"
  KV_CACHE_DTYPE: "fp8"
  QUANTIZATION: "awq"
  TRUST_REMOTE_CODE: "true"

---
# Prefill Deployment - Optimized for parallel token processing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-prefill
  namespace: cognitive-stack-v5
  labels:
    app: llm-prefill
    tier: inference
    phase: prefill
spec:
  replicas: 3
  selector:
    matchLabels:
      app: llm-prefill
  template:
    metadata:
      labels:
        app: llm-prefill
        tier: inference
        phase: prefill
      annotations:
        cloud.google.com/compute-class: gpu-l4-spot
    spec:
      serviceAccountName: llm-router
      nodeSelector:
        workload: llm-prefill
      tolerations:
      - key: workload
        operator: Equal
        value: prefill
        effect: NoSchedule

      containers:
      - name: vllm-prefill
        image: vllm/vllm-openai:v0.8.0
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9090
          name: metrics

        env:
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: llm-vllm-config
              key: MODEL_NAME
        - name: TENSOR_PARALLEL_SIZE
          valueFrom:
            configMapKeyRef:
              name: llm-vllm-config
              key: TENSOR_PARALLEL_SIZE
        - name: VLLM_DISAGGREGATED_SERVING_MODE
          value: "prefill"
        - name: MAX_NUM_BATCHED_TOKENS
          value: "16384"  # Large batch for prefill
        - name: MAX_NUM_SEQS
          value: "256"
        - name: CUDA_VISIBLE_DEVICES
          value: "0,1"
        - name: VLLM_ATTENTION_BACKEND
          value: "FLASHINFER"

        args:
        - --model=$(MODEL_NAME)
        - --served-model-name=pnkln-hybrid-model
        - --tensor-parallel-size=$(TENSOR_PARALLEL_SIZE)
        - --max-model-len=8192
        - --gpu-memory-utilization=0.95
        - --enable-prefix-caching
        - --enable-chunked-prefill
        - --kv-cache-dtype=fp8
        - --quantization=awq
        - --trust-remote-code
        - --port=8000
        - --host=0.0.0.0
        - --disable-log-requests

        resources:
          requests:
            memory: "32Gi"
            nvidia.com/gpu: "2"
          limits:
            memory: "48Gi"
            nvidia.com/gpu: "2"

        volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache/huggingface

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSec: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 180
          periodSeconds: 10
          timeoutSec: 5
          failureThreshold: 3

      volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
      - name: model-cache
        csi:
          driver: gcsfuse.csi.storage.gke.io
          readOnly: true
          volumeAttributes:
            bucketName: pnkln-core-stack-model-weights
            mountOptions: "implicit-dirs,file-mode=644,dir-mode=755"

---
# Decode Deployment - Optimized for token generation
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-decode
  namespace: cognitive-stack-v5
  labels:
    app: llm-decode
    tier: inference
    phase: decode
spec:
  replicas: 5
  selector:
    matchLabels:
      app: llm-decode
  template:
    metadata:
      labels:
        app: llm-decode
        tier: inference
        phase: decode
      annotations:
        cloud.google.com/compute-class: gpu-l4-spot
    spec:
      serviceAccountName: llm-router
      nodeSelector:
        workload: llm-decode
      tolerations:
      - key: workload
        operator: Equal
        value: decode
        effect: NoSchedule

      containers:
      - name: vllm-decode
        image: vllm/vllm-openai:v0.8.0
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9090
          name: metrics

        env:
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: llm-vllm-config
              key: MODEL_NAME
        - name: VLLM_DISAGGREGATED_SERVING_MODE
          value: "decode"
        - name: MAX_NUM_BATCHED_TOKENS
          value: "4096"  # Smaller batch for decode
        - name: MAX_NUM_SEQS
          value: "512"  # More sequences for generation
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: VLLM_ATTENTION_BACKEND
          value: "FLASHINFER"

        args:
        - --model=$(MODEL_NAME)
        - --served-model-name=pnkln-hybrid-model
        - --tensor-parallel-size=1
        - --max-model-len=8192
        - --gpu-memory-utilization=0.95
        - --enable-prefix-caching
        - --kv-cache-dtype=fp8
        - --quantization=awq
        - --trust-remote-code
        - --port=8000
        - --host=0.0.0.0
        - --disable-log-requests

        resources:
          requests:
            memory: "16Gi"
            nvidia.com/gpu: "1"
          limits:
            memory: "24Gi"
            nvidia.com/gpu: "1"

        volumeMounts:
        - name: shm
          mountPath: /dev/shm
        - name: model-cache
          mountPath: /root/.cache/huggingface

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSec: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 180
          periodSeconds: 10
          timeoutSec: 5
          failureThreshold: 3

      volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi
      - name: model-cache
        csi:
          driver: gcsfuse.csi.storage.gke.io
          readOnly: true
          volumeAttributes:
            bucketName: pnkln-core-stack-model-weights
            mountOptions: "implicit-dirs,file-mode=644,dir-mode=755"

---
# Prefill Service
apiVersion: v1
kind: Service
metadata:
  name: llm-prefill-service
  namespace: cognitive-stack-v5
  labels:
    app: llm-prefill
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "llm-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app: llm-prefill
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP

---
# Decode Service
apiVersion: v1
kind: Service
metadata:
  name: llm-decode-service
  namespace: cognitive-stack-v5
  labels:
    app: llm-decode
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "llm-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app: llm-decode
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP

---
# Service Account with Workload Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-router
  namespace: cognitive-stack-v5
  annotations:
    iam.gke.io/gcp-service-account: redacted@shadowtag-v4.local
