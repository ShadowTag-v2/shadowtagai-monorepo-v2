# Resource Quotas and Limits for Cost Control
# Monthly budget: $65K → enforce resource limits per namespace
---
# Governance Namespace (Judge 6)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: governance-quota
  namespace: ShadowTag-v2jr-governance
spec:
  hard:
    requests.cpu: "32"
    requests.memory: "128Gi"
    limits.cpu: "64"
    limits.memory: "256Gi"
    persistentvolumeclaims: "10"
    requests.storage: "500Gi"
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: governance-limits
  namespace: ShadowTag-v2jr-governance
spec:
  limits:
  - max:
      cpu: "8"
      memory: "32Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "2"
      memory: "4Gi"
    defaultRequest:
      cpu: "500m"
      memory: "1Gi"
    type: Container
---
# Orchestration Namespace (AutoGen)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: orchestration-quota
  namespace: autogen-orchestration
spec:
  hard:
    requests.cpu: "64"
    requests.memory: "256Gi"
    limits.cpu: "128"
    limits.memory: "512Gi"
    persistentvolumeclaims: "20"
    requests.storage: "1Ti"
    pods: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: orchestration-limits
  namespace: autogen-orchestration
spec:
  limits:
  - max:
      cpu: "16"
      memory: "64Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "4"
      memory: "8Gi"
    defaultRequest:
      cpu: "1"
      memory: "2Gi"
    type: Container
---
# Inference Namespace (LLM serving)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: inference-quota
  namespace: llm-inference
spec:
  hard:
    requests.cpu: "128"
    requests.memory: "512Gi"
    limits.cpu: "256"
    limits.memory: "1Ti"
    requests.nvidia.com/gpu: "20"  # 20x L4 GPUs (10 nodes × 2 GPUs)
    persistentvolumeclaims: "30"
    requests.storage: "2Ti"
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: inference-limits
  namespace: llm-inference
spec:
  limits:
  - max:
      cpu: "24"
      memory: "96Gi"
      nvidia.com/gpu: "2"
    min:
      cpu: "1"
      memory: "4Gi"
    default:
      cpu: "8"
      memory: "32Gi"
    defaultRequest:
      cpu: "4"
      memory: "16Gi"
    type: Container
---
# ShadowTag Namespace (Audit trail)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: shadowtag-quota
  namespace: shadowtag-audit
spec:
  hard:
    requests.cpu: "16"
    requests.memory: "64Gi"
    limits.cpu: "32"
    limits.memory: "128Gi"
    persistentvolumeclaims: "10"
    requests.storage: "500Gi"
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: shadowtag-limits
  namespace: shadowtag-audit
spec:
  limits:
  - max:
      cpu: "4"
      memory: "16Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "1"
      memory: "2Gi"
    defaultRequest:
      cpu: "250m"
      memory: "512Mi"
    type: Container
---
# Monitoring Namespace
apiVersion: v1
kind: ResourceQuota
