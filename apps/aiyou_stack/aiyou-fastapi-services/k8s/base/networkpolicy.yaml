apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: shadowtagai-orchestrator
  namespace: shadowtagai-production
  labels:
    app: shadowtagai
    component: orchestrator
spec:
  podSelector:
    matchLabels:
      app: shadowtagai
      component: orchestrator

  policyTypes:
  - Ingress
  - Egress

  # Ingress rules
  ingress:
  # Allow from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080

  # Allow from Prometheus (monitoring)
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8080

  # Egress rules
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53

  # Allow HTTPS to Vertex AI and GCP services
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443

  # Allow HTTP (for Vertex AI endpoints)
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 80
