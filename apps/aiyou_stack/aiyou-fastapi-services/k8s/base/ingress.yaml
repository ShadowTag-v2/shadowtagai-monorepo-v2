apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shadowtagai-orchestrator
  namespace: shadowtagai-production
  labels:
    app: shadowtagai
    component: orchestrator
  annotations:
    # Use GCE ingress controller
    kubernetes.io/ingress.class: "gce"

    # SSL redirect
    kubernetes.io/ingress.allow-http: "false"

    # Global static IP (create separately)
    kubernetes.io/ingress.global-static-ip-name: "shadowtagai-orchestrator-ip"

    # Managed certificate (GCP)
    networking.gke.io/managed-certificates: "shadowtagai-cert"

    # Backend config
    cloud.google.com/backend-config: '{"default": "shadowtagai-backend-config"}'

    # NEG (Network Endpoint Groups)
    cloud.google.com/neg: '{"ingress": true}'
spec:
  rules:
  - host: api.shadowtagai.io
    http:
      paths:
      - path: /*
        pathType: ImplementationSpecific
        backend:
          service:
            name: shadowtagai-orchestrator
            port:
              number: 80
