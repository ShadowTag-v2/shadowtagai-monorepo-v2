apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge-6-hybrid
  namespace: pnkln-core
  labels:
    app: judge-6
    component: governance
    tier: critical-path
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: judge-6
  template:
    metadata:
      labels:
        app: judge-6
        component: governance
        tier: critical-path
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: pnkln-judge-sa

      # Affinity rules to spread pods across zones
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - judge-6
              topologyKey: topology.kubernetes.io/zone

      # GPU node selector for Autopilot
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4

      containers:
      # Layer 1: Gemini Policy Understanding
      - name: gemini-layer
        image: gcr.io/pnkln-validation/judge-gemini:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
          name: gemini-api
          protocol: TCP
        env:
        - name: VERTEX_AI_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: judge-6-config
              key: VERTEX_AI_ENDPOINT
        - name: VERTEX_AI_LOCATION
          valueFrom:
            configMapKeyRef:
              name: judge-6-config
              key: VERTEX_AI_LOCATION
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: judge-6-config
              key: GEMINI_TUNED_MODEL_NAME
        - name: GOOGLE_CLOUD_PROJECT
          value: pnkln-validation
        - name: LAYER_TIMEOUT_MS
          value: "30"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
            nvidia.com/gpu: "1"
          limits:
            memory: "8Gi"
            cpu: "4"
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3

      # Layer 2: PyTorch Enforcement Logic
      - name: pytorch-enforcer
        image: gcr.io/pnkln-validation/judge-pytorch:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8002
          name: pytorch-api
          protocol: TCP
        env:
        - name: MODEL_PATH
          value: "/models/enforcement-v1"
        - name: LAYER_TIMEOUT_MS
          value: "40"
        - name: BATCH_SIZE
          value: "8"
        - name: GPU_DEVICE_ID
          value: "0"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"
        volumeMounts:
        - name: model-cache
          mountPath: /models
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3

      # Layer 3: Deterministic Rules Engine
      - name: rules-engine
        image: gcr.io/pnkln-validation/judge-rules:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8003
          name: rules-api
          protocol: TCP
        env:
        - name: RULES_CONFIG_PATH
          value: "/config/rules.json"
        - name: LAYER_TIMEOUT_MS
          value: "10"
        - name: CACHE_ENABLED
          value: "true"
        - name: CACHE_TTL_SEC
          value: "300"
        resources:
          requests:
            memory: "2Gi"
            cpu: "2"
          limits:
            memory: "4Gi"
            cpu: "4"
        volumeMounts:
        - name: rules-config
          mountPath: /config
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2

      # Orchestrator: Coordinates 3 layers
      - name: orchestrator
        image: gcr.io/pnkln-validation/judge-orchestrator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9090
          name: grpc
          protocol: TCP
        - containerPort: 8081
          name: metrics
          protocol: TCP
        env:
        - name: GEMINI_ENDPOINT
          value: "http://localhost:8001"
        - name: PYTORCH_ENDPOINT
          value: "http://localhost:8002"
        - name: RULES_ENDPOINT
          value: "http://localhost:8003"
        - name: LATENCY_SLA_P99_MS
          valueFrom:
            configMapKeyRef:
              name: judge-6-config
              key: LATENCY_SLA_P99_MS
        - name: CIRCUIT_BREAKER_THRESHOLD_MS
          valueFrom:
            configMapKeyRef:
              name: judge-6-config
              key: CIRCUIT_BREAKER_THRESHOLD_MS
        - name: CIRCUIT_BREAKER_FALLBACK_MODE
          valueFrom:
            configMapKeyRef:
              name: judge-6-config
              key: CIRCUIT_BREAKER_FALLBACK_MODE
        envFrom:
        - configMapRef:
            name: judge-6-config
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3

      volumes:
      - name: model-cache
        emptyDir:
          sizeLimit: 50Gi
      - name: rules-config
        configMap:
          name: judge-rules-config

      # Termination grace period for clean shutdown
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: judge-6-service
  namespace: pnkln-core
  labels:
    app: judge-6
spec:
  type: ClusterIP
  selector:
    app: judge-6
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: grpc
    port: 9090
    targetPort: 9090
    protocol: TCP
  - name: metrics
    port: 8081
    targetPort: 8081
    protocol: TCP
  sessionAffinity: None
