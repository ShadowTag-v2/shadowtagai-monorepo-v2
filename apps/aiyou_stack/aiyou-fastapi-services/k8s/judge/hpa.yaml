apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: judge-6-hpa
  namespace: pnkln-core
  labels:
    app: judge-6
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: judge-6-hybrid
  minReplicas: 3
  maxReplicas: 20
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max
  metrics:
  # Primary metric: p99 latency (custom metric from Prometheus)
  - type: Pods
    pods:
      metric:
        name: judge_request_latency_p99_milliseconds
      target:
        type: AverageValue
        averageValue: "85"  # Buffer below 90ms SLA

  # Secondary metric: CPU utilization
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  # Tertiary metric: GPU utilization
  - type: Pods
    pods:
      metric:
        name: nvidia_gpu_duty_cycle
      target:
        type: AverageValue
        averageValue: "75"

  # Request rate metric for proactive scaling
  - type: Pods
    pods:
      metric:
        name: judge_requests_per_second
      target:
        type: AverageValue
        averageValue: "50"
