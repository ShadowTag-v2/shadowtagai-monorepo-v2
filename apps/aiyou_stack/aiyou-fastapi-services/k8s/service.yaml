apiVersion: v1
kind: Service
metadata:
  name: ingestion-api
  namespace: ingestion-layer
  labels:
    app: gemini-ingestion
    component: api
spec:
  type: ClusterIP
  selector:
    app: gemini-ingestion
    component: api
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-api
  namespace: ingestion-layer
  labels:
    app: gemini-ingestion
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gemini-ingestion
      component: api
  template:
    metadata:
      labels:
        app: gemini-ingestion
        component: api
    spec:
      serviceAccountName: gemini-ingestion-sa

      containers:
      - name: api
        image: gcr.io/PROJECT_ID/gemini-ingestion:latest
        imagePullPolicy: Always

        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

        env:
        # Secrets
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: ingestion-secrets
              key: anthropic-api-key
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: ingestion-secrets
              key: google-api-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ingestion-secrets
              key: database-url

        # ConfigMap
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: ingestion-config
              key: environment
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: ingestion-config
              key: log-level
        - name: GCP_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: ingestion-config
              key: gcp-project-id

        ports:
        - containerPort: 8000
          name: http
          protocol: TCP

        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: gemini-ingestion-sa
  namespace: ingestion-layer
  annotations:
    iam.gke.io/gcp-service-account: gemini-ingestion@PROJECT_ID.iam.gserviceaccount.com

---

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ingestion-api-pdb
  namespace: ingestion-layer
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gemini-ingestion
      component: api
