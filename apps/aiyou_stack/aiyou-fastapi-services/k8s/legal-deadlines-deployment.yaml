---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legal-deadlines-api
  namespace: legal-deadlines
  labels:
    app: legal-deadlines
    component: api
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: legal-deadlines
      component: api
  template:
    metadata:
      labels:
        app: legal-deadlines
        component: api
        version: v1.0.0
    spec:
      serviceAccountName: legal-deadlines-sa
      containers:
      - name: api
        image: gcr.io/PROJECT_ID/legal-deadlines-api:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8001
          protocol: TCP
        env:
        - name: PORT
          value: "8001"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: legal-deadlines-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: legal-deadlines-secrets
              key: redis-url
        - name: GCS_BUCKET_NAME
          value: "legal-deadlines-documents"
        - name: GCS_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: legal-deadlines-config
              key: gcs-project-id
        - name: GOOGLE_CALENDAR_CREDENTIALS
          value: "/secrets/google-calendar/credentials.json"
        - name: SENDGRID_API_KEY
          valueFrom:
            secretKeyRef:
              name: legal-deadlines-secrets
              key: sendgrid-api-key
        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            secretKeyRef:
              name: legal-deadlines-secrets
              key: twilio-account-sid
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: legal-deadlines-secrets
              key: twilio-auth-token
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: legal-deadlines-secrets
              key: slack-webhook-url
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENVIRONMENT
          value: "production"
        volumeMounts:
        - name: google-calendar-credentials
          mountPath: /secrets/google-calendar
          readOnly: true
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: google-calendar-credentials
        secret:
          secretName: google-calendar-credentials
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - legal-deadlines
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: legal-deadlines-api
  namespace: legal-deadlines
  labels:
    app: legal-deadlines
    component: api
spec:
  type: LoadBalancer
  selector:
    app: legal-deadlines
    component: api
  ports:
  - name: http
    port: 80
    targetPort: 8001
    protocol: TCP
  sessionAffinity: None
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: legal-deadlines-api-hpa
  namespace: legal-deadlines
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: legal-deadlines-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
