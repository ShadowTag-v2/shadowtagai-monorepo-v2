# Redis for Agent Communication and Glicko Backend
# Provides shared state for multi-agent debates and rating persistence

---
apiVersion: v1
kind: Namespace
metadata:
  name: pinkln-system
  labels:
    name: pinkln-system
    purpose: multi-agent-infrastructure

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: pinkln-system
data:
  redis.conf: |
    # Redis configuration for Pinkln multi-agent system
    maxmemory 2gb
    maxmemory-policy allkeys-lru
    save 900 1
    save 300 10
    save 60 10000
    appendonly yes
    appendfsync everysec

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
  namespace: pinkln-system
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard-rwo
  resources:
    requests:
      storage: 20Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  namespace: pinkln-system
  labels:
    app: redis
    role: master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
      role: master
  template:
    metadata:
      labels:
        app: redis
        role: master
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - /etc/redis/redis.conf
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: pinkln-system
  labels:
    app: redis
    role: master
spec:
  type: ClusterIP
  selector:
    app: redis
    role: master
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis

---
# Redis CLI pod for debugging
apiVersion: v1
kind: Pod
metadata:
  name: redis-cli
  namespace: pinkln-system
  labels:
    app: redis-client
spec:
  containers:
    - name: redis-cli
      image: redis:7-alpine
      command:
        - sleep
        - "infinity"
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "200m"
