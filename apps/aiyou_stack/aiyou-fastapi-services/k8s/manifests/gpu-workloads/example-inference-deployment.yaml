# Example Inference Deployment on L4 GPU
# Deploys a model inference service with auto-scaling

apiVersion: v1
kind: Service
metadata:
  name: llm-inference-service
  namespace: production
  labels:
    app: llm-inference
    tier: production
spec:
  type: ClusterIP
  selector:
    app: llm-inference
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-inference
  namespace: production
  labels:
    app: llm-inference
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-inference
  template:
    metadata:
      labels:
        app: llm-inference
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: inference-sa

      # Node selection for L4 GPU nodes
      nodeSelector:
        workload: inference
        gpu: l4

      # Tolerate GPU taint
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

      containers:
        - name: inference
          image: gcr.io/omega-production/llm-inference:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP

          env:
            - name: MODEL_NAME
              value: "llama-13b-instruct"
            - name: MODEL_PATH
              value: "gs://omega-models/llama-13b-instruct"
            - name: MAX_BATCH_SIZE
              value: "32"
            - name: MAX_INPUT_LENGTH
              value: "2048"
            - name: MAX_TOTAL_TOKENS
              value: "4096"
            - name: CUDA_VISIBLE_DEVICES
              value: "0"

          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: "1"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: model-cache
              mountPath: /root/.cache/huggingface

      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "8Gi"
        - name: model-cache
          emptyDir:
            sizeLimit: "50Gi"

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llm-inference-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llm-inference
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: inference_requests_per_second
        target:
          type: AverageValue
          averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: llm-inference-pdb
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: llm-inference
