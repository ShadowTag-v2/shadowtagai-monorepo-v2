name: pnkln-gke-infrastructure
runtime: nodejs
description: PNKLN Core Stack™ - GKE Infrastructure (ShadowTag-v4 Platform)

config:
  gcp:project:
    description: GCP Project ID
    default: shadowtag_v4-prod
  gcp:region:
    description: GCP Region
    default: us-central1
  region:
    description: Primary region for resources
    default: us-central1
  clusterName:
    description: GKE Standard cluster name
    default: pnkln-main
