apiVersion: batch/v1
kind: CronJob
metadata:
  name: pnkln-nightly-synthesis
  namespace: pnkln-core
spec:
  schedule: "0 2 * * *" # 2:00 AM PST
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: default # Uses the Compute SA (God Mode)
          restartPolicy: OnFailure

          # THE SHARED BRAIN
          volumes:
            - name: shared-workspace
              emptyDir: {} # Ephemeral handoff space
            - name: infinite-drive
              nfs:
                server: 10.x.x.x # REPLACE WITH TERRAFORM OUTPUT IP
                path: /monorepo

          # STEP 1: GATHER (Python / Gemini 2.5)
          initContainers:
          - name: ingestion-layer
            image: us-central1-docker.pkg.dev/pnkln-core/pnkln-core/ingestion-analyzer:gemini-3.1
            command: ["python", "-m", "app.jobs.nightly_ingest"]
            volumeMounts:
              - name: shared-workspace
                mountPath: /workspace
              - name: infinite-drive
                mountPath: /monorepo
            env:
              - name: MODEL_VERSION
                value: "gemini-3.1-flash-lite-preview"

          # STEP 2: BUILD (Node / Gemini 2.5)
          containers:
          - name: design-agent
            image: us-central1-docker.pkg.dev/pnkln-core/pnkln-core/design-system-builder:gemini-3.1
            command: ["/bin/sh", "-c"]
            args:
              - |
                echo "🎨 Checking for Ingestion Report..."
                if [ -f /workspace/ingestion_report.json ]; then
                   echo "Report found. Engaging Design Systems..."
                   npm run analyze -- --input /workspace/ingestion_report.json --fix
                else
                   echo "⚠️ No report found. Skipping."
                fi
            volumeMounts:
              - name: shared-workspace
                mountPath: /workspace
              - name: infinite-drive
                mountPath: /monorepo
            env:
              - name: GCP_PROJECT_ID
                value: "pnkln-core"
