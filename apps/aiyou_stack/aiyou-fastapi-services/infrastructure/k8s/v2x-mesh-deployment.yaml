---
apiVersion: v1
kind: Namespace
metadata:
  name: v2x-mesh
  labels:
    name: v2x-mesh
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: v2x-mesh-config
  namespace: v2x-mesh
data:
  MESH_NODE_POOL: "v2x-edge"
  BEACON_INTERVAL_S: "1.0"
  EVENT_BROADCAST_RADIUS_M: "1000"
  SHADOWTAG_ENDPOINT: "http://shadowtag-service.default.svc.cluster.local:8003"
  REDIS_HOST: "redis-master.default.svc.cluster.local"
  REDIS_PORT: "6379"
  ENABLE_GPU: "true"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: Secret
metadata:
  name: v2x-mesh-secrets
  namespace: v2x-mesh
type: Opaque
stringData:
  GOOGLE_CONTENT_SAFETY_API_KEY: "placeholder-key"
  HIVE_MODERATION_API_KEY: "placeholder-key"
  TEE_MASTER_KEY: "placeholder-tee-key"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: v2x-mesh-gateway
  namespace: v2x-mesh
  labels:
    app: v2x-mesh-gateway
    tier: edge
spec:
  replicas: 3
  selector:
    matchLabels:
      app: v2x-mesh-gateway
  template:
    metadata:
      labels:
        app: v2x-mesh-gateway
        tier: edge
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8012"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        workload-type: v2x-edge
      tolerations:
        - key: "v2x-edge"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: v2x-gateway
          image: gcr.io/PROJECT_ID/v2x-mesh:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8010
              protocol: TCP
            - name: websocket
              containerPort: 8011
              protocol: TCP
            - name: metrics
              containerPort: 8012
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "v2x-mesh-gateway"
            - name: MESH_NODE_POOL
              valueFrom:
                configMapKeyRef:
                  name: v2x-mesh-config
                  key: MESH_NODE_POOL
            - name: SHADOWTAG_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: v2x-mesh-config
                  key: SHADOWTAG_ENDPOINT
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: v2x-mesh-config
                  key: REDIS_HOST
            - name: GOOGLE_CONTENT_SAFETY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: v2x-mesh-secrets
                  key: GOOGLE_CONTENT_SAFETY_API_KEY
            - name: HIVE_MODERATION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: v2x-mesh-secrets
                  key: HIVE_MODERATION_API_KEY
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8012
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8012
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: cache
              mountPath: /app/cache
      volumes:
        - name: cache
          emptyDir:
            sizeLimit: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: v2x-tower-cache
  namespace: v2x-mesh
  labels:
    app: v2x-tower-cache
    tier: infrastructure
spec:
  replicas: 5
  selector:
    matchLabels:
      app: v2x-tower-cache
  template:
    metadata:
      labels:
        app: v2x-tower-cache
        tier: infrastructure
    spec:
      nodeSelector:
        workload-type: v2x-edge
      containers:
        - name: tower-cache
          image: gcr.io/PROJECT_ID/v2x-tower-cache:latest
          imagePullPolicy: Always
          ports:
            - name: cache
              containerPort: 8013
              protocol: TCP
          env:
            - name: CACHE_SIZE_GB
              value: "10"
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: v2x-mesh-config
                  key: REDIS_HOST
          resources:
            requests:
              cpu: 1000m
              memory: 12Gi
              nvidia.com/gpu: 1  # GPU for inference caching
            limits:
              cpu: 4000m
              memory: 16Gi
              nvidia.com/gpu: 1
          volumeMounts:
            - name: cache-storage
              mountPath: /cache
      volumes:
        - name: cache-storage
          emptyDir:
            sizeLimit: 20Gi

---
apiVersion: v1
kind: Service
metadata:
  name: v2x-mesh-gateway
  namespace: v2x-mesh
  labels:
    app: v2x-mesh-gateway
spec:
  type: LoadBalancer
  selector:
    app: v2x-mesh-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8010
      protocol: TCP
    - name: websocket
      port: 8011
      targetPort: 8011
      protocol: TCP
    - name: metrics
      port: 8012
      targetPort: 8012
      protocol: TCP
  sessionAffinity: ClientIP

---
apiVersion: v1
kind: Service
metadata:
  name: v2x-tower-cache
  namespace: v2x-mesh
  labels:
    app: v2x-tower-cache
spec:
  type: ClusterIP
  selector:
    app: v2x-tower-cache
  ports:
    - name: cache
      port: 8013
      targetPort: 8013
      protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: v2x-mesh-gateway-hpa
  namespace: v2x-mesh
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: v2x-mesh-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    - type: Pods
      pods:
        metric:
          name: mesh_messages_per_second
        target:
          type: AverageValue
          averageValue: "1000"

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: v2x-mesh-gateway-pdb
  namespace: v2x-mesh
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: v2x-mesh-gateway

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: v2x-mesh-network-policy
  namespace: v2x-mesh
spec:
  podSelector:
    matchLabels:
      app: v2x-mesh-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: default
        - podSelector:
            matchLabels:
              tier: edge
      ports:
        - protocol: TCP
          port: 8010
        - protocol: TCP
          port: 8011
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: default
      ports:
        - protocol: TCP
          port: 8003  # ShadowTag
        - protocol: TCP
          port: 6379  # Redis
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443  # External APIs (Google, Hive)
