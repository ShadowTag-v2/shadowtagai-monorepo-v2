
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lawtrack-api
  namespace: lawtrack
  labels:
    app: lawtrack-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lawtrack-api
  template:
    metadata:
      labels:
        app: lawtrack-api
    spec:
      containers:
      - name: api
        image: gcr.io/${PROJECT_ID}/lawtrack-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: lawtrack-secrets
              key: database-url
        - name: GOOGLE_CLOUD_PROJECT
          valueFrom:
            configMapKeyRef:
              name: lawtrack-config
              key: project-id
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: lawtrack-service
  namespace: lawtrack
spec:
  selector:
    app: lawtrack-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lawtrack-ingress
  namespace: lawtrack
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/managed-certificates: "lawtrack-cert"
spec:
  rules:
  - host: api.lawtrack.ai
    http:
      paths:
      - path: /api/v1/lawtrack/*
        pathType: ImplementationSpecific
        backend:
          service:
            name: lawtrack-service
            port:
              number: 80
