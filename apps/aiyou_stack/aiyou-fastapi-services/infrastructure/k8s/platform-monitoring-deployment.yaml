---
apiVersion: v1
kind: Namespace
metadata:
  name: platform-monitoring
  labels:
    name: platform-monitoring
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-monitoring-config
  namespace: platform-monitoring
data:
  V2X_MESH_API_URL: "http://v2x-mesh-gateway.v2x-mesh.svc.cluster.local:8010"
  GEMINI_INGESTION_STATUS_URL: "http://gemini-ingestion-status.gemini-ingestion.svc.cluster.local:8000"
  REFRESH_INTERVAL_SECONDS: "30"
  LOG_LEVEL: "INFO"
  # Budget configuration
  BUDGET_GEMINI_INGESTION: "77.0"
  BUDGET_V2X_MESH: "3200.0"
  BUDGET_PLATFORM_MONITORING: "50.0"
  BUDGET_TOTAL: "3300.0"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-monitoring
  namespace: platform-monitoring
  labels:
    app: platform-monitoring
    tier: observability
spec:
  replicas: 2  # HA setup
  selector:
    matchLabels:
      app: platform-monitoring
  template:
    metadata:
      labels:
        app: platform-monitoring
        tier: observability
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/prometheus"
    spec:
      # Use preemptible nodes for cost savings
      nodeSelector:
        workload-type: monitoring

      serviceAccountName: platform-monitoring-sa

      containers:
        - name: monitoring-api
          image: gcr.io/PROJECT_ID/platform-monitoring:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP

          envFrom:
            - configMapRef:
                name: platform-monitoring-config

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: platform-monitoring
  namespace: platform-monitoring
  labels:
    app: platform-monitoring
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: platform-monitoring

---
apiVersion: v1
kind: Service
metadata:
  name: platform-monitoring-external
  namespace: platform-monitoring
  labels:
    app: platform-monitoring
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: platform-monitoring

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-monitoring-sa
  namespace: platform-monitoring
  annotations:
    iam.gke.io/gcp-service-account: platform-monitoring@PROJECT_ID.iam.gserviceaccount.com

---
# NetworkPolicy to allow access to V2X and Gemini services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: platform-monitoring-network-policy
  namespace: platform-monitoring
spec:
  podSelector:
    matchLabels:
      app: platform-monitoring
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from anywhere (external access)
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow to V2X mesh
    - to:
        - namespaceSelector:
            matchLabels:
              name: v2x-mesh
      ports:
        - protocol: TCP
          port: 8010

    # Allow to Gemini Ingestion
    - to:
        - namespaceSelector:
            matchLabels:
              name: gemini-ingestion
      ports:
        - protocol: TCP
          port: 8000

    # Allow to Vertex AI (external)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

---
# HorizontalPodAutoscaler for automatic scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-monitoring-hpa
  namespace: platform-monitoring
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-monitoring
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# ServiceMonitor for Prometheus Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: platform-monitoring-monitor
  namespace: platform-monitoring
spec:
  selector:
    matchLabels:
      app: platform-monitoring
  endpoints:
    - port: metrics
      interval: 30s
      path: /prometheus
