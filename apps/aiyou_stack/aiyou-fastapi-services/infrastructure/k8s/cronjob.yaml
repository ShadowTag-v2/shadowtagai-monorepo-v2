# PNKLN Core Stack - Ingestion Layer CronJob
# Runs nightly at 2 AM UTC to collect intelligence

apiVersion: batch/v1
kind: CronJob
metadata:
  name: pnkln-ingestion
  namespace: pnkln-core
  labels:
    app: pnkln-ingestion
    component: gemini-ingestion-layer
    tier: collection
spec:
  # Run every night at 2:00 AM UTC
  schedule: "0 2 * * *"

  # Keep last 3 successful and 1 failed job for debugging
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  # Don't run concurrent jobs
  concurrencyPolicy: Forbid

  # Start deadline: if job doesn't start within 30 min, skip
  startingDeadlineSeconds: 1800

  jobTemplate:
    metadata:
      labels:
        app: pnkln-ingestion
        component: gemini-ingestion-layer
    spec:
      # Limit runtime to 60 minutes (slightly over target 45 min)
      activeDeadlineSeconds: 3600

      # Restart policy: Never retry failed jobs automatically
      backoffLimit: 0

      template:
        metadata:
          labels:
            app: pnkln-ingestion
            component: gemini-ingestion-layer
        spec:
          restartPolicy: Never

          # Service account for GCP access
          serviceAccountName: pnkln-ingestion-sa

          # Node selector for cost optimization (use preemptible nodes)
          nodeSelector:
            workload-type: batch

          # Resource requests and limits
          containers:
          - name: ingestion
            image: gcr.io/PROJECT_ID/pnkln-ingestion:latest
            imagePullPolicy: Always

            # Default command (can override with args)
            command: ["python", "-m", "ingestion.main"]
            args: []

            # Environment variables from ConfigMap and Secrets
            envFrom:
            - configMapRef:
                name: pnkln-ingestion-config
            - secretRef:
                name: pnkln-ingestion-secrets

            # Resource allocation
            resources:
              requests:
                cpu: "500m"
                memory: "1Gi"
              limits:
                cpu: "2000m"
                memory: "4Gi"

            # Prometheus metrics port (for monitoring)
            ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # Graceful shutdown: allow 30 seconds for cleanup
          terminationGracePeriodSeconds: 30

---
# ConfigMap for non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: pnkln-ingestion-config
  namespace: pnkln-core
data:
  # GCP settings
  GCP_PROJECT_ID: "your-project-id"
  GCP_REGION: "us-central1"

  # Ingestion settings
  INGESTION_MAX_ITEMS_PER_RUN: "10000"
  INGESTION_RUNTIME_LIMIT_MINUTES: "45"
  INGESTION_COST_BUDGET_USD: "77.0"

  # Crawler settings
  CRAWLER_MAX_RATE_PER_DOMAIN: "1.0"
  CRAWLER_RESPECT_ROBOTS_TXT: "true"
  CRAWLER_USER_AGENT: "PNKLN-Ingestion/1.0 (+https://pnkln.ai/bot)"

  # Classification thresholds
  TIER_1_SCORE_THRESHOLD: "0.80"
  TIER_2_SCORE_THRESHOLD: "0.50"
  RELEVANCE_MIN_SCORE: "0.70"

  # Monitoring
  LOG_LEVEL: "INFO"
  ENABLE_STRUCTURED_LOGGING: "true"
  PROMETHEUS_PORT: "9090"

  # Feature flags
  ENABLE_YOUTUBE_SOURCE: "true"
  ENABLE_TWITTER_SOURCE: "true"
  ENABLE_NEWS_RSS_SOURCE: "true"
  ENABLE_TIER_CLASSIFICATION: "true"
  ENABLE_ETHICAL_FILTERING: "true"

  # AM Briefing delivery
  AM_BRIEFING_DELIVERY_TIME: "06:00"
  AM_BRIEFING_RECIPIENTS: "redacted@shadowtag-v4.local"

---
# Secret for API keys (create with kubectl create secret)
# kubectl create secret generic pnkln-ingestion-secrets \
#   --from-literal=ANTHROPIC_API_KEY=your_key \
#   --from-literal=YOUTUBE_API_KEY=your_key \
#   --from-literal=TWITTER_BEARER_TOKEN=your_token \
#   -n pnkln-core

apiVersion: v1
kind: Secret
metadata:
  name: pnkln-ingestion-secrets
  namespace: pnkln-core
type: Opaque
# data: (create separately with kubectl, not checked into git)

---
# Service Account for GKE Workload Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pnkln-ingestion-sa
  namespace: pnkln-core
  annotations:
    iam.gke.io/gcp-service-account: pnkln-ingestion@PROJECT_ID.iam.gserviceaccount.com

---
# Namespace definition
apiVersion: v1
kind: Namespace
metadata:
  name: pnkln-core
  labels:
    name: pnkln-core
    tier: collection
