---
apiVersion: v1
kind: Namespace
metadata:
  name: gemini-ingestion
  labels:
    name: gemini-ingestion
    environment: production

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gemini-ingestion-config
  namespace: gemini-ingestion
data:
  CRON_SCHEDULE: "0 2 * * *"  # 2am UTC daily
  RUNTIME_TARGET_MINUTES: "45"
  ITEMS_PER_DAY_TARGET: "1000"
  COST_PER_ITEM_CENTS: "0.05"
  RELEVANCE_THRESHOLD: "0.7"
  TIER1_TARGET_PCT: "30"
  V2X_MESH_GATEWAY_URL: "http://v2x-mesh-gateway.v2x-mesh.svc.cluster.local"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: Secret
metadata:
  name: gemini-ingestion-secrets
  namespace: gemini-ingestion
type: Opaque
stringData:
  GEMINI_API_KEY = "REDACTED_API_KEY"
  YOUTUBE_API_KEY = "REDACTED_API_KEY"
  TWITTER_BEARER_TOKEN = "REDACTED_API_KEY"
  NEWS_API_KEY = "REDACTED_API_KEY"

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: gemini-ingestion-nightly
  namespace: gemini-ingestion
  labels:
    app: gemini-ingestion
    tier: intelligence
spec:
  # Run nightly at 2am UTC
  schedule: "0 2 * * *"

  # Keep last 3 successful and 1 failed job
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  # Concurrency policy: Don't start new job if previous still running
  concurrencyPolicy: Forbid

  jobTemplate:
    metadata:
      labels:
        app: gemini-ingestion
        job-type: nightly-ingestion
    spec:
      # Allow 60 minutes for completion (buffer over 45min target)
      activeDeadlineSeconds: 3600

      # Don't restart on failure
      backoffLimit: 0

      template:
        metadata:
          labels:
            app: gemini-ingestion
            job-type: nightly-ingestion
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8080"
        spec:
          restartPolicy: Never

          # Use spot instances for cost savings
          nodeSelector:
            workload-type: batch

          # Service account for GCS access
          serviceAccountName: gemini-ingestion-sa

          containers:
            - name: ingestion-runner
              image: gcr.io/PROJECT_ID/gemini-ingestion:latest
              imagePullPolicy: Always

              env:
                - name: JOB_TYPE
                  value: "nightly-ingestion"

                - name: RUNTIME_TARGET_MINUTES
                  valueFrom:
                    configMapKeyRef:
                      name: gemini-ingestion-config
                      key: RUNTIME_TARGET_MINUTES

                - name: V2X_MESH_GATEWAY_URL
                  valueFrom:
                    configMapKeyRef:
                      name: gemini-ingestion-config
                      key: V2X_MESH_GATEWAY_URL

                - name: GEMINI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: gemini-ingestion-secrets
                      key: GEMINI_API_KEY

                - name: YOUTUBE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: gemini-ingestion-secrets
                      key: YOUTUBE_API_KEY

                - name: TWITTER_BEARER_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: gemini-ingestion-secrets
                      key: TWITTER_BEARER_TOKEN

                - name: NEWS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: gemini-ingestion-secrets
                      key: NEWS_API_KEY

              resources:
                requests:
                  cpu: 1000m
                  memory: 2Gi
                limits:
                  cpu: 2000m
                  memory: 4Gi

              volumeMounts:
                - name: output
                  mountPath: /app/output
                - name: cache
                  mountPath: /app/cache

          volumes:
            - name: output
              emptyDir:
                sizeLimit: 500Mi
            - name: cache
              emptyDir:
                sizeLimit: 1Gi

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gemini-ingestion-sa
  namespace: gemini-ingestion
  annotations:
    iam.gke.io/gcp-service-account: gemini-ingestion@PROJECT_ID.iam.gserviceaccount.com

---
# NetworkPolicy to allow egress to V2X mesh and external APIs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gemini-ingestion-network-policy
  namespace: gemini-ingestion
spec:
  podSelector:
    matchLabels:
      app: gemini-ingestion
  policyTypes:
    - Egress
  egress:
    # Allow to V2X mesh
    - to:
        - namespaceSelector:
            matchLabels:
              name: v2x-mesh
      ports:
        - protocol: TCP
          port: 8010

    # Allow to external APIs (YouTube, Twitter, NewsAPI, Gemini)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

---
# PodMonitor for Prometheus metrics
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: gemini-ingestion-monitor
  namespace: gemini-ingestion
spec:
  selector:
    matchLabels:
      app: gemini-ingestion
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      path: /metrics
