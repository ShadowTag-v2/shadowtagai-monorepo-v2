apiVersion: apps/v1
kind: Deployment
metadata:
  name: Claude_Code_6-core
  labels:
    app: Claude_Code_6
    doctrine: targeting
spec:
  replicas: 2
  selector:
    matchLabels:
      app: Claude_Code_6
  template:
    metadata:
      labels:
        app: Claude_Code_6
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      terminationGracePeriodSeconds: 25
      containers:
      - name: Claude_Code_6-engine
        image: us-docker.pkg.dev/cloudrun/container/hello # Placeholder until build
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
            ephemeral-storage: "1Gi"
        env:
        - name: DOCTRINE
          value: "PRECISION_PERSISTENCE_PROFIT"
