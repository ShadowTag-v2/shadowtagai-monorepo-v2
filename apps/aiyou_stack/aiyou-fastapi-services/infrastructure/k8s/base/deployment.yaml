apiVersion: apps/v1
kind: Deployment
metadata:
  name: shadowtagai-orchestrator
  namespace: shadowtagai-production
  labels:
    app: shadowtagai
    component: orchestrator
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: shadowtagai
      component: orchestrator
  template:
    metadata:
      labels:
        app: shadowtagai
        component: orchestrator
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: shadowtagai-orchestrator

      # Use Spot VMs for cost optimization
      nodeSelector:
        cloud.google.com/gke-spot: "true"

      # Tolerate preemption
      tolerations:
      - key: cloud.google.com/gke-spot
        operator: Equal
        value: "true"
        effect: NoSchedule

      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: orchestrator
        image: us-central1-docker.pkg.dev/PROJECT_ID/shadowtagai/orchestrator:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        env:
        # From ConfigMap
        - name: CLOUD_ML_REGION
          valueFrom:
            configMapKeyRef:
              name: shadowtagai-config
              key: CLOUD_ML_REGION

        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: shadowtagai-config
              key: NODE_ENV

        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: shadowtagai-config
              key: LOG_LEVEL

        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: shadowtagai-config
              key: PORT

        - name: MIN_LTV_CAC_RATIO
          valueFrom:
            configMapKeyRef:
              name: shadowtagai-config
              key: MIN_LTV_CAC_RATIO

        - name: MIN_ROI_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: shadowtagai-config
              key: MIN_ROI_THRESHOLD

        - name: MIN_CONFIDENCE
          valueFrom:
            configMapKeyRef:
              name: shadowtagai-config
              key: MIN_CONFIDENCE

        # From Secret (created via Secret Manager)
        - name: ANTHROPIC_VERTEX_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: shadowtagai-secrets
              key: project-id

        # Resources
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "4Gi"
            cpu: "2000m"
            ephemeral-storage: "2Gi"

        # Liveness probe
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3

        # Readiness probe
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 2

        # Startup probe (for slow starts)
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 30

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL

        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache

      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
