apiVersion: v1
kind: Service
metadata:
  name: shadowtagai-orchestrator
  namespace: shadowtagai-production
  labels:
    app: shadowtagai
    component: orchestrator
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "shadowtagai-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app: shadowtagai
    component: orchestrator
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  sessionAffinity: None
