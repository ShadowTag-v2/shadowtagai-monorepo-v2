apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-gemini
  namespace: gke-inference-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-gemini
  template:
    metadata:
      labels:
        app: vllm-gemini
    spec:
      tolerations:
      - key: "accelerator"
        operator: "Equal"
        value: "gpu"
        effect: "NoSchedule"
      containers:
      - name: vllm
        image: vllm/vllm-openai:latest
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
        args: ["--model", "google/gemini-pro", "--trust-remote-code"]
        env:
        - name: HUGGING_FACE_HUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: token
        resources:
          limits:
            nvidia.com/gpu: 1
        ports:
        - containerPort: 8000

      # Judge #6 Sidecar (Enforcement)
      - name: judge-enforcer
        image: pnkln/judge:v6.2
        env:
        - name: TARGET_LATENCY_P99
          value: "10ms"
        - name: COVERAGE_THRESHOLD
          value: "0.98"
        - name: AUTO_ROLLBACK
          value: "true"
