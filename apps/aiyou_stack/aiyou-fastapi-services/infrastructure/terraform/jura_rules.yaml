# JURA Governance Rules for Terraform Infrastructure
# These rules are enforced by the 30 Pro-tier agents during swarm audit
#
# Severity Levels:
#   CRITICAL - Blocks deployment, requires immediate fix
#   HIGH     - Blocks deployment, should be fixed before apply
#   MEDIUM   - Warning, may escalate for manual review
#   LOW      - Informational, logged but doesn't block

rules:
  # ==========================================================================
  # SECURITY RULES
  # ==========================================================================

  - id: JURA-SEC-001
    name: "No public S3 buckets"
    description: "S3 buckets must not have public read/write ACLs"
    resource: aws_s3_bucket
    check: acl != "public-read" AND acl != "public-read-write"
    severity: CRITICAL
    remediation: "Set acl = 'private' and use bucket policies for access control"

  - id: JURA-SEC-002
    name: "No public RDS instances"
    description: "RDS instances must not be publicly accessible"
    resource: aws_db_instance
    check: publicly_accessible == false
    severity: CRITICAL
    remediation: "Set publicly_accessible = false"

  - id: JURA-SEC-003
    name: "No open security groups"
    description: "Security groups must not allow 0.0.0.0/0 on sensitive ports"
    resource: aws_security_group_rule
    check: NOT (cidr_blocks contains "0.0.0.0/0" AND (from_port == 22 OR from_port == 3389 OR from_port == 3306 OR from_port == 5432))
    severity: CRITICAL
    remediation: "Restrict CIDR blocks to specific IP ranges"

  - id: JURA-SEC-004
    name: "No hardcoded secrets"
    description: "Resources must not contain hardcoded secrets or API keys"
    resource: "*"
    check: NOT contains(values, "password=") AND NOT contains(values, "api_key=") AND NOT contains(values, "secret=")
    severity: CRITICAL
    remediation: "Use AWS Secrets Manager or SSM Parameter Store"

  # ==========================================================================
  # ENCRYPTION RULES
  # ==========================================================================

  - id: JURA-ENC-001
    name: "EBS encryption required"
    description: "All EBS volumes must be encrypted"
    resource: aws_ebs_volume
    check: encrypted == true
    severity: HIGH
    remediation: "Set encrypted = true and specify kms_key_id"

  - id: JURA-ENC-002
    name: "S3 encryption required"
    description: "S3 buckets must have server-side encryption enabled"
    resource: aws_s3_bucket
    check: server_side_encryption_configuration.rule.apply_server_side_encryption_by_default exists
    severity: HIGH
    remediation: "Enable default encryption with SSE-S3 or SSE-KMS"

  - id: JURA-ENC-003
    name: "RDS encryption required"
    description: "RDS instances must have storage encryption enabled"
    resource: aws_db_instance
    check: storage_encrypted == true
    severity: HIGH
    remediation: "Set storage_encrypted = true"

  - id: JURA-ENC-004
    name: "CloudTrail encryption required"
    description: "CloudTrail logs must be encrypted with KMS"
    resource: aws_cloudtrail
    check: kms_key_id exists
    severity: HIGH
    remediation: "Specify a KMS key for CloudTrail encryption"

  # ==========================================================================
  # COST CONTROLS
  # ==========================================================================

  - id: JURA-COST-001
    name: "Instance size limit"
    description: "EC2 instances must not exceed approved sizes without approval"
    resource: aws_instance
    check: instance_type IN ["t3.micro", "t3.small", "t3.medium", "t3.large", "m5.large", "m5.xlarge"]
    severity: MEDIUM
    escalate_to: governance
    remediation: "Use approved instance types or request exception"

  - id: JURA-COST-002
    name: "Estimated monthly cost threshold"
    description: "Infrastructure changes must not exceed $10,000/month without approval"
    resource: "*"
    check: estimated_monthly_cost < 10000
    severity: MEDIUM
    escalate_to: governance
    remediation: "Review cost estimate and request budget exception if needed"

  - id: JURA-COST-003
    name: "RDS instance size limit"
    description: "RDS instances must use approved sizes"
    resource: aws_db_instance
    check: instance_class IN ["db.t3.micro", "db.t3.small", "db.t3.medium", "db.r5.large"]
    severity: MEDIUM
    escalate_to: governance
    remediation: "Use approved RDS instance classes"

  # ==========================================================================
  # NAMING CONVENTIONS
  # ==========================================================================

  - id: JURA-NAME-001
    name: "Resource naming convention"
    description: "Resources must follow naming convention: {env}-{service}-{component}"
    resource: "*"
    check: name matches "^(dev|staging|prod)-[a-z]+-[a-z]+.*$"
    severity: LOW
    remediation: "Follow naming pattern: {environment}-{service}-{component}"

  - id: JURA-NAME-002
    name: "Required tags"
    description: "Resources must have required tags: Environment, Owner, CostCenter"
    resource: "*"
    check: tags.Environment exists AND tags.Owner exists AND tags.CostCenter exists
    severity: MEDIUM
    remediation: "Add required tags to all resources"

  # ==========================================================================
  # GCP-SPECIFIC RULES
  # ==========================================================================

  - id: JURA-GCP-001
    name: "No default network"
    description: "Projects must not use default VPC network"
    resource: google_compute_network
    check: name != "default"
    severity: HIGH
    remediation: "Create custom VPC networks instead of using default"

  - id: JURA-GCP-002
    name: "GKE private cluster"
    description: "GKE clusters must be private"
    resource: google_container_cluster
    check: private_cluster_config.enable_private_nodes == true
    severity: HIGH
    remediation: "Enable private nodes in GKE cluster config"

  - id: JURA-GCP-003
    name: "Cloud SQL private IP"
    description: "Cloud SQL instances must use private IP"
    resource: google_sql_database_instance
    check: settings.ip_configuration.private_network exists
    severity: HIGH
    remediation: "Configure private network for Cloud SQL"

  # ==========================================================================
  # COMPLIANCE RULES (SOC2, HIPAA, PCI-DSS)
  # ==========================================================================

  - id: JURA-COMP-001
    name: "Logging enabled"
    description: "All resources must have appropriate logging enabled"
    resource: "*"
    check: logging_config exists OR access_logs exists
    severity: MEDIUM
    compliance: ["SOC2", "HIPAA"]
    remediation: "Enable logging for compliance requirements"

  - id: JURA-COMP-002
    name: "Backup retention"
    description: "Databases must have backup retention of at least 7 days"
    resource: aws_db_instance
    check: backup_retention_period >= 7
    severity: MEDIUM
    compliance: ["SOC2", "HIPAA"]
    remediation: "Set backup_retention_period >= 7"

  - id: JURA-COMP-003
    name: "Multi-AZ deployment"
    description: "Production databases must be multi-AZ"
    resource: aws_db_instance
    check: multi_az == true OR environment != "prod"
    severity: HIGH
    compliance: ["SOC2"]
    remediation: "Enable multi-AZ for production databases"

# ==========================================================================
# ESCALATION MATRIX
# ==========================================================================
escalation:
  governance:
    - recipient: "redacted@shadowtag-v4.local"
    - slack_channel: "#infra-approvals"
    - sla_hours: 4

  security:
    - recipient: "redacted@shadowtag-v4.local"
    - slack_channel: "#security-alerts"
    - sla_hours: 1

  cost:
    - recipient: "redacted@shadowtag-v4.local"
    - slack_channel: "#cost-alerts"
    - sla_hours: 24
