apiVersion: apps/v1
kind: Deployment
metadata:
  name: pnkln-fastapi
  labels:
    app: pnkln-fastapi
    component: governance-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pnkln-fastapi
  template:
    metadata:
      labels:
        app: pnkln-fastapi
        component: governance-api
    spec:
      containers:
      - name: fastapi
        image: gcr.io/PROJECT_ID/pnkln-fastapi:latest
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: PNKLN_API_KEY
          valueFrom:
            secretKeyRef:
              name: pnkln-api-secrets
              key: api-key
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: pnkln-fastapi-service
  labels:
    app: pnkln-fastapi
spec:
  type: LoadBalancer
  selector:
    app: pnkln-fastapi
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pnkln-fastapi-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pnkln-fastapi
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
