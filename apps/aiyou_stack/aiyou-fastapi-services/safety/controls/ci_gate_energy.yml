name: CI Gate - Energy Margin
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  energy-margin:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Calculate energy margin (placeholder)
        id: energy
        run: |
          # Placeholder: In production, integrate with CodeCarbon, CloudCarbon, or similar
          # For now, synthetic calculation based on PR size
          FILES_CHANGED=$(git diff --name-only origin/main...HEAD 2>/dev/null | wc -l || echo 10)
          LINES_CHANGED=$(git diff --stat origin/main...HEAD 2>/dev/null | tail -1 | awk '{print $4}' || echo 100)

          # Simple heuristic: margin = 1 - (lines_changed / 10000)
          MARGIN=$(python - <<EOF
          import sys
          lines = max(1, min(10000, ${LINES_CHANGED}))
          margin = max(0.05, 1.0 - (lines / 10000.0))
          print(f"{margin:.3f}")
          EOF
          )

          echo "ENERGY_MARGIN=${MARGIN}" >> $GITHUB_ENV
          echo "energy_margin=${MARGIN}" >> $GITHUB_OUTPUT
          echo "Files changed: ${FILES_CHANGED}, Lines changed: ${LINES_CHANGED}, Margin: ${MARGIN}"

      - name: Enforce energy margin threshold
        env:
          THRESHOLD: "0.10"
        run: |
          MARGIN=${{ steps.energy.outputs.energy_margin }}
          THRESHOLD=${THRESHOLD}

          echo "Energy margin: ${MARGIN}"
          echo "Threshold: ${THRESHOLD}"

          PASS=$(python - <<EOF
          margin = float("${MARGIN}")
          threshold = float("${THRESHOLD}")
          print("true" if margin >= threshold else "false")
          EOF
          )

          if [ "${PASS}" = "true" ]; then
            echo "✅ Energy margin ${MARGIN} meets threshold ${THRESHOLD}"
          else
            echo "❌ Energy margin ${MARGIN} below threshold ${THRESHOLD}"
            exit 1
          fi

      - name: Save energy report
        run: |
          mkdir -p .ci
          cat > .ci/energy-margin-report.json <<EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${GITHUB_SHA}",
            "margin": ${{ steps.energy.outputs.energy_margin }},
            "threshold": 0.10,
            "passed": true
          }
          EOF

      - name: Upload energy report
        uses: actions/upload-artifact@v4
        with:
          name: energy-margin-report
          path: .ci/energy-margin-report.json
          retention-days: 90

      - name: Update summary
        if: always()
        run: |
          echo "## ⚡ Energy Margin Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Energy Margin**: ${{ steps.energy.outputs.energy_margin }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Threshold**: 0.10" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Note: This is a placeholder implementation. Integrate with CodeCarbon for production use._" >> $GITHUB_STEP_SUMMARY
