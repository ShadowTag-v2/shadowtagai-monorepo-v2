apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge6
  namespace: pnkln
  labels:
    app.kubernetes.io/name: judge6
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: pnkln-core-stack
    app.kubernetes.io/managed-by: terraform
    workload-type: gpu
    sla-tier: critical
spec:
  replicas: 2  # Start with 2 for HA, HPA will adjust
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero downtime deployments
  selector:
    matchLabels:
      app: judge6
      version: v1
  template:
    metadata:
      labels:
        app: judge6
        version: v1
        sla-tier: critical
        gpu-workload: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        # GCS FUSE mounting
        gke-gcsfuse/volumes: "true"
        gke-gcsfuse/cpu-limit: "1000m"
        gke-gcsfuse/memory-limit: "2Gi"
    spec:
      # Use workload identity service account
      serviceAccountName: pnkln-workload

      # Critical priority for p99 ≤90ms SLA
      priorityClassName: pnkln-critical

      # GPU node selector and tolerations
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4  # or nvidia-h100-80gb
        workload-type: gpu

      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

      # Optimize pod scheduling
      affinity:
        podAntiAffinity:
          # Prefer spreading across nodes for HA
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - judge6
              topologyKey: kubernetes.io/hostname

      # Fast startup for reduced cold start latency
      initContainers:
      - name: model-loader
        image: google/cloud-sdk:slim
        command:
        - sh
        - -c
        - |
          echo "Verifying model files in GCS FUSE mount..."
          ls -lh /models/judge6 || echo "Model not found - ensure GCS bucket is populated"
          echo "Model verification complete"
        volumeMounts:
        - name: model-storage
          mountPath: /models
          readOnly: true
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"

      containers:
      - name: judge6-inference
        # Replace with your actual inference server image
        # Examples: vllm/vllm-openai, nvcr.io/nvidia/tritonserver
        image: vllm/vllm-openai:latest
        imagePullPolicy: IfNotPresent

        command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        args:
        - --model
        - $(MODEL_PATH)
        - --tensor-parallel-size
        - "1"
        - --gpu-memory-utilization
        - $(GPU_MEMORY_UTILIZATION)
        - --max-model-len
        - "4096"
        - --dtype
        - $(DTYPE)
        - --quantization
        - $(QUANTIZATION)
        - --enable-paged-attention
        - --port
        - "8000"
        - --host
        - "0.0.0.0"

        env:
        # Import all config from ConfigMap
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: judge6-config
              key: MODEL_NAME
        - name: MODEL_PATH
          valueFrom:
            configMapKeyRef:
              name: judge6-config
              key: MODEL_PATH
        - name: GPU_MEMORY_UTILIZATION
          valueFrom:
            configMapKeyRef:
              name: judge6-config
              key: GPU_MEMORY_UTILIZATION
        - name: DTYPE
          valueFrom:
            configMapKeyRef:
              name: judge6-config
              key: DTYPE
        - name: QUANTIZATION
          valueFrom:
            configMapKeyRef:
              name: judge6-config
              key: QUANTIZATION
        - name: PROMETHEUS_PORT
          valueFrom:
            configMapKeyRef:
              name: judge6-config
              key: PROMETHEUS_PORT

        # GPU request
        resources:
          requests:
            cpu: "4"
            memory: "16Gi"
            nvidia.com/gpu: 1  # Request 1 GPU
          limits:
            cpu: "8"
            memory: "32Gi"
            nvidia.com/gpu: 1

        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 8080
          protocol: TCP

        # Optimized health checks for low latency
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120  # GPU model loading takes time
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 2

        # Startup probe to handle initial model loading
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30  # Allow up to 5 minutes for startup

        volumeMounts:
        - name: model-storage
          mountPath: /models
          readOnly: true
        - name: shm
          mountPath: /dev/shm  # Shared memory for GPU operations

        # Security context
        securityContext:
          runAsNonRoot: false  # GPU drivers require root
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false  # vLLM needs write access

      volumes:
      # GCS FUSE volume for model storage
      - name: model-storage
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: REPLACE_WITH_YOUR_BUCKET
            mountOptions: "implicit-dirs,max-conns-per-host=100"

      # Shared memory for GPU operations
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi  # Adjust based on model size

      # Graceful shutdown for inference requests
      terminationGracePeriodSeconds: 120

      # DNS configuration for low latency
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
        - name: ndots
          value: "1"  # Reduce DNS lookup time
