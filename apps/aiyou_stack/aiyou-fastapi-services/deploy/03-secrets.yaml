# Secrets are managed in GCP Secret Manager
# This file shows how to reference them using the Workload Identity
# with GCP Secret Manager CSI driver or environment variable injection

# Option 1: Use External Secrets Operator (recommended)
# Install: kubectl apply -f https://raw.githubusercontent.com/external-secrets/external-secrets/main/deploy/crds/bundle.yaml
#          kubectl apply -f https://raw.githubusercontent.com/external-secrets/external-secrets/main/deploy/external-secrets.yaml

# Option 2: Use GKE Workload Identity with Secret Manager API
# This is handled in the deployment via environment variables

# Example ExternalSecret (if using External Secrets Operator)
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcpsm-secret-store
  namespace: pnkln
spec:
  provider:
    gcpsm:
      projectID: "PROJECT_ID"  # Replace with your project ID
      auth:
        workloadIdentity:
          clusterLocation: us-central1-a
          clusterName: pnkln-prod
          serviceAccountRef:
            name: pnkln-inference

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pnkln-secrets
  namespace: pnkln
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-secret-store
    kind: SecretStore
  target:
    name: pnkln-secrets
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: pnkln-api-keys
    - secretKey: model-credentials
      remoteRef:
        key: pnkln-model-credentials
    - secretKey: database-url
      remoteRef:
        key: pnkln-database-url

# If not using External Secrets Operator, secrets will be accessed
# directly via GCP Secret Manager API using Workload Identity
# See deployment.yaml for environment variable configuration
