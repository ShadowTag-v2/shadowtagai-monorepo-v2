apiVersion: v1
kind: ConfigMap
metadata:
  name: judge6-config
  namespace: pnkln
  labels:
    app.kubernetes.io/name: judge6
    app.kubernetes.io/component: config
    app.kubernetes.io/managed-by: terraform
data:
  # Model configuration
  MODEL_NAME: "pnkln-judge6-v1"
  MODEL_PATH: "/models/judge6"

  # Performance tuning for p99 ≤90ms SLA
  BATCH_SIZE: "1"
  MAX_BATCH_WAIT_MS: "5"
  MAX_CONCURRENT_REQUESTS: "100"

  # GPU optimization
  GPU_MEMORY_UTILIZATION: "0.9"
  ENABLE_TENSOR_PARALLELISM: "false"
  ENABLE_PAGED_ATTENTION: "true"
  ENABLE_FLASH_ATTENTION: "true"

  # Quantization for latency optimization
  QUANTIZATION: "awq"  # or "fp8" for H100
  DTYPE: "float16"

  # Caching
  ENABLE_KV_CACHE: "true"
  KV_CACHE_DTYPE: "fp8"

  # Monitoring
  PROMETHEUS_PORT: "8080"
  LOG_LEVEL: "INFO"
  ENABLE_METRICS: "true"

  # Health check endpoints
  HEALTH_CHECK_PATH: "/health"
  READINESS_CHECK_PATH: "/ready"

  # GCS model loading
  GCS_BUCKET: "gs://REPLACE_WITH_YOUR_BUCKET/models/judge6"
  ENABLE_GCS_FUSE: "true"
