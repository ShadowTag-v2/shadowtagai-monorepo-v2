apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: judge6-hpa
  namespace: pnkln
  labels:
    app.kubernetes.io/name: judge6-hpa
    app.kubernetes.io/component: autoscaling
    app.kubernetes.io/managed-by: terraform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: judge6

  minReplicas: 2  # Minimum for HA
  maxReplicas: 6  # Maximum to stay within cost budget

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
      - type: Percent
        value: 50  # Scale down by max 50% at a time
        periodSeconds: 60
      - type: Pods
        value: 1  # Or max 1 pod at a time
        periodSeconds: 60
      selectPolicy: Min

    scaleUp:
      stabilizationWindowSeconds: 60  # Fast scale up for latency SLA
      policies:
      - type: Percent
        value: 100  # Scale up by 100% at a time
        periodSeconds: 30
      - type: Pods
        value: 2  # Or max 2 pods at a time
        periodSeconds: 30
      selectPolicy: Max

  metrics:
  # CPU-based autoscaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Scale at 70% CPU

  # Memory-based autoscaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80  # Scale at 80% memory

  # GPU utilization (requires custom metrics adapter)
  # Uncomment when custom metrics adapter is deployed
  # - type: Pods
  #   pods:
  #     metric:
  #       name: gpu_utilization
  #     target:
  #       type: AverageValue
  #       averageValue: "70"

  # Request rate-based scaling (requires custom metrics)
  # - type: Pods
  #   pods:
  #     metric:
  #       name: requests_per_second
  #     target:
  #       type: AverageValue
  #       averageValue: "50"

  # Latency-based scaling (requires custom metrics)
  # - type: Pods
  #   pods:
  #     metric:
  #       name: p99_latency_ms
  #     target:
  #       type: AverageValue
  #       averageValue: "75"  # Scale before hitting 90ms SLA
