apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: Cor.Claude_Code_6-network-policy
  namespace: pnkln
  labels:
    app.kubernetes.io/name: Cor.Claude_Code_6-network-policy
    app.kubernetes.io/component: security
    app.kubernetes.io/managed-by: terraform
spec:
  podSelector:
    matchLabels:
      app: Cor.Claude_Code_6
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow traffic from load balancer
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8080

  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53

  # Allow GCS access
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

  # Allow GKE metadata server
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 988
