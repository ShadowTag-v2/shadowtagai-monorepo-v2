apiVersion: v1
kind: Service
metadata:
  name: judge6
  namespace: pnkln
  labels:
    app.kubernetes.io/name: judge6
    app.kubernetes.io/component: inference
    app.kubernetes.io/managed-by: terraform
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "judge6-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app: judge6
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  sessionAffinity: None

---
# Service for metrics scraping
apiVersion: v1
kind: Service
metadata:
  name: judge6-metrics
  namespace: pnkln
  labels:
    app.kubernetes.io/name: judge6-metrics
    app.kubernetes.io/component: monitoring
spec:
  type: ClusterIP
  selector:
    app: judge6
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  clusterIP: None  # Headless service for Prometheus scraping

---
# Backend configuration for GCP Load Balancer
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: judge6-backend-config
  namespace: pnkln
spec:
  # Connection draining for graceful shutdown
  connectionDraining:
    drainingTimeoutSec: 60

  # Health check configuration optimized for inference
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /health
    port: 8000

  # Session affinity for consistent routing
  sessionAffinity:
    affinityType: "CLIENT_IP"
    affinityCookieTtlSec: 300

  # Timeout configuration for inference requests
  timeoutSec: 30

  # Cloud CDN disabled for dynamic inference responses
  cdn:
    enabled: false
