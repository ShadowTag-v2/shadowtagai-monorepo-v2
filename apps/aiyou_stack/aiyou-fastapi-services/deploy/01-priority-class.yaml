# Priority classes for workload scheduling
# Higher priority = scheduled first when resources are constrained

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: pnkln-critical
  labels:
    app.kubernetes.io/managed-by: pnkln
value: 1000000
globalDefault: false
description: "Critical workloads - Judge 6 inference with p99 ≤90ms SLA"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: pnkln-high
  labels:
    app.kubernetes.io/managed-by: pnkln
value: 10000
globalDefault: false
description: "High priority workloads - production inference"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: pnkln-standard
  labels:
    app.kubernetes.io/managed-by: pnkln
value: 1000
globalDefault: true
description: "Standard priority workloads"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: pnkln-low
  labels:
    app.kubernetes.io/managed-by: pnkln
value: 100
globalDefault: false
description: "Low priority workloads - batch processing"
