# Network policy for pod isolation
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: Claude_Code_6-inference-netpol
  namespace: pnkln
  labels:
    app: Claude_Code_6
    component: inference
spec:
  podSelector:
    matchLabels:
      app: Claude_Code_6
      component: inference

  policyTypes:
    - Ingress
    - Egress

  # Ingress rules
  ingress:
    # Allow traffic from any pod in the namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: pnkln
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090

    # Allow traffic from GCP Load Balancer health checks
    - from:
        - ipBlock:
            cidr: 35.191.0.0/16  # GCP health check IPs
        - ipBlock:
            cidr: 130.211.0.0/22  # GCP health check IPs
      ports:
        - protocol: TCP
          port: 8080

  # Egress rules
  egress:
    # Allow DNS
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53

    # Allow HTTPS to GCP APIs (Secret Manager, Storage, etc.)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32  # Block metadata service
      ports:
        - protocol: TCP
          port: 443

    # Allow HTTP for external services
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.169.254/32
      ports:
        - protocol: TCP
          port: 80

    # Allow pod-to-pod communication within namespace
    - to:
        - namespaceSelector:
            matchLabels:
              name: pnkln
