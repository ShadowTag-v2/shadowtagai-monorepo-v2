apiVersion: v1
kind: ConfigMap
metadata:
  name: pnkln-config
  namespace: pnkln
  labels:
    app: pnkln
data:
  # Application configuration
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"

  # Inference configuration
  MODEL_NAME: "judge-6"
  MAX_BATCH_SIZE: "8"
  MAX_CONCURRENT_REQUESTS: "100"

  # Performance tuning
  INFERENCE_TIMEOUT_MS: "80"  # Target 80ms to stay under p99 90ms SLA
  WORKER_THREADS: "4"
  GPU_MEMORY_FRACTION: "0.95"

  # Monitoring configuration
  METRICS_PORT: "9090"
  METRICS_PATH: "/metrics"
  HEALTH_CHECK_PATH: "/health"
  READINESS_CHECK_PATH: "/ready"

  # Model storage (GCS bucket via FUSE)
  MODEL_STORAGE_PATH: "/models"
  MODEL_CACHE_SIZE_GB: "10"
