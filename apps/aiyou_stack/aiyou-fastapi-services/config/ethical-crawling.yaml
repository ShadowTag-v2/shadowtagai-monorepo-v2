ethical_crawling:
  # User-Agent identification
  user_agent: "SHADOWTAGAI-Ingestion-Bot/1.0 (+https://shadowtagai.ai/bot; redacted@shadowtag-v4.local)"
  contact_email: "redacted@shadowtag-v4.local"
  info_url: "https://shadowtagai.ai/bot"

  # robots.txt compliance
  robots_txt:
    enabled: true
    cache_ttl_hours: 24
    default_crawl_delay_seconds: 1
    respect_crawl_delay: true
    user_agent_name: "SHADOWTAGAI-Ingestion-Bot"

  # Rate limiting
  rate_limiting:
    default_delay_seconds: 2
    min_delay_seconds: 1
    max_delay_seconds: 60
    adaptive: true

    # Tier-specific delays
    tier_delays:
      tier_1: 2    # High-value sources: slower, more respectful
      tier_2: 5
      tier_3: 10

    # Per-domain overrides
    domain_overrides:
      "apnews.com": 3
      "reuters.com": 3
      "bbc.com": 2
      "twitter.com": 2
      "youtube.com": 1  # API-based, not rate limited same way

  # Circuit breaker
  circuit_breaker:
    failure_threshold: 5
    timeout_seconds: 300  # 5 minutes
    half_open_max_requests: 1
    success_threshold: 3  # Consecutive successes to close

  # Privacy & PII
  privacy:
    scrub_pii: true
    pii_patterns:
      - email
      - phone
      - ssn
      - credit_card
    retention_days:
      tier_1: 90
      tier_2: 30
      tier_3: 14
    allow_personal_data: false
    gdpr_compliant: true

  # Content filtering
  content_filtering:
    # Blacklisted domains (never crawl)
    blacklisted_domains:
      - "illegal-content.example"
      - "known-malware.example"
      - "spam-site.example"

    # Prohibited keywords (flag for review)
    prohibited_keywords:
      - "child exploitation"
      - "hacked database"
      - "leaked credentials"
      # Additional keywords maintained in separate secure list

    # Content types to exclude
    excluded_content_types:
      - "application/x-executable"
      - "application/x-msdownload"
      - "application/x-dosexec"

  # Compliance
  compliance:
    respect_paywalls: true
    require_api_for_auth_sites: true
    fair_use_excerpt_max_words: 200
    dmca_response_hours: 24
    link_to_original: true
    no_paywall_circumvention: true

  # Request headers
  headers:
    user_agent: "SHADOWTAGAI-Ingestion-Bot/1.0 (+https://shadowtagai.ai/bot; redacted@shadowtag-v4.local)"
    from: "redacted@shadowtag-v4.local"
    accept: "application/json, text/html, */*"
    accept_encoding: "gzip, deflate"
    connection: "keep-alive"

  # Monitoring & alerting
  monitoring:
    track_robots_violations: true
    track_rate_limit_hits: true
    track_blocked_requests: true
    alert_on_violation: true

    # Alert thresholds
    alerts:
      robots_violation: 0  # Zero tolerance
      rate_limit_hits_per_hour: 10
      circuit_breaker_opens: 1
      pii_detection: 1

  # Whitelisted domains (always allowed, skip robots.txt)
  whitelisted_domains:
    - "api.example.com"  # Official APIs
    - "data.gov"         # Public government data

  # Source-specific policies
  source_policies:
    youtube:
      use_api: true
      respect_quota: true
      max_requests_per_day: 10000

    twitter:
      use_api: true
      respect_rate_limits: true
      max_tweets_per_request: 100

    news:
      check_robots: true
      respect_paywalls: true
      max_articles_per_outlet: 100

    rss:
      check_robots: true
      cache_feeds: true
      feed_refresh_hours: 1

    web_scraper:
      check_robots: true
      adaptive_rate_limiting: true
      max_depth: 2
      follow_redirects: true
      max_redirects: 3
