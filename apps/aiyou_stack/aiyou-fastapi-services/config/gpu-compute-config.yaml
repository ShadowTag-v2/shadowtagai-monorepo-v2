# GPU Compute Configuration for Omega
# Version: 1.0
# Date: 2025-11-17
# Owner: GPU Infrastructure Team

---
# Global Settings
global:
  project_name: "omega-gpu-compute"
  environment: "production"  # Options: development, staging, production
  deployment_strategy: "cloud-first"  # Options: cloud-first, hybrid, on-premise

  # Cost Management
  budget:
    monthly_cap_usd: 50000
    alert_threshold_pct: 80
    auto_shutdown_on_cap: true

  # Monitoring
  monitoring:
    enabled: true
    dashboard_url: "https://grafana.omega.internal/gpu"
    alert_channels:
      - email: "redacted@shadowtag-v4.local"
      - slack: "#gpu-infrastructure"
      - pagerduty: "gpu-critical"

---
# Cloud Provider Configuration (C-ETF Portfolio)
cloud_providers:
  # Hyperscaler A - Primary enterprise workloads
  - name: "hyperscaler-a-gcp"
    provider: "gcp"
    enabled: true
    weight: 0.30  # 30% of workload allocation
    priority: 1   # Higher priority = selected first

    gpu_config:
      instance_type: "a3-highgpu-8g"  # 8× H100 80GB
      gpu_type: "nvidia-h100-80gb"
      gpu_count: 8
      region: "us-central1"
      zone: "us-central1-a"

    pricing:
      on_demand_per_gpu_hour: 10.00
      reserved_per_gpu_hour: 7.50
      spot_per_gpu_hour: 3.00
      commitment_type: "1-year-reserved"  # Options: on-demand, reserved, spot

    limits:
      max_concurrent_gpus: 64
      max_monthly_spend_usd: 15000

    features:
      preemptible: false
      auto_scaling: true
      auto_shutdown_idle_minutes: 30
      checkpoint_frequency_minutes: 15

  # Specialist Provider 1 - Cost-optimized committed
  - name: "specialist-coreweave"
    provider: "coreweave"
    enabled: true
    weight: 0.25
    priority: 2

    gpu_config:
      instance_type: "gpu.h100.8x"
      gpu_type: "H100-80GB-HBM3"
      gpu_count: 8
      region: "ord1"  # Chicago
      datacenter: "ORD1"

    pricing:
      on_demand_per_gpu_hour: 4.00
      committed_per_gpu_hour: 3.50
      commitment_type: "1-year-committed"
      commitment_hours_monthly: 720  # Full month

    limits:
      max_concurrent_gpus: 32
      max_monthly_spend_usd: 12500

    features:
      preemptible: false
      auto_scaling: true
      auto_shutdown_idle_minutes: 15
      checkpoint_frequency_minutes: 10
      nvlink: true
      infiniband: true

  # Hyperscaler B - Regional redundancy
  - name: "hyperscaler-b-aws"
    provider: "aws"
    enabled: true
    weight: 0.20
    priority: 3

    gpu_config:
      instance_type: "p5.48xlarge"  # 8× H100
      gpu_type: "H100"
      gpu_count: 8
      region: "us-east-1"
      availability_zone: "us-east-1a"

    pricing:
      on_demand_per_gpu_hour: 10.50
      reserved_per_gpu_hour: 8.00
      spot_per_gpu_hour: 4.50
      commitment_type: "savings-plan"

    limits:
      max_concurrent_gpus: 32
      max_monthly_spend_usd: 10000

    features:
      preemptible: false
      auto_scaling: true
      auto_shutdown_idle_minutes: 30
      checkpoint_frequency_minutes: 15
      efa_networking: true  # Elastic Fabric Adapter

  # Specialist Provider 2 - Burst capacity
  - name: "specialist-lambda"
    provider: "lambda"
    enabled: true
    weight: 0.15
    priority: 4

    gpu_config:
      instance_type: "gpu_8x_h100_sxm5"
      gpu_type: "H100-SXM5-80GB"
      gpu_count: 8
      region: "us-west"
      datacenter: "us-west-1"

    pricing:
      on_demand_per_gpu_hour: 5.00
      reserved_per_gpu_hour: 4.00
      commitment_type: "on-demand"

    limits:
      max_concurrent_gpus: 24
      max_monthly_spend_usd: 7500

    features:
      preemptible: true
      auto_scaling: true
      auto_shutdown_idle_minutes: 10
      checkpoint_frequency_minutes: 5
      nvlink: true

  # Hyperscaler C - Edge/low-latency
  - name: "hyperscaler-c-azure"
    provider: "azure"
    enabled: true
    weight: 0.10
    priority: 5

    gpu_config:
      instance_type: "Standard_ND96isr_H100_v5"
      gpu_type: "H100"
      gpu_count: 8
      region: "eastus"
      availability_zone: "1"

    pricing:
      on_demand_per_gpu_hour: 9.50
      reserved_per_gpu_hour: 7.00
      spot_per_gpu_hour: 3.50
      commitment_type: "reserved"

    limits:
      max_concurrent_gpus: 16
      max_monthly_spend_usd: 5000

    features:
      preemptible: false
      auto_scaling: true
      auto_shutdown_idle_minutes: 30
      checkpoint_frequency_minutes: 15
      infiniband: true

---
# On-Premise Configuration (Future - Phase 3)
on_premise:
  enabled: false  # Set to true when hardware deployed

  cluster:
    name: "omega-dgx-cluster-01"
    location: "primary-datacenter"
    installation_date: null  # To be filled when deployed

    nodes:
      - name: "dgx-node-01"
        type: "DGX-H100"
        gpu_count: 8
        gpu_type: "H100-80GB-SXM5"
        nvlink_version: "4.0"
        infiniband_speed_gbps: 400
        system_ram_gb: 2048
        nvme_storage_tb: 30

      - name: "dgx-node-02"
        type: "DGX-H100"
        gpu_count: 8
        gpu_type: "H100-80GB-SXM5"
        nvlink_version: "4.0"
        infiniband_speed_gbps: 400
        system_ram_gb: 2048
        nvme_storage_tb: 30

      # Additional nodes 03-08 follow same pattern
      # Total: 8 nodes × 8 GPUs = 64 GPUs

  infrastructure:
    networking:
      infiniband_fabric: true
      switch_type: "NVIDIA Quantum-2"
      topology: "fat-tree"

    storage:
      nvme_tier_tb: 240  # Fast scratch
      object_storage_tb: 1000  # Checkpoints, models
      backup_strategy: "3-2-1"

    power:
      total_capacity_kw: 120
      redundancy: "2N"
      ups_runtime_minutes: 15
      pue_target: 1.4

    cooling:
      type: "liquid-cooled"
      redundancy: "N+1"
      target_temp_celsius: 24

  operations:
    monitoring:
      dcgm_enabled: true
      prometheus_enabled: true
      grafana_dashboards: true

    software:
      cuda_version: "12.3"
      nvidia_driver_version: "545.x"
      nvidia_ai_enterprise: false  # Set true if licensed
      container_runtime: "nvidia-container-runtime"
      orchestration: "kubernetes"

  cost:
    capex_usd: 3200000
    depreciation_months: 36
    monthly_power_usd: 6912
    monthly_cooling_usd: 2765
    monthly_facilities_usd: 15000
    monthly_tco_usd: 113566

---
# Workload Routing Configuration
workload_routing:
  enabled: true

  routing_rules:
    # Training workloads - optimize for cost
    - workload_type: "training"
      priority: "cost"
      allowed_providers:
        - "specialist-coreweave"
        - "specialist-lambda"
        - "hyperscaler-a-gcp"

      requirements:
        min_gpu_count: 8
        max_cost_per_gpu_hour: 5.00
        preemptible_ok: true
        checkpoint_strategy: "frequent"

      fallback_strategy: "queue"  # Options: queue, upgrade-tier, fail

    # Inference workloads - optimize for latency
    - workload_type: "inference"
      priority: "latency"
      allowed_providers:
        - "hyperscaler-a-gcp"
        - "hyperscaler-b-aws"
        - "hyperscaler-c-azure"

      requirements:
        min_gpu_count: 1
        max_latency_ms_p95: 200
        preemptible_ok: false
        geo_redundancy: true

      fallback_strategy: "upgrade-tier"

    # Fine-tuning - balance cost and speed
    - workload_type: "fine-tuning"
      priority: "balanced"
      allowed_providers:
        - "specialist-coreweave"
        - "hyperscaler-b-aws"
        - "hyperscaler-a-gcp"

      requirements:
        min_gpu_count: 4
        max_cost_per_gpu_hour: 7.00
        preemptible_ok: false
        checkpoint_strategy: "moderate"

      fallback_strategy: "queue"

    # Research/experimental - maximize flexibility
    - workload_type: "research"
      priority: "flexibility"
      allowed_providers:
        - "specialist-lambda"
        - "specialist-coreweave"

      requirements:
        min_gpu_count: 1
        max_cost_per_gpu_hour: 4.00
        preemptible_ok: true
        checkpoint_strategy: "aggressive"

      fallback_strategy: "fail"

---
# FinOps Configuration
finops:
  tracking:
    enabled: true
    granularity: "per-job"  # Options: per-job, per-user, per-project

    metrics:
      - "total_gpu_hours"
      - "total_cost_usd"
      - "cost_per_gpu_hour"
      - "utilization_percentage"
      - "idle_time_minutes"
      - "preemption_count"
      - "tokens_generated"
      - "cost_per_1m_tokens"
      - "epochs_completed"
      - "cost_per_epoch"

  optimization:
    auto_spot_bidding: true
    spot_max_price_multiplier: 0.6  # Max 60% of on-demand

    idle_detection:
      threshold_minutes: 15
      action: "alert"  # Options: alert, downscale, shutdown

    right_sizing:
      enabled: true
      check_interval_hours: 24
      recommendations: true

  reporting:
    daily_summary: true
    weekly_report: true
    monthly_invoice: true

    recipients:
      - "redacted@shadowtag-v4.local"
      - "redacted@shadowtag-v4.local"
      - "redacted@shadowtag-v4.local"

    dashboards:
      - name: "GPU Cost Dashboard"
        url: "https://grafana.omega.internal/d/gpu-cost"
        refresh_seconds: 60

      - name: "GPU Utilization Heatmap"
        url: "https://grafana.omega.internal/d/gpu-util"
        refresh_seconds: 30

---
# Model CI/CD Pipeline
model_cicd:
  enabled: true

  pipeline_stages:
    - stage: "lint"
      gpu_required: false
      providers: ["any"]
      timeout_minutes: 10

    - stage: "unit-test"
      gpu_required: false
      providers: ["any"]
      timeout_minutes: 30

    - stage: "train"
      gpu_required: true
      gpu_count: 8
      providers: ["specialist-coreweave", "specialist-lambda"]
      timeout_minutes: 480
      checkpoint_frequency_minutes: 15

    - stage: "evaluate"
      gpu_required: true
      gpu_count: 1
      providers: ["any"]
      timeout_minutes: 60

    - stage: "canary"
      gpu_required: true
      gpu_count: 2
      providers: ["hyperscaler-a-gcp", "hyperscaler-b-aws"]
      timeout_minutes: 120
      traffic_percentage: 5

    - stage: "promote"
      gpu_required: false
      providers: ["any"]
      timeout_minutes: 15
      approval_required: true

  rollback:
    automatic: true
    trigger_conditions:
      - "error_rate_increase_pct > 10"
      - "latency_p95_increase_pct > 25"
      - "throughput_decrease_pct > 20"

    rollback_targets:
      - "previous-stable"
      - "previous-version"

---
# Observability & Alerting
observability:
  metrics:
    collection_interval_seconds: 15
    retention_days: 90

    gpu_metrics:
      - "gpu_utilization_pct"
      - "gpu_memory_used_mb"
      - "gpu_memory_free_mb"
      - "gpu_temperature_celsius"
      - "gpu_power_watts"
      - "gpu_sm_clock_mhz"
      - "gpu_memory_clock_mhz"

    system_metrics:
      - "cpu_utilization_pct"
      - "ram_used_gb"
      - "disk_io_mbps"
      - "network_io_mbps"

    business_metrics:
      - "inference_requests_per_second"
      - "inference_latency_p50_ms"
      - "inference_latency_p95_ms"
      - "inference_latency_p99_ms"
      - "training_steps_per_second"
      - "cost_per_inference"
      - "cost_per_training_step"

  alerts:
    - name: "High GPU Cost"
      condition: "daily_cost_usd > 2000"
      severity: "warning"
      notification_channels: ["email", "slack"]

    - name: "Budget Cap Approaching"
      condition: "monthly_spend_pct > 80"
      severity: "warning"
      notification_channels: ["email", "slack"]

    - name: "Budget Cap Exceeded"
      condition: "monthly_spend_pct > 100"
      severity: "critical"
      notification_channels: ["email", "slack", "pagerduty"]
      actions: ["auto_shutdown"]

    - name: "Low GPU Utilization"
      condition: "avg_gpu_util_pct < 30 FOR 1h"
      severity: "info"
      notification_channels: ["slack"]

    - name: "High GPU Temperature"
      condition: "gpu_temp_celsius > 85"
      severity: "critical"
      notification_channels: ["email", "pagerduty"]

    - name: "Inference Latency High"
      condition: "inference_latency_p95_ms > 300"
      severity: "warning"
      notification_channels: ["slack", "pagerduty"]

    - name: "Training Job Failed"
      condition: "training_job_status == 'failed'"
      severity: "warning"
      notification_channels: ["slack"]

    - name: "Preemption Rate High"
      condition: "preemption_rate_pct > 10 FOR 4h"
      severity: "warning"
      notification_channels: ["slack"]

---
# Security & Compliance
security:
  encryption:
    data_at_rest: true
    data_in_transit: true
    key_management: "cloud-kms"

  access_control:
    authentication: "sso"  # Single Sign-On
    authorization: "rbac"  # Role-Based Access Control

    roles:
      - name: "gpu-admin"
        permissions: ["*"]

      - name: "ml-engineer"
        permissions:
          - "job:submit"
          - "job:view"
          - "job:cancel-own"
          - "metrics:view"

      - name: "researcher"
        permissions:
          - "job:submit"
          - "job:view-own"
          - "job:cancel-own"

      - name: "finance"
        permissions:
          - "cost:view"
          - "reports:view"

  compliance:
    data_residency: "us-only"  # Options: us-only, eu-only, global
    pii_handling: "strict"
    audit_logging: true
    audit_retention_days: 365

  network:
    vpc_isolation: true
    private_endpoints: true
    firewall_rules: "strict"
    allowed_ip_ranges:
      - "10.0.0.0/8"  # Internal network
      - "203.0.113.0/24"  # Office IPs (example)

---
# Break-Even Decision Engine
decision_engine:
  enabled: true

  triggers:
    # Trigger DGX procurement when these conditions met
    own_hardware_trigger:
      conditions:
        - metric: "90_day_avg_utilization_pct"
          operator: ">="
          threshold: 35

        - metric: "blended_cloud_cost_per_gpu_hour"
          operator: ">="
          threshold: 7.00

      logic: "AND"  # All conditions must be true

      actions:
        - type: "alert"
          message: "DGX procurement trigger conditions met"
          channels: ["email", "slack"]

        - type: "report"
          generate: "tco-comparison-report"
          recipients: ["redacted@shadowtag-v4.local", "redacted@shadowtag-v4.local"]

        - type: "workflow"
          initiate: "dgx-procurement-approval"

  monitoring:
    check_interval_hours: 24
    report_frequency: "weekly"

    metrics_to_track:
      - "rolling_30_day_utilization_pct"
      - "rolling_60_day_utilization_pct"
      - "rolling_90_day_utilization_pct"
      - "blended_cost_per_gpu_hour"
      - "total_monthly_gpu_spend"
      - "projected_annual_gpu_spend"

