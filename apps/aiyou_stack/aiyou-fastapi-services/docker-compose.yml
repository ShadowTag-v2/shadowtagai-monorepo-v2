version: '3.8'

services:
  api:
    build:
      context: .
      target: development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /tmp/sandbox-temp:/tmp/sandbox-temp
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - SANDBOX__ENABLED=true
      - SANDBOX__MAX_EXECUTION_TIME=30
      - SANDBOX__MAX_MEMORY_MB=512
      - SANDBOX__MAX_CPU_PERCENT=80.0
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-production:
    build:
      context: .
      target: production
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - SANDBOX__ENABLED=true
      - SANDBOX__MAX_EXECUTION_TIME=15
      - SANDBOX__MAX_MEMORY_MB=256
      - SANDBOX__MAX_CPU_PERCENT=50.0
    env_file:
      - .env.production
    restart: always
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    profiles:
      - production

networks:
  app-network:
    driver: bridge
