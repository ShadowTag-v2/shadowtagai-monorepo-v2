<!DOCTYPE html>
<html>
<head><title>Cor2.0 Pricing</title></head>
<body style="font-family: system-ui; max-width: 1200px; margin: 0 auto; padding: 40px">
    <h1 style="text-align: center">Cut AI Coding Costs 90%</h1>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-top: 60px">
        <div style="border: 2px solid #eee; padding: 40px; border-radius: 12px">
            <h3>Free</h3><div style="font-size: 48px; color: #32808d">sh</div>
            <button onclick="alert('Email capture TBD')" style="width: 100%; padding: 16px; background: #32808d; color: white; border: none; border-radius: 8px; cursor: pointer">Get Started</button>
        </div>
        <div style="border: 2px solid #32808d; padding: 40px; border-radius: 12px">
            <h3>Pro</h3><div style="font-size: 48px; color: #32808d">0/mo</div>
            <button onclick="checkout('pro')" style="width: 100%; padding: 16px; background: #32808d; color: white; border: none; border-radius: 8px; cursor: pointer">Start Pro</button>
        </div>
        <div style="border: 2px solid #eee; padding: 40px; border-radius: 12px">
            <h3>Math Auditor</h3><div style="font-size: 48px; color: #32808d">9/mo</div>
            <button onclick="checkout('math_auditor')" style="width: 100%; padding: 16px; background: #32808d; color: white; border: none; border-radius: 8px; cursor: pointer">Start Math Auditor</button>
        </div>
    </div>
    <script>
        async function checkout(tier) {
            const email = prompt('Enter your email:');
            if (!email) return;
            const res = await fetch('/api/subscription/create-checkout-session', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({tier, email})
            });
            const data = await res.json();
            window.location.href = data.checkout_url;
        }
    </script>
</body>
</html>
