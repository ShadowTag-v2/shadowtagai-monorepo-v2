# FILE: antigravity-deploy.yaml
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: antigravity-core-v11
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0" # Cost = $0
        autoscaling.knative.dev/maxScale: "100"
    spec:
      containers:
        - image: gcr.io/shadowtag-omega-v2/antigravity-core-v11:latest
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: "shadowtag-omega-v2"
            - name: ENVIRONMENT
              value: "PRODUCTION"
          resources:
            limits:
              cpu: "2000m"
              memory: "2Gi"
