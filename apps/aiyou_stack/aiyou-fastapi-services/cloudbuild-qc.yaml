steps:
  # Step 1: Install Dependencies & Run Tests (UCMJ Discipline)
  # The agent's code is tested here. A timeout enforces discipline.
  # Failure or hanging results in immediate build termination (Endex).
  - name: 'python:3.11-slim'
    id: 'Test'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y git && \
        pip install -r requirements.txt && \
        pip install pytest && \
        chmod +x scripts/ucmj_timeout.sh && \
        ./scripts/ucmj_timeout.sh 300 pytest

  # Step 2: Build the container image (Staging)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/antigravity-orchestrator:staging', '.']

  # Step 3: Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/antigravity-orchestrator:staging']

  # Step 4: Deploy "Staging" Revision (QC / Traffic Splitting)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'antigravity-orchestrator'
      - '--image'
      - 'gcr.io/$PROJECT_ID/antigravity-orchestrator:staging'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--no-traffic'
      - '--tag'
      - 'staging'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=$$GEMINI_API_KEY'
    secretEnv: ['GEMINI_API_KEY']

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
    env: 'GEMINI_API_KEY'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/antigravity-orchestrator:staging'
