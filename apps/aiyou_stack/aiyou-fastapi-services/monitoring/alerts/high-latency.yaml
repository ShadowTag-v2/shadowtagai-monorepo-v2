displayName: "ShadowTagAi - High Latency (p99 > 5s)"
documentation:
  content: "Request latency p99 exceeded 5 seconds. Users experiencing slow responses."
  mimeType: "text/markdown"

conditions:
  - displayName: "p99 latency > 5s"
    conditionThreshold:
      filter: |
        resource.type = "k8s_pod"
        AND resource.labels.namespace_name = "shadowtagai-production"
        AND metric.type = "prometheus.googleapis.com/shadowtagai_request_duration_seconds/histogram"

      comparison: COMPARISON_GT
      thresholdValue: 5.0
      duration: "120s"

      aggregations:
        - alignmentPeriod: "60s"
          perSeriesAligner: ALIGN_DELTA
          crossSeriesReducer: REDUCE_PERCENTILE_99

alertStrategy:
  autoClose: "1800s"

enabled: true
