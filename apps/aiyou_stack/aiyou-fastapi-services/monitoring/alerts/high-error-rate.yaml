displayName: "ShadowTagAi - High Error Rate"
documentation:
  content: "Error rate exceeded 5% threshold. Investigate immediately."
  mimeType: "text/markdown"

conditions:
  - displayName: "Error rate > 5%"
    conditionThreshold:
      filter: |
        resource.type = "k8s_pod"
        AND resource.labels.namespace_name = "shadowtagai-production"
        AND metric.type = "prometheus.googleapis.com/shadowtagai_requests_total/counter"
        AND metric.labels.status = "error"

      comparison: COMPARISON_GT
      thresholdValue: 0.05
      duration: "60s"

      aggregations:
        - alignmentPeriod: "60s"
          perSeriesAligner: ALIGN_RATE
          crossSeriesReducer: REDUCE_SUM

alertStrategy:
  autoClose: "1800s"  # 30 minutes

notificationChannels:
  # Add your notification channel IDs here
  # - "projects/PROJECT_ID/notificationChannels/CHANNEL_ID"

enabled: true
