# Prometheus Configuration for ShadowTag-v2 FastAPI Services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'production'
    service: 'shadowtag_v4-fastapi-services'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load alert rules
rule_files:
  - 'alerts.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ShadowTag-v2 FastAPI Services
  - job_name: 'shadowtag_v4-fastapi-services'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:8000']
        labels:
          environment: 'production'
          instance: 'app-1'

  # Add additional service instances here
  # - job_name: 'shadowtag_v4-fastapi-services-staging'
  #   static_configs:
  #     - targets: ['staging-app:8000']
  #       labels:
  #         environment: 'staging'
