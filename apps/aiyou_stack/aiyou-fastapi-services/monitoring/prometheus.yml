global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ShadowTagAi FastAPI Gateway
  - job_name: 'shadowtagai-gateway'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'

  # Judge 6 Governance Engine
  - job_name: 'judge-six'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: '/metrics'

  # Token Compression Pipeline
  - job_name: 'token-compression'
    static_configs:
      - targets: ['host.docker.internal:8002']
    metrics_path: '/metrics'

  # Kuvasz uptime monitor
  - job_name: 'kuvasz'
    static_configs:
      - targets: ['kuvasz:8080']
    metrics_path: '/actuator/prometheus'
