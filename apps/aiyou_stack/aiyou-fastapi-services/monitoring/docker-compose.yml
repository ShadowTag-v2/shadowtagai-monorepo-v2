version: "3.8"

services:
  # Kuvasz Uptime Monitoring
  kuvasz:
    image: kuvaszmonitoring/kuvasz:latest
    container_name: kuvasz-monitor
    ports:
      - "8080:8080"
    environment:
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=kuvasz
      - DATABASE_USER=kuvasz
      - DATABASE_PASSWORD=kuvasz_secret
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=[VAPORIZED_PWD]_admin
      - ADMIN_API_KEY=shadowtagai-monitor-key-2024
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitoring

  # PostgreSQL for Kuvasz
  postgres:
    image: postgres:15-alpine
    container_name: kuvasz-postgres
    environment:
      - POSTGRES_DB=kuvasz
      - POSTGRES_USER=kuvasz
      - POSTGRES_PASSWORD=kuvasz_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuvasz -d kuvasz"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - monitoring

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9099:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - monitoring

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=[VAPORIZED_PWD]_admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
