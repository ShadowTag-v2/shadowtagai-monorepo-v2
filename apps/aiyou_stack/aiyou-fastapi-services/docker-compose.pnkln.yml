# Pnkln Ultrathink Framework - Docker Compose
# Version: 1.0.0
# For local development and testing

version: '3.8'

services:
  pnkln-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pnkln-api
    ports:
      - "8000:8000"
    volumes:
      # Mount data directory for audit trail persistence
      - ./data:/app/data
      # Mount code for development (hot reload)
      - ./pnkln:/app/pnkln
      - ./api:/app/api
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: omega-postgres
    environment:
      - POSTGRES_USER=omega
      - POSTGRES_PASSWORD=ShadowTag_password
      - POSTGRES_DB=ShadowTag_governance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - omega-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: omega-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - omega-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  antigravity-proxy:
    build:
      context: ./antigravity-proxy
      dockerfile: Dockerfile
    container_name: antigravity-proxy
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - proxy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  # OpenTelemetry Collector (optional - for observability)
  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: omega-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics
    networks:
      - omega-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  omega-network:
    driver: bridge
  proxy-network:
    driver: bridge
