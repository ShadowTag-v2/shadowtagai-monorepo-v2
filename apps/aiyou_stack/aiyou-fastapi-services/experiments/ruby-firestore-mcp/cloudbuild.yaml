steps:
  # 1. Build Layer: Use Buildpacks (No Dockerfile)
  # "The Surprising Simplicity" -> Use Pack CLI approach for control
  - name: 'gcr.io/k8s-skaffold/pack'
    args:
      - 'build'
      - 'gcr.io/$PROJECT_ID/ruby-firestore-mcp:latest'
      - '--builder=gcr.io/buildpacks/builder:v1'
      - '--path=.'

  # 2. Deploy Layer: Cloud Run Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ruby-firestore-mcp'
      - '--image=gcr.io/$PROJECT_ID/ruby-firestore-mcp:latest'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=PROJECT_ID=$PROJECT_ID,MCP_TRANSPORT=http'

images:
  - 'gcr.io/$PROJECT_ID/ruby-firestore-mcp:latest'

substitutions:
  _REGION: us-central1
