steps:
  # 1. Build the Container Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/vllm-doc-parser:latest', '.']

  # 2. Push the Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vllm-doc-parser:latest']

  # 3. Deploy to Cloud Run (GPU Enabled)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'vllm-doc-parser'
      - '--image=gcr.io/$PROJECT_ID/vllm-doc-parser:latest'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      # GPU Configuration (L4 is good for vLLM inference)
      - '--gpu=1'
      - '--gpu-type=nvidia-l4'
      - '--memory=16Gi'
      - '--cpu=4'
      - '--cpu=4'
      - '--set-env-vars=MODEL_ID=nanonets/nanonets-ocr-s'
      - '--set-secrets=HUGGING_FACE_HUB_TOKEN=hugging-face-token:latest'

images:
  - 'gcr.io/$PROJECT_ID/vllm-doc-parser:latest'

substitutions:
  _REGION: us-central1
