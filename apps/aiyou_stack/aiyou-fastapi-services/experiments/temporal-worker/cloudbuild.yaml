steps:
  # 1. Build Layer: Use Buildpacks (No Dockerfile)
  # Converts Python Source -> Container Image automatically
  - name: 'gcr.io/k8s-skaffold/pack'
    args:
      - 'build'
      - 'gcr.io/$PROJECT_ID/temporal-worker:latest'
      - '--builder=gcr.io/buildpacks/builder:v1'
      - '--path=.'

  # 2. Deploy Layer: Cloud Run Worker Pool
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'beta'
      - 'run'
      - 'worker-pools'
      - 'deploy'
      - 'temporal-worker'
      - '--image=gcr.io/$PROJECT_ID/temporal-worker:latest'
      - '--region=$_REGION'
      - '--min-instances=1'
      - '--max-instances=5'
      - '--max-instances=5'
      - '--set-env-vars=TEMPORAL_ADDRESS=namespace.tmprl.cloud:7233,TEMPORAL_NAMESPACE=default'
      - '--set-secrets=TEMPORAL_API_KEY=temporal-api-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/temporal-worker:latest'

substitutions:
  _REGION: us-central1
