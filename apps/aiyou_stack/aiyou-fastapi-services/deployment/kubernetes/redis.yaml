apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cor17-redis
  namespace: cor17
spec:
  serviceName: cor17-redis
  replicas: 1
  selector:
    matchLabels:
      app: cor17-redis
  template:
    metadata:
      labels:
        app: cor17-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cor17-redis
  namespace: cor17
spec:
  clusterIP: None
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  selector:
    app: cor17-redis
