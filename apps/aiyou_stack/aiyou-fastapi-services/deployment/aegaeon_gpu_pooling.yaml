# Aegaeon GPU Pooling Deployment
# Description: Pack 7+ AI models onto a single GPU using vLLM + Ray
# Savings: $49,200/year (82% GPU cost reduction)
# Based on: llm-serving-efficiency research branch

apiVersion: v1
kind: Namespace
metadata:
  name: aegaeon-gpu-pool
  labels:
    app: aegaeon
    cost-center: gpu-optimization

---
# ConfigMap for model configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: aegaeon-config
  namespace: aegaeon-gpu-pool
data:
  models.yaml: |
    # Aegaeon Multi-Model GPU Pooling Configuration
    # Enables 7+ models per GPU via token-level scheduling

    pooling:
      enabled: true
      strategy: token-level  # Switch models at token boundaries
      max_models_per_gpu: 7

    models:
      - name: gesture-detection
        weight: 0.15
        priority: high

      - name: emotion-analysis
        weight: 0.10
        priority: medium

      - name: art-generation
        weight: 0.25
        priority: high

      - name: fraud-detection
        weight: 0.15
        priority: critical

      - name: content-moderation
        weight: 0.10
        priority: high

      - name: nft-pricing
        weight: 0.10
        priority: medium

      - name: recommendation
        weight: 0.15
        priority: low

    performance:
      max_latency_ms: 100
      batch_size: 32
      vram_utilization_target: 0.90

    cost:
      baseline_gpus: 50
      optimized_gpus: 9
      monthly_savings: 4100
      annual_savings: 49200

---
# vLLM Deployment with Ray for GPU Pooling
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegaeon-vllm
  namespace: aegaeon-gpu-pool
  labels:
    app: aegaeon
    component: vllm-server
spec:
  replicas: 1  # Will scale via Ray autoscaler
  selector:
    matchLabels:
      app: aegaeon
      component: vllm-server
  template:
    metadata:
      labels:
        app: aegaeon
        component: vllm-server
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          resources:
            requests:
              nvidia.com/gpu: 1
              memory: "32Gi"
              cpu: "8"
            limits:
              nvidia.com/gpu: 1
              memory: "64Gi"
              cpu: "16"
          env:
            - name: VLLM_WORKER_USE_NATIVE_FLASH_ATTENTION
              value: "1"
            - name: RAY_ADDRESS
              value: "auto"
          ports:
            - containerPort: 8000
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
            - name: model-cache
              mountPath: /root/.cache/huggingface
          args:
            - "--model"
            - "Qwen/Qwen2.5-Coder-7B-Instruct"
            - "--tensor-parallel-size"
            - "1"
            - "--max-model-len"
            - "8192"
            - "--gpu-memory-utilization"
            - "0.90"
            - "--enable-prefix-caching"

      volumes:
        - name: config
          configMap:
            name: aegaeon-config
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc

      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-tesla-t4

      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

---
# Service for vLLM endpoint
apiVersion: v1
kind: Service
metadata:
  name: aegaeon-vllm
  namespace: aegaeon-gpu-pool
  labels:
    app: aegaeon
spec:
  selector:
    app: aegaeon
    component: vllm-server
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

---
# Ray Head for orchestration
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-head
  namespace: aegaeon-gpu-pool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ray
      component: head
  template:
    metadata:
      labels:
        app: ray
        component: head
    spec:
      containers:
        - name: ray-head
          image: rayproject/ray:2.9.0-py310-gpu
          ports:
            - containerPort: 6379  # Redis
            - containerPort: 8265  # Dashboard
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          env:
            - name: RAY_HEAD_SERVICE
              value: "ray-head"
          command:
            - /bin/bash
            - -c
            - |
              ray start --head --port=6379 --dashboard-host=0.0.0.0 --block

---
# Service for Ray Head
apiVersion: v1
kind: Service
metadata:
  name: ray-head
  namespace: aegaeon-gpu-pool
spec:
  selector:
    app: ray
    component: head
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: dashboard
      port: 8265
      targetPort: 8265
  type: ClusterIP

---
# HPA for auto-scaling based on GPU utilization
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aegaeon-hpa
  namespace: aegaeon-gpu-pool
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aegaeon-vllm
  minReplicas: 1
  maxReplicas: 3  # Max 3 GPUs instead of 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

---
# PVC for model cache
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-pvc
  namespace: aegaeon-gpu-pool
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard

---
# NetworkPolicy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aegaeon-network-policy
  namespace: aegaeon-gpu-pool
spec:
  podSelector:
    matchLabels:
      app: aegaeon
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: default
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector: {}
