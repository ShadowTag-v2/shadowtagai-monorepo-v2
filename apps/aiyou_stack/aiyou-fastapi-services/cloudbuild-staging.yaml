steps:
  # Build the container image (Staging)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/antigravity-orchestrator:staging', '.']

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/antigravity-orchestrator:staging']

  # Deploy to Cloud Run (Staging Revision - Hidden URL)
  # This executes the "Outer Loop" QC Strategy: Deploying a tagged revision with 0% traffic.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'antigravity-orchestrator'
      - '--image'
      - 'gcr.io/$PROJECT_ID/antigravity-orchestrator:staging'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--no-traffic'  # Do not shift public traffic
      - '--tag'
      - 'staging'       # Generates specific URL (e.g., https://staging---antigravity-orchestrator-xyz.run.app)
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=$$GEMINI_API_KEY'
    secretEnv: ['GEMINI_API_KEY']

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
    env: 'GEMINI_API_KEY'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/antigravity-orchestrator:staging'
