---
apiVersion: v1
kind: Namespace
metadata:
  name: pnkln-inference
  labels:
    app: pnkln
    env: production

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pnkln-inference-sa
  namespace: pnkln-inference
  annotations:
    iam.gke.io/gcp-service-account: pnkln-inference@PROJECT_ID.iam.gserviceaccount.com

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: judge-config
  namespace: pnkln-inference
data:
  # Judge 6 Multi-LLM Configuration
  JUDGE_VERSION: "6.0.0"
  SLA_P99_TARGET_MS: "90"
  SLA_P95_TARGET_MS: "50"
  SLA_P50_TARGET_MS: "20"

  # Multi-LLM weights (Hybrid enforcement)
  GEMINI_WEIGHT: "40"
  CLAUDE_WEIGHT: "35"
  GPT5_WEIGHT: "15"
  GROK_WEIGHT: "5"
  MISTRAL_WEIGHT: "5"

  # Circuit breaker configuration
  CIRCUIT_BREAKER_THRESHOLD: "5"
  CIRCUIT_BREAKER_TIMEOUT_SEC: "60"
  CIRCUIT_BREAKER_HALF_OPEN_REQUESTS: "3"

  # Autoscaling parameters
  MIN_REPLICAS: "2"
  MAX_REPLICAS: "50"
  TARGET_CPU_PERCENT: "70"
  TARGET_MEMORY_PERCENT: "80"
  TARGET_RPS: "1000"

  # Model endpoints
  GEMINI_ENDPOINT: "https://generativelanguage.googleapis.com/v1beta"
  CLAUDE_ENDPOINT: "https://api.anthropic.com/v1"
  OPENAI_ENDPOINT: "https://api.openai.com/v1"
  XAI_ENDPOINT: "https://api.x.ai/v1"
  MISTRAL_ENDPOINT: "https://api.mistral.ai/v1"

  # Monitoring
  ENABLE_PROMETHEUS: "true"
  ENABLE_TRACE: "true"
  LOG_LEVEL: "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pnkln-judge
  namespace: pnkln-inference
  labels:
    app: pnkln-judge
    version: v6
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: pnkln-judge
  template:
    metadata:
      labels:
        app: pnkln-judge
        version: v6
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: pnkln-inference-sa

      # Affinity rules for distribution
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - pnkln-judge
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: workload
                operator: In
                values:
                - inference

      # Init container for secret validation
      initContainers:
      - name: validate-secrets
        image: google/cloud-sdk:alpine
        command:
        - /bin/sh
        - -c
        - |
          echo "Validating API key secrets..."
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY is empty"
            exit 1
          fi
          if [[ "$ANTHROPIC_API_KEY" == PLACEHOLDER* ]]; then
            echo "ERROR: ANTHROPIC_API_KEY is still a placeholder - update via Secret Manager"
            exit 1
          fi
          echo "Secrets validation passed"
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: pnkln-api-keys
              key: anthropic-api-key

      containers:
      - name: judge
        image: gcr.io/PROJECT_ID/pnkln-judge:latest
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: grpc
          containerPort: 8081
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP

        env:
        - name: PORT
          value: "8080"
        - name: GRPC_PORT
          value: "8081"
        - name: METRICS_PORT
          value: "9090"

        # API Keys from Secret Manager
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: pnkln-api-keys
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: pnkln-api-keys
              key: openai-api-key
        - name: XAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: pnkln-api-keys
              key: xai-api-key
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: pnkln-api-keys
              key: mistral-api-key
        - name: GOOGLE_AI_API_KEY
          valueFrom:
            secretKeyRef:
              name: pnkln-api-keys
              key: google-ai-api-key

        # Configuration from ConfigMap
        envFrom:
        - configMapRef:
            name: judge-config

        # Resource requests and limits
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
            ephemeral-storage: "10Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
            ephemeral-storage: "20Gi"
            nvidia.com/gpu: "1"

        # Health checks
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        startupProbe:
          httpGet:
            path: /startup
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

        # Security context
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true

        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/cache

      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir:
          sizeLimit: 10Gi

      # Pod security
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      # Node selector for GPU nodes
      nodeSelector:
        workload: inference
        gpu: "true"

      # Tolerations for GPU taints
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "present"
        effect: "NoSchedule"

---
apiVersion: v1
kind: Service
metadata:
  name: pnkln-judge
  namespace: pnkln-inference
  labels:
    app: pnkln-judge
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    cloud.google.com/backend-config: '{"default": "pnkln-backend-config"}'
spec:
  type: ClusterIP
  selector:
    app: pnkln-judge
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: grpc
    port: 8081
    targetPort: 8081
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 300

---
apiVersion: v1
kind: Service
metadata:
  name: pnkln-judge-lb
  namespace: pnkln-inference
  labels:
    app: pnkln-judge
  annotations:
    cloud.google.com/load-balancer-type: "External"
spec:
  type: LoadBalancer
  selector:
    app: pnkln-judge
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: grpc
    port: 8081
    targetPort: 8081
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pnkln-judge-hpa
  namespace: pnkln-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pnkln-judge
  minReplicas: 2
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "1000"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 5
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 10
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pnkln-judge-pdb
  namespace: pnkln-inference
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: pnkln-judge

---
apiVersion: v1
kind: Secret
metadata:
  name: pnkln-api-keys
  namespace: pnkln-inference
  annotations:
    reloader.stakater.com/match: "true"
type: Opaque
stringData:
  anthropic-api-key = "REDACTED_API_KEY"
  openai-api-key = "REDACTED_API_KEY"
  xai-api-key = "REDACTED_API_KEY"
  mistral-api-key = "REDACTED_API_KEY"
  google-ai-api-key = "REDACTED_API_KEY"

---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: pnkln-backend-config
  namespace: pnkln-inference
spec:
  timeoutSec: 30
  connectionDraining:
    drainingTimeoutSec: 60
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /healthz
    port: 8080
  logging:
    enable: true
    sampleRate: 1.0
  iap:
    enabled: false

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pnkln-judge-netpol
  namespace: pnkln-inference
spec:
  podSelector:
    matchLabels:
      app: pnkln-judge
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
    - namespaceSelector:
        matchLabels:
          name: pnkln-inference
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8081
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: pnkln-judge-monitor
  namespace: pnkln-inference
  labels:
    app: pnkln-judge
spec:
  selector:
    matchLabels:
      app: pnkln-judge
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http
