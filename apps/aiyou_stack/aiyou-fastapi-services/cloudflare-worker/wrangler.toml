# Cloudflare Workers Configuration for PNKLN Judge #6 Lite

name = "pnkln-judge"
main = "worker.ts"
compatibility_date = "2025-01-08"

# Account details (update with your Cloudflare account)
# account_id = "your-account-id"

# Workers Paid plan features
workers_dev = true

# Environment variables (non-sensitive)
[vars]
VERTEX_AI_PROJECT_ID = "pnkln-core-stack"
VERTEX_AI_REGION = "us-central1"

# Secrets (set via `wrangler secret put <NAME>`)
# Run these commands after initial setup:
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put GOOGLE_CLOUD_TOKEN

# Usage limits
[limits]
cpu_ms = 50  # 50ms CPU time limit per request

# Cron triggers for metrics collection (optional)
# [triggers]
# crons = ["0 * * * *"]  # Every hour

# KV namespaces for rate limiting (optional future enhancement)
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "your-kv-namespace-id"

# Observability
[observability]
enabled = true

# Development settings
[dev]
port = 8787
