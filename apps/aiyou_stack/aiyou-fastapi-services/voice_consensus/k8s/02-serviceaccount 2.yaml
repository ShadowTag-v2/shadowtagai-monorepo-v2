apiVersion: v1
kind: ServiceAccount
metadata:
  name: consensus-sa
  namespace: consensus
  annotations:
    iam.gke.io/gcp-service-account: consensus-sa@PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: consensus-role
  namespace: consensus
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: consensus-rolebinding
  namespace: consensus
subjects:
- kind: ServiceAccount
  name: consensus-sa
  namespace: consensus
roleRef:
  kind: Role
  name: consensus-role
  apiGroup: rbac.authorization.k8s.io
