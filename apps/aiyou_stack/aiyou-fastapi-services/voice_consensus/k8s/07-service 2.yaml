apiVersion: v1
kind: Service
metadata:
  name: consensus-orchestrator
  namespace: consensus
  labels:
    app: consensus-orchestrator
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: LoadBalancer
  selector:
    app: consensus-orchestrator
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours
---
apiVersion: v1
kind: Service
metadata:
  name: consensus-orchestrator-internal
  namespace: consensus
  labels:
    app: consensus-orchestrator
spec:
  type: ClusterIP
  selector:
    app: consensus-orchestrator
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
