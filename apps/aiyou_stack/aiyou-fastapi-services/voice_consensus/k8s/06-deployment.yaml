apiVersion: apps/v1
kind: Deployment
metadata:
  name: consensus-orchestrator
  namespace: consensus
  labels:
    app: consensus-orchestrator
    version: v1.0
spec:
  replicas: 3  # High availability
  selector:
    matchLabels:
      app: consensus-orchestrator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: consensus-orchestrator
        version: v1.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: consensus-sa

      # Init container: Sync memory from GCS
      initContainers:
      - name: memory-sync
        image: google/cloud-sdk:alpine
        command:
        - sh
        - -c
        - |
          echo "================================"
          echo "MEMORY SYNC FROM GCS"
          echo "================================"
          echo "Bucket: gs://${GCS_BUCKET}/memories/"
          echo "Target: /memory/memory.md"
          echo ""

          if gsutil -q stat gs://${GCS_BUCKET}/memories/current_memory.md; then
            echo "✓ Memory file found in GCS"
            gsutil cp gs://${GCS_BUCKET}/memories/current_memory.md /memory/memory.md
            echo "✓ Memory synced successfully"
            echo ""
            echo "Memory preview:"
            head -20 /memory/memory.md
          else
            echo "⚠ No memory file found in GCS"
            echo "Creating empty memory file..."
            echo "# Consensus Memory (Empty)" > /memory/memory.md
          fi

          echo ""
          echo "================================"
          echo "MEMORY SYNC COMPLETE"
          echo "================================"
        volumeMounts:
        - name: memory-volume
          mountPath: /memory
        envFrom:
        - configMapRef:
            name: consensus-config

      # Main container
      containers:
      - name: orchestrator
        image: gcr.io/PROJECT_ID/consensus-orchestrator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP

        # Environment variables from ConfigMap
        envFrom:
        - configMapRef:
            name: consensus-config

        # Environment variables from Secrets
        env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: google-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: anthropic-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: openai-api-key
        - name: XAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: xai-api-key
        - name: PERPLEXITY_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: perplexity-api-key
        - name: API_KEYS
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: api-keys

        # Volume mounts
        volumeMounts:
        - name: memory-volume
          mountPath: /memory
          readOnly: true
        - name: archive-volume
          mountPath: /data

        # Resource limits
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Graceful shutdown
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

      # Volumes
      volumes:
      - name: memory-volume
        emptyDir: {}
      - name: archive-volume
        persistentVolumeClaim:
          claimName: consensus-archive-pvc

      # Pod scheduling
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - consensus-orchestrator
              topologyKey: kubernetes.io/hostname
