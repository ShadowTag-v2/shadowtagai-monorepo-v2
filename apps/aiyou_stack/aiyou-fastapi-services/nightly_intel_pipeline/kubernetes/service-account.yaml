apiVersion: v1
kind: ServiceAccount
metadata:
  name: nightly-intel-sa
  namespace: default
  labels:
    app: nightly-intel-pipeline
  annotations:
    iam.gke.io/gcp-service-account: nightly-intel-pipeline@PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nightly-intel-role
  namespace: default
spec:
  rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nightly-intel-rolebinding
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nightly-intel-role
subjects:
- kind: ServiceAccount
  name: nightly-intel-sa
  namespace: default
