apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-intel-pipeline
  namespace: default
  labels:
    app: nightly-intel-pipeline
    component: ingestion-layer
    version: v1.0.0
spec:
  # Run daily at 2 AM UTC
  schedule: "0 2 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid  # Prevent overlapping runs
  successfulJobsHistoryLimit: 7  # Keep last 7 successful runs
  failedJobsHistoryLimit: 3      # Keep last 3 failed runs

  jobTemplate:
    metadata:
      labels:
        app: nightly-intel-pipeline
        component: ingestion-layer
    spec:
      # 45-minute timeout (expected runtime + buffer)
      activeDeadlineSeconds: 3600
      backoffLimit: 2  # Retry failed jobs twice

      template:
        metadata:
          labels:
            app: nightly-intel-pipeline
            component: ingestion-layer
        spec:
          restartPolicy: OnFailure

          # Service account for GKE permissions
          serviceAccountName: nightly-intel-sa

          # Security context
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000

          containers:
          - name: intel-pipeline
            image: gcr.io/PROJECT_ID/nightly-intel-pipeline:latest
            imagePullPolicy: Always

            # Command to run the pipeline
            command: ["python", "main.py"]

            # Environment variables from secrets
            env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: intel-pipeline-secrets
                  key: github-token
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: intel-pipeline-secrets
                  key: anthropic-api-key
            - name: EXECUTION_MODE
              value: "gke"
            - name: LOG_LEVEL
              value: "INFO"

            # Resource requests and limits
            resources:
              requests:
                cpu: "1000m"      # 1 CPU core
                memory: "2Gi"     # 2GB RAM
                ephemeral-storage: "5Gi"
              limits:
                cpu: "2000m"      # Max 2 CPU cores
                memory: "4Gi"     # Max 4GB RAM
                ephemeral-storage: "10Gi"

            # Volume mounts
            volumeMounts:
            - name: pipeline-data
              mountPath: /app/data
            - name: pipeline-storage
              mountPath: /app/storage
            - name: pipeline-logs
              mountPath: /app/logs

          # Volumes
          volumes:
          - name: pipeline-data
            persistentVolumeClaim:
              claimName: intel-pipeline-data-pvc
          - name: pipeline-storage
            persistentVolumeClaim:
              claimName: intel-pipeline-storage-pvc
          - name: pipeline-logs
            persistentVolumeClaim:
              claimName: intel-pipeline-logs-pvc
