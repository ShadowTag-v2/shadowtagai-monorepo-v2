apiVersion: batch/v1
kind: CronJob
metadata:
  name: gemini-ingestion
  namespace: gke-training-system
  labels:
    app: gemini-ingestion
    component: crawler
spec:
  # Run daily at 2:00 AM Pacific Time (10:00 UTC)
  schedule: "0 10 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3

  jobTemplate:
    metadata:
      labels:
        app: gemini-ingestion
        component: batch-job
    spec:
      # Allow 90 minutes before killing job
      activeDeadlineSeconds: 5400
      backoffLimit: 2

      template:
        metadata:
          labels:
            app: gemini-ingestion
            component: crawler-pod
        spec:
          restartPolicy: OnFailure

          # Use preemptible nodes for cost savings
          nodeSelector:
            cloud.google.com/gke-preemptible: "true"

          # Tolerate preemption
          tolerations:
          - key: cloud.google.com/gke-preemptible
            operator: Equal
            value: "true"
            effect: NoSchedule

          # Workload Identity for GCP API access
          serviceAccountName: gemini-ingestion-sa

          initContainers:
          # Pre-fetch robots.txt files
          - name: robots-prefetch
            image: gcr.io/pnkln/robots-prefetch:latest
            volumeMounts:
            - name: robots-cache
              mountPath: /cache/robots
            resources:
              requests:
                memory: "512Mi"
                cpu: "500m"

          containers:
          # Container 1: Web Crawler
          - name: crawler
            image: gcr.io/pnkln/gemini-crawler:v1.0.0
            imagePullPolicy: Always

            env:
            - name: TIER_1_SOURCES
              valueFrom:
                configMapKeyRef:
                  name: ingestion-config
                  key: tier1_sources
            - name: TIER_2_SOURCES
              valueFrom:
                configMapKeyRef:
                  name: ingestion-config
                  key: tier2_sources
            - name: TIER_3_SOURCES
              valueFrom:
                configMapKeyRef:
                  name: ingestion-config
                  key: tier3_sources
            - name: ETHICS_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: ingestion-config
                  key: ethics
            - name: YOUTUBE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: youtube-api-key
            - name: TWITTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: twitter-api-key
            - name: NEWSAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: newsapi-key
            - name: OUTPUT_BUCKET
              value: "gs://pnkln-ingestion-daily"
            - name: PUBSUB_TOPIC
              value: "projects/pnkln-prod/topics/ingestion-complete"

            resources:
              requests:
                memory: "4Gi"
                cpu: "2"
              limits:
                memory: "8Gi"
                cpu: "4"

            volumeMounts:
            - name: ingestion-cache
              mountPath: /data/cache
            - name: robots-cache
              mountPath: /cache/robots

          # Container 2: Content Classifier (GPU-accelerated)
          - name: classifier
            image: gcr.io/pnkln/gemini-classifier:v1.0.0
            imagePullPolicy: Always

            env:
            - name: MODEL_PATH
              value: "gs://pnkln-models/tier-classifier/v2"
            - name: BATCH_SIZE
              value: "32"
            - name: TIER1_THRESHOLD
              value: "0.85"
            - name: TIER2_THRESHOLD
              value: "0.60"

            resources:
              requests:
                memory: "8Gi"
                cpu: "2"
                nvidia.com/gpu: 1  # T4 GPU for classification
              limits:
                memory: "16Gi"
                cpu: "4"
                nvidia.com/gpu: 1

            volumeMounts:
            - name: ingestion-cache
              mountPath: /data/cache
            - name: model-cache
              mountPath: /models

          # Container 3: Quality Gate Validator
          - name: quality-gate
            image: gcr.io/pnkln/quality-gate:v1.0.0
            imagePullPolicy: Always

            env:
            - name: QUALITY_GATES
              valueFrom:
                configMapKeyRef:
                  name: ingestion-config
                  key: quality_gates
            - name: METRICS_ENDPOINT
              value: "http://prometheus-server.gke-monitoring-system.svc.cluster.local:9090"

            resources:
              requests:
                memory: "2Gi"
                cpu: "1"
              limits:
                memory: "4Gi"
                cpu: "2"

            volumeMounts:
            - name: ingestion-cache
              mountPath: /data/cache

          # Container 4: Metrics & Logging Sidecar
          - name: metrics-exporter
            image: gcr.io/pnkln/ingestion-metrics:v1.0.0
            imagePullPolicy: Always

            ports:
            - containerPort: 9090
              name: metrics
              protocol: TCP

            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "1Gi"
                cpu: "500m"

          volumes:
          - name: ingestion-cache
            persistentVolumeClaim:
              claimName: ingestion-cache
          - name: robots-cache
            emptyDir: {}
          - name: model-cache
            emptyDir:
              sizeLimit: 20Gi
