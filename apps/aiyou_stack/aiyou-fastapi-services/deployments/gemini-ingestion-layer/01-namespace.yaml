apiVersion: v1
kind: Namespace
metadata:
  name: gke-training-system
  labels:
    app.kubernetes.io/name: pnkln-core-stack
    app.kubernetes.io/component: training
    app.kubernetes.io/managed-by: kubectl
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-config
  namespace: gke-training-system
data:
  # Tier 1 Sources: High-value, authoritative
  tier1_sources: |
    youtube.com/c/cspan
    youtube.com/c/whitehouse
    api.nytimes.com
    newsapi.org/v2/top-headlines
    api.nasa.gov
    data.fda.gov

  # Tier 2 Sources: Medium-value, diverse perspectives
  tier2_sources: |
    twitter.com/verified
    feeds.reuters.com/reuters/topNews
    techcrunch.com/feed
    arxiv.org/list/cs.AI/recent

  # Tier 3 Sources: Low-value, bulk context
  tier3_sources: |
    reddit.com/r/MachineLearning/top
    hackernews.com/best

  # Quality Gate Thresholds
  quality_gates: |
    items_per_day_minimum: 10000
    items_per_day_target: 50000
    relevance_minimum: 0.70
    tier1_minimum: 0.85
    cost_per_item_max: 0.001
    runtime_max_minutes: 60

  # Ethical Compliance Settings
  ethics: |
    respect_robots_txt: true
    max_requests_per_second: 2
    transparent_user_agent: true
    contact_email: crawler@pnkln.ai
    crawl_delay_respect: true
