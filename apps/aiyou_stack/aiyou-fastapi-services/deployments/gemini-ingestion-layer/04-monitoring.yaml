apiVersion: v1
kind: Service
metadata:
  name: ingestion-metrics
  namespace: gke-training-system
  labels:
    app: gemini-ingestion
    component: metrics
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    app: gemini-ingestion
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gemini-ingestion
  namespace: gke-training-system
  labels:
    app: gemini-ingestion
spec:
  selector:
    matchLabels:
      app: gemini-ingestion
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gemini-ingestion-alerts
  namespace: gke-training-system
spec:
  groups:
  - name: gemini-ingestion
    interval: 30s
    rules:
    # Alert if job hasn't completed by 3:30 AM (11:30 UTC)
    - alert: IngestionJobStale
      expr: |
        (time() - max(kube_job_status_completion_time{namespace="gke-training-system", job_name=~"gemini-ingestion-.*"})) > 86400
        and hour() == 11 and minute() >= 30
      for: 5m
      labels:
        severity: critical
        component: gemini-ingestion
      annotations:
        summary: "Gemini ingestion job failed or stalled"
        description: "No completed ingestion job in last 24 hours. Judge #6 using stale data."

    # Alert if items per day below minimum
    - alert: IngestionLowVolume
      expr: |
        ingestion_items_total{namespace="gke-training-system"} < 10000
      for: 5m
      labels:
        severity: warning
        component: gemini-ingestion
      annotations:
        summary: "Ingestion volume below minimum threshold"
        description: "Only {{ $value }} items ingested, minimum is 10,000."

    # Alert if relevance score drops
    - alert: IngestionLowQuality
      expr: |
        ingestion_relevance_score_avg{namespace="gke-training-system"} < 0.65
      for: 5m
      labels:
        severity: warning
        component: gemini-ingestion
      annotations:
        summary: "Ingestion quality score below threshold"
        description: "Average relevance score {{ $value }}, minimum is 0.70."

    # Alert if cost per item exceeds budget
    - alert: IngestionCostOverrun
      expr: |
        ingestion_cost_per_item{namespace="gke-training-system"} > 0.001
      for: 5m
      labels:
        severity: warning
        component: gemini-ingestion
      annotations:
        summary: "Ingestion cost per item exceeded budget"
        description: "Cost per item ${{ $value }}, budget is $0.001."

    # Alert if runtime exceeds 60 minutes
    - alert: IngestionRuntimeSlow
      expr: |
        ingestion_runtime_minutes{namespace="gke-training-system"} > 60
      for: 5m
      labels:
        severity: warning
        component: gemini-ingestion
      annotations:
        summary: "Ingestion runtime exceeded target"
        description: "Runtime {{ $value }} minutes, target is 45 minutes."

    # Alert on ethical violations
    - alert: IngestionEthicsViolation
      expr: |
        ingestion_robots_txt_violations_total{namespace="gke-training-system"} > 0
      for: 1m
      labels:
        severity: critical
        component: gemini-ingestion
      annotations:
        summary: "robots.txt violation detected"
        description: "ZERO violations tolerated. Immediate investigation required."
