# Cloud Build configuration for ShadowTagAi Engine
# Hybrid Path: Test -> Build -> Staging -> (Manual Approval) -> Prod
#
# Fix #10: Added staging deployment with manual approval gate

substitutions:
  _REGION: 'us-central1'
  _CLUSTER: 'autopilot-cluster-1'
  _STAGING_CLUSTER: 'autopilot-cluster-staging'
  _REGISTRY: '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shadowtagai-core'

steps:
  # 0. Run tests with coverage (Fix #10)
  - name: 'python:3.11'
    id: 'test'
    entrypoint: bash
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        pip install pytest pytest-cov
        pytest --cov=src/pnkln --cov-fail-under=98 --cov-report=term-missing
    waitFor: ['-']

  # 1. Build Docker image with semantic version tag
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '${_REGISTRY}/engine:${SHORT_SHA}'
      - '-t'
      - '${_REGISTRY}/engine:latest'
      - '.'
    waitFor: ['test']

  # 2. Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGISTRY}/engine'
    waitFor: ['build-engine']

  # 3. Deploy to STAGING cluster first
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy-staging'
    args:
      - 'run'
      - '--filename=k8s/'
      - '--location=${_REGION}'
      - '--cluster=${_STAGING_CLUSTER}'
      - '--image=${_REGISTRY}/engine:${SHORT_SHA}'
    waitFor: ['push-engine']

  # 4. Run staging smoke tests
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'staging-smoke-test'
    entrypoint: bash
    args:
      - '-c'
      - |
        echo "Running staging smoke tests..."
        # Add actual smoke test commands here
        # curl -f https://staging.pnkln.ai/health || exit 1
        echo "Staging smoke tests passed"
    waitFor: ['deploy-staging']

  # === MANUAL APPROVAL REQUIRED FOR PRODUCTION ===
  # Use Cloud Build approvals or trigger separate prod pipeline

  # 5. Deploy to PRODUCTION cluster (10% traffic split initially)
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy-prod'
    args:
      - 'run'
      - '--filename=k8s/'
      - '--location=${_REGION}'
      - '--cluster=${_CLUSTER}'
      - '--image=${_REGISTRY}/engine:${SHORT_SHA}'
    waitFor: ['staging-smoke-test']

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shadowtagai-core/engine:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/shadowtagai-core/engine:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  # Enable manual approval for production deployment
  # Requires: gcloud builds triggers update --require-approval
  pool:
    name: 'projects/${PROJECT_ID}/locations/${_REGION}/workerPools/default'

timeout: '3600s'  # 60 min for tests + build + deploy

# To enable manual approval, run:
# gcloud builds triggers update <TRIGGER_NAME> --require-approval
