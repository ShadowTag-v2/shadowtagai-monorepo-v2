# Cloud Run Service Configuration
# Deploy with: gcloud run services replace cloud-run-deploy.yaml

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: pnkln-api
  labels:
    cloud.googleapis.com/location: us-central1
    component: pnkln-core-stack
    version: "1.0.0"
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
spec:
  template:
    metadata:
      annotations:
        # Scaling
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        autoscaling.knative.dev/target: "80"  # Target CPU utilization %

        # Resource limits
        run.googleapis.com/cpu-throttling: "false"  # Always-on CPU
        run.googleapis.com/startup-cpu-boost: "true"  # Fast cold starts
        run.googleapis.com/execution-environment: gen2  # Second generation execution environment
    spec:
      containerConcurrency: 80  # Max concurrent requests per instance
      timeoutSeconds: 300  # 5-minute timeout (for batch operations)

      containers:
      - name: pnkln-api
        image: gcr.io/PROJECT_ID/pnkln-api:latest  # Replace PROJECT_ID

        ports:
        - name: http1
          containerPort: 8080

        env:
        # Application config
        - name: PORT
          value: "8080"
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "info"

        # Gemini API (from Secret Manager)
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-api-key
              key: latest

        # Google Cloud config
        - name: GCP_PROJECT_ID
          value: "PROJECT_ID"  # Replace with actual project ID
        - name: GCP_REGION
          value: "us-central1"

        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "2Gi"

        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      serviceAccountName: pnkln-api-sa@PROJECT_ID.iam.gserviceaccount.com
