---
# ShadowTagAI Corp Engine - Kubernetes Deployment
apiVersion: v1
kind: Namespace
metadata:
  name: corp-engine
  labels:
    app: corp-engine
    tier: enterprise

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: corp-engine-config
  namespace: corp-engine
data:
  ENVIRONMENT: "prod"
  LOG_LEVEL: "info"
  INTEL_REFRESH_INTERVAL: "3600"
  SHADOWTAG_ENABLED: "true"
  AUTO_PORT_ENABLED: "true"
  PUBSUB_PROJECT: "acquired-jet-478701-b3"
  PUBSUB_INTEL_TOPIC: "corp-engine-intel-updates-prod"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corp-engine-api
  namespace: corp-engine
  labels:
    app: corp-engine
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: corp-engine
      component: api
  template:
    metadata:
      labels:
        app: corp-engine
        component: api
    spec:
      serviceAccountName: corp-engine
      containers:
        - name: api
          image: us-central1-docker.pkg.dev/acquired-jet-478701-b3/corp-engine-prod/api:latest
          ports:
            - containerPort: 8700
              name: http
          envFrom:
            - configMapRef:
                name: corp-engine-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: corp-engine-secrets
                  key: database-url
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: corp-engine-secrets
                  key: gemini-api-key
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: corp-engine-api
  namespace: corp-engine
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8700
      protocol: TCP
      name: http
  selector:
    app: corp-engine
    component: api

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: corp-engine-api
  namespace: corp-engine
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: corp-engine-api
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# Intel Processor - Consumes Pub/Sub events
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intel-processor
  namespace: corp-engine
  labels:
    app: corp-engine
    component: intel-processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: corp-engine
      component: intel-processor
  template:
    metadata:
      labels:
        app: corp-engine
        component: intel-processor
    spec:
      serviceAccountName: corp-engine
      containers:
        - name: processor
          image: us-central1-docker.pkg.dev/acquired-jet-478701-b3/corp-engine-prod/intel-processor:latest
          envFrom:
            - configMapRef:
                name: corp-engine-config
          env:
            - name: PUBSUB_SUBSCRIPTION
              value: "intel-processor-prod"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: corp-engine-secrets
                  key: database-url
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

---
# Self-Config Engine - Monitors for auto-port opportunities
apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-config-engine
  namespace: corp-engine
  labels:
    app: corp-engine
    component: self-config
spec:
  replicas: 1
  selector:
    matchLabels:
      app: corp-engine
      component: self-config
  template:
    metadata:
      labels:
        app: corp-engine
        component: self-config
    spec:
      serviceAccountName: corp-engine
      containers:
        - name: engine
          image: us-central1-docker.pkg.dev/acquired-jet-478701-b3/corp-engine-prod/self-config:latest
          envFrom:
            - configMapRef:
                name: corp-engine-config
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: corp-engine-secrets
                  key: gemini-api-key
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: corp-engine
  namespace: corp-engine
  annotations:
    iam.gke.io/gcp-service-account: redacted@shadowtag-v4.local

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: corp-engine-ingress
  namespace: corp-engine
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "corp-engine-ip"
    networking.gke.io/managed-certificates: "corp-engine-cert"
spec:
  rules:
    - host: api.shadowtagai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: corp-engine-api
                port:
                  number: 80
    - host: app.shadowtagai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: corp-engine-api
                port:
                  number: 80

---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: corp-engine-cert
  namespace: corp-engine
spec:
  domains:
    - api.shadowtagai.com
    - app.shadowtagai.com
