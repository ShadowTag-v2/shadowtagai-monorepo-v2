name: Dual-Model CI

on:
  pull_request:
    types: [opened, synchronize]

env:
  PYTHON_VERSION: "3.11"

jobs:
  implementer:
    name: "Stage 1: Implementer"
    runs-on: self-hosted
    outputs:
      test_plan: ${{ steps.impl.outputs.plan }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install requests

      - name: Get diff
        run: git diff origin/main...HEAD > diff.txt

      - name: Implementer Analysis
        id: impl
        env:
          n-autoresearch/Kosmos/BioAgents_URL: ${{ secrets.n-autoresearch/Kosmos/BioAgents_URL }}
        run: |
          python scripts/implementer.py diff.txt > test_plan.json
          echo "plan=$(cat test_plan.json | base64 -w 0)" >> $GITHUB_OUTPUT

  critic:
    name: "Stage 2: Critic"
    needs: implementer
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install anthropic

      - name: Get diff
        run: git diff origin/main...HEAD > diff.txt

      - name: Decode test plan
        env:
          TEST_PLAN: ${{ needs.implementer.outputs.test_plan }}
        run: echo "$TEST_PLAN" | base64 -d > test_plan.json

      - name: Critic Validation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/critic.py diff.txt test_plan.json

      - name: Post Results
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let issues = '';
            try {
              issues = fs.readFileSync('critic_issues.md', 'utf8');
            } catch (e) {
              issues = 'Critic validation failed. Check logs for details.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔍 Critic Review\n\n${issues}`
            });

  archlint:
    name: "ArchLint"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ArchLint Check
        run: python scripts/archlint.py origin/main...HEAD

  scope-lint:
    name: "Scope Lint"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Scope Lint Check
        run: python scripts/scope_lint.py origin/main...HEAD
