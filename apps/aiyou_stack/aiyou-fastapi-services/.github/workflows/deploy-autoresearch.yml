name: Deploy n-autoresearch/Kosmos/BioAgents to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'agents/autoresearch.py'
      - 'bin/n-autoresearch/Kosmos/BioAgents-server'
      - 'n-autoresearch/Kosmos/BioAgents-server.Dockerfile'
      - 'requirements.txt'
      - 'src/shadowtag_v4/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  PROJECT_ID: acquired-jet-478701-b3
  REGION: us-central1
  REPOSITORY: n-autoresearch/Kosmos/BioAgents
  IMAGE: server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/215390634092/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'redacted@shadowtag-v4.local'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:latest \
            -f n-autoresearch/Kosmos/BioAgents-server.Dockerfile .
          docker push --all-tags us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE

      - name: Deploy to Cloud Run (Dev)
        if: github.event.inputs.environment != 'prod'
        run: |
          gcloud run deploy n-autoresearch/Kosmos/BioAgents-server-dev \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --memory 2Gi \
            --cpu 2 \
            --set-env-vars PYTHONPATH=/app

      - name: Deploy to Cloud Run (Prod)
        if: github.event.inputs.environment == 'prod'
        run: |
          gcloud run deploy n-autoresearch/Kosmos/BioAgents-server \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --memory 2Gi \
            --cpu 2 \
            --set-env-vars PYTHONPATH=/app

      - name: Output Service URL
        run: |
          SERVICE_NAME=${{ github.event.inputs.environment == 'prod' && 'n-autoresearch/Kosmos/BioAgents-server' || 'n-autoresearch/Kosmos/BioAgents-server-dev' }}
          URL=$(gcloud run services describe $SERVICE_NAME --region $REGION --format 'value(status.url)')
          echo "## Deployed to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "Service URL: $URL" >> $GITHUB_STEP_SUMMARY
