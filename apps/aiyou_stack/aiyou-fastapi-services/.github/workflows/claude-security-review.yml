name: Claude Security Review

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  pull_request:
    types: [labeled]

jobs:
  security-review:
    # Only run when PR is labeled with "security-review"
    if: github.event.label.name == 'security-review'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Perform a comprehensive security review of this PR. Focus on:

            1. OWASP Top 10 vulnerabilities
            2. Input validation and sanitization
            3. Authentication and authorization issues
            4. SQL injection and XSS vulnerabilities
            5. Sensitive data exposure
            6. API security best practices
            7. Dependency vulnerabilities

            Provide a detailed report with:
            - Security issues found (if any)
            - Severity level for each issue
            - Recommendations for fixes
            - Best practices to follow
          claude_args: "--max-turns 5 --model claude-opus-4-1-20250805"
