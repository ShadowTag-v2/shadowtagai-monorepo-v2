<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ShadowTag AI — Sovereign Intelligence Infrastructure</title>
<meta name="description" content="ShadowTag AI powers sovereign intelligence infrastructure. Visit our products at kovelai.com and shadowtagai.com."/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0908;
    color: #e8ddc9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
  }
  .container {
    text-align: center;
    padding: 48px;
    position: relative;
    z-index: 1;
  }
  .logo {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: #e6c487;
    margin-bottom: 16px;
  }
  .tagline {
    font-size: 0.875rem;
    color: #9e9380;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .links {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .links a {
    color: #e6c487;
    text-decoration: none;
    font-size: 0.8125rem;
    font-weight: 600;
    padding: 12px 28px;
    border: 1px solid rgba(230,196,135,0.2);
    border-radius: 8px;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .links a:hover {
    background: rgba(230,196,135,0.08);
    border-color: rgba(230,196,135,0.4);
  }
  .bg-glow {
    position: fixed;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.08;
    pointer-events: none;
  }
  .glow-1 { top: -100px; left: -100px; background: #e6c487; }
  .glow-2 { bottom: -100px; right: -100px; background: #aac7ff; }
</style>
</head>
<body>
<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>
<main class="container" role="main">
  <div class="logo">ShadowTag AI</div>
  <div class="tagline">Sovereign Intelligence Infrastructure</div>
  <nav class="links" aria-label="Product links">
    <a href="https://shadowtagai.web.app">ShadowTag AI — Corporate</a>
  </nav>
</main>
</body>
</html>
