# ════════════════════════════════════════════════════════════
# KovelAI — Nginx Reverse Proxy Configuration
#
# Features:
#   - Reverse proxy to API (:8080) and Agent (:8000)
#   - Anti-forensic headers on EVERY response
#   - Rate limiting: 30 req/min per IP on /api/v1/query
#   - SSE streaming support for AG-UI agent
#   - CSP headers matching Firebase Hosting hardening
#   - Optional TLS termination (cert mount)
# ════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # ── Gzip ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Rate Limiting ────────────────────────────
    # 30 requests/minute per client IP for the query endpoint
    limit_req_zone $binary_remote_addr zone=query_limit:10m rate=30r/m;
    # 10 requests/minute for session creation (anti-abuse)
    limit_req_zone $binary_remote_addr zone=session_limit:10m rate=10r/m;

    # ── Upstream Backends ────────────────────────
    upstream kovelai_api {
        server kovelai-api:8080;
        keepalive 32;
    }

    upstream kovelai_agent {
        server kovelai-agent:8000;
        keepalive 16;
    }

    # ── HTTP → HTTPS Redirect (production) ───────
    server {
        listen 80;
        server_name _;

        # Health check passthrough (no redirect)
        location /api/v1/health {
            proxy_pass http://kovelai_api;
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ─────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS Configuration (mount certs via docker-compose volume)
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        # ── Anti-Forensic Security Headers ───────
        # These headers ensure NO browser caching of privileged content.
        # Required for Heppner compliance and S.E.U. architecture.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.stripe.com; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;

        # Anti-forensic cache control (every response)
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        # ── API Routes ───────────────────────────

        # S.E.U. Proxy — Privileged Query Endpoint (rate limited)
        location /api/v1/query {
            limit_req zone=query_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://kovelai_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout for LLM API calls (can be slow)
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
        }

        # Session Management (rate limited)
        location /api/v1/session/ {
            limit_req zone=session_limit burst=3 nodelay;

            proxy_pass http://kovelai_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Stripe Webhooks (no rate limit — Stripe retries on failure)
        location /api/v1/stripe/webhook {
            proxy_pass http://kovelai_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Must pass raw body for signature verification
            proxy_request_buffering off;
        }

        # All other API routes
        location /api/ {
            proxy_pass http://kovelai_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── AG-UI Agent SSE Endpoint ─────────────
        location /api/copilotkit {
            proxy_pass http://kovelai_agent;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming support
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;

            # Disable response buffering for real-time streaming
            add_header X-Accel-Buffering "no" always;
        }

        # Agent health
        location /agent/health {
            proxy_pass http://kovelai_agent/health;
            proxy_set_header Host $host;
        }

        # ── Deny Everything Else ─────────────────
        location / {
            return 404;
        }
    }
}
