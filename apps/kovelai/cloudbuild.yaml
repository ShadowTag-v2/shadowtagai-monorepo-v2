# ════════════════════════════════════════════════════════════
# KovelAI — Cloud Build Configuration
# Triggered by: gcloud builds submit --config=cloudbuild.yaml .
# Or: GitHub push trigger via Cloud Build Triggers
#
# Builds the Docker image and deploys to Cloud Run.
# No local Docker daemon required.
# ════════════════════════════════════════════════════════════

steps:
  # Step 1: Build the Docker image using Cloud Build
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-docker.pkg.dev/${PROJECT_ID}/kovelai/secure-proxy:${SHORT_SHA}'
      - '-t'
      - 'us-docker.pkg.dev/${PROJECT_ID}/kovelai/secure-proxy:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-docker.pkg.dev/${PROJECT_ID}/kovelai/secure-proxy'

  # Step 3: Deploy the S.E.U. API service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'kovelai-api'
      - '--image'
      - 'us-docker.pkg.dev/${PROJECT_ID}/kovelai/secure-proxy:${SHORT_SHA}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--timeout'
      - '120'
      - '--concurrency'
      - '80'
      - '--cpu-throttling'
      - '--no-allow-unauthenticated'
      - '--set-env-vars'
      - 'SERVICE_NAME=kovelai-api,PORT=8080'
      - '--set-secrets'
      - 'STRIPE_SECRET_KEY=kovelai-stripe-key:latest,STRIPE_WEBHOOK_SECRET=kovelai-stripe-webhook:latest,KOVEL_KMS_SECRET=kovelai-kms-secret:latest,GOOGLE_API_KEY=kovelai-gemini-key:latest'
      - '--command'
      - 'uvicorn'
      - '--args'
      - 'api.main:app,--host,0.0.0.0,--port,8080,--workers,2'

  # Step 4: Deploy the AG-UI Agent service to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'kovelai-agent'
      - '--image'
      - 'us-docker.pkg.dev/${PROJECT_ID}/kovelai/secure-proxy:${SHORT_SHA}'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--port'
      - '8000'
      - '--memory'
      - '384Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '40'
      - '--cpu-throttling'
      - '--no-allow-unauthenticated'
      - '--set-env-vars'
      - 'SERVICE_NAME=kovelai-agent,KOVELAI_PORT=8000'
      - '--set-secrets'
      - 'GOOGLE_API_KEY=kovelai-gemini-key:latest,KOVEL_KMS_SECRET=kovelai-kms-secret:latest'
      - '--command'
      - 'uvicorn'
      - '--args'
      - 'agent.kovelai_agent:app,--host,0.0.0.0,--port,8000,--workers,1'

images:
  - 'us-docker.pkg.dev/${PROJECT_ID}/kovelai/secure-proxy:${SHORT_SHA}'
  - 'us-docker.pkg.dev/${PROJECT_ID}/kovelai/secure-proxy:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

substitutions:
  _REGION: us-central1

tags:
  - 'kovelai'
  - 'production'
