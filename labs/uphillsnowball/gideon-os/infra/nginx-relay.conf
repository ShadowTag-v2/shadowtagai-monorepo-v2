# infra/nginx-relay.conf
# ============================================================================
# NGINX WebSocket Relay for ULTRAPLAN
# ============================================================================
# Block 10b of the Ex Toto Omni-Compile (Gideon OS Architecture)
# Proxies WebSocket connections from the React UI to Cor.Yay bridge.
# ============================================================================

server {
    listen 443 ssl;
    server_name ide.sovereign-gideon.com;
    client_max_body_size 100M;

    location /relay {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;

        # CRITICAL: Allows ULTRAPLAN remote exploration to run for 24h
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
