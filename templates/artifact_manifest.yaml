# ═══════════════════════════════════════════════════════════
# Artifact Manifest Template — Two-Lane Upload Doctrine
# Invariant #114: The manifest is committed; the payload is not.
# ═══════════════════════════════════════════════════════════
#
# Usage:
#   Copy this template when moving a non-source payload out of Git.
#   Fill in all required fields. Commit the manifest to the repo.
#   The payload itself goes to artifact storage (GCS, Releases, or local ignored dir).
#
# Example:
#   cp templates/artifact_manifest.yaml artifacts/manifests/model_weights_v2.yaml
#   # Edit fields, then: git add artifacts/manifests/model_weights_v2.yaml

# --- REQUIRED FIELDS ---

# Unique identifier for this artifact (use descriptive kebab-case)
artifact_id: ""

# Human-readable name
name: ""

# Where the payload lives (GCS URI, GitHub Release URL, or local ignored path)
# Examples:
#   gs://shadowtag-artifacts/models/bert-legal-v2.bin
#   https://github.com/ShadowTag-v2/Monorepo-Uphillsnowball/releases/download/v1.0/data.tar.gz
#   .local_artifacts/indexes/skills.lance  (gitignored)
uri: ""

# SHA-256 hash of the payload for integrity verification
# Generate with: shasum -a 256 <file> | cut -d' ' -f1
sha256: ""

# Who is responsible for this artifact
owner: ""

# Retention class: ephemeral | session | release | permanent
# ephemeral:  Can be deleted after the current task
# session:    Retained for the current development cycle
# release:    Retained until the next major release
# permanent:  Never auto-deleted, requires explicit archival
retention_class: ""

# --- METADATA ---

# Original source of this artifact
source:
  type: ""          # generated | downloaded | exported | trained | compiled
  origin: ""        # URL, script path, or description of how it was created
  created_at: ""    # ISO 8601 timestamp (e.g., 2026-04-27T16:00:00Z)

# Current status: active | archived | superseded | quarantined
status: "active"

# File size in bytes (for quick reference without fetching)
size_bytes: 0

# MIME type
mime_type: ""

# --- RETRIEVAL ---

# Instructions for an agent or human to retrieve this artifact
retrieval_instructions: |
  # How to fetch this artifact:
  # 1. Ensure you have access to the storage bucket
  # 2. Run: gsutil cp <uri> <local_path>
  # Or for GitHub Releases:
  #   curl -LO <uri>

# --- OPTIONAL ---

# Tags for searchability
tags: []

# If this supersedes a previous artifact, reference it
supersedes: ""

# Related Beads issue ID
beads_issue: ""

# Expiry date (for ephemeral/session artifacts)
expires_at: ""
