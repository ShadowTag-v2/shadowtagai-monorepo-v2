name: AiYou CI
on:
  push:
    branches: [ main ]
  pull_request: {}

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lang: [node, rust]
    steps:
      - uses: actions/checkout@v4

      # Node.js Track (Serverless/Ops)
      - uses: actions/setup-node@v4
        if: matrix.lang == 'node'
        with: { node-version: '22', cache: 'npm' }

      - name: Node Validation
        if: matrix.lang == 'node'
        run: |
          npm ci
          npm run lint
          npm test -- --ci

      # Rust Track (High-Perf Agents/BDH)
      - uses: actions-rs/toolchain@v1
        if: matrix.lang == 'rust'
        with: { toolchain: stable, components: clippy, rustfmt }

      - name: Rust Validation
        if: matrix.lang == 'rust'
        run: |
          cargo fmt -- --check
          cargo clippy -- -D warnings
          cargo test --all --locked
