# Service Account and RBAC for Intelligence Pipeline
# Provides necessary permissions for BigQuery, GCS, and Secret access

apiVersion: v1
kind: ServiceAccount
metadata:
  name: intelligence-runner
  namespace: intelligence-pipeline
  annotations:
    iam.gke.io/gcp-service-account: intelligence-pipeline@PROJECT_ID.iam.gserviceaccount.com

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: intelligence-runner-role
  namespace: intelligence-pipeline
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: intelligence-runner-binding
  namespace: intelligence-pipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: intelligence-runner-role
subjects:
- kind: ServiceAccount
  name: intelligence-runner
  namespace: intelligence-pipeline
