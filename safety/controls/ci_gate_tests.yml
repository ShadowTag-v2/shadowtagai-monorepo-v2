name: CI Gate - Tests
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.14"]
        node: ["20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install Python dependencies
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        run: |
          python -m pip install --upgrade pip uv
          if [ -f requirements.txt ]; then uv pip install --system -r requirements.txt; fi
          if [ -f pyproject.toml ]; then uv pip install --system -e .; fi

      - name: Install Node dependencies
        if: hashFiles('package.json') != ''
        run: |
          npm ci || npm install

      - name: Run Python tests
        if: hashFiles('**/test_*.py', '**/test*.py', 'tests/**/*.py') != ''
        run: |
          python -m pytest --tb=short --cov --cov-report=term --cov-report=json || true

      - name: Run TypeScript/JavaScript tests
        if: hashFiles('**/*.test.ts', '**/*.test.js', '**/*.spec.ts') != ''
        run: |
          npm run test --if-present || echo "No test script defined"

      - name: Check test coverage threshold
        if: hashFiles('coverage.json') != ''
        run: |
          COVERAGE=$(python - <<'EOF'
          import json, sys
          try:
              with open('coverage.json') as f:
                  cov = json.load(f)
                  total = cov.get('totals', {}).get('percent_covered', 0)
                  print(f"{total:.1f}")
                  sys.exit(0 if total >= 98.0 else 1)
          except:
              print("0.0")
              sys.exit(1)
          EOF
          )
          echo "Coverage: ${COVERAGE}%"
          echo "COVERAGE=${COVERAGE}" >> $GITHUB_ENV

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python }}-node${{ matrix.node }}
          path: |
            coverage.json
            htmlcov/
          retention-days: 30

  verify-typescript:
    runs-on: ubuntu-latest
    if: hashFiles('**/*.ts', '**/*.tsx') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci || npm install
      - run: npm run ci:verify:ts --if-present || npx tsc --noEmit

  summary:
    runs-on: ubuntu-latest
    needs: [tests, verify-typescript]
    if: always()
    steps:
      - name: Test gate summary
        run: |
          echo "## 🧪 Test Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Matrix tests: ${{ needs.tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript verification: ${{ needs.verify-typescript.result }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.tests.result }}" == "failure" ]] || [[ "${{ needs.verify-typescript.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Tests failed - PR blocked**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **All tests passed**" >> $GITHUB_STEP_SUMMARY
          fi
