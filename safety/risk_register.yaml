# Risk Register (FMEA-style for SaaS)
# Severity: 1 (negligible) to 5 (catastrophic)
# Probability: 1 (rare) to 5 (frequent)
# Control: 1 (weak) to 5 (strong)
# Risk Priority Number (RPN) = Severity × Probability ÷ Control

risks:
  - id: R-001
    area: model-output
    failure: Harmful, defamatory, or biased model outputs
    severity: 5
    probability: 3
    control: 4
    rpn: 3.75
    owner: safety@aiyou.com
    mitigations:
      - Safety filters on all model outputs
      - Human-in-the-loop review for flagged content
      - Continuous evaluation suite (1,000+ test cases)
      - User feedback loop for false positives/negatives
    evidence:
      - ci/artifacts/safety-eval-results.json
      - safety/audits/model-safety-reports/
    status: active
    review_date: 2025-11-08

  - id: R-002
    area: availability
    failure: Service outage exceeding error budget (>0.1%)
    severity: 4
    probability: 2
    control: 4
    rpn: 2.0
    owner: sre@aiyou.com
    mitigations:
      - SLO-based alerting (Prometheus + PagerDuty)
      - Canary deployments (10% traffic before full rollout)
      - Automated rollback on health check failures
      - Multi-region redundancy (active-passive)
    evidence:
      - safety/monitoring/slo-dashboard.png
      - safety/monitoring/uptime-reports/
    status: active
    review_date: 2025-11-08

  - id: R-003
    area: security
    failure: PII leakage or unauthorized data access
    severity: 5
    probability: 2
    control: 5
    rpn: 2.0
    owner: security@aiyou.com
    mitigations:
      - Encryption at rest (AES-256) and in transit (TLS 1.3)
      - Zero plaintext PII in logs or error messages
      - Automated PII detection and redaction pipeline
      - Annual penetration testing + quarterly vulnerability scans
    evidence:
      - safety/audits/pentest-reports/
      - ci/artifacts/pii-scan-results.json
    status: active
    review_date: 2025-11-08

  - id: R-004
    area: compliance
    failure: GDPR/CCPA violation (failure to honor data deletion requests)
    severity: 5
    probability: 1
    control: 4
    rpn: 1.25
    owner: legal@aiyou.com
    mitigations:
      - Automated right-to-delete workflow (≤30 days)
      - Data retention policies enforced via TTL
      - Audit log of all deletion requests and confirmations
      - Privacy impact assessments for new features
    evidence:
      - safety/audits/compliance-reports/
      - safety/controls/data-retention-policy.md
    status: active
    review_date: 2025-11-08

  - id: R-005
    area: model-drift
    failure: Model performance degradation in production
    severity: 3
    probability: 3
    control: 3
    rpn: 3.0
    owner: ml-eng@aiyou.com
    mitigations:
      - Continuous monitoring of model metrics (accuracy, F1, latency)
      - Automated alerts on >5% performance drop
      - A/B testing infrastructure for model updates
      - Quarterly model retraining and evaluation
    evidence:
      - safety/monitoring/model-metrics-dashboard.json
      - safety/audits/model-evaluation-reports/
    status: active
    review_date: 2025-11-08

  - id: R-006
    area: dependency
    failure: Critical vulnerability in third-party dependencies
    severity: 4
    probability: 3
    control: 4
    rpn: 3.0
    owner: engineering@aiyou.com
    mitigations:
      - Automated dependency scanning (npm audit, pip-audit, Semgrep)
      - Auto-fix pipeline for low-risk CVEs (Codemender-style)
      - Manual review + patching SLA ≤7 days for critical vulnerabilities
      - Vendor risk assessment for all third-party integrations
    evidence:
      - .ci/security_scan.json
      - safety/audits/dependency-reports/
    status: active
    review_date: 2025-11-08

  - id: R-007
    area: energy-efficiency
    failure: Excessive compute cost or carbon footprint
    severity: 2
    probability: 2
    control: 3
    rpn: 1.33
    owner: platform-eng@aiyou.com
    mitigations:
      - Energy margin threshold (≥10%) enforced in CI
      - Auto-scaling policies to minimize idle resources
      - Model optimization (quantization, pruning) where applicable
      - Monthly cost review and carbon offset purchases
    evidence:
      - .ci/energy-margin-reports.json
      - safety/monitoring/cost-dashboard.png
    status: active
    review_date: 2025-11-08

  - id: R-008
    area: rate-limiting
    failure: DDoS or abuse leading to service degradation
    severity: 3
    probability: 3
    control: 4
    rpn: 2.25
    owner: platform-eng@aiyou.com
    mitigations:
      - Adaptive rate limiting per IP, user, API key
      - CAPTCHA challenges on suspicious patterns
      - CDN-level DDoS protection (Cloudflare/AWS Shield)
      - IP blocklist integration (abuse.ch, Spamhaus)
    evidence:
      - safety/monitoring/rate-limit-logs/
      - safety/audits/ddos-drills/
    status: active
    review_date: 2025-11-08

  - id: R-009
    area: insider-threat
    failure: Unauthorized access by internal staff
    severity: 4
    probability: 1
    control: 4
    rpn: 1.0
    owner: security@aiyou.com
    mitigations:
      - Principle of least privilege (RBAC, IAM policies)
      - All admin actions logged and auditable
      - Annual background checks for staff with production access
      - Separation of duties (no single person can deploy + approve)
    evidence:
      - safety/audits/access-control-reviews/
      - safety/controls/rbac-policies.yaml
    status: active
    review_date: 2025-11-08

  - id: R-010
    area: ci-cd-pipeline
    failure: Malicious code merged via compromised CI/CD
    severity: 5
    probability: 1
    control: 5
    rpn: 1.0
    owner: devops@aiyou.com
    mitigations:
      - Mandatory code review (≥2 approvals for critical paths)
      - Automated security scanning on every PR (SAST, SCA)
      - Signed commits and branch protection rules
      - Cursor agent permissions restricted (no direct merge)
    evidence:
      - .github/workflows/security-auto-fix.yml
      - .cursor/cli.json (deny rules)
    status: active
    review_date: 2025-11-08

# Risk Assessment Summary
summary:
  total_risks: 10
  critical_rpn: 2  # RPN > 3.5
  high_rpn: 5      # RPN 2.5-3.5
  medium_rpn: 3    # RPN 1.5-2.5
  low_rpn: 0       # RPN < 1.5
  next_review: 2026-02-08  # Quarterly

# Risk Appetite Statement
risk_appetite: |
  We accept risks with RPN ≤2.0 as-is, provided controls are maintained.
  Risks with RPN >2.0 require additional mitigations or executive approval.
  Any risk with Severity=5 and Probability≥3 triggers immediate escalation.

# Escalation Procedure
escalation:
  - level: L1 (RPN ≤2.0)
    action: Monitor via quarterly review
    owner: Engineering Team Lead
  - level: L2 (RPN 2.0-3.5)
    action: Monthly review + mitigation plan
    owner: Engineering Manager
  - level: L3 (RPN >3.5)
    action: Weekly review + executive briefing
    owner: CTO / VP Engineering
  - level: L4 (Severity=5, Probability≥4)
    action: Immediate halt + emergency response
    owner: CEO / Board
