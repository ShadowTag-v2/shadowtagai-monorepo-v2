name: smoke
on:
  push:
  pull_request:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Sanity file checks
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f .pnkln-stack/assistant.defaults.json
          test -f .github/workflows/assistant-defaults-guard.yml
      - name: Python smoke (if applicable)
        if: hashFiles('requirements.txt') != ''
        shell: bash
        run: |
          set -e
          python3 -m venv .venv || true
          . .venv/bin/activate || true
          pip install -q -r requirements.txt || true
          pip install -q pytest httpx || true
          if [ -d tests ]; then pytest -q || true; else echo 'no tests dir'; fi
      - name: Node smoke (if applicable)
        if: hashFiles('package.json') != ''
        shell: bash
        run: |
          set -e
          if command -v npm >/dev/null 2>&1; then
            if [ -f package-lock.json ]; then npm ci --silent || true; else npm i --silent || true; fi
            if grep -q '"test"' package.json; then npm test --silent || true; else echo 'no npm test script'; fi
          else
            echo 'npm not installed'
          fi
