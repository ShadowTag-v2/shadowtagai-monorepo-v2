name: PR Quality Gate (make check)
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'control/pnkln/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'


concurrency:
  group: make-check-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install ruff pytest
      - name: Run make check
        run: make check
