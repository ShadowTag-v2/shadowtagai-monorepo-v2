name: PR Quality Gate (make check)
on:
  pull_request:
    branches: [main]
    paths:
      - 'control/pnkln/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: pip install ruff pytest vulture
      - name: Run make check
        run: make check
