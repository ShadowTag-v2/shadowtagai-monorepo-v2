name: release-with-artifacts

on:
  push:
    tags: ["v*.*.*", "blake3-native-v*.*.*"]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: win-x64
          - os: macos-13
            target: macos-x64
          - os: macos-14
            target: macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci || npm i
      - name: Build native
        run: |
          echo "Simulated native build for ${{ matrix.target }}"
          mkdir -p dist/${{ matrix.target }}
          echo "dummy" > dist/${{ matrix.target }}/blake3.node
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.target }}/*.node
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci || npm i
      - run: echo "Simulated npm publish"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

