name: "\U0001F6E1\uFE0F Omni-Sanitation & Zero-Trust CI"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  security-events: write
  pull-requests: read
  actions: read

jobs:
  # ─────────────────────────────────────────────────────
  # JOB 1: Zero-Trust Gates (Secrets + Supply Chain)
  # ─────────────────────────────────────────────────────
  zero-trust-gates:
    name: "\U0001F575\uFE0F Secrets & Supply Chain"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "1. TruffleHog Secret Scanner"
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: "2. Dependency Vulnerability Review"
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ─────────────────────────────────────────────────────
  # JOB 2: Self-Healing Pass (Auto-Fix + SARIF)
  # ─────────────────────────────────────────────────────
  self-healing-and-sarif:
    name: "\u26A1 Rust Auto-Fix & Annotations"
    runs-on: ubuntu-latest
    needs: zero-trust-gates
    steps:
      - name: "🔐 Generate GitHub App Token (Zero-Trust)"
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CORP_APP_ID }}
          private-key: ${{ secrets.CORP_APP_PEM }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.generate_token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Toolchains
        run: |
          npm install -g @biomejs/biome@latest @ast-grep/cli@latest
          pip install ruff

      - name: "1. Self-Healing Pass (Auto-Format & Unsafe Fixes)"
        run: |
          echo "::group::Biome Auto-Fix"
          biome check --write --unsafe ./apps ./libs || true
          echo "::endgroup::"

          echo "::group::Ruff Auto-Fix"
          ruff check . --fix --unsafe-fixes --exclude external_repos --exclude external_sdks --exclude third_party --exclude archive --exclude deep-archive || true
          echo "::endgroup::"

          echo "::group::Ruff Format"
          ruff format . --exclude external_repos --exclude external_sdks --exclude third_party --exclude archive --exclude deep-archive || true
          echo "::endgroup::"

          echo "::group::AST-Grep Auto-Fix"
          sg scan --update-all || true
          echo "::endgroup::"

      - name: "2. Commit Auto-Fixes back to PR"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(ci): autonomous biome/ruff/sg self-healing"
          branch: ${{ github.head_ref }}

      - name: "3. Generate SARIF & GitHub Annotations"
        if: always()
        run: |
          # Biome outputs directly to GitHub UI annotations
          biome ci ./apps ./libs --reporter=github || true

          # AST-Grep outputs to GitHub annotations
          sg scan --format github || true

          # Ruff exports SARIF for GitHub Advanced Security tab
          ruff check . --output-format=sarif -o ruff.sarif --exclude external_repos --exclude external_sdks --exclude third_party || true

      - name: "4. Upload Ruff SARIF to GitHub Security"
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ruff.sarif
          category: ruff-lint

  # ─────────────────────────────────────────────────────
  # JOB 3: Necromancy Gate (Dead Code + Types)
  # ─────────────────────────────────────────────────────
  necromancy-and-types:
    name: "\U0001F480 Zombie Code & Type Gates"
    runs-on: ubuntu-latest
    needs: self-healing-and-sarif
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Toolchains
        run: |
          npm install -g knip typescript
          pip install pyright ruff

      - name: "1. Knip (Block Unused JS/TS Exports & Deps)"
        run: |
          cd apps/kovelai/site && npx knip
          cd ../../../apps/shadowtagai/site && npx knip

      - name: "2. Ruff Dead Code (F401/F841 — V22 replaces vulture)"
        run: |
          ruff check apps/ libs/ scripts/ \
            --select F401,F841 \
            --exclude external_repos,external_sdks,third_party,archive,deep-archive,.venv \
            --statistics

      - name: "3. Pyright Type Check"
        run: |
          pyright apps/counselconduit/ apps/aiyou_stack/aiyou-fastapi-services/apps/ || true

  # ─────────────────────────────────────────────────────
  # JOB 4: CodeQL Semantic Analysis
  # ─────────────────────────────────────────────────────
  codeql-semantic-analysis:
    name: "\U0001F9E0 Semantic CodeQL Analysis"
    runs-on: ubuntu-latest
    needs: self-healing-and-sarif
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "python, javascript-typescript"
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python,javascript-typescript"

  # ─────────────────────────────────────────────────────
  # JOB 5: Lighthouse CI Budget Assertions
  # ─────────────────────────────────────────────────────
  lighthouse-ci:
    name: "\U0001F4A1 Lighthouse Performance Budget"
    runs-on: ubuntu-latest
    needs: self-healing-and-sarif
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@latest

      - name: Run Lighthouse CI
        run: |
          lhci autorun || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ─────────────────────────────────────────────────────
  # JOB 6: Debt Metrics (noqa counter)
  # ─────────────────────────────────────────────────────
  debt-metrics:
    name: "\U0001F4CA Debt Metrics"
    runs-on: ubuntu-latest
    needs: self-healing-and-sarif
    steps:
      - uses: actions/checkout@v4

      - name: "Count noqa directives (debt metric)"
        run: |
          echo "## Tech Debt Metrics" >> $GITHUB_STEP_SUMMARY
          NOQA_COUNT=$(grep -rn "# noqa" --include="*.py" apps/ libs/ scripts/ | wc -l || echo 0)
          NOSEC_COUNT=$(grep -rn "# nosec" --include="*.py" apps/ libs/ scripts/ | wc -l || echo 0)
          TYPE_IGNORE=$(grep -rn "# type: ignore" --include="*.py" apps/ libs/ scripts/ | wc -l || echo 0)
          echo "| Directive | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| noqa | $NOQA_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| nosec | $NOSEC_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| type: ignore | $TYPE_IGNORE |" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "Total noqa: $NOQA_COUNT"
          echo "Total nosec: $NOSEC_COUNT"
          echo "Total type-ignore: $TYPE_IGNORE"

  # ─────────────────────────────────────────────────────
  # JOB 7: .NET 11.0 Build Validation (Semantic Kernel)
  # ─────────────────────────────────────────────────────
  dotnet-build:
    name: "🔧 .NET 11.0 Build Gate"
    runs-on: ubuntu-latest
    needs: self-healing-and-sarif
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 11.0 Preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "11.0.x"
          include-prerelease: true

      - name: "Build All C# Projects"
        run: |
          echo "::group::AiYou.Kernel"
          dotnet build apps/aiyou_stack/aiyou-fastapi-services/apps/aiyou-kernel/AiYou.Kernel.csproj --configuration Release --no-restore || dotnet restore apps/aiyou_stack/aiyou-fastapi-services/apps/aiyou-kernel/AiYou.Kernel.csproj && dotnet build apps/aiyou_stack/aiyou-fastapi-services/apps/aiyou-kernel/AiYou.Kernel.csproj --configuration Release
          echo "::endgroup::"

          echo "::group::SemanticKernel"
          dotnet build apps/agent-starter-pack/shadowtag-agent/src/SemanticKernel/SemanticKernel.csproj --configuration Release
          echo "::endgroup::"

          echo "::group::SeatJudge"
          dotnet build apps/aiyou_stack/aiyou-fastapi-services/apps/seatjudge-mcp/SeatJudge.Inventory.Mcp.csproj --configuration Release
          echo "::endgroup::"

          echo "::group::Explore"
          dotnet build apps/aiyou_stack/aiyou-fastapi-services/apps/api-explorer/Explore.csproj --configuration Release
          echo "::endgroup::"

      - name: "Report Build Summary"
        if: always()
        run: |
          echo "## .NET 11.0 Build Results" >> $GITHUB_STEP_SUMMARY
          echo "| Project | TFM |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| AiYou.Kernel | net11.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| SemanticKernel | net11.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| SeatJudge.Inventory.Mcp | net11.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| Explore | net11.0 |" >> $GITHUB_STEP_SUMMARY
