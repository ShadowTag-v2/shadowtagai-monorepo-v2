name: Cursor Code Review (Blocking)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

env:
  BLOCKING_REVIEW: 'true'  # Set to 'false' to make non-blocking

jobs:
  cursor-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate PR diff
        id: diff
        run: |
          mkdir -p .ci

          # Get PR diff
          gh pr diff ${{ github.event.pull_request.number }} > .ci/pr.diff || {
            git fetch origin main
            git diff origin/main...HEAD > .ci/pr.diff
          }

          # Get PR metadata
          gh pr view ${{ github.event.pull_request.number }} --json title,body,author \
            > .ci/pr-metadata.json || echo '{}' > .ci/pr-metadata.json

          DIFF_SIZE=$(wc -l < .ci/pr.diff)
          echo "diff_lines=${DIFF_SIZE}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create review prompt
        run: |
          cat > .ci/review-prompt.txt <<'EOF'
          You are a code reviewer for a safety-critical SaaS platform.

          Review the following pull request and identify:
          - 🚨 **Critical issues**: Security vulnerabilities, data loss risks, auth bypasses
          - 🔒 **Security concerns**: PII leakage, injection risks, weak crypto
          - ⚠️ **Logic errors**: Race conditions, edge case bugs, incorrect algorithms
          - ⚡ **Performance issues**: N+1 queries, memory leaks, inefficient loops

          Focus on high-impact issues only. Limit to max 10 comments.

          For each issue, provide:
          1. Severity emoji (🚨/🔒/⚠️/⚡)
          2. File:line reference
          3. Brief description
          4. Suggested fix (if applicable)

          After review, output exactly one line:
          RESULT_CRITICAL=<true|false>

          where 'true' means at least one 🚨 or 🔒 issue was found.
          EOF

      - name: Simulate Cursor agent review
        id: review
        run: |
          # PLACEHOLDER: In production, call Cursor CLI or API here
          # For now, perform basic static analysis as a demo

          mkdir -p .ci

          # Example: grep for common security anti-patterns
          CRITICAL_FOUND=false

          # Check for hardcoded secrets (simple regex)
          if grep -r -E "(password|secret|api_key|token)\s*=\s*['\"][^'\"]+['\"]" . \
             --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.ci \
             > .ci/secret-scan.txt 2>/dev/null; then
            echo "🔒 Potential hardcoded secrets detected" | tee -a .ci/review-comments.txt
            CRITICAL_FOUND=true
          fi

          # Check for SQL concatenation (injection risk)
          if grep -r -E "execute\(.*\+.*\)" . \
             --include="*.py" --exclude-dir=node_modules --exclude-dir=.git \
             > .ci/sql-injection-scan.txt 2>/dev/null; then
            echo "🚨 Potential SQL injection via string concatenation" | tee -a .ci/review-comments.txt
            CRITICAL_FOUND=true
          fi

          # Check for eval() usage
          if grep -r -E "\beval\(" . \
             --include="*.py" --include="*.js" --exclude-dir=node_modules --exclude-dir=.git \
             > .ci/eval-scan.txt 2>/dev/null; then
            echo "🚨 Use of eval() detected (code injection risk)" | tee -a .ci/review-comments.txt
            CRITICAL_FOUND=true
          fi

          # Output result
          echo "RESULT_CRITICAL=${CRITICAL_FOUND}" | tee .ci/review-result.txt
          echo "critical_found=${CRITICAL_FOUND}" >> $GITHUB_OUTPUT

          # Create review summary
          if [ -f .ci/review-comments.txt ]; then
            cat > .ci/review-summary.md <<EOF
          # 🤖 Cursor Code Review Results

          **PR**: #${{ github.event.pull_request.number }}
          **Diff size**: ${{ steps.diff.outputs.diff_lines }} lines

          ## Issues Found

          $(cat .ci/review-comments.txt)

          ## Recommendation

          $(if [ "${CRITICAL_FOUND}" = "true" ]; then
            echo "❌ **Blocking issues found** - please address before merging"
          else
            echo "✅ **No critical issues detected**"
          fi)

          ---
          _Note: This is a placeholder implementation. Integrate Cursor CLI for production._
          EOF
          else
            cat > .ci/review-summary.md <<EOF
          # 🤖 Cursor Code Review Results

          **PR**: #${{ github.event.pull_request.number }}
          **Diff size**: ${{ steps.diff.outputs.diff_lines }} lines

          ✅ **No issues detected** by automated review.

          ---
          _Note: This is a placeholder implementation. Integrate Cursor CLI for production._
          EOF
          fi

      - name: Comment review on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('.ci/review-summary.md', 'utf8');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Check blocking review gate
        if: env.BLOCKING_REVIEW == 'true'
        run: |
          CRITICAL=${{ steps.review.outputs.critical_found }}

          echo "Blocking review mode: ${BLOCKING_REVIEW}"
          echo "Critical issues found: ${CRITICAL}"

          if [ "${CRITICAL}" = "true" ]; then
            echo "❌ Critical issues detected - failing workflow"
            exit 1
          else
            echo "✅ No blocking issues"
          fi

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cursor-review-${{ github.event.pull_request.number }}
          path: |
            .ci/review-summary.md
            .ci/review-comments.txt
            .ci/pr.diff
          retention-days: 30

      - name: Update step summary
        if: always()
        run: |
          cat .ci/review-summary.md >> $GITHUB_STEP_SUMMARY
