name: Autolint — Continuous Self-Healing
# CI-side equivalent of the proposed gca_autolint_daemon.py
# Runs ruff + biome on push, auto-commits fixes back to the branch

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**.json'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  autolint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.GH_APP_ID }}
          application_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          revoke_token: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.ref }}
          # Need full history to push back
          fetch-depth: 0

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install linters
        run: |
          pip install ruff vulture
          npm install -g @biomejs/biome @ast-grep/cli

      - name: Run ruff check --fix
        run: ruff check --fix .
        continue-on-error: true

      - name: Run ruff format
        run: ruff format .
        continue-on-error: true

      - name: Run biome check --write
        run: |
          biome check --write --unsafe \
            --files-ignore-unknown=true \
            --no-errors-on-unmatched .
        continue-on-error: true

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push fixes
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "ShadowTag GCA Bot"
          git config user.email "gca-bot@shadowtagai.ai"
          git add -A
          git commit -m "chore(ast): autonomous AST optimization via GCA [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
