name: Dependabot Auto-Merge

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write


concurrency:
  group: dependabot-automerge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependabot-automerge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor == 'dependabot[bot]'

    steps:
      # GitHub App short-lived token enables downstream workflow triggers
      # that secrets.GITHUB_TOKEN cannot do by design.
      - name: Generate Short-Lived Token
        id: get_app_token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.GH_APP_ID }}
          application_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          organization: ShadowTag-v2
          permissions: "contents:write,pull_requests:write,statuses:write"
          revoke_token: true

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ steps.get_app_token.outputs.token }}"

      - name: Auto-approve patch and minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.get_app_token.outputs.token }}

      - name: Enable auto-merge for patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.get_app_token.outputs.token }}

      - name: Enable auto-merge for minor updates (non-breaking)
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-minor' &&
          !contains(steps.metadata.outputs.dependency-names, 'hardhat') &&
          !contains(steps.metadata.outputs.dependency-names, 'ethers') &&
          !contains(steps.metadata.outputs.dependency-names, 'solc')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.get_app_token.outputs.token }}

      - name: Comment on major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body "⚠️ **Major version update** - requires manual review.

          This is a breaking change update that needs manual verification before merging.

          **Package**: ${{ steps.metadata.outputs.dependency-names }}
          **Update type**: ${{ steps.metadata.outputs.update-type }}

          Please review the changelog and test before approving."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.get_app_token.outputs.token }}
