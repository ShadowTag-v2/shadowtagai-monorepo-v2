name: Claude Code — Interactive + Auto Review

on:
  # Interactive mode: respond to @claude mentions in issues/PRs
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

  # Automation mode: auto-review on PR open/sync
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/workflows/**"
      - "*.json"
      - "*.yaml"
      - "*.yml"

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # ── Interactive Mode: @claude mentions ──────────────────────────────────
  interactive:
    name: "Claude Interactive"
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude') &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Auth via GCP Vertex AI (OIDC) — our GCP-native path
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Generate GitHub App token for enhanced permissions
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SHADOWTAG_APP_ID }}
          private-key: ${{ secrets.SHADOWTAG_APP_PEM }}

      - uses: anthropics/claude-code-action@v1
        with:
          use_vertex: "true"
          github_token: ${{ steps.app-token.outputs.token }}
          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 25
            --allowedTools "Read,Edit,Write,Bash(git:*),Bash(gh:*),mcp__github_inline_comment__create_inline_comment"

  # ── Automated PR Review ─────────────────────────────────────────────────
  auto-review:
    name: "Claude Auto Review"
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SHADOWTAG_APP_ID }}
          private-key: ${{ secrets.SHADOWTAG_APP_PEM }}

      - uses: anthropics/claude-code-action@v1
        with:
          use_vertex: "true"
          github_token: ${{ steps.app-token.outputs.token }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            AUTHOR: ${{ github.event.pull_request.user.login }}
            BASE: ${{ github.base_ref }}
            HEAD: ${{ github.head_ref }}

            You are reviewing a PR in the ShadowTag AI monorepo.
            The PR branch is already checked out.

            ## Review Checklist

            ### Security (Cor.30 Compliance)
            - [ ] No hardcoded secrets, API keys, or credentials
            - [ ] Input validation via Pydantic/Zod on all endpoints
            - [ ] Server-side authz checks present
            - [ ] No raw DB objects in responses (DTO serialization required)
            - [ ] No secrets/PII in logs

            ### Architecture (AGENTS.md Compliance)
            - [ ] No circular dependencies
            - [ ] Single source of truth preserved
            - [ ] No duplicate logic (check existing utilities first)
            - [ ] Files under 400 lines
            - [ ] Functions do exactly one thing

            ### Code Quality
            - [ ] Conventional commit messages
            - [ ] Test coverage for new functions
            - [ ] Error handling with RFC 9457 structured responses
            - [ ] Loading + error states for async UI operations

            ### Monorepo Guardrails
            - [ ] No second source of truth for MCP
            - [ ] No real secrets committed
            - [ ] No live repo marked archived
            - [ ] Root truth fixed first, tooling second, runtime third

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for specific code issues.
            Only post GitHub comments — don't submit review text as messages.

            Rate severity: 🔴 Critical | 🟡 Nit | 🟣 Pre-existing.

          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 15
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read"
