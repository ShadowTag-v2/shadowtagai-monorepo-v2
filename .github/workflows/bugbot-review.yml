name: BugBot PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  bugbot:
    name: Static Analysis
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install analysis tools
        run: |
          pip install pylint mypy bandit radon

      - name: Run BugBot
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python scripts/bugbot_hook.py origin/${{ github.base_ref }}...HEAD

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bugbot-results
          path: |
            bugbot_results.json
            bugbot_comment.md

      - name: Post PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('bugbot_comment.md')) {
              const body = fs.readFileSync('bugbot_comment.md', 'utf8');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
