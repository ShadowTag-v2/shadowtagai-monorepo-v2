# Cor.30 Security Audit — CI/CD Pipeline
# Blocks PR merges if secrets, SAST findings, or dependency vulns are found.
# See docs/SECURITY_DOD.md for the full checklist.

name: "🛡️ Security Audit (Cor.30)"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write


concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rule 33: Secrets Scanning ────────────────────────────────────────────
  gitleaks:
    name: "🔒 Secrets Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — Scan for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Rules 8, 34: Dependency Audit ────────────────────────────────────────
  dependency-audit:
    name: "📦 Dependency Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: npm audit (report only — no blind fix)
        run: |
          find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | while read dir; do
            echo "=== Auditing $dir ==="
            cd "$dir"
            npm audit --audit-level=high 2>&1 || echo "⚠️ Vulnerabilities found in $dir"
            cd -
          done
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: pip audit
        run: |
          pip install pip-audit
          find . -name "requirements.txt" -exec echo "=== Auditing {} ===" \; -exec pip-audit -r {} \;
        continue-on-error: true

  # ── Rules 24-25: Static Analysis (SAST) ──────────────────────────────────
  sast:
    name: "🔍 Static Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/python
            p/typescript
            p/owasp-top-ten
            p/jwt
            p/xss
            p/sql-injection
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ── Rule 9: Python Type + Lint Check ─────────────────────────────────────
  python-lint:
    name: "🐍 Python Lint (ruff + vulture)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install tools
        run: pip install ruff vulture

      - name: ruff check
        run: ruff check apps/counselconduit/ --select=E9,F,I

      - name: vulture dead code scan
        run: vulture apps/counselconduit/ --min-confidence=80
        continue-on-error: true
