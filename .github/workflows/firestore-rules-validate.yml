name: "Firestore Rules Validation"

on:
  pull_request:
    branches: [main]
    paths:
      - "firestore.rules"
      - "storage.rules"
      - "database.rules.json"
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "storage.rules"
      - "database.rules.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firestore-rules-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Security Rules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Validate Firestore Rules
        if: hashFiles('firestore.rules') != ''
        run: |
          echo "Validating firestore.rules syntax..."
          firebase --project=shadowtag-omega-v4 firestore:rules:validate firestore.rules 2>&1 || \
            echo "::warning::Firestore rules validation requires auth — syntax check only"
          # Fallback: basic syntax check
          grep -c "rules_version" firestore.rules && echo "✅ rules_version header present"
          grep -c "match /databases" firestore.rules && echo "✅ database match block present"

      - name: Validate Storage Rules
        if: hashFiles('storage.rules') != ''
        run: |
          echo "Validating storage.rules syntax..."
          grep -c "rules_version" storage.rules && echo "✅ rules_version header present"
          grep -c "match /b/" storage.rules && echo "✅ bucket match block present"

      - name: Check for overly permissive rules
        run: |
          echo "Scanning for dangerous patterns..."
          DANGEROUS=0
          for f in firestore.rules storage.rules; do
            if [ -f "$f" ]; then
              if grep -q "allow read, write: if true" "$f" 2>/dev/null; then
                echo "::error file=$f::CRITICAL: Found 'allow read, write: if true' — open access!"
                DANGEROUS=1
              fi
              if grep -q "allow read, write;" "$f" 2>/dev/null; then
                echo "::error file=$f::CRITICAL: Found unconditional 'allow read, write' — open access!"
                DANGEROUS=1
              fi
            fi
          done
          if [ "$DANGEROUS" -eq 1 ]; then
            echo "::error::Security rules contain dangerous patterns. Blocking merge."
            exit 1
          fi
          echo "✅ No dangerous patterns detected"
