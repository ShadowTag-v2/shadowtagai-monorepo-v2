# Pomelli Swarm — Continuous Fleet Optimization (V25 Pinnacle)
# Runs Lighthouse audits across HeadFade, CounselConduit, KovelAI on schedule
# and on-demand via workflow_dispatch.

name: Pomelli Swarm Audit

on:
  schedule:
    - cron: '0 6 * * 1,4' # Mon + Thu at 06:00 UTC
  workflow_dispatch:
    inputs:
      target_site:
        description: 'Site to audit (all, headfade, counselconduit, kovelai)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - headfade
          - counselconduit
          - kovelai

permissions:
  contents: read
  id-token: write

env:
  GOOGLE_CLOUD_PROJECT: shadowtag-omega-v4

jobs:
  audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        site:
          - name: headfade
            url: https://headfade.com
          - name: counselconduit
            url: https://counselconduit-767252945109.us-central1.run.app
          - name: kovelai
            url: https://kovelai.com
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Filter by dispatch target
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_site != 'all'
        run: |
          if [ "${{ matrix.site.name }}" != "${{ github.event.inputs.target_site }}" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Run Lighthouse CI
        if: env.SKIP != 'true'
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ matrix.site.url }}
          budgetPath: .github/lighthouse-budgets.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Enforce P95/A100/BP100/SEO100 budgets
        if: env.SKIP != 'true'
        run: |
          echo "Lighthouse audit complete for ${{ matrix.site.name }}"
          echo "URL: ${{ matrix.site.url }}"
          # Budget enforcement is handled by lighthouse-ci-action budgetPath

      - name: Upload results
        if: env.SKIP != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-${{ matrix.site.name }}
          path: .lighthouseci/
          retention-days: 30
