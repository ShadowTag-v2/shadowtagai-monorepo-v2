name: Deploy Lead Capture Router

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/lead-capture-router/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: ./apps/lead-capture-router
        run: npm ci --legacy-peer-deps
      - name: Setup Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy to Firebase Functions Gen 2
        run: firebase deploy --only functions:captureContact,functions:analyticalWebhook --project shadowtag-omega-v4
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
