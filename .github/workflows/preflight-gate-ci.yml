# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# preflight-gate-ci.yml — Preflight Gate Enforcement in CI
#
# Runs preflight_gate.sh health checks on push to main.
# Enforces: root guard, structural audit, MCP verification,
#           linting (ruff/biome), and betterleaks secret scan.
#
# Risk #85 remediation: preflight_gate.sh was local-only.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Preflight Gate CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    name: 🛫 Preflight Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install tools
        run: |
          pip install --no-cache-dir ruff
          go install github.com/betterleaks/betterleaks@latest

      # Gate 1: Root Guard
      - name: Root Guard Check
        run: |
          if [ -f scripts/pnkln_root_guard.sh ]; then
            bash scripts/pnkln_root_guard.sh
          else
            echo "⚠️ Root guard script not found, skipping"
          fi

      # Gate 2: Structural Audit
      - name: Structural Audit
        run: |
          if [ -f scripts/audit_monorepo_state.sh ]; then
            timeout 30 bash scripts/audit_monorepo_state.sh || echo "⚠️ Audit timed out or failed"
          else
            echo "⚠️ Audit script not found, skipping"
          fi

      # Gate 3: MCP Config Check
      - name: MCP Verification
        run: |
          if [ -f scripts/verify_mcp.sh ]; then
            bash scripts/verify_mcp.sh || echo "⚠️ MCP verification warning"
          else
            echo "⚠️ MCP verification script not found, skipping"
          fi

      # Gate 4: Ruff Lint
      - name: Python Lint (Ruff)
        run: |
          ruff check apps/counselconduit --output-format=github || true
          ruff check apps/ShadowTag-v2_stack --output-format=github || true

      # Gate 5: Betterleaks Secret Scan
      - name: Betterleaks Secret Scan
        run: |
          ~/go/bin/betterleaks dir --no-git --path . --config .betterleaks.toml --redact

      # Gate 6: Repo Doctor
      - name: Repo Doctor Health Check
        run: |
          if [ -f scripts/repo_doctor.py ]; then
            python3 scripts/repo_doctor.py || echo "⚠️ Repo doctor warning"
          else
            echo "⚠️ Repo doctor not found, skipping"
          fi
