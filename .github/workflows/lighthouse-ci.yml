name: Lighthouse CI
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'product-pitch-site/**'
      - 'apps/kovelai/**'
      - 'apps/shadowtagai/**'
  pull_request:
    branches: [main]
    paths:
      - 'product-pitch-site/**'
      - 'apps/kovelai/**'
      - 'apps/shadowtagai/**'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: product-pitch-site/package-lock.json

      - name: Install & Build
        working-directory: product-pitch-site
        run: |
          npm ci
          npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: product-pitch-site/.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
