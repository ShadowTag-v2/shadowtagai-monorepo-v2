name: WebPageTest CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/kovelai/**'
      - 'apps/shadowtagai/**'
  workflow_dispatch:

jobs:
  webpagetest:
    name: WebPageTest Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site:
          - url: https://kovelai.web.app
            label: KovelAI
          - url: https://shadowtagai.web.app
            label: ShadowTagAI
    steps:
      - uses: actions/checkout@v4

      - name: Run WebPageTest
        id: wpt
        uses: ArcticLight/wpt-action@v1
        with:
          url: ${{ matrix.site.url }}
          label: "${{ matrix.site.label }} - ${{ github.sha }}"
          location: "Dulles:Chrome"
          connectivity: "Cable"
        continue-on-error: true

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: wpt-${{ matrix.site.label }}
          message: |
            ## 🌐 WebPageTest — ${{ matrix.site.label }}
            
            | Metric | Value |
            |--------|-------|
            | URL | ${{ matrix.site.url }} |
            | Test ID | ${{ steps.wpt.outputs.testId }} |
            | Summary | ${{ steps.wpt.outputs.summaryUrl }} |
            
            [Full Results →](${{ steps.wpt.outputs.summaryUrl }})
