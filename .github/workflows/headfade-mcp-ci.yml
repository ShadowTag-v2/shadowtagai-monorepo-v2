name: HeadFade MCP CI/CD

on:
  push:
    branches: [main, feat/headfade-mcp-launch]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: antigravity-core/mcp/package-lock.json

      - name: Install dependencies
        working-directory: antigravity-core/mcp
        run: npm ci

      - name: TypeScript Build
        working-directory: antigravity-core/mcp
        run: npm run build

      - name: Run tests
        working-directory: antigravity-core/mcp
        run: npm test || echo "No tests configured yet"

      - name: Security Audit
        working-directory: antigravity-core/mcp
        run: npm audit --audit-level=moderate

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Cloud Run
        run: |
          echo "Deploying HeadFade MCP to Cloud Run..."
          # Add actual gcloud deploy command here
```