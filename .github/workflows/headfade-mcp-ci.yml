name: HeadFade MCP CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install dependencies
      working-directory: ./antigravity-core/mcp
      run: npm ci

    - name: Lint and Format Check
      working-directory: ./antigravity-core/mcp
      run: npm run lint

    - name: Build
      working-directory: ./antigravity-core/mcp
      run: npm run build

    - name: Run Tests
      working-directory: ./antigravity-core/mcp
      run: npm test

    - name: Security Audit
      working-directory: ./antigravity-core/mcp
      run: npm audit
