name: slurm-orchestrator
on:
  schedule:
    - cron: '21 3 * * *'
  workflow_dispatch: {}
jobs:
  run:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PowerShell 7
        uses: PowerShell/PowerShell@v1
        with:
          version: '7.4.x'
      - name: Run connectors
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./ops/slurm-orchestrator.ps1 -Owner $env:GITHUB_REPOSITORY_OWNER -Repo $env:GITHUB_REPOSITORY.Split('/')[1]
      - name: Comment summary on latest PR (if any)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $prs = gh pr list --state open --json number --limit 1 | ConvertFrom-Json
          if ($prs.Count -gt 0) {
            $n = $prs[0].number
            $health = Get-Content .\.slurm\out\github_health.json -Raw
            gh pr comment $n --body "slurm-orchestrator summary:\n\n
\`\`\`json\n$health\n\`\`\`"
          } else { Write-Host "No open PRs to comment." }

