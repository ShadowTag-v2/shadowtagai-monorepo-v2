name: Daily Memory Sync

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger


concurrency:
  group: daily_sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  extract_and_sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      # GitHub App token for push operations and release creation.
      # GITHUB_TOKEN push events don't trigger downstream workflows.
      - name: Generate Short-Lived Token
        id: get_app_token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.GH_APP_ID }}
          application_private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          organization: ShadowTag-v2
          permissions: "contents:write"
          revoke_token: true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.get_app_token.outputs.token }}
          fetch-depth: 0  # Full history for proper versioning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai google-cloud-storage

      - name: Configure Git
        run: |
          git config user.name "antigravity-shadowtag-manager[bot]"
          git config user.email "3018200+antigravity-shadowtag-manager[bot]@users.noreply.github.com"

      - name: Run extraction
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python scripts/extract_and_commit.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git push origin main --tags
        env:
          GITHUB_TOKEN: ${{ steps.get_app_token.outputs.token }}

      - name: Create release
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ steps.get_app_token.outputs.token }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Memory Update ${{ github.ref }}
          body: |
            Automated daily memory sync
            - Extracted conversations from Cursor/Claude/Codex
            - Updated ShadowTagAIAi architecture context
            - Refreshed JR framework and bootstrap gates
          draft: false
          prerelease: false
