name: Deploy CounselConduit
on:
  push:
    branches: [main]
    paths: ['apps/counselconduit/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  PROJECT_ID: shadowtag-omega-v4
  REGION: us-central1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install Dependencies
        run: pip install -r apps/counselconduit/requirements.txt pytest httpx
      - name: Run Regression Tests
        run: |
          CC_STAGING_URL="https://counselconduit-staging-767252945109.us-central1.run.app" \
            python -m pytest apps/counselconduit/tests/test_regression.py -v

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.environment == 'staging'
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: counselconduit-staging
          source: apps/counselconduit
          region: ${{ env.REGION }}

  deploy-production:
    needs: [test, deploy-staging]
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}
      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: counselconduit
          source: apps/counselconduit
          region: ${{ env.REGION }}
          flags: '--no-traffic --tag=canary'
      - name: Canary Health Check
        run: |
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /tmp/readyz_body -w "%{http_code}" \
              "https://canary---counselconduit-6byqzjbd7a-uc.a.run.app/readyz")
            BODY=$(cat /tmp/readyz_body)
            echo "Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q '"healthy"'; then
              echo "✅ Canary verified: $BODY"
              exit 0
            fi
            sleep 5
          done
          echo "❌ Canary health check failed after 60s"
          exit 1
      - name: Promote Canary
        run: |
          gcloud run services update-traffic counselconduit \
            --project=${{ env.PROJECT_ID }} --region=${{ env.REGION }} \
            --to-latest --quiet
