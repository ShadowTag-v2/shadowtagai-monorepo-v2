name: GCA Autolint v9 — Self-Healing AST Pipeline

# V9: Integrated with omni-autolint.yml for comprehensive coverage.
# This workflow handles PR-level incremental linting (fast path).
# omni-autolint.yml handles nightly full-sweep (slow path).

on:
  pull_request:
    paths:
      - '**.py'
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'

concurrency:
  group: "gca-autolint-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: write
  security-events: write

jobs:
  incremental-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # ---- Python: Ruff (lint + format + dead code) ----
      - name: Ruff Lint + Fix
        uses: astral-sh/ruff-action@v3
        with:
          args: check --fix
        continue-on-error: true

      - name: Ruff Format
        run: uv run ruff format .
        continue-on-error: true

      - name: Ruff Dead Code Scan (F401/F841)
        id: dead-code
        run: |
          uv run ruff check --select F401,F841 . \
            --exclude "external_repos,node_modules,.venv,target" \
            --output-format=json > /tmp/dead-code.json 2>&1 || true
          COUNT=$(python3 -c "import json; d=json.load(open('/tmp/dead-code.json')); print(len(d))" 2>/dev/null || echo "0")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "🔍 Dead code findings: $COUNT"

      # ---- TypeScript/JS: Biome ----
      - name: Biome Check + Fix
        run: npx @biomejs/biome check --write . || true

      # ---- SARIF Upload for GitHub Security Tab ----
      - name: Generate SARIF Report
        run: uv run ruff check . --output-format=sarif -o ruff.sarif || true

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ruff.sarif
          category: gca-autolint-v9
        continue-on-error: true

      # ---- Auto-commit fixes ----
      - name: Check for Changes
        id: git-check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-commit Fixes
        if: steps.git-check.outputs.changes == 'true' && github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(lint): GCA v9 auto-heal [skip ci]"
          commit_options: "--no-verify"
