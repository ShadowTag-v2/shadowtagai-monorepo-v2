name: Omni-Autolint Secure Pipeline

on:
  schedule:
    - cron: '0 3 * * *' # Run daily at 3 AM UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  omni-autolint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate Short-Lived GitHub App Token
        id: generate-token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.APP_ID }}
          application_private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Ruff — https://github.com/astral-sh/ruff
      # Pre-commit: https://github.com/astral-sh/ruff-pre-commit
      # VSCode: https://github.com/astral-sh/ruff-vscode
      - name: Ruff Lint Check (via astral-sh/ruff GitHub Action)
        uses: astral-sh/ruff-action@v3
        with:
          args: check --fix --output-format=json
        continue-on-error: true  # We fix and commit, not block

      - name: Run Ruff (check + format + statistics)
        id: ruff
        run: |
          uv run ruff check --fix --output-format=json . > /tmp/ruff-check.json 2>&1 || true
          uv run ruff check --fix .
          RUFF_CHECK_EXIT=$?
          if [ $RUFF_CHECK_EXIT -gt 1 ]; then
            echo "::error::Ruff check crashed with exit code $RUFF_CHECK_EXIT"
            exit $RUFF_CHECK_EXIT
          fi

          # Item 8: Statistics for PR body
          uv run ruff check --statistics . > /tmp/ruff-stats.txt 2>&1 || true
          echo "ruff_stats<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/ruff-stats.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          uv run ruff format .
          RUFF_FMT_EXIT=$?
          if [ $RUFF_FMT_EXIT -gt 1 ]; then
            echo "::error::Ruff format crashed with exit code $RUFF_FMT_EXIT"
            exit $RUFF_FMT_EXIT
          fi

      - name: Ruff dead-code pass (V22 — replaces vulture)
        id: ruff-dead-code
        continue-on-error: true
        run: |
          uv run ruff check --select F401,F841 . \
            --exclude "external_repos,node_modules,.venv" \
            | tee /tmp/ruff-dead-code-output.txt
          echo "dead_code_findings=$(wc -l < /tmp/ruff-dead-code-output.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Run Biome (check + fix)
        id: biome
        run: |
          npx @biomejs/biome check --write .
          BIOME_EXIT=$?
          if [ $BIOME_EXIT -gt 1 ]; then
            echo "::error::Biome crashed with exit code $BIOME_EXIT"
            exit $BIOME_EXIT
          fi

      - name: Check for AST Modifications
        id: git-check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "diff_stat<<EOF" >> "$GITHUB_OUTPUT"
            git diff --stat >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Gitleaks Secret Scan
        if: steps.git-check.outputs.changes == 'true'
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --no-git --path .
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Commit, Push Branch & Open PR
        if: steps.git-check.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          BRANCH_NAME="chore/omni-autolint-$(date +%s)"

          # Configure Git user (GitHub App noreply)
          git config user.name "Omni-Autolint Bot[bot]"
          git config user.email "3018200+shadowtag-bot[bot]@users.noreply.github.com"

          # Create branch and commit
          git checkout -b "$BRANCH_NAME"
          git add .
          git commit -m "chore(ast): autonomous AST optimization via GCA"

          # Push securely using the short-lived token
          git push origin "$BRANCH_NAME"

          # Build PR body with ruff dead-code findings (V22 Pruned — vulture removed)
          DEAD_CODE_COUNT="${{ steps.ruff-dead-code.outputs.dead_code_findings }}"
          PR_BODY="## 🤖 Autonomous AST Optimization

          **Generated by:** Omni-Autolint Secure Pipeline (V22 Pruned)
          **Linters:** ruff check + format + dead-code (F401/F841), biome

          ### Diff Stats
          \`\`\`
          ${{ steps.git-check.outputs.diff_stat }}
          \`\`\`

          ### Ruff Dead Code Findings (F401/F841)
          <details>
          <summary>${DEAD_CODE_COUNT:-0} dead code items detected</summary>

          \`\`\`
          $(cat /tmp/ruff-dead-code-output.txt 2>/dev/null || echo 'No findings')
          \`\`\`
          </details>

          ---
          *Gitleaks scan passed. No secrets detected in lint fixes.*"

          gh pr create \
            --title "🤖 AST Auto-Heal: Omni-Linter Corrections" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH_NAME" \
            --label "autolint,auto-merge"

          # Enable auto-merge if branch protection allows
          gh pr merge "$BRANCH_NAME" --auto --squash || true
