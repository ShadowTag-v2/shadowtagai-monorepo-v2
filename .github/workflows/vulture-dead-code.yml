# Vulture dead code CI gate
# Runs on every PR and push to main for Python directories
# Items 3, 5, 6, 8: Validated YAML, kovelai+CC blocking, pinned vulture

name: Vulture Dead Code Scan

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/**/*.py', 'apps/kovelai/**/*.py', 'apps/counselconduit/**/*.py']
  pull_request:
    branches: [main]
    paths: ['scripts/**/*.py', 'apps/kovelai/**/*.py', 'apps/counselconduit/**/*.py']

permissions:
  contents: read

jobs:
  vulture:
    runs-on: ubuntu-latest
    name: Dead Code Detection
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: scripts
            whitelist: scripts/vulture_whitelist.py
            blocking: true
          - target: apps/kovelai/api
            whitelist: apps/kovelai/api/vulture_whitelist.py
            blocking: true
          - target: apps/counselconduit
            whitelist: ""
            blocking: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install vulture
        run: pip install 'vulture>=2.14'

      - name: Run vulture (${{ matrix.target }})
        run: |
          WHITELIST="${{ matrix.whitelist }}"
          ARGS="${{ matrix.target }}"
          if [ -n "$WHITELIST" ] && [ -f "$WHITELIST" ]; then
            ARGS="$ARGS $WHITELIST"
          fi
          python -m vulture $ARGS \
            --min-confidence 90 \
            --exclude "venv,node_modules,.git,.next,__pycache__,migrations,alembic"
