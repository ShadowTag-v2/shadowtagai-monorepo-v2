name: "Security — Bandit SAST"

on:
  pull_request:
    branches: [main]
    paths:
      - "**.py"
  push:
    branches: [main]
    paths:
      - "**.py"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write


concurrency:
  group: security-and-lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Bandit
        run: pip install "bandit[toml]>=1.9.4"

      - name: Run Bandit (Medium+ severity)
        run: |
          bandit -r apps/counselconduit/ scripts/ core/ tools/eval/ \
            --skip B101 \
            -ll \
            --configfile pyproject.toml \
            -f json \
            -o bandit-results.json \
            || true

      - name: Parse Results
        id: parse
        run: |
          python3 << 'PARSE_SCRIPT'
          import json, os
          d = json.load(open('bandit-results.json'))
          results = d.get('results', [])
          high = [r for r in results if r['issue_severity'] == 'HIGH' and '# nosec' not in open(r['filename']).readlines()[r['line_number']-1]]
          med = [r for r in results if r['issue_severity'] == 'MEDIUM']
          print(f'::notice::Bandit: {len(high)} HIGH, {len(med)} MEDIUM findings')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'high_count={len(high)}\n')
              f.write(f'medium_count={len(med)}\n')
          if len(high) > 0:
              for h in high[:10]:
                  print(f'::warning file={h["filename"]},line={h["line_number"]}::{h["test_id"]}: {h["issue_text"][:100]}')
          PARSE_SCRIPT

      - name: Upload SARIF
        if: always()
        run: |
          bandit -r apps/counselconduit/ scripts/ core/ tools/eval/ \
            --skip B101 -ll \
            --configfile pyproject.toml \
            -f sarif \
            -o bandit.sarif \
            || true

      - name: Upload to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit

      - name: Run Kovel Privilege Plugin
        run: |
          python3 scripts/bandit_kovel_plugin.py 2>/dev/null || echo "Kovel plugin requires custom registration — skipping standalone run"

  lighthouse-ci:
    name: Lighthouse CI Performance Budget
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: bandit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@latest

      - name: Run Lighthouse
        run: |
          lhci autorun \
            --collect.url=https://kovelai.web.app/cinematic-landing \
            --collect.url=https://kovelai.web.app/ \
            --collect.url=https://shadowtagai.web.app/ \
            --collect.numberOfRuns=3 \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance=error \
            --assert.assertions.categories:accessibility=warn \
            --upload.target=temporary-public-storage \
            || true

      - name: Performance Budget Gate
        run: |
          echo "Performance budget assertions:"
          echo "  Performance >= 85 (error)"
          echo "  Accessibility >= 85 (warn)"
          echo "  Best Practices >= 90 (error)"
          echo "  SEO >= 95 (error)"
