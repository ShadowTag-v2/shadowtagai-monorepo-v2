name: "Code Quality Gate — Ruff + Biome"

on:
  pull_request:
    branches: [main]
    paths:
      - "**.py"
  push:
    branches: [main]
    paths:
      - "**.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff Lint + Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install "ruff>=0.11.0"

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  ruff-dead-code:
    name: Ruff Dead Code Detection (F401/F841 — V22 replaces vulture)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install "ruff>=0.15.0"

      - name: Run ruff dead code (F401/F841)
        run: |
          ruff check apps/counselconduit/ scripts/ core/ tools/eval/ \
            --select F401,F841 \
            --exclude ".venv,node_modules,__pycache__,reference_architectures" \
            --statistics || true
