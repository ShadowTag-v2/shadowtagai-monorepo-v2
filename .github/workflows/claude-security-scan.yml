name: Claude Security Scan

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "apps/counselconduit/**"
      - "core/**"
      - "infra/**"
      - "scripts/auth_*"
      - "*.py"
      - "*.ts"

permissions:
  contents: read
  pull-requests: write
  security-events: write
  id-token: write

concurrency:
  group: claude-security-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-review:
    name: "Claude Security Review"
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SHADOWTAG_APP_ID }}
          private-key: ${{ secrets.SHADOWTAG_APP_PEM }}

      - uses: anthropics/claude-code-action@v1
        with:
          use_vertex: "true"
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a Cor.30 security audit on this PR.

            ## OWASP LLM Top 10 (2025)
            - LLM01: Prompt Injection — system prompts isolated from user input?
            - LLM02: Sensitive Info Disclosure — PII stripped from context?
            - LLM05: Improper Output — LLM output treated as untrusted?
            - LLM06: Excessive Agency — minimum-permission tool manifests?
            - LLM07: Prompt Leakage — prompts never in responses/logs?
            - LLM10: Unbounded Consumption — token budget + rate limits?

            ## Cor.30 6-Pillar Framework
            1. Identity & Session: Short-lived tokens, MFA, CSRF, redirect allow-lists
            2. Secrets & Supply Chain: No hardcoded keys, pinned deps
            3. API Hardening: Input validation, rate limits, security headers
            4. Storage & Uploads: Tenant isolation, signed URLs, magic-byte validation
            5. Payments & Webhooks: HMAC verification, idempotency keys
            6. Ops & Audit: No PII in logs, token caps, GDPR flow

            Rate severity: 🔴 CRITICAL | 🟡 MEDIUM | 🟢 LOW
            Post findings as inline comments with `confirmed: true`.

          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 15
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Read"
