name: Quality Gate (make check)

on:
  pull_request:
    paths:
      - 'control/pnkln/**'
      - 'scripts/**'
      - 'tests/**'
      - 'Makefile'


concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install ruff vulture pytest numpy

      - name: Lint (ruff check)
        run: python3 -m ruff check control/pnkln/ scripts/

      - name: Format check (ruff format --check)
        run: python3 -m ruff format --check control/pnkln/ scripts/

      - name: Tests (55 expected)
        run: python3 -m pytest tests/ -v --tb=short

      - name: Dead code (vulture)
        run: python3 -m vulture control/pnkln/ scripts/ --min-confidence 90
        continue-on-error: true
