name: Branch Protection Rules

on:
  workflow_dispatch:

# This workflow creates branch protection rules via GitHub API
# Requires GITHUB_APP_JWT secret with admin permissions

jobs:
  protect-branches:
    name: Configure Branch Protection
    runs-on: ubuntu-latest
    steps:
      - name: Protect main branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: 'ShadowTag-v2',
              repo: 'Monorepo-Uphillsnowball',
              branch: 'main',
              required_status_checks: {
                strict: true,
                contexts: ['structural-tests']
              },
              enforce_admins: false,
              required_pull_request_reviews: {
                required_approving_review_count: 0,
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false
              },
              restrictions: null,
              required_linear_history: true,
              allow_force_pushes: false,
              allow_deletions: false,
              required_conversation_resolution: true
            });

            console.log('✅ Branch protection rules applied to main');
