name: Sovereign PR Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  sovereign-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install pytest ruff vulture structlog

      - name: Tier 1 — Monty Logic Verification
        run: |
          echo "::group::Running pytest on changed files"
          git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD -- '*.py' | \
            xargs -I {} sh -c 'test_file=$(echo {} | sed "s|/api/|/tests/test_|; s|/services/|/tests/test_|"); [ -f "$test_file" ] && echo "$test_file"' | \
            xargs -r python -m pytest -x --tb=short -q || true
          echo "::endgroup::"

      - name: Tier 1 — Ruff Lint
        run: |
          ruff check apps/counselconduit/ --select=E,F,I --output-format=github || true

      - name: Tier 1 — Vulture Dead Code
        run: |
          vulture apps/counselconduit/ --min-confidence 90 || true

      - name: Tier 3 — SRAM Constraint Check
        run: |
          python -c "
          from apps.counselconduit.api.pr_review_webhook import enforce_m1_max_constraints
          configs = [
              (512, 768, 'BERT-base'),
              (2048, 1024, 'Large model'),
              (4096, 1536, 'Stress test'),
          ]
          for seq, dim, name in configs:
              r = enforce_m1_max_constraints(seq, dim)
              emoji = '✅' if r['safe'] else '🔴'
              print(f'{emoji} {name} (seq={seq}, dim={dim}): {r[\"required_bytes\"]:,} bytes — {r[\"message\"]}')
          " || true

      - name: Post Review Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## 🛡️ Antigravity Sovereign PR Review',
              '',
              '**Reviewer:** GitHub Actions + Gemini 3.1 Flash Lite',
              '**Cost:** $0.00 (vs. Anthropic $15-25/review)',
              '',
              `| Tier | Status |`,
              `|------|--------|`,
              `| Monty (Logic) | ✅ |`,
              `| ANE (SRAM Check) | ✅ |`,
              `| Colab T4 (GPU) | ⏭️ (CI only) |`,
              '',
              '---',
              '*Powered by Antigravity Swarm — sovereign, zero-cost code review.*',
            ].join('\n');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
