# Dependabot Configuration
# Auto-merge patch/minor bumps, group by ecosystem
# Security updates are enabled separately via GitHub repo settings

version: 2

# Registries for private packages (configure secrets in repo settings)
# registries:
#   npm-registry:
#     type: npm-registry
#     url: https://npm.pkg.github.com
#     token: ${{secrets.NPM_TOKEN}}

updates:
  # Python (pip) — root
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  # Python — CounselConduit
  - package-ecosystem: "pip"
    directory: "/apps/counselconduit"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
      - "counselconduit"
    groups:
      counselconduit-deps:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  # Python — AiYou stack
  - package-ecosystem: "pip"
    directory: "/apps/aiyou_stack/aiyou-fastapi-services"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
      - "aiyou"
    groups:
      aiyou-deps:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 3

  # npm — KovelAI
  - package-ecosystem: "npm"
    directory: "/apps/kovelai"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "javascript"
      - "kovelai"
    groups:
      kovelai-deps:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 3

  # Terraform — IaC Catalog
  - package-ecosystem: "terraform"
    directory: "/terraform/infrastructure-catalog-gcp-cloud-run"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "terraform"
      - "infrastructure"
    groups:
      terraform-providers:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 3

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-deps:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 3
