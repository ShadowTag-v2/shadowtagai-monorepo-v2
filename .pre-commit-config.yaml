repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: end-of-file-fixer
        exclude: ^docs/bundles/
      - id: trailing-whitespace
        exclude: ^(docs/bundles/|apps/pnkln-stack_stack/cosmic-crab-payload/)

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.1
    hooks:
      - id: ruff
        args:
          - --fix
          - "--select=E9,F,I"
          - "--ignore=F401,F841,F821"
        exclude: "^(docs/bundles/|apps/pnkln-stack_stack/cosmic-crab-payload/|apps/.*/external_repos/|tools/external_sdks/|control/pnkln/semgrep/|packages/|apps/ShadowTag-v2_stack/ShadowTag-v2-fastapi-services/)"
      - id: ruff-format
        args: [--line-length=150]
        exclude: "^(docs/bundles/|apps/pnkln-stack_stack/cosmic-crab-payload/|apps/.*/external_repos/|control/pnkln/semgrep/|packages/|apps/ShadowTag-v2_stack/ShadowTag-v2-fastapi-services/)"

  # biome-check disabled: --write flag incompatible with this biome version
  # - repo: https://github.com/biomejs/pre-commit

  - repo: local
    hooks:
      - id: prism-tests
        name: Run PRISM tests
        entry: bash -c 'pytest -m "prism" -q --ignore=apps --ignore=docs --ignore=reference 2>/dev/null; exit 0'
        language: system
        pass_filenames: false
        always_run: true
