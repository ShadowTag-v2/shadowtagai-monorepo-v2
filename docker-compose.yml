# AlloyDB Omni + Redis Local Development Stack
# Replaces legacy Celery/BullMQ architecture with Cloud Tasks-native design.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f alloydb
#
# Architecture:
#   - AlloyDB Omni: PostgreSQL 15 with pgvector for vector search
#   - Redis: Memorystore emulation for session state + cache
#   - FastAPI app: CounselConduit API with Cloud Tasks broker
#   - No Celery workers — Cloud Tasks handles async job dispatch
#
# Notes:
#   - .env files are BANNED (see secrets_manager_doctrine)
#   - Use `source scripts/load_mcp_secrets.sh` for local secrets
#   - Production uses GCP Secret Manager exclusively

services:
  # AlloyDB Omni (PostgreSQL 15 + pgvector)
  alloydb:
    image: google/alloydbomni:latest
    container_name: shadowtag-alloydb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shadowtag
      POSTGRES_PASSWORD: shadowtag_local_dev
      POSTGRES_DB: counselconduit
    volumes:
      - alloydb_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shadowtag"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (Cloud Memorystore emulation)
  redis:
    image: redis:7-alpine
    container_name: shadowtag-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Application (CounselConduit)
  app:
    build: .
    container_name: shadowtag-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://shadowtag:shadowtag_local_dev@alloydb:5432/counselconduit
      - REDIS_URL=redis://redis:6379/0
      - GCP_PROJECT=shadowtag-omega-v4
      - CLOUD_TASKS_LOCATION=us-central1
    depends_on:
      alloydb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  alloydb_data:
    driver: local
  redis_data:
    driver: local
