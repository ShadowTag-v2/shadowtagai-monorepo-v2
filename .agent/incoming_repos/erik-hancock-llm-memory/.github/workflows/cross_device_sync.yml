name: Cross-Device Sync Notification

on:
  push:
    branches:
      - main
    paths:
      - 'memory/**'

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest commit info
        id: commit_info
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          COMMIT_HASH=$(git log -1 --pretty=%h)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          echo "message=${COMMIT_MSG}" >> $GITHUB_OUTPUT
          echo "hash=${COMMIT_HASH}" >> $GITHUB_OUTPUT
          echo "author=${COMMIT_AUTHOR}" >> $GITHUB_OUTPUT

      - name: Parse memory statistics
        id: stats
        run: |
          CONV_COUNT=$(jq -r '.statistics.total_conversations // 0' memory/current.json)
          TOKEN_COUNT=$(jq -r '.statistics.total_tokens // 0' memory/current.json)
          VERSION=$(jq -r '.version // "1.0.0"' memory/current.json)
          echo "conversations=${CONV_COUNT}" >> $GITHUB_OUTPUT
          echo "tokens=${TOKEN_COUNT}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Send notification (placeholder)
        run: |
          echo "Memory updated!"
          echo "Version: ${{ steps.stats.outputs.version }}"
          echo "Conversations: ${{ steps.stats.outputs.conversations }}"
          echo "Tokens: ${{ steps.stats.outputs.tokens }}"
          echo "Commit: ${{ steps.commit_info.outputs.hash }} by ${{ steps.commit_info.outputs.author }}"
          echo ""
          echo "Devices should run: ./sync_to_devices.sh pull"

      # Optional: Send Slack/Discord/Email notification
      # - name: Send Slack notification
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
      #     payload: |
      #       {
      #         "text": "Memory updated to v${{ steps.stats.outputs.version }}",
      #         "blocks": [
      #           {
      #             "type": "section",
      #             "text": {
      #               "type": "mrkdwn",
      #               "text": "*Memory Sync Alert*\nVersion: ${{ steps.stats.outputs.version }}\nConversations: ${{ steps.stats.outputs.conversations }}\nCommit: ${{ steps.commit_info.outputs.hash }}"
      #             }
      #           }
