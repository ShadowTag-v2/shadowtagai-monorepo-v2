name: ci

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps (if package.json exists)
        run: |
          if [ -f package.json ]; then npm ci || npm install; fi
      - name: Lint (if available)
        run: |
          if [ -f package.json ]; then npm run -s lint || echo "lint skipped"; fi
      - name: Test (if available)
        run: |
          if [ -f package.json ]; then npm test --silent || echo "tests skipped"; fi

  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: clippy, rustfmt
      - name: Cargo check
        run: |
          if [ -f Cargo.toml ]; then cargo check --all-targets; else echo "no Rust project"; fi
      - name: Cargo clippy
        run: |
          if [ -f Cargo.toml ]; then cargo clippy --all-targets -- -D warnings; else echo "no Rust project"; fi
      - name: Cargo test
        run: |
          if [ -f Cargo.toml ]; then cargo test --all --quiet; else echo "no Rust project"; fi

