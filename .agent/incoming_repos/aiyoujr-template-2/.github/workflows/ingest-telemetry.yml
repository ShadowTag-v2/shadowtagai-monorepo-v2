name: ingest-telemetry
on:
  push:
    paths:
      - 'ops/.telemetry/*.md'
      - 'ops/.telemetry/*.json'
      - 'ops/.telemetry/*.csv'
  workflow_dispatch: {}
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload telemetry artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telemetry
          path: ops/.telemetry

