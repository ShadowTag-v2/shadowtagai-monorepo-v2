# ═══════════════════════════════════════════════════════════
# external_repos/upstream_manifest.yaml — Clone Yard Policy
# Rule: Reference leverage without landfill.
# Clone into external_repos/upstream/<group>/<org>/<repo>
# Never into canonical source.
# ═══════════════════════════════════════════════════════════
version: 1

