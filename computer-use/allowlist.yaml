# Computer-Use Agent Allowlist
# Defines which domains and actions are permitted

# Allowed domains for navigation
domains:
  - example.com
  - docs.aiyou.com
  - github.com
  - huggingface.co

# Maximum actions per session
limits:
  max_turns: 10
  max_clicks: 40
  timeout_seconds: 300

# Blocked URL patterns (safety controls)
block:
  url_contains:
    - /logout
    - /delete
    - /billing/close
    - /admin/destroy

# Allowed predefined functions
# (See Gemini Computer-Use API docs for full list)
allowed_functions:
  - navigate
  - click_at
  - type_text_at
  - wait
  - back
  - forward

# Excluded (risky) functions
excluded_functions:
  - download_file  # Prevent automatic downloads
  - upload_file    # Prevent file uploads without review

# Audit settings
audit:
  log_all_actions: true
  screenshot_on_error: true
  retention_days: 90
