# upload_policy.yaml — Root declaration of the Two-Lane Upload Doctrine
# This file is the machine-readable source of truth for what enters Git
# versus what goes to artifact storage.
#
# Referenced by: push-with-app-gates.sh, classify-upload-payload.sh,
#                tool_contracts/github.push.yaml, .bazelignore, .gitignore
#
# Version history:
#   v1 - 2026-04-27: Initial doctrine from Monorepo OS DNA spec.

version: 1

lanes:
  git_source:
    purpose: >
      Canonical source, policy, small docs, tests, build metadata.
      This is the only lane that enters the Git repository.
    allowed:
      - apps/**
      - packages/**
      - libs/**
      - tools/**
      - scripts/**
      - infra/**
      - docs/**
      - .github/**
      - .agent/workflows/**
      - .agent/evidence/**
      - .agents/**
      - BUILD
      - BUILD.bazel
      - MODULE.bazel
      - .bazelrc
      - .bazelignore
      - .gitattributes
      - .gitignore
      - monorepo_manifest.yaml
      - operator_invariants.json
      - upload_policy.yaml
      - tool_contracts/**
      - artifacts/manifest.yaml
    warning_file_size_mib: 50
    block_file_size_mib: 95

  artifact_archive:
    purpose: >
      Large payloads, source archives, generated outputs, reference mirrors,
      model files, and anything that exceeds git_source thresholds.
    storage:
      primary: gcs
      bucket: gs://shadowtag-artifacts
    git_representation:
      - artifact manifest (artifacts/manifest.yaml)
      - sha256 checksum
      - owner declaration
      - source attribution
      - retrieval instruction

forbidden_in_git:
  paths:
    - archive/**
    - external_repos/**
    - external_sdks/**
    - reference_architectures/raw/**
    - third_party/raw/**
    - venv/**
    - .venv/**
    - .venv-*/**
    - node_modules/**
    - .gitnexus/**
    - .mypy_cache/**
    - .ruff_cache/**
    - .pytest_cache/**
    - dist/**
    - build/**
    - out/**
    - .next/**
    - .turbo/**
    - __pycache__/**
  extensions:
    - .zip
    - .tar
    - .tar.gz
    - .tgz
    - .7z
    - .dmg
    - .iso
    - .mp4
    - .mov
    - .onnx
    - .pt
    - .gguf
    - .bin
    - .weights
    - .safetensors
    - .pkl
    - .heapsnapshot
  secrets:
    - .env
    - .env.*
    - "*.pem"
    - "*.key"
    - "client_secret*.json"
    - "*service-account*.json"

lfs:
  default: forbidden
  allowed_only_by_exception: true
  requires:
    - owner
    - reason
    - budget_check
    - artifact_alternative_rejected
