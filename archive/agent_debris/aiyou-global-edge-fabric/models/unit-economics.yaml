# shadowtag-omega-v4 Unit Economics — Per-Customer / Per-Node Profitability

infrastructure_edge_node:
  description: "Single CoreWeave GPU pod at edge location"

  costs:
    capex:
      hardware: 8000  # GPU server, networking, enclosure
      installation: 2000
      total: 10000

    opex_monthly:
      power: 200
      bandwidth: 150
      maintenance: 100
      monitoring: 50
      total: 500

    opex_annual: 6000

  revenue:
    arpu_monthly: 2500  # Average revenue per node
    arpu_annual: 30000

  margins:
    gross_margin: 0.65
    contribution_margin: 0.70

  payback:
    months: 10
    roi_18mo: 2.10

