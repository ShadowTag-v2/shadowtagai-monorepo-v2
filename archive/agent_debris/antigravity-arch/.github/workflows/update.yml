name: Update PKGBUILD

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"  # Daily at 4 AM UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: antigravity-arch

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for updates
        id: check
        run: |
          python update_package.py
          if [ -n "$(git status --porcelain PKGBUILD)" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "version=$(grep '^pkgver=' PKGBUILD | cut -d= -f2)" >> $GITHUB_OUTPUT
          fi

      - name: Validate PKGBUILD syntax
        if: steps.check.outputs.updated == 'true'
        run: |
          echo "Checking PKGBUILD syntax..."
          bash -n PKGBUILD
          echo "Syntax OK"

      - name: Run tests
        if: steps.check.outputs.updated == 'true'
        run: |
          pip install pytest
          pytest tests/ -v

      - name: Commit and push
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO 2>/dev/null || git add PKGBUILD
          git commit -m "chore(arch): bump shadowtagai to ${{ steps.check.outputs.version }}"
          git push

  # Separate job to validate on Arch Linux
  validate:
    needs: update
    if: needs.update.outputs.updated == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          pacman -Syu --noconfirm namcap

      - name: Run namcap
        working-directory: antigravity-arch
        run: |
          namcap PKGBUILD || echo "namcap completed with warnings"
