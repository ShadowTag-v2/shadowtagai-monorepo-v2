services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ane_mem
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./sql/postgres.sql:/docker-entrypoint-initdb.d/01-postgres.sql:ro
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
