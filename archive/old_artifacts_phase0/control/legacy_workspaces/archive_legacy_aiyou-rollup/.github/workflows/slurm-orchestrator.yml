name: slurm-orchestrator

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch: {}

concurrency:
  group: slurm-orchestrator-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell
        uses: PowerShell/PowerShell@v1
        with:
          version: '7.4.3'

      - name: Run orchestrator
        shell: pwsh
        run: |
          ./ops/slurm-orchestrator.ps1

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-summary
          path: .slurm/out/orchestrator-summary-*.json
          retention-days: 7
          if-no-files-found: warn

      - name: Find latest open PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            if (!prs.length) {
              core.setOutput('number', '');
              return;
            }
            prs.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
            core.setOutput('number', String(prs[0].number));

      - name: Comment summary on PR if any
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.slurm/out/orchestrator-summary.md';
            if (!fs.existsSync(path)) {
              core.warning('No summary markdown found');
              return;
            }
            const body = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.pr.outputs.number }}'),
              body
            });
