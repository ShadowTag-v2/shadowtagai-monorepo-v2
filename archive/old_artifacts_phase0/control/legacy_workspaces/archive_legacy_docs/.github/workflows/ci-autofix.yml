name: AI Autofix (throttled)

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-autofix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  autofix:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_TPM_BUDGET: "450000"
      OPENAI_RPM_BUDGET: "60"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest
      - name: Run throttled autofix
        run: |
          python tools/ci/ai_autofix.py || true
      - name: Post metrics summary
        id: metrics
        run: |
          python tools/ci/post_metrics.py > .ci/metrics_summary.md || echo "no metrics" > .ci/metrics_summary.md
      - name: Comment PR with metrics
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: .ci/metrics_summary.md
