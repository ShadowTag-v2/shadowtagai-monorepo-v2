steps:
  # 1. Build Frontend
  - name: 'node:18'
    dir: 'apps/agent-manager-ui'
    entrypoint: 'npm'
    args: ['install']
  - name: 'node:18'
    dir: 'apps/agent-manager-ui'
    entrypoint: 'npm'
    args: ['run', 'build']

  # 2. Build Container
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/shadowtag-omega-v2',
      '-f', 'apps/n-autoresearch/Kosmos/BioAgentss-server/Dockerfile',
      '.'
    ]

  # 3. Push Container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/shadowtag-omega-v2']

  # 4. Deploy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', 'shadowtag-omega-v2',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/shadowtag-omega-v2',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

# Ensure images are also pushed
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/shadowtag-omega-v2'

timeout: '1200s'
