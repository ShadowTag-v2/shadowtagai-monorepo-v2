repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.30.1
    hooks:
      - id: eslint
        additional_dependencies:
          - eslint@9.30.1
          - @typescript-eslint/parser@8.35.1
          - @typescript-eslint/eslint-plugin@8.35.1
        files: "\.(js|jsx|ts|tsx)$"

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]

  - repo: local
    hooks:
      - id: typecheck
        name: typecheck
        entry: bash -lc 'if [ -f package.json ]; then npm run typecheck; elif [ -f pyproject.toml ]; then python -m py_compile $(git ls-files "*.py"); else echo "skip typecheck"; fi'
        language: system
        pass_filenames: false

      - id: tests
        name: tests
        entry: bash -lc 'if [ -f package.json ]; then npm test -- --runInBand || npm test; elif [ -f pyproject.toml ]; then pytest -q; else echo "skip tests"; fi'
        language: system
        pass_filenames: false
