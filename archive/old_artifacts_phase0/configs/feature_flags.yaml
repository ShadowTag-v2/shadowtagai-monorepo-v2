version: 1

flags:
  # === CounselConduit Product Flags ===
  counselconduit_managed_mode:
    enabled: true
    owner: counselconduit
    description: "Managed Gemini backend (attorney pays subscription, no API key needed)"

  counselconduit_byok_routing:
    enabled: true
    owner: counselconduit
    description: "BYOK mode for enterprise firms who want to use their own API keys"

  counselconduit_evaporating_ui:
