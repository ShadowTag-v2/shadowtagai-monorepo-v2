name: Offline Eval + Promotion Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "23 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install deps
        run: |
          python -m pip install --upgrade pip pyyaml

      - name: Sync policy
        run: |
          mkdir -p policy/config
          curl -fsSL -o policy/config/strict_policy.yml \
            https://raw.githubusercontent.com/ehanc69/pnkln-stack-policy/refs/heads/main/policy/config/strict_policy.yml

      - name: Run offline eval
        run: |
          python tools/eval/offline_eval.py

      - name: Check promotion gate
        id: gate
        continue-on-error: true
        run: |
          python tools/eval/promotion_gate.py

      - name: Label PR if blocked
        if: github.event_name == 'pull_request' && steps.gate.outcome == 'failure'
        env: { GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "blocked:promotion-gate"
          gh pr comment ${{ github.event.pull_request.number }} --body "Offline eval uplift below policy threshold."
