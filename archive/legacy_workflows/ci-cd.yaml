name: CI/CD Pipeline - LegalTrack & LawTrack

# Trigger on push to main/develop and on pull requests
on:
  push:
    branches:
      - main
      - develop
      - 'claude/*'
    paths:
      - 'src/**'
      - 'Dockerfile.*'
      - 'requirements.txt'
      - 'k8s/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
      - develop

  # Manual trigger
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Environment to deploy (staging/production)'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  GCP_PROJECT_ID: pnkln-project
  GCP_REGION: us-central1
  GKE_CLUSTER_NAME: pnkln-gke-prod
  GKE_ZONE: us-central1-a
  REGISTRY: gcr.io

jobs:
  # ============================================================================
  # Job 1: Code Quality & Testing
  # ============================================================================
  test:
    name: Test & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run code quality checks
        run: |
          echo "Running black..."
          black --check src/

          echo "Running isort..."
          isort --check-only src/

          echo "Running flake8..."
          flake8 src/ --max-line-length=100 --extend-ignore=E203,W503

          echo "Running mypy..."
          mypy src/ --ignore-missing-imports

      - name: Run unit tests
        run: |
          pytest src/ -v --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # ============================================================================
  # Job 2: Build Docker Images
  # ============================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    strategy:
      matrix:
        service: [legaltrack, lawtrack]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker gcr.io

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ matrix.service }}-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ matrix.service }}-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ matrix.service }}-api:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ matrix.service }}-api:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # Job 3: Deploy to Staging
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    environment:
      name: staging
      url: https://staging.legaltrack.ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER_NAME }} \
            --zone ${{ env.GKE_ZONE }} \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Deploy LegalTrack to staging
        run: |
          # Update image in deployment
          kubectl set image deployment/legaltrack-api \
            api=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/legaltrack-api:${{ github.sha }} \
            -n legaltrack-staging

          # Wait for rollout
          kubectl rollout status deployment/legaltrack-api -n legaltrack-staging --timeout=5m

      - name: Deploy LawTrack to staging
        run: |
          # Update image in deployment
          kubectl set image deployment/lawtrack-api \
            api=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/lawtrack-api:${{ github.sha }} \
            -n lawtrack-staging

          # Wait for rollout
          kubectl rollout status deployment/lawtrack-api -n lawtrack-staging --timeout=5m

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."

          # LegalTrack health check
          kubectl run smoke-test-legaltrack --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            --namespace=legaltrack-staging \
            -- curl -f http://legaltrack-api/health

          # LawTrack health check
          kubectl run smoke-test-lawtrack --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            --namespace=lawtrack-staging \
            -- curl -f http://lawtrack-api/health

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "⚠️ Staging deployment failed for ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment Failed*\n\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                  }
                }
              ]
            }

  # ============================================================================
  # Job 4: Deploy to Production
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    environment:
      name: production
      url: https://app.legaltrack.ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER_NAME }} \
            --zone ${{ env.GKE_ZONE }} \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Deploy LegalTrack to production (canary)
        run: |
          # Canary deployment: 10% traffic
          kubectl set image deployment/legaltrack-api-canary \
            api=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/legaltrack-api:${{ github.sha }} \
            -n legaltrack-prod

          # Wait for canary rollout
          kubectl rollout status deployment/legaltrack-api-canary -n legaltrack-prod --timeout=5m

          # Monitor canary metrics for 5 minutes
          echo "Monitoring canary deployment..."
          sleep 300

          # If canary is healthy, promote to full deployment
          echo "Promoting canary to full deployment..."
          kubectl set image deployment/legaltrack-api \
            api=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/legaltrack-api:${{ github.sha }} \
            -n legaltrack-prod

          # Wait for full rollout
          kubectl rollout status deployment/legaltrack-api -n legaltrack-prod --timeout=10m

      - name: Deploy LawTrack to production (canary)
        run: |
          # Canary deployment: 10% traffic
          kubectl set image deployment/lawtrack-api-canary \
            api=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/lawtrack-api:${{ github.sha }} \
            -n lawtrack-prod

          # Wait for canary rollout
          kubectl rollout status deployment/lawtrack-api-canary -n lawtrack-prod --timeout=5m

          # Monitor canary metrics for 5 minutes
          echo "Monitoring canary deployment..."
          sleep 300

          # If canary is healthy, promote to full deployment
          echo "Promoting canary to full deployment..."
          kubectl set image deployment/lawtrack-api \
            api=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/lawtrack-api:${{ github.sha }} \
            -n lawtrack-prod

          # Wait for full rollout
          kubectl rollout status deployment/lawtrack-api -n lawtrack-prod --timeout=10m

      - name: Run production smoke tests
        run: |
          echo "Running smoke tests against production..."

          # LegalTrack health check
          kubectl run smoke-test-legaltrack --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            --namespace=legaltrack-prod \
            -- curl -f http://legaltrack-api/health

          # LawTrack health check
          kubectl run smoke-test-lawtrack --rm -i --restart=Never \
            --image=curlimages/curl:latest \
            --namespace=lawtrack-prod \
            -- curl -f http://lawtrack-api/health

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## What's Changed

            - LegalTrack API: ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/legaltrack-api:${{ github.sha }}
            - LawTrack API: ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/lawtrack-api:${{ github.sha }}

            Full Changelog: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Notify Slack on success
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "✅ Production deployment successful for ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment Successful*\n\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\n\nLegalTrack: https://app.legaltrack.ai\nLawTrack: https://app.lawtrack.ai\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                  }
                }
              ]
            }

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "🚨 Production deployment FAILED for ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment FAILED*\n\n@channel - Immediate action required!\n\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                  }
                }
              ]
            }

  # ============================================================================
  # Job 5: Security Scanning
  # ============================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk security scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Run GitGuardian scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
