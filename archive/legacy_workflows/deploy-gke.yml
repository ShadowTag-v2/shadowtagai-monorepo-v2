name: Deploy to GKE (pnkln + pnkln-stack Ecosystem)

on:
  push:
    branches:
      - main
      - claude/encode-cor8-pnkln-stack-global-edge-fabric-*
  pull_request:
    branches:
      - main

env:
  GCP_PROJECT_ID: pnkln-stack-prod
  GKE_CLUSTER: pnkln-main
  GKE_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  IMAGE_pnkln: us-central1-docker.pkg.dev/pnkln-stack-prod/containers/pnkln-api
  IMAGE_JUDGE6: us-central1-docker.pkg.dev/pnkln-stack-prod/containers/judge6

jobs:
  test:
    name: Run Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run integration tests
        run: |
          python3 test_integration.py
          python3 test_orchestrator.py

      - name: Run pytest with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term

      - name: Check coverage threshold (98%)
        run: |
          coverage report --fail-under=98

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Fail on critical vulnerabilities
        run: |
          if grep -q "CRITICAL" trivy-results.sarif; then
            echo "Critical vulnerabilities found!"
            exit 1
          fi

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    outputs:
      pnkln-image: ${{ steps.meta-pnkln.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GKE_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Extract metadata (pnkln API)
        id: meta-pnkln
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_pnkln }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push pnkln API
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta-pnkln.outputs.tags }}
          labels: ${{ steps.meta-pnkln.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Judge #6
        uses: docker/build-push-action@v5
        with:
          context: ./judge6
          push: true
          tags: ${{ steps.meta-judge6.outputs.tags }}

  binary-authorization:
    name: Binary Authorization Attestation
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GKE_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Verify 98% coverage threshold
        id: coverage-check
        run: |
          COVERAGE=$(python3 -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); root = tree.getroot(); print(root.attrib['line-rate'])")
          COVERAGE_PCT=$(python3 -c "print(round(float('$COVERAGE') * 100, 2))")

          echo "Coverage: $COVERAGE_PCT%"

          if (( $(echo "$COVERAGE_PCT >= 98.0" | bc -l) )); then
            echo "✓ Coverage threshold met: $COVERAGE_PCT% >= 98%"
            echo "coverage_passed=true" >> $GITHUB_OUTPUT
          else
            echo "✗ Coverage threshold NOT met: $COVERAGE_PCT% < 98%"
            echo "coverage_passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Create coverage attestation
        if: steps.coverage-check.outputs.coverage_passed == 'true'
        run: |
          gcloud beta container binauthz attestations sign-and-create \
            --project=${{ env.GCP_PROJECT_ID }} \
            --artifact-url=${{ needs.build-and-push.outputs.pnkln-image }} \
            --attestor=projects/${{ env.GCP_PROJECT_ID }}/attestors/coverage-98-attestor \
            --attestor-project=${{ env.GCP_PROJECT_ID }} \
            --keyversion-project=${{ env.GCP_PROJECT_ID }} \
            --keyversion-location=us-central1 \
            --keyversion-keyring=binauthz \
            --keyversion-key=coverage-attestor-key \
            --keyversion=1

      - name: Create security scan attestation
        run: |
          gcloud beta container binauthz attestations sign-and-create \
            --project=${{ env.GCP_PROJECT_ID }} \
            --artifact-url=${{ needs.build-and-push.outputs.pnkln-image }} \
            --attestor=projects/${{ env.GCP_PROJECT_ID }}/attestors/security-scan-attestor \
            --attestor-project=${{ env.GCP_PROJECT_ID }} \
            --keyversion-project=${{ env.GCP_PROJECT_ID }} \
            --keyversion-location=us-central1 \
            --keyversion-keyring=binauthz \
            --keyversion-key=security-attestor-key \
            --keyversion=1

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [build-and-push, binary-authorization]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GKE_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}

      - name: Deploy pnkln API
        run: |
          kubectl set image deployment/pnkln-api \
            api=${{ needs.build-and-push.outputs.pnkln-image }} \
            --namespace=production

          kubectl rollout status deployment/pnkln-api \
            --namespace=production \
            --timeout=5m

      - name: Verify deployment health
        run: |
          kubectl wait --for=condition=available \
            --timeout=2m \
            deployment/pnkln-api \
            --namespace=production

      - name: Run smoke tests
        run: |
          CLUSTER_IP=$(kubectl get svc pnkln-api -n production -o jsonpath='{.spec.clusterIP}')

          # Health check
          kubectl run curl-test --image=curlimages/curl:latest --rm -it --restart=Never -- \
            curl -f http://$CLUSTER_IP/health || exit 1

          # API endpoint test
          kubectl run curl-test --image=curlimages/curl:latest --rm -it --restart=Never -- \
            curl -f http://$CLUSTER_IP/api/v1/orchestrator/health || exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "✓ Deployment successful!"
          echo "  - pnkln API: ${{ needs.build-and-push.outputs.pnkln-image }}"
          echo "  - Coverage: ≥98%"
          echo "  - Security: Scanned, no critical vulnerabilities"
          echo "  - Binary Authorization: Attested"
          echo "  - Health: All pods ready"

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GKE_DEPLOY_SA }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_REGION }}

      - name: Rollback deployment
        run: |
          echo "⚠️  Deployment failed, rolling back..."
          kubectl rollout undo deployment/pnkln-api --namespace=production
          kubectl rollout status deployment/pnkln-api --namespace=production --timeout=5m

      - name: Notify rollback
        run: |
          echo "✗ Deployment failed and was rolled back"
          echo "  - Check logs: kubectl logs -l app=pnkln-api -n production"
          echo "  - Check events: kubectl get events -n production"
