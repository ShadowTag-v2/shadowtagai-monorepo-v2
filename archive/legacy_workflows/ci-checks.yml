name: ci-checks
on:
  push:
    branches: [ main, "feat/**", "fix/**", "ops/**" ]
  pull_request:
    branches: [ main ]
jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci || npm i
      - run: npm -v && node -v
      - run: npm -s test

