name: Claude Code Action

on:
  # Trigger when @claude is mentioned in PR comments or issue comments
  issue_comment:
    types: [created]

  # Trigger when issues are assigned to @claude
  issues:
    types: [assigned, opened, edited]

  # Trigger on pull request events
  pull_request:
    types: [opened, synchronize, reopened]

  pull_request_review_comment:
    types: [created]

# Required permissions for Claude to interact with your repository
permissions:
  contents: write      # Read/write access to repository contents
  pull-requests: write # Create and update pull requests
  issues: write        # Create and update issues
  checks: write        # Create check runs

jobs:
  claude:
    runs-on: ubuntu-latest

    steps:
      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          # Your Anthropic API key (store in repository secrets)
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Optional: Specify Claude model (defaults to latest)
          # model: 'claude-sonnet-4-5-20250929'

          # Optional: Custom instructions for Claude's behavior in your repo
          # instructions: |
          #   When reviewing code, focus on:
          #   - Python best practices and PEP 8 compliance
          #   - Security vulnerabilities
          #   - Performance optimization opportunities
          #   - Type hint coverage
          #
          #   When implementing features:
          #   - Follow existing project structure
          #   - Include comprehensive docstrings
          #   - Add appropriate error handling
          #   - Write tests for new functionality
