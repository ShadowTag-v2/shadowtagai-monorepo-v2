# Antigravity Utility Rules Profile
# This profile contains operational rules and settings compiled from the
# provided instructions. Load this profile as an optional workflow profile
# after loading authority memory and operator invariants.

workspace_isolation:
  workspace_file: "Monorepo-Uphillsnowball/Monorepo-Uphillsnowball.code-workspace"
  strict_mode: true
  allow_non_workspace_file_access: false

session_start:
  # Commands to run at the beginning of each session
  commands:
    - "/omega-loop"
    - "python3 gcloud_auth_solver.py"
    - "python3 omega_auth_daemon.py"
  docs_to_review:
    - "@.agent/workflows/live-engine.md"
    - "@.agent/docs/toolbelt.md"
    - "@.agent/rules/shadowtag-laws.md"
  notes:
    - "Ensure BRAIN_DIR is set correctly for your environment"
    - "Save all tasks, memories and decisions to Beads"

operational_guidelines:
  - "Use scripts/god_mode_admin.py for ShadowTagAI operations. Typical commands: status, sync, help, json, shell, commit, rollback, memw, mems, artifact."
  - "Run god_mode_admin.py via the project's .venv interpreter to avoid global Python drift."
  - "If you see an asyncpg warning, install it with: pip install asyncpg"
  - "If the repository has uncommitted changes, be careful with commit/rollback commands in god mode."
  - "Use the service account shadowtag-core-run-sa@shadowtag-omega-v4.iam.gserviceaccount.com for cloud runs."
  - "Make sure to run a 'sync_repo' at regular intervals (e.g. every 600 seconds) and capture health snapshots (every 120 seconds) if using the queue worker engine."

