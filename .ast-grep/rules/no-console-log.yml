id: no-console-log
message: "Style: Remove console.log() from production code."
severity: warning
language: typescript
rule:
  pattern: |
    console.log($$$ARGS)
files:
  - "apps/kovelai/**/*.ts"
  - "apps/kovelai/**/*.tsx"
  - "apps/counselconduit-dashboard/**/*.ts"
  - "apps/counselconduit-dashboard/**/*.tsx"
