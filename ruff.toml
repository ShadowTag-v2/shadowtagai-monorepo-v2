# Ruff configuration — https://github.com/astral-sh/ruff
# Pre-commit hook: https://github.com/astral-sh/ruff-pre-commit
# VSCode extension: https://github.com/astral-sh/ruff-vscode (charliermarsh.ruff)
target-version = "py314"
line-length = 150
extend-exclude = [
    # Historical and recovered trees are not canonical workspace truth.
    "archive/",
    "reference",
    "**/branches",
    "**/ShadowTag-Omega_backup_*",
    "**/ShadowTag-Omega-v*_backup_*",
    "apps/ShadowTag-v2_stack/.quarantine",
    # Cookiecutter/Jinja templates are not valid TOML until rendered.
    "apps/ShadowTag-v2_stack/agent-starter-pack/agent_starter_pack/agents",
    "apps/ShadowTag-v2_stack/agent-starter-pack/agent_starter_pack/base_template",
    "apps/ShadowTag-v2_stack/agent-starter-pack/agent_starter_pack/data_ingestion",
    "apps/ShadowTag-v2_stack/agent-starter-pack/agent_starter_pack/deployment_targets",
    # Cursor/VSCode extension files — not project source
    "packages/",
    "docs/bundles/",
    "apps/ShadowTag-v2_stack/cosmic-crab-payload/",
    "**/external_repos/",
    "**/external_sdks/",
    "**/libs/autoresearch_sources/",
    "labs/gemini-cookbook/",
    "tools/",
]

[lint]
# E: Errors, F: Pyflakes, I: Isort, UP: PyUpgrade, B: Bugbear, SIM: Simplify
# V22 Pruned Singularity: F401/F841 now ENABLED (replaces vulture dead-code scanning)
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "E501",    # line-too-long (handled by formatter)
    "E402",    # module-import-not-at-top (intentional sys.path manipulation)
    "E722",    # bare-except (being fixed via AST-Grep, not noqa)
    "E741",    # ambiguous-variable-name (intentional math/physics vars)
    # F401 (unused-import) and F841 (unused-variable) are NOW ENABLED.
    # They replace vulture's dead-code scanning. See per-file-ignores for legacy dirs.
    "F821",    # undefined-name (dynamic imports, TYPE_CHECKING)
    "I001",    # isort violations (handled separately)
    "PTH118",  # pathlib (gradual migration)
    "PTH123",  # pathlib (gradual migration)
    "SIM108",  # ternary (readability preference)
    "SIM102",  # collapsible-if (chunked AI refactor later)
    "N815",    # mixed-case (external API compliance)
    "B017",    # assert-raises-exception (test patterns)
    "B023",    # function-uses-loop-variable (intentional closures)
    "B028",    # no-explicit-stacklevel (gradual migration)
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "PLR2004", "D103"]
"**/test_*.py" = ["S101", "PLR2004", "D103"]
"**/conftest.py" = ["F401", "E402"]
"scripts/**/*.py" = ["T201"]  # Allow print() in scripts
# V22 Pruned Singularity: Legacy dirs suppressed for F401/F841 until chunked cleanup
"control/**/*.py" = ["F401", "F841"]
"docs/**/*.py" = ["F401", "F841"]
"labs/**/*.py" = ["F401", "F841"]
"data/**/*.py" = ["F401", "F841"]

[lint.isort]
force-single-line = false
