# ═══════════════════════════════════════════════════════════════
# .bunfig.toml — V18 Enterprise Registry Configuration
# ═══════════════════════════════════════════════════════════════
#
# Routes private scopes through Google Artifact Registry.
# Public packages route through the default Bun registry.
# Auth via Workload Identity Federation (WIF) — no static tokens.
#
# Reference: https://bun.sh/docs/install/registries

[install]
# Fail on lockfile mismatch in CI
frozenLockfile = true

# Use hardlinks for faster installs
globalDir = "~/.bun/install/cache"

[install.scopes]
# ─── Google Labs Experimental Packages ───────────────────────
# Sourced from external_repos/ local builds + Artifact Registry
"@google-labs-code" = { url = "https://us-npm.pkg.dev/shadowtag-omega-v4/google-labs-npm/", token = "$ARTIFACT_REGISTRY_TOKEN" }

# ─── Stitch Design System SDK ────────────────────────────────
"@stitch" = { url = "https://us-npm.pkg.dev/shadowtag-omega-v4/stitch-npm/", token = "$ARTIFACT_REGISTRY_TOKEN" }

# ─── Jules CI/CD SDK ─────────────────────────────────────────
"@jules" = { url = "https://us-npm.pkg.dev/shadowtag-omega-v4/jules-npm/", token = "$ARTIFACT_REGISTRY_TOKEN" }

# ─── ShadowTag Internal Packages ─────────────────────────────
"@shadowtag" = { url = "https://us-npm.pkg.dev/shadowtag-omega-v4/internal-npm/", token = "$ARTIFACT_REGISTRY_TOKEN" }

[install.peer]
# Auto-install peer dependencies
enabled = true

[run]
# Bun-native HTTP server (no Node compat layer)
bun = true

[test]
# Coverage via Bun's native test runner
coverage = true
coverageDir = "coverage"
