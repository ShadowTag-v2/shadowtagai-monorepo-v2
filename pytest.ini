[pytest]
# Pytest Configuration for ShadowTag-v2 Platform

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Show summary of all test outcomes
    -ra
    # Coverage reporting
    --cov=src/ShadowTag-v2
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    # Fail if coverage below threshold
    --cov-fail-under=60
    # Show warnings
    -W default
    # Asyncio mode
    --asyncio-mode=auto

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, external services)
    security: Security-focused tests
    slow: Slow-running tests
    auth: Authentication and authorization tests
    api: API endpoint tests
    database: Database tests
    gemini: Gemini AI integration tests
    shadowtag: ShadowTag cryptography tests
    smoke: Smoke tests (critical paths only)

# Coverage options
[coverage:run]
source = src/ShadowTag-v2
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */virtualenv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
