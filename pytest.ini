[pytest]
# Pytest Configuration for UphillSnowball Monorepo — v8.5
# Aspirational stubs archived 2026-04-13. Only structural tests remain.
# Note: Requires Python 3.14+ for environment compatibility.

# Test discovery
testpaths =
    tests
    apps/counselconduit/tests
pythonpath =
    .
    apps/aiyou_stack/aiyou-fastapi-services/apps
    apps/counselconduit
    labs/uphillsnowball

python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Importlib mode for monorepo namespace collision resolution
    --import-mode=importlib
    # Show summary of all test outcomes
    -ra
    # Show warnings
    -W default
    # Asyncio mode
    --asyncio-mode=auto

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, external services)
    security: Security-focused tests
    slow: Slow-running tests
    structural: Structural import/export validation tests
    e2e: End-to-end tests (full pipeline)
    chaos: Chaos engineering / fault injection tests
