# Harbor + Gemma-4-31B Local Inference Configuration
# ShadowTag Sovereign Monorepo — Zero-Cost Local LLM Stack
#
# Architecture:
#   M1 Max (64GB) → llama.cpp (Q4_K_M quantized) → OpenAI-compatible API
#   ANE Bridge (libane_bridge.dylib) handles hardware acceleration routing
#
# Quick Start:
#   docker compose -f configs/harbor-gemma.yaml up -d
#
# API endpoint: http://localhost:8080/v1/chat/completions

services:
  llamacpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: shadowtag-llamacpp
    ports:
      - "8080:8080"
    volumes:
      - ${HOME}/.cache/huggingface/hub:/models:ro
    command: >-
      --host 0.0.0.0
      --port 8080
      --model /models/models--unsloth--gemma-4-31B-it-GGUF/snapshots/latest/gemma-4-31B-it-Q4_K_M.gguf
      --ctx-size 32768
      --n-gpu-layers 99
      --threads 8
      --flash-attn
      --cont-batching
      --metrics
    deploy:
      resources:
        limits:
          memory: 24G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: shadowtag-webui
    ports:
      - "3100:8080"
    environment:
      - OPENAI_API_BASE_URL=http://llamacpp:8080/v1
      - OPENAI_API_KEY=sk-local
      - WEBUI_AUTH=false
    depends_on:
      llamacpp:
        condition: service_healthy
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: shadowtag-searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_SECRET=shadowtag-local-search
    restart: unless-stopped
