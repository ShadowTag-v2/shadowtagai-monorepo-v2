# Example secrets configuration
# Copy this file to secrets.yml and fill in your actual secrets
# NEVER commit secrets.yml to version control!

# API Keys (if needed for external services)
api_keys:
  service_name: "your-api-key-here"

# Encryption Keys
encryption:
  master_key: "your-master-encryption-key-here"
  salt: "your-salt-here"

# JWT Secret
jwt:
  secret_key: "your-jwt-secret-key-here"
  algorithm: "HS256"

# Database Credentials (if using external DB)
database:
  username: "db_user"
  password: "db_password"
  host: "localhost"
  port: 5432
  database: "shadowtag"

# Cloud Storage (if using S3, etc.)
cloud_storage:
  provider: "aws"  # aws, gcp, azure
  access_key: "your-access-key"
  secret_key: "your-secret-key"
  bucket: "shadowtag-storage"
  region: "us-east-1"

# Email/Notifications (if needed)
notifications:
  smtp_host: "smtp.example.com"
  smtp_port: 587
  smtp_user: "notifications@example.com"
  smtp_password: "smtp-password"

# External Services
external:
  api_endpoint: "https://api.example.com"
  api_key: "external-service-key"
