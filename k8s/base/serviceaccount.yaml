apiVersion: v1
kind: ServiceAccount
metadata:
  name: pnkln-orchestrator
  namespace: pnkln-production
  annotations:
    # Workload Identity binding
    # Replace with your GCP service account
    iam.gke.io/gcp-service-account: pnkln-orchestrator@YOUR_PROJECT_ID.iam.gserviceaccount.com
  labels:
    app: pnkln
    component: orchestrator
