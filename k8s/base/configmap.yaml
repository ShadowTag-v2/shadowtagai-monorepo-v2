apiVersion: v1
kind: ConfigMap
metadata:
  name: pnkln-config
  namespace: pnkln-production
  labels:
    app: pnkln
    component: orchestrator
data:
  # Vertex AI Configuration
  CLOUD_ML_REGION: "us-central1"

  # Application Configuration
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "8080"

  # Business Rules
  MIN_LTV_CAC_RATIO: "4.0"
  MIN_ROI_THRESHOLD: "3.0"
  MIN_CONFIDENCE: "0.70"

  # Mode Configuration
  MODE_THINK: "strategic_reasoning"
  MODE_BUILD: "implementation"
  MODE_SCALE: "growth_acceleration"
