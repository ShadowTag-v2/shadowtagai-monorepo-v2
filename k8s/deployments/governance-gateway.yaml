---
# Governance Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: governance-gateway
  namespace: governance
  labels:
    app: governance-gateway
    component: api
    version: v0.1.0
spec:
  replicas: 3  # High availability
  selector:
    matchLabels:
      app: governance-gateway
  template:
    metadata:
      labels:
        app: governance-gateway
        component: api
        version: v0.1.0
    spec:
      serviceAccountName: governance-gateway-sa
      containers:
        - name: gateway
          image: gcr.io/PROJECT_ID/governance-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                configMapKeyRef:
                  name: governance-config
                  key: project_id
            - name: VERTEX_AI_LOCATION
              value: "us-central1"
            - name: VERTEX_AI_MODEL
              value: "gemini-2.5-flash-002"
            - name: OPA_URL
              value: "http://opa.governance.svc.cluster.local:8181"
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
            - name: AGENTOPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: governance-secrets
                  key: agentops_api_key
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: policy-cache
              mountPath: /app/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: policy-cache
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - governance-gateway
                topologyKey: kubernetes.io/hostname

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: governance-gateway
  namespace: governance
  labels:
    app: governance-gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: governance-gateway

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: governance-gateway-hpa
  namespace: governance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: governance-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
