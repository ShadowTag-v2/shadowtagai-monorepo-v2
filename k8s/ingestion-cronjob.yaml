apiVersion: batch/v1
kind: CronJob
metadata:
  name: gemini-ingestion-layer
  namespace: pnkln-ingestion
  labels:
    app: gemini-ingestion
    component: cronjob
    version: v1.0.0
spec:
  # Schedule: Daily at 2:00 AM UTC (~45 min runtime target)
  schedule: "0 2 * * *"

  # Prevent concurrent runs
  concurrencyPolicy: Forbid

  # Keep recent job history
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  # Start deadline: 10 minutes (if scheduler misses window)
  startingDeadlineSeconds: 600

  jobTemplate:
    metadata:
      labels:
        app: gemini-ingestion
        component: ingestion-job
    spec:
      # Retry failed jobs up to 3 times
      backoffLimit: 3

      # Timeout after 60 minutes (45 min target + 15 min buffer)
      activeDeadlineSeconds: 3600

      template:
        metadata:
          labels:
            app: gemini-ingestion
            component: ingestion-pod
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "8080"
            prometheus.io/path: "/metrics"
        spec:
          # Use preemptible nodes for cost savings
          nodeSelector:
            cloud.google.com/gke-preemptible: "true"

          # Workload identity for GCP service authentication
          serviceAccountName: gemini-ingestion-sa

          # Don't restart on failure (CronJob handles retries)
          restartPolicy: Never

          # Init container: Pre-flight checks
          initContainers:
            - name: preflight-checks
              image: gcr.io/pnkln-project/ingestion-preflight:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  echo "Running pre-flight checks..."
                  # Check GCS bucket access
                  gsutil ls gs://pnkln-ingestion-data/ || exit 1
                  # Check PostgreSQL connectivity
                  pg_isready -h $POSTGRES_HOST -p 5432 -U $POSTGRES_USER || exit 1
                  # Check Redis connectivity
                  redis-cli -h $REDIS_HOST ping || exit 1
                  echo "Pre-flight checks passed!"
              env:
                - name: POSTGRES_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: ingestion-config
                      key: postgres_host
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: ingestion-secrets
                      key: postgres_user
                - name: REDIS_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: ingestion-config
                      key: redis_host

          # Main containers: Multi-container parallel processing
          containers:
            # Coordinator: Orchestrates workflow
            - name: coordinator
              image: gcr.io/pnkln-project/ingestion-coordinator:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["python", "/app/coordinator.py"]
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "500m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
              env:
                - name: RUNTIME_TARGET_MINUTES
                  value: "45"
                - name: GCS_BUCKET
                  value: "gs://pnkln-ingestion-data"
                - name: LOG_LEVEL
                  value: "INFO"
              envFrom:
                - configMapRef:
                    name: ingestion-config
                - secretRef:
                    name: ingestion-secrets
              volumeMounts:
                - name: config-volume
                  mountPath: /app/config
                  readOnly: true
                - name: shared-data
                  mountPath: /data

            # YouTube Collector
            - name: youtube-collector
              image: gcr.io/pnkln-project/ingestion-youtube:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["python", "/app/collectors/youtube_collector.py"]
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              env:
                - name: YOUTUBE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ingestion-secrets
                      key: youtube_api_key
                - name: COLLECTOR_TYPE
                  value: "youtube"
              envFrom:
                - configMapRef:
                    name: ingestion-config
              volumeMounts:
                - name: config-volume
                  mountPath: /app/config
                  readOnly: true
                - name: shared-data
                  mountPath: /data

            # Twitter/X Collector
            - name: twitter-collector
              image: gcr.io/pnkln-project/ingestion-twitter:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["python", "/app/collectors/twitter_collector.py"]
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              env:
                - name: TWITTER_BEARER_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: ingestion-secrets
                      key: twitter_bearer_token
                - name: COLLECTOR_TYPE
                  value: "twitter"
              envFrom:
                - configMapRef:
                    name: ingestion-config
              volumeMounts:
                - name: config-volume
                  mountPath: /app/config
                  readOnly: true
                - name: shared-data
                  mountPath: /data

            # News Collector
            - name: news-collector
              image: gcr.io/pnkln-project/ingestion-news:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["python", "/app/collectors/news_collector.py"]
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              env:
                - name: NEWS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ingestion-secrets
                      key: news_api_key
                - name: COLLECTOR_TYPE
                  value: "news"
              envFrom:
                - configMapRef:
                    name: ingestion-config
              volumeMounts:
                - name: config-volume
                  mountPath: /app/config
                  readOnly: true
                - name: shared-data
                  mountPath: /data

            # RSS Collector
            - name: rss-collector
              image: gcr.io/pnkln-project/ingestion-rss:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["python", "/app/collectors/rss_collector.py"]
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              env:
                - name: COLLECTOR_TYPE
                  value: "rss"
              envFrom:
                - configMapRef:
                    name: ingestion-config
              volumeMounts:
                - name: config-volume
                  mountPath: /app/config
                  readOnly: true
                - name: shared-data
                  mountPath: /data

            # Web Scraper
            - name: web-scraper
              image: gcr.io/pnkln-project/ingestion-scraper:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["python", "/app/collectors/web_scraper.py"]
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "500m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
              env:
                - name: COLLECTOR_TYPE
                  value: "web_scraper"
              envFrom:
                - configMapRef:
                    name: ingestion-config
              volumeMounts:
                - name: config-volume
                  mountPath: /app/config
                  readOnly: true
                - name: shared-data
                  mountPath: /data

            # Tier Classifier
            - name: tier-classifier
              image: gcr.io/pnkln-project/ingestion-classifier:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["python", "/app/processors/tier_classifier.py"]
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "500m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
              env:
                - name: MODEL_PATH
                  value: "/models/tier_classifier_v1.pkl"
              envFrom:
                - configMapRef:
                    name: ingestion-config
              volumeMounts:
                - name: config-volume
                  mountPath: /app/config
                  readOnly: true
                - name: model-volume
                  mountPath: /models
                  readOnly: true
                - name: shared-data
                  mountPath: /data

            # Compliance Validator
            - name: compliance-validator
              image: gcr.io/pnkln-project/ingestion-compliance:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["python", "/app/processors/compliance_validator.py"]
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              envFrom:
                - configMapRef:
                    name: ingestion-config
              volumeMounts:
                - name: config-volume
                  mountPath: /app/config
                  readOnly: true
                - name: shared-data
                  mountPath: /data

            # Quality Scorer
            - name: quality-scorer
              image: gcr.io/pnkln-project/ingestion-quality:v1.0.0
              imagePullPolicy: IfNotPresent
              command: ["python", "/app/processors/quality_scorer.py"]
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              envFrom:
                - configMapRef:
                    name: ingestion-config
              volumeMounts:
                - name: config-volume
                  mountPath: /app/config
                  readOnly: true
                - name: shared-data
                  mountPath: /data

          # Volumes
          volumes:
            # Configuration files
            - name: config-volume
              configMap:
                name: ingestion-config-files
                items:
                  - key: sources.yaml
                    path: sources.yaml
                  - key: tier-classification.yaml
                    path: tier-classification.yaml
                  - key: ethical-crawling.yaml
                    path: ethical-crawling.yaml
                  - key: quality-gates.yaml
                    path: quality-gates.yaml

            # ML models
            - name: model-volume
              persistentVolumeClaim:
                claimName: ingestion-models-pvc
                readOnly: true

            # Shared data between containers
            - name: shared-data
              emptyDir: {}

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gemini-ingestion-sa
  namespace: pnkln-ingestion
  annotations:
    iam.gke.io/gcp-service-account: gemini-ingestion@pnkln-project.iam.gserviceaccount.com

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-config
  namespace: pnkln-ingestion
data:
  # GCS configuration
  gcs_bucket: "pnkln-ingestion-data"
  gcs_project: "pnkln-project"

  # PostgreSQL configuration
  postgres_host: "10.0.1.10"
  postgres_port: "5432"
  postgres_database: "pnkln_ingestion"

  # Redis configuration
  redis_host: "10.0.1.20"
  redis_port: "6379"

  # Runtime configuration
  runtime_target_minutes: "45"
  parallel_collectors: "6"
  max_items_per_source: "1000"

  # Monitoring
  prometheus_port: "8080"
  log_level: "INFO"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ingestion-models-pvc
  namespace: pnkln-ingestion
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard-rwo
