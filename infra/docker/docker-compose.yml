version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shadowtag-test-db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: shadowtag_test
    ports:
      - "5432:5432"
    volumes:
      - ../migrations/001_shadowtag_init.sql:/docker-entrypoint-initdb.d/001_shadowtag_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d shadowtag_test"]
      interval: 5s
      timeout: 5s
      retries: 5
