# infra/cloud-run/counselconduit.yaml
# Cloud Run service config for CounselConduit API
# Deploy: gcloud run deploy counselconduit --source apps/counselconduit/ --region us-central1

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: counselconduit
  labels:
    app: counselconduit
    product: kovelai
    environment: production
spec:
  template:
    metadata:
      annotations:
        # Scale: min 0 (scale to zero), max 10
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        # CPU is always allocated (needed for Gemini streaming)
        run.googleapis.com/cpu-throttling: "false"
        # Startup CPU boost for cold starts
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: counselconduit-sa@shadowtag-omega-v4.iam.gserviceaccount.com
      containers:
        - image: us-central1-docker.pkg.dev/shadowtag-omega-v4/counselconduit/api:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: "1Gi"
          env:
            - name: APP_ENV
              value: production
            - name: GOOGLE_CLOUD_PROJECT
              value: shadowtag-omega-v4
            - name: GOOGLE_CLOUD_LOCATION
              value: us-central1
            - name: GEMINI_MODEL
              value: gemini-2.5-flash
            - name: FIRESTORE_DATABASE
              value: "(default)"
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secret-key
                  key: latest
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: stripe-webhook-secret
                  key: latest
---
# Staging variant
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: counselconduit-staging
  labels:
    app: counselconduit
    product: kovelai
    environment: staging
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
    spec:
      containerConcurrency: 20
      timeoutSeconds: 60
      containers:
        - image: us-central1-docker.pkg.dev/shadowtag-omega-v4/counselconduit/api:staging
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          env:
            - name: APP_ENV
              value: staging
            - name: GOOGLE_CLOUD_PROJECT
              value: shadowtag-omega-v4
