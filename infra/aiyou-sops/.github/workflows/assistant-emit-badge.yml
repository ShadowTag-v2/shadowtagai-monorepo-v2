name: assistant-emit-badge
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
jobs:
  emit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create badges dir
        run: mkdir -p .gh-pages/badges
      - name: Emit verification badge
        run: |
          echo "{ \"tier\": \"L2\", \"generated\": \"$(date -u +%FT%TZ)\" }" > .gh-pages/badges/verification.json
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .gh-pages