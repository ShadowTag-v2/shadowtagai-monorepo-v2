# infra/monitoring/alert_policies.yaml
# Cloud Monitoring Alert Policies for CounselConduit + ShadowTagAI
# Apply with: gcloud monitoring policies create --policy-from-file=alert_policies.yaml

# 1. High Error Rate: >5% 5xx errors in 5 minutes
- displayName: "CounselConduit 5xx Error Rate"
  combiner: OR
  conditions:
    - displayName: "5xx error rate > 5%"
      conditionThreshold:
        filter: >
          resource.type="cloud_run_revision"
          AND resource.labels.service_name="counselconduit"
          AND metric.type="run.googleapis.com/request_count"
          AND metric.labels.response_code_class="5xx"
        comparison: COMPARISON_GT
        thresholdValue: 5
        duration: 300s
        aggregations:
          - alignmentPeriod: 60s
            perSeriesAligner: ALIGN_RATE
  notificationChannels: []  # Add PagerDuty/Discord channel IDs
  alertStrategy:
    autoClose: 1800s

# 2. High Latency: p95 > 5 seconds
- displayName: "CounselConduit High Latency"
  combiner: OR
  conditions:
    - displayName: "p95 latency > 5s"
      conditionThreshold:
        filter: >
          resource.type="cloud_run_revision"
          AND resource.labels.service_name="counselconduit"
          AND metric.type="run.googleapis.com/request_latencies"
        comparison: COMPARISON_GT
        thresholdValue: 5000  # milliseconds
        duration: 300s
        aggregations:
          - alignmentPeriod: 60s
            perSeriesAligner: ALIGN_PERCENTILE_95

# 3. Token Budget Alert: >80% monthly token usage
- displayName: "CounselConduit Token Budget Warning"
  combiner: OR
  conditions:
    - displayName: "Token usage > 80%"
      conditionThreshold:
        filter: >
          resource.type="cloud_run_revision"
          AND resource.labels.service_name="counselconduit"
          AND metric.type="custom.googleapis.com/counselconduit/tokens_used"
        comparison: COMPARISON_GT
        thresholdValue: 80000  # 80% of 100K professional tier
        duration: 0s

# 4. Instance Count Spike
- displayName: "CounselConduit Instance Spike"
  combiner: OR
  conditions:
    - displayName: "instances > 10"
      conditionThreshold:
        filter: >
          resource.type="cloud_run_revision"
          AND resource.labels.service_name="counselconduit"
          AND metric.type="run.googleapis.com/container/instance_count"
        comparison: COMPARISON_GT
        thresholdValue: 10
        duration: 120s
