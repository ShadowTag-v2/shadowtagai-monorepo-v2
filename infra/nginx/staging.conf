# NGINX Staging Relay Configuration
# For Gideon OS staging proxy — routes IDE WebSocket + API traffic

upstream gideon_api {
    server 127.0.0.1:8080;
}

upstream gideon_ws {
    server 127.0.0.1:3000;
}

server {
    listen 8443 ssl;
    server_name staging.gideon-os.local;

    # Self-signed for local staging (mkcert)
    ssl_certificate     /usr/local/etc/nginx/certs/gideon-staging.pem;
    ssl_certificate_key /usr/local/etc/nginx/certs/gideon-staging-key.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss://staging.gideon-os.local ws://localhost:3000; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" always;

    # API routes → FastAPI backend
    location /api/ {
        proxy_pass http://gideon_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket relay → Obsidian sync daemon
    location /ws/ {
        proxy_pass http://gideon_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Static → AdminLTE frontend
    location / {
        root /Users/pikeymickey/.gemini/antigravity/Monorepo-Uphillsnowball/frontend/out;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
