[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agnt-keybindings"
version = "1.0.0"
description = "Headless keybinding management for Antigravity agents — ported from Claude Code"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "ShadowTag-v2" },
]
keywords = ["keybindings", "terminal", "agent", "daemon", "headless"]

# Zero external dependencies — pure stdlib Python
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.11",
]

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.ruff]
target-version = "py311"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "PLW"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
