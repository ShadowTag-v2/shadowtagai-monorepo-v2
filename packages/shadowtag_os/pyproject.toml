[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shadowtag-os"
version = "0.1.0"
description = "ShadowTag OS — Unified orchestration integrating PNKLN stack with Google Skills, zx, and A2UI"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "ShadowTag Core", email = "core@shadowtag.ai" }]

dependencies = [
    "google-cloud-aiplatform>=1.80.0",
    "google-cloud-firestore>=2.20.0",
    "pydantic>=2.10",
    "structlog>=24.4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.11",
]

[tool.hatch.build.targets.wheel]
packages = ["shadowtag_os"]

[tool.ruff]
line-length = 150
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
