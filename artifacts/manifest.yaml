# artifacts/manifest.yaml — Artifact Manifest
# This file tracks non-source payloads moved out of Git.
# Git stores this manifest; GCS (or other storage) stores the actual weight.
#
# Every entry MUST include: id, type, storage, uri, sha256, owner, status,
# and git_source_replacement (what to look at instead of the binary).
#
# Referenced by: upload_policy.yaml, tool_contracts/artifact.upload.yaml
# Version: 1

version: 1

artifacts:
