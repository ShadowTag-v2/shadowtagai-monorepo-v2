    type: source_mine_archive
    storage: gcs
    uri: gs://shadowtag-artifacts/legacy/legacy-archive-2026-04.tar.zst
    sha256: TBD
    owner: platform
    status: reference_only
    retention: indefinite
    git_source_replacement: docs/archive_index.md
