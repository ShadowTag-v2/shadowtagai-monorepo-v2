# ty.toml — Configuration for the ty type checker (Astral)
# These settings were previously in .vscode/settings.json as ty.analysis.*
# which ty rejected as "Received unknown options"

[environment]
python = "/opt/homebrew/bin/python3.14"
python-platform = "darwin"

[src]
# Additional source roots for import resolution
root = "."
extra-paths = ["src", "packages", "apps"]

[rules]
# Equivalent to the old ty.analysis.reportMissingImports, etc.
# ty uses its own rule system, not Pyright-style keys
