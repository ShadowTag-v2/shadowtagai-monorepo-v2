# ty.toml — Configuration for the ty type checker (Astral, v0.0.35)
# Valid sections: environment, src, rules, terminal, analysis, overrides
# Validated via: ty check --config-file ty.toml

[environment]
python = "/opt/homebrew/bin/python3.14"
python-version = "3.14"
python-platform = "darwin"
extra-paths = ["src", "packages", "apps"]

[src]
exclude = [
    "external_repos/",
    "archive/",
    "_archive*/",
    "node_modules/",
    ".venv/",
    "third_party/",
    "vendor/",
    "build/",
    "target/",
    ".mypy_cache/",
    ".ruff_cache/",
    ".pytest_cache/",
    "__pycache__/",
    "control/",
]
