# migration_manifest.yaml — Quarry → V2 Canonical Monorepo
# This file is the SINGLE SOURCE OF TRUTH for all transplantation decisions.
# Status: DRAFT — requires human review before execution.
# Created: 2026-04-27
#
# Dispositions:
#   TRANSPLANT  — move to V2 canonical repo (wave N)
#   DEFER       — hold for later evaluation
#   ABANDON     — never migrate, stays in quarry forever
#   CONSOLIDATE — merge with another path before transplanting
#
# Wave Model:
#   Wave 0: Governance, manifests, tool gateways, prepush gates
#   Wave 1: Shared libraries and packages
#   Wave 2: Revenue-generating apps (counselconduit, kovelai)
#   Wave 3: Infrastructure, CI, IaC
#   Wave 4: Remaining active apps
#   Wave 5: Controlled third-party dependencies

