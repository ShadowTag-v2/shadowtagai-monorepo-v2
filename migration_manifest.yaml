# NEVER MIGRATE — Quarry-Only Content
# ============================================================
never_migrate:
  - archive/                    # 59 GiB legacy snapshots
  - venv/                       # Python virtualenvs
  - .venv*/                     # Python virtualenvs
  - .gitnexus/                  # GitNexus analysis cache
  - .mypy_cache/                # Type-checking cache
  - node_modules/               # NPM dependencies
  - external_repos/             # Vendored forks
  - bazel-*/                    # Bazel symlinks
  - .tmp.driveupload/           # Google Drive artifacts
  - .scannerwork/               # SonarQube cache
  - "*.bundle"                  # Git bundles

