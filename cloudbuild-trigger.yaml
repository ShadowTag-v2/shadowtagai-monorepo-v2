# Cloud Build trigger config for CounselConduit deployment
# Used with: gcloud builds triggers create github
steps:
  # Step 1: Run preflight checks
  - name: 'python:3.14-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt
        python -m pytest tests/ --ignore=tests/test_zt_legal.py --ignore=tests/e2e/ -x -q
    id: 'preflight-tests'

  # Step 2: Build container
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/counselconduit/api:$COMMIT_SHA', '.']
    id: 'build'
    waitFor: ['preflight-tests']

  # Step 3: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/counselconduit/api:$COMMIT_SHA']
    id: 'push'
    waitFor: ['build']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'counselconduit'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/counselconduit/api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--min-instances=1'
      - '--service-account=counselconduit-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--quiet'
    id: 'deploy'
    waitFor: ['push']

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _DEPLOY_REGION: 'us-central1'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/counselconduit/api:$COMMIT_SHA'
