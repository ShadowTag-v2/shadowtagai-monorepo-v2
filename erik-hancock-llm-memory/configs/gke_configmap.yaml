# GKE Native ConfigMap for LLM Memory
# Stores Pnkln architecture, JR framework, and memory snapshots
# Used by init containers to inject context into pods

apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-memory
  namespace: default
  labels:
    app: pnkln
    component: memory
    version: v1.0.0
data:
  # Memory schema and architecture
  schema.json: |
    {
      "version": "1.0.0",
      "pnkln_architecture": {
        "judge_6": {
          "description": "Gemini + PyTorch + Rules engine with 98% coverage",
          "sla": {"coverage": 0.98, "p99_latency": "≤90ms"}
        },
        "shadowtag_2_0": {
          "description": "DCT watermarking for content protection"
        },
        "cor_ns": {
          "description": "Unified execution brain + service mesh"
        }
      },
      "jr_framework": {
        "purpose": "Does this advance Pnkln revenue/mission?",
        "reasons": "Defensible judgment with evidence",
        "brakes": "p99 survivability, bootstrap constraints"
      },
      "bootstrap_gates": {
        "roi_target": "3x in 18mo",
        "ltv_cac_target": "4:1 in 12mo",
        "p99_latency": "≤90ms",
        "security": "100% gate (absolute)"
      }
    }

  # Sync script for init containers
  sync-memory.sh: |
    #!/bin/bash
    set -e

    REPO_URL="https://github.com/ehanc69/erik-hancock-llm-memory.git"
    MEMORY_DIR="/mnt/memory"

    echo "Syncing LLM memory from GitHub..."

    # Clone or pull repo
    if [ -d "$MEMORY_DIR/.git" ]; then
      cd "$MEMORY_DIR"
      git pull origin main
    else
      git clone "$REPO_URL" "$MEMORY_DIR"
    fi

    # Copy current memory to shared volume
    cp "$MEMORY_DIR/memory/current.json" /shared/memory.json

    echo "✓ Memory synced to /shared/memory.json"

---
apiVersion: v1
kind: Pod
metadata:
  name: pnkln-worker-example
  namespace: default
  labels:
    app: pnkln
    component: worker
spec:
  # Init container: Sync memory from GitHub
  initContainers:
  - name: sync-memory
    image: alpine/git:latest
    command: ["/bin/sh"]
    args: ["/config/sync-memory.sh"]
    volumeMounts:
    - name: memory-config
      mountPath: /config
    - name: shared-memory
      mountPath: /shared

  # Main container: Use synced memory
  containers:
  - name: worker
    image: gcr.io/pnkln-prod/worker:latest
    env:
    - name: MEMORY_PATH
      value: "/shared/memory.json"
    - name: PNKLN_ARCHITECTURE
      value: "judge_6,shadowtag_2_0,cor_ns"
    volumeMounts:
    - name: shared-memory
      mountPath: /shared
      readOnly: true

  volumes:
  - name: memory-config
    configMap:
      name: llm-memory
      defaultMode: 0755
  - name: shared-memory
    emptyDir: {}

---
# Deployment example with memory injection
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pnkln-api
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pnkln
      component: api
  template:
    metadata:
      labels:
        app: pnkln
        component: api
    spec:
      initContainers:
      - name: sync-memory
        image: alpine/git:latest
        command: ["/bin/sh", "/config/sync-memory.sh"]
        volumeMounts:
        - name: memory-config
          mountPath: /config
        - name: shared-memory
          mountPath: /shared

      containers:
      - name: api
        image: gcr.io/pnkln-prod/api:latest
        ports:
        - containerPort: 8080
        env:
        - name: MEMORY_PATH
          value: "/shared/memory.json"
        - name: JR_FRAMEWORK_ENABLED
          value: "true"
        - name: BOOTSTRAP_GATES_ENABLED
          value: "true"
        volumeMounts:
        - name: shared-memory
          mountPath: /shared
          readOnly: true
        - name: memory-config
          mountPath: /config/schema.json
          subPath: schema.json
          readOnly: true

      volumes:
      - name: memory-config
        configMap:
          name: llm-memory
          defaultMode: 0755
      - name: shared-memory
        emptyDir: {}

---
# CronJob for periodic memory refresh
apiVersion: batch/v1
kind: CronJob
metadata:
  name: memory-sync
  namespace: default
spec:
  # Run every 6 hours
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: sync
            image: alpine/git:latest
            command:
            - /bin/sh
            - -c
            - |
              set -e
              REPO_URL="https://github.com/ehanc69/erik-hancock-llm-memory.git"
              MEMORY_DIR="/tmp/memory"

              echo "Syncing memory from GitHub..."
              git clone --depth 1 "$REPO_URL" "$MEMORY_DIR"

              # Update ConfigMap (requires kubectl with appropriate permissions)
              # In production, this would trigger a rolling update
              echo "✓ Memory synced"
              cat "$MEMORY_DIR/memory/current.json"

          restartPolicy: OnFailure
