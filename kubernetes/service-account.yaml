apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingestion-service-account
  namespace: pnkln-ingestion
  annotations:
    description: "Service account for Gemini Ingestion Layer CronJob"

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ingestion-role
  namespace: pnkln-ingestion
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ingestion-rolebinding
  namespace: pnkln-ingestion
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ingestion-role
subjects:
- kind: ServiceAccount
  name: ingestion-service-account
  namespace: pnkln-ingestion
