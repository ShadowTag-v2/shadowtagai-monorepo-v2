name: Assistant Defaults Guard
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate .ShadowTag-v2/assistant.defaults.json exists
        shell: bash
        run: |
          test -f .ShadowTag-v2/assistant.defaults.json || { echo "missing defaults"; exit 1; }
          jq . .ShadowTag-v2/assistant.defaults.json >/dev/null 2>&1 || { echo "invalid json"; exit 1; }