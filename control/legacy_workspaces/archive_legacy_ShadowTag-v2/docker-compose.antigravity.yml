  # FastAPI Backend (Python)
  # ============================================================
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    container_name: antigravity-fastapi
    environment:
      - ENVIRONMENT=development
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LOG_LEVEL=debug
    healthcheck:
      interval: 30s
      retries: 3
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      timeout: 3s
    networks:
      - antigravity
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./agents:/app/agents:cached
      - ./app:/app/app:cached
      - ./shadowtagai:/app/shadowtagai:cached
      - ./src:/app/src:cached

  # ============================================================
  # FastGPT - Knowledge Console (RAG)
  # ============================================================
  fastgpt:
    container_name: antigravity-fastgpt
    depends_on:
      - flyingmonkeys
      - mongodb
    environment:
      - DB_URL=mongodb://mongodb:27017/fastgpt
      - DEFAULT_MODEL=gemini-3.1-flash
      - OPENAI_API_KEY=dummy
      - OPENAI_BASE_URL=http://flyingmonkeys:8600/v1
    image: ghcr.io/labring/fastgpt:latest
    networks:
      - antigravity
    ports:
      - "3001:3000"
    restart: unless-stopped

  # ============================================================
  # FlyingMonkeys - 600 Agent Swarm (Tiered Gemini)
  # ============================================================
  flyingmonkeys:
    # Note: Installing pip packages at runtime is slow; consider moving to a Dockerfile
    command: >
      bash -c "pip install --quiet fastapi uvicorn pydantic && python bin/flyingmonkeys-server"
    container_name: flyingmonkeys-server
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL_BULK=gemini-3.1-flash
      - GEMINI_MODEL_GOVERNANCE=gemini-3.1-pro
      - PYTHONPATH=/app
    healthcheck:
      interval: 30s
      retries: 3
      test: ["CMD", "curl", "-f", "http://localhost:8600/health"]
      timeout: 3s
    image: python:3.11-slim
    networks:
      - antigravity
    ports:
      - "8600:8600"
    restart: unless-stopped
    volumes:
      - ./agents:/app/agents:cached
      - ./bin:/app/bin:cached
      - ./src:/app/src:cached
    working_dir: /app

  # ============================================================
  # Gemini CLI - Google AI CLI Interface
  # ============================================================
  gemini-cli:
    command: >
      bash -c "npm install -g @google/gemini-cli && sleep infinity"
    container_name: gemini-cli
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    image: node:20-slim
    networks:
      - antigravity
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - ./:/app:cached
      - gemini-cli-cache:/root/.gemini
    working_dir: /app

  # ============================================================
  # mitmproxy - Intercepts Antigravity IDE traffic
  # ============================================================
  mitmproxy:
    # Fixed: Combined flags into single command using multiline syntax
    command: >
      mitmweb
      --web-host 0.0.0.0
      --set confdir=/home/mitmproxy/.mitmproxy
      --ignore-hosts '^(accounts\.google\.com|oauth2\.googleapis\.com)'
    container_name: antigravity-proxy
    image: mitmproxy/mitmproxy:latest
    networks:
      - antigravity
    ports:
      - "8082:8080"   # Proxy port (8080 in use by kuvasz)
      - "8083:8081"   # Web interface
    restart: unless-stopped
    volumes:
      - ./tools/dev-environment/antigravity-proxy:/home/mitmproxy/.mitmproxy

  # ============================================================
  # MongoDB - FastGPT Database
  # ============================================================
  mongodb:
    container_name: fastgpt-mongo
    image: mongo:6
    networks:
      - antigravity
    ports:
      - "27017:27017"
    restart: unless-stopped
    volumes:
      - fastgpt-mongo-data:/data/db

