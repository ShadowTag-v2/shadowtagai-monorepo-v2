    restart: unless-stopped

  # ============================================================
  # Terraform Auditor - Infrastructure with Swarm Audit
  # ============================================================
  terraform-auditor:
    container_name: terraform-auditor
    depends_on:
      - flyingmonkeys
    entrypoint: ["tail", "-f", "/dev/null"]
    environment:
      - FLYINGMONKEYS_URL=http://flyingmonkeys-server:8600
      - TF_VAR_project_id=${GCP_PROJECT_ID:-}
      - TF_VAR_region=${GCP_REGION:-us-central1}
    image: hashicorp/terraform:1.6
    networks:
      - antigravity
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - ./infrastructure:/app/infrastructure:cached
      - ./scripts:/app/scripts:cached
      - ~/.aws:/root/.aws:ro
      - ~/.config/gcloud:/root/.config/gcloud:ro
    working_dir: /app/infrastructure

