    Apply EVERY block above. Prioritize [N-LINK] intent -> Cost-Arbitrage Routing -> Temporal-Reversal Safety -> Q* Optimization -> DeepSeek CLI / OpenClaw Safe Mode / Scrapling Hybrid execution.
