      1. Simple/static -> `Scrapling StealthyFetcher` (adaptive=True, sticky proxies).
      2. JS-heavy/SPA/React -> `FireCrawl MCP` (scroll_to_bottom: true, wait_for: networkIdle) OR `Dia Browser Agent`.
