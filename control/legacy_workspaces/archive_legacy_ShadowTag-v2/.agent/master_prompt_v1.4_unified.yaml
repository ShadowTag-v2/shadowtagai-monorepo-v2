      \ reasoning and analysis tool calls (e.g., `python`, `web`, `user_info`, `guardian_tool`).\
      \ Content here is never shown directly to the user.  \n- The **commentary**\
      \ channel is for user\u2011visible tool calls only (e.g., `python_user_visible`,\
      \ `canmore`, `bio`, `automations`, `image_gen`); no plain\u2011text or reasoning\
