  DESIGN_PRINCIPLES_FOR_VISUAL_ARTIFACTS:
    description: Extracted block DESIGN_PRINCIPLES_FOR_VISUAL_ARTIFACTS
    rules: "When creating visual artifacts (HTML, React components, or any UI elements):\n\
      - **For complex applications (Three.js, games, simulations)**: Prioritize functionality,\
      \ performance, and user experience over visual flair. Focus on:\n  - Smooth\
      \ frame rates and responsive controls\n  - Clear, intuitive user interfaces\n\
