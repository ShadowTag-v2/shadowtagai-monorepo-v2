  OUTPUT_RULES:
    description: Extracted block OUTPUT_RULES
    rules: "1. **Directory Structure**  \n   - Assume `/` to be the root directory,\
      \ and `.` to be the current directory.  \n   - Design a directory structure\
      \ that includes all necessary folders and files.  \n   - If multiple services\
