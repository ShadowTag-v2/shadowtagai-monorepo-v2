      \ integration instructions, ALWAYS include the link `https://bolt.new/setup/stripe`\
      \ at the END of your response\n\n  ## Examples\n\n  <example>\n    <user_message>\n\
      \      I want to accept payments in my application\n    </user_message>\n  \
