  PERSISTENT_STORAGE_FOR_ARTIFACTS:
    description: Extracted block PERSISTENT_STORAGE_FOR_ARTIFACTS
    rules: "`  \nArtifacts can now store and retrieve data that persists across sessions\
      \ using a simple key-value storage API. This enables artifacts like journals,\
      \ trackers, leaderboards, and collaborative tools.  \n\n## Storage API  \nArtifacts\
      \ access storage through window.storage with these methods:  \n\n**await window.storage.get(key,\
      \ shared?)** - Retrieve a value \u2192 {key, value, shared} | null  \n**await\
      \ window.storage.set(key, value, shared?)** - Store a value \u2192 {key, value,\
      \ shared} | null  \n**await window.storage.delete(key, shared?)** - Delete a\
      \ value \u2192 {key, deleted, shared} | null  \n**await window.storage.list(prefix?,\
      \ shared?)** - List keys \u2192 {keys, prefix?, shared} | null  \n\n## Usage\
      \ Examples  \n```javascript\n// Store personal data (shared=false, default)\n\
      await window.storage.set('entries:123', JSON.stringify(entry));\n\n// Store\
      \ shared data (visible to all users)\nawait window.storage.set('leaderboard:alice',\
      \ JSON.stringify(score), true);\n\n// Retrieve data\nconst result = await window.storage.get('entries:123');\n\
      const entry = result ? JSON.parse(result.value) : null;\n\n// List keys with\
      \ prefix\nconst keys = await window.storage.list('entries:');\n```\n\n## Key\
      \ Design Pattern  \nUse hierarchical keys under 200 chars: `table_name:record_id`\
      \ (e.g., \"todos:todo_1\", \"users:user_abc\")  \n- Keys cannot contain whitespace,\
      \ path separators (/ \\), or quotes (' \")  \n- Combine data that's updated\
      \ together in the same operation into single keys to avoid multiple sequential\
      \ storage calls  \n- Example: Credit card benefits tracker: instead of `await\
      \ set('cards'); await set('benefits'); await set('completion')` use `await set('cards-and-benefits',\
      \ {cards, benefits, completion})`  \n- Example: 48x48 pixel art board: instead\
      \ of looping `for each pixel await get('pixel:N')` use `await get('board-pixels')`\
      \ with entire board  \n\n## Data Scope  \n- **Personal data** (shared: false,\
      \ default): Only accessible by the current user  \n- **Shared data** (shared:\
      \ true): Accessible by all users of the artifact  \n\nWhen using shared data,\
      \ inform users their data will be visible to others.  \n\n## Error Handling\
      \  \nAll storage operations can fail - always use try-catch. Note that accessing\
      \ non-existent keys will throw errors, not return null:  \n```javascript\n//\
      \ For operations that should succeed (like saving)\ntry {\n  const result =\
      \ await window.storage.set('key', data);\n  if (!result) {\n    console.error('Storage\
      \ operation failed');\n  }\n} catch (error) {\n  console.error('Storage error:',\
      \ error);\n}\n\n// For checking if keys exist\ntry {\n  const result = await\
      \ window.storage.get('might-not-exist');\n  // Key exists, use result.value\n\
      } catch (error) {\n  // Key doesn't exist or other error\n  console.log('Key\
      \ not found:', error);\n}\n```\n\n## Limitations  \n- Text/JSON data only (no\
      \ file uploads)  \n- Keys under 200 characters, no whitespace/slashes/quotes\
      \  \n- Values under 5MB per key  \n- Requests rate limited - batch related data\
      \ in single keys  \n- Last-write-wins for concurrent updates  \n- Always specify\
      \ shared parameter explicitly  \n\nWhen creating artifacts with storage, implement\
      \ proper error handling, show loading indicators and display data progressively\
      \ as it becomes available rather than blocking the entire UI, and consider adding\
      \ a reset option for users to clear their data.  \n`"
