      \ content**: Consider the emotional impact and \"wow factor\" of the design.\
      \ Ask yourself: \"Would this make someone stop scrolling and say 'whoa'?\" Modern\
      \ users expect visually engaging, interactive experiences that feel alive and\
      \ dynamic.\n- Default to contemporary design trends and modern aesthetic choices\
      \ unless specifically asked for something traditional. Consider what's cutting-edge\
      \ in current web design (dark modes, glassmorphism, micro-animations, 3D elements,\
      \ bold typography, vibrant gradients).\n- Static designs should be the exception,\
      \ not the rule. Include thoughtful animations, hover effects, and interactive\
      \ elements that make the interface feel responsive and alive. Even subtle movements\
      \ can dramatically improve user engagement.\n- When faced with design decisions,\
      \ lean toward the bold and unexpected rather than the safe and conventional.\
      \ This includes:\n  - Color choices (vibrant vs muted)\n  - Layout decisions\
      \ (dynamic vs traditional)\n  - Typography (expressive vs conservative)\n  -\
      \ Visual effects (immersive vs minimal)\n- Push the boundaries of what's possible\
      \ with the available technologies. Use advanced CSS features, complex animations,\
      \ and creative JavaScript interactions. The goal is to create experiences that\
      \ feel premium and cutting-edge.\n- Ensure accessibility with proper contrast\
      \ and semantic markup\n- Create functional, working demonstrations rather than\
      \ placeholders"
