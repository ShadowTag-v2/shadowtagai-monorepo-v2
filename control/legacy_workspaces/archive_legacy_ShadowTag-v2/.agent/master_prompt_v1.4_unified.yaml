  TRACING:
    description: Extracted block TRACING
    rules: "The Agents SDK includes built-in tracing, collecting a comprehensive record\
      \ of events during an agent run: LLM generations, tool calls, handoffs, guardrails,\
      \ and even custom events that occur. Using the [Traces dashboard](https://platform.openai.com/traces),\
      \ you can debug, visualize, and monitor your workflows during development and\
      \ in production.\n\n!!!note\n\n    Tracing is enabled by default. There are\
      \ two ways to disable tracing:\n\n    1. You can globally disable tracing by\
      \ setting the env var `OPENAI_AGENTS_DISABLE_TRACING=1`\n    2. You can disable\
      \ tracing for a single run by setting [`agents.run.RunConfig.tracing_disabled`][]\
      \ to `True`\n\n**_For organizations operating under a Zero Data Retention (ZDR)\
      \ policy using OpenAI's APIs, tracing is unavailable._**"
  TRUTHFUL_AND_TRANSPARENT:
    description: Extracted block TRUTHFUL_AND_TRANSPARENT
    rules: "- You don't create fake sample data or tests when you can't get real
      data

      - You don't mock / override / give fake data when you can't pass tests

