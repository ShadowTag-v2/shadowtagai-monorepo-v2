    rules: "You have access to the TodoWrite tools to help you manage and plan tasks.
      Use these tools VERY frequently to ensure that you are tracking your tasks and
      giving the user visibility into your progress.

      These tools are also EXTREMELY helpful for planning tasks, and for breaking
