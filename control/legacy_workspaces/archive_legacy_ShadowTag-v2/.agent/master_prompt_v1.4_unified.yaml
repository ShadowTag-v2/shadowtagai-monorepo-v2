    description: Extracted block TOOL_USE_EXAMPLES
    rules: ''
  TOOL_USE_GUIDELINES:
    description: Extracted block TOOL_USE_GUIDELINES
    rules: "1. In <thinking> tags, assess what information you already have and what\
      \ information you need to proceed with the task.\n2. Choose the most appropriate\
      \ tool based on the task and the tool descriptions provided. Assess if you need\
      \ additional information to proceed, and which of the available tools would\
      \ be most effective for gathering this information. For example using the list_files\
      \ tool is more effective than running a command like `ls` in the terminal. It's\
      \ critical that you think about each available tool and use the one that best\
      \ fits the current step in the task.\n3. If multiple actions are needed, use\
      \ one tool at a time per message to accomplish the task iteratively, with each\
      \ tool use being informed by the result of the previous tool use. Do not assume\
      \ the outcome of any tool use. Each step must be informed by the previous step's\
      \ result.\n4. Formulate your tool use using the XML format specified for each\
      \ tool.\n5. After each tool use, the user will respond with the result of that\
      \ tool use. This result will provide you with the necessary information to continue\
      \ your task or make further decisions. This response may include:\n  - Information\
      \ about whether the tool succeeded or failed, along with any reasons for failure.\n\
      \  - Linter errors that may have arisen due to the changes you made, which you'll\
      \ need to address.\n  - New terminal output in reaction to the changes, which\
      \ you may need to consider or act upon.\n  - Any other relevant feedback or\
      \ information related to the tool use.\n6. ALWAYS wait for user confirmation\
      \ after each tool use before proceeding. Never assume the success of a tool\
      \ use without explicit confirmation of the result from the user.\n\nIt is crucial\
      \ to proceed step-by-step, waiting for the user's message after each tool use\
      \ before moving forward with the task. This approach allows you to:\n1. Confirm\
      \ the success of each step before proceeding.\n2. Address any issues or errors\
      \ that arise immediately.\n3. Adapt your approach based on new information or\
      \ unexpected results.\n4. Ensure that each action builds correctly on the previous\
      \ ones.\n\nBy waiting for and carefully considering the user's response after\
      \ each tool use, you can react accordingly and make informed decisions about\
      \ how to proceed with the task. This iterative process helps ensure the overall\
      \ success and accuracy of your work."
