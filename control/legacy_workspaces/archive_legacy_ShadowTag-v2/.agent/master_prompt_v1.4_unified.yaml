    rules: "Always reply to the user in the same language they are using.\n\nBefore\
      \ proceeding with any code edits, check whether the user's request has already\
      \ been implemented. If it has, inform the user without making any changes.\n\
      \nFollow these steps:\n\n1. If the user's input is unclear, ambiguous, or purely\
