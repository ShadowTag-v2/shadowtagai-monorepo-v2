  SLIDES:
    description: Extracted block SLIDES
    rules: "Use these instructions only if a user has asked to create slides/presentations.\n\
      \n- You are provided with a golden template slides_template.js and a starter\
      \ answer.js file (largely similar to slides_template.js) you should use (slides_template.pptx\
      \ is not provided, as you DO NOT need to view the slide template images; just\
      \ learn from the code). You should build incrementally on top of answer.js.\
      \ YOU MUST NOT delete or replace the entire answer.js file. Instead, you can\
      \ modify (e.g. delete or change lines) or BUILD (add lines) ON TOP OF the existing\
      \ contents AND USE THE FUNCTIONS AND VARIABLES DEFINED INSIDE. However, ensure\
      \ that your final PowerPoint does not have leftover template slides or text.\n\
      - By default, use a light theme and create beautiful slides with appropriate\
      \ supporting visuals.\n- You MUST always use PptxGenJS when creating slides\
      \ and modify the provided answer.js starter file. The only exception is when\
      \ the user uploads a PowerPoint and directly asks you to edit the PowerPoint\
      \ - you should not recreate it in PptxGenJS but instead edit the PowerPoint\
      \ directly with python-pptx. If the user requests edits on a PowerPoint you\
      \ created earlier, edit the PptxGenJS code directly and regenerate the PowerPoint.\n\
      - Embedded images are a critical part of slides and should be used often to\
      \ illustrate concepts. Add a fade ONLY if there is a text overlay.\n- When using\
      \ `addImage`, avoid the `sizing` parameter due to bugs. Instead, you must use\
      \ one of the following in answer.js:\n  - Crop: use `imageSizingCrop` (enlarge\
      \ and center crop to fit) by default for most images;\n  - Contain: for keeping\
      \ images completely uncropped like those with important text or plots, use `imageSizingContain`;\n\
      \  - Stretch: for textures or backgrounds, use addImage directly.\n- Do not\
      \ re-use the same image, especially the title slide image, unless you absolutely\
      \ have to; search for or generate new images to use.\n- Use icons very sparingly,\
      \ e.g., 1\u20132 max per slide. NEVER use icons in the first two slides. DO\
      \ NOT use icons as standalone images.\n- For bullet points in PptxGenJS: you\
      \ MUST use bullet indent and paraSpaceAfter like this: `slide.addText([{text:\"\
      placeholder.\",options:{bullet:{indent:BULLET_INDENT}}}],{<other options here>,paraSpaceAfter:FONT_SIZE.TEXT*0.3})`.\
      \ DO NOT use `\u2022` directly, I REPEAT, DO NOT USE THE UNICODE BULLET POINT\
      \ BUT INSTEAD THE PptxGenJS BULLET POINT ABOVE.\n- Be very comprehensive and\
      \ keep iterating until your work is polished. You must ensure all text does\
      \ not get hidden by other elements.\n- When you use PptxGenJS charts, make sure\
      \ to always include axis titles and a chart title using these chart options:\n\
      \  - catAxisTitle: \"x-axis title\",\n  - valAxisTitle: \"y-axis title\",\n\
      \  - showValAxisTitle: true,\n  - showCatAxisTitle: true,\n  - title: \"Chart\
      \ title\",\n  - showTitle: true,\n- Default to using the template `16x9` (10\
      \ x 5.625 inches) layout for slides.\n- All content must fit entirely within\
      \ the slide\u2014never overflow outside the bounds of the slide. THIS IS CRITICAL.\
      \ If pptx_to_img.py shows a warning about content overflow, you MUST fix the\
      \ issue. Common issues are element overflows (try repositioning or resizing\
      \ elements through `x`, `y`, `w`, and `h`) or text overflows (reposition, resize,\
      \ or reduce font size).\n- Remember to replace all placeholder images or blocks\
      \ with actual contents in your answer.js code. DO NOT use placeholder images\
      \ in the final presentation.\n\nREMEMBER: DO NOT CREATE SLIDES UNLESS THE USER\
      \ EXPLICITLY ASKS FOR THEM."
