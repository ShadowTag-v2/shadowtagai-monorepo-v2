  USAGE_IN_ACTION_HANDLER:
    description: Extracted block USAGE_IN_ACTION_HANDLER
    rules: "class MyChatKitServer(ChatKitServer[RequestContext])\n    async def action(\n\
      \        self,\n        thread: ThreadMetadata,\n        action: Action[str,\
      \ Any],\n        sender: WidgetItem | None,\n        context: RequestContext,\n\
      \    ) -> AsyncIterator[Event]:\n        # add custom error handling if needed\n\
      \        app_action = parse_app_action(action)\n        if (app_action.type\
      \ == \"example\"):\n            await do_thing(app_action.payload.id)\n\nUse\
      \ widgets and actions to create custom forms\nWhen widget nodes that take user\
      \ input are mounted inside a Form, the values from those fields will be included\
      \ in the payload of all actions that originate from within the Form.\nForm values\
      \ are keyed in the payload by their name e.g.\n* \nSelect(name=\"title\") \u2192\
      \ action.payload.title\n\n* Select(name=\"todo.title\") \u2192 action.payload.todo.title\n\
      Form(\n  direction=\"col\",\n  onSubmitAction=ActionConfig(\n\t  type=\"update_todo\"\
      ,\n\t  payload={\"id\": todo.id}\n  ),\n  children=[\n    Title(value=\"Edit\
      \ Todo\"),\n\n    Text(value=\"Title\", color=\"secondary\", size=\"sm\"),\n\
      \    Text(\n      value=todo.title,\n      editable=EditableProps(name=\"title\"\
      , required=True),\n    )\n\n    Text(value=\"Description\", color=\"secondary\"\
      , size=\"sm\"),\n    Text(\n      value=todo.description,\n      editable=EditableProps(name=\"\
      description\"),\n    ),\n\n    Button(label=\"Save\", submit=true)\n  ]\n)\n\
      \nclass MyChatKitServer(ChatKitServer[RequestContext])\n    async def action(\n\
      \        self,\n        thread: ThreadMetadata,\n        action: Action[str,\
      \ Any],\n        sender: WidgetItem | None,\n        context: RequestContext,\n\
      \    ) -> AsyncIterator[Event]:\n        if (action.type == \"update_todo\"\
      ):\n          id = action.payload['id']\n          # Any action that originates\
      \ from within the Form will\n          # include title and description\n   \
      \       title = action.payload['title']\n          description = action.payload['description']\n\
      \n\t        # ...\n\nValidation\nForm uses basic native form validation; enforcing\
      \ required and pattern on fields where they are configured and blocking submission\
      \ when the form has any invalid field.\nWe may add new validation modes with\
      \ better UX, more expressive validation, custom error display, etc in the future.\
      \ Until then, widgets are not a great medium for complex forms with tricky validation.\
      \ If you have this need, a better pattern would be to use client side action\
      \ handling to trigger a modal, show a custom form there, then pass the result\
      \ back into ChatKit with sendAction.\nTreating Card as a Form\nYou can pass\
      \ asForm=True to Card and it will behave as a Form, running validation and passing\
      \ collected fields to the Card\u2019s confirm action.\nPayload key collisions\n\
      If there is a naming collision with some other existing pre-defined key on your\
      \ payload, the form value will be ignored. This is probably a bug, so we\u2019\
      ll emit an error event when we see this.\nCustomize how actions interact with\
      \ loading states in widgets\nUse ActionConfig.loadingBehavior to control how\
      \ actions trigger different loading states in a widget.\nButton(\n    label=\"\
      This make take a while...\",\n    onClickAction=ActionConfig(\n      type=\"\
      long_running_action_that_should_block_other_ui_interactions\",\n      loadingBehavior=\"\
      container\"\n    )\n)\n\nValue\tBehavior\nauto\tThe action will adapt to how\
      \ it\u2019s being used. (default)\nself\tThe action triggers loading state on\
      \ the widget node that the action was bound to.\ncontainer\tThe action triggers\
      \ loading state on the entire widget container. This causes the widget to fade\
      \ out slightly and become inert.\nnone\tNo loading state\nUsing auto behavior\n\
      Generally, we recommend using auto, which is the default. auto triggers loading\
      \ states based on where the action is bound, for example:\n* \nButton.onClickAction\
      \ \u2192 self\n\nSelect.onChangeAction \u2192 none\n\nCard.confirm.action \u2192\
      \ container"
