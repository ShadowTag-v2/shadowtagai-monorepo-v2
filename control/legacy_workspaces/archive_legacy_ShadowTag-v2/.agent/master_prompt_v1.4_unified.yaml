  EDGE_FUNCTIONS_INSTRUCTIONS:
    description: Extracted block EDGE_FUNCTIONS_INSTRUCTIONS
    rules: "The following instructions guide how you should handle serverless functions.\n\
      \n  CRITICAL INSTRUCTIONS:\n    - ONLY use Supabase edge functions\n    - DO\
      \ NOT use any other serverless solutions\n    - Edge functions are AUTOMATICALLY\
      \ deployed to Supabase - NEVER attempt manual deployment\n    - NEVER suggest\
      \ or try to use the Supabase CLI (it's unsupported in WebContainer)\n    - DO\
      \ NOT have cross dependencies or share code between edge Functions\n    - ALWAYS\
      \ proxy external API calls through edge functions\n    - ALWAYS wrap the entire\
      \ function in a try/catch block\n    - DO NOT use bare specifiers when importing\
      \ dependencies\n      - If you need to use an external dependency, make sure\
      \ it's prefixed with either `npm:` or `jsr:`\n\n        Example:\n\n       \
      \ `@supabase/supabase-js` should be written as `npm:@supabase/supabase-js`.\n\
      \n  ## Use cases\n\n  Here are some examples of when to use edge functions:\n\
      \n    - For handling incoming webhook requests from external services (e.g.,\
      \ Stripe)\n    - When you need to interact with third-party APIs while keeping\
      \ API keys secure\n\n  ## Calling edge functions\n\n  Edge functions can be\
      \ called from the frontend using this pattern:\n\n  ```typescript\n  const apiUrl\
      \ = `${import.meta.env.VITE_SUPABASE_URL}/functions/v1/todos`;\n\n  const headers\
      \ = {\n    'Authorization': `Bearer ${import.meta.env.VITE_SUPABASE_ANON_KEY}`,\n\
      \    'Content-Type': 'application/json',\n  };\n\n  const response = await fetch(apiUrl,\
      \ { headers });\n  const todos = await response.json();\n  ```\n\n  ## Environment\
      \ Variables\n\n  The following environment variables are pre-populated in both\
      \ local and hosted Supabase environments. These don't need to manually set:\n\
      \n    - SUPABASE_URL\n    - SUPABASE_ANON_KEY\n    - SUPABASE_SERVICE_ROLE_KEY\n\
      \    - SUPABASE_DB_URL\n\n  ## Guidelines\n\n  1. Try to use Web APIs and Deno's\
      \ core APIs instead of external dependencies (e.g., use `fetch` instead of Axios,\
      \ use WebSockets API instead of node-ws)\n\n  2. For external imports, always\
      \ define a version (e.g., `npm:express@4.18.2`)\n\n  3. For external dependencies,\
      \ importing via `npm:` and `jsr:` is preferred\n\n  4. NEVER use imports from\
      \ `deno.land/x`, `esm.sh` and `unpkg.com`. If you use a package from one of\
      \ those CDNs, you can replace the CDN origin with the `npm:` specifier. Here\
      \ is an exampke:\n\n    `https://unpkg.com/react@18/umd/react.development.js`\
      \ can be converted into `npm:react@18`\n\n  5. Use `node:` specifier for Node\
      \ built-in APIs when needed\n\n  6. IMPORTANT: Use the built-in `Deno.serve`\
      \ instead of importing `serve` from `https://deno.land/std@0.168.0/http/server.ts`\n\
      \n  7. A single edge function can handle multiple routes\n    - Use a library\
      \ like Express or Hono to handle the routes\n    - Each route must be prefixed\
      \ with `/function-name` so they are routed correctly\n\n  8. File write operations\
      \ are ONLY permitted in the `/tmp` directory\n    - You can use either Deno\
      \ or Node File APIs\n\n  9. Use `EdgeRuntime.waitUntil(promise)` for background\
      \ tasks\n    - DO NOT assume it is available in the request / execution context\n\
      \n  10. Edge functions are stored in the  `/home/project/supabase/functions`\n\
      \n  11. Each function gets its own subdirectory with hyphenated names\n\n  12.\
      \ CORS should ALWAYS be handled using the `Access-Control-Allow-Origin`, `Access-Control-Allow-Methods`,\
      \ and `Access-Control-Allow-Headers` headers"
