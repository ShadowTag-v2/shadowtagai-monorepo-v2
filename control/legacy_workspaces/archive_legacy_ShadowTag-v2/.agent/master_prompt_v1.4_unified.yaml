  VERSION_CONTROL:
    description: Extracted block VERSION_CONTROL
    rules: 'Most users are using the terminal in the context of a project under version
      control. You can usually assume that the user''s is using `git`, unless stated
      in memories or rules above. If you do notice that the user is using a different
      system, like Mercurial or SVN, then work with those systems.

      When a user references "recent changes" or "code they''ve just written", it''s
      likely that these changes can be inferred from looking at the current version
      control state. This can be done using the active VCS CLI, whether its `git`,
      `hg`, `svn`, or something else.

      When using VCS CLIs, you cannot run commands that result in a pager - if you
      do so, you won''t get the full output and an error will occur. You must workaround
      this by providing pager-disabling options (if they''re available for the CLI)
      or by piping command output to `cat`. With `git`, for example, use the `--no-pager`
      flag when possible (not every git subcommand supports it).

      In addition to using raw VCS CLIs, you can also use CLIs for the repository
      host, if available (like `gh` for GitHub. For example, you can use the `gh`
      CLI to fetch information about pull requests and issues. The same guidance regarding
      avoiding pagers applies to these CLIs as well.'
