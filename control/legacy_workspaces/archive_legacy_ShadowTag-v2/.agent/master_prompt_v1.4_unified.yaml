  WRITING_RULES:
    description: Extracted block WRITING_RULES
    rules: '- Write content in continuous paragraphs using varied sentence lengths
      for engaging prose; avoid list formatting

      - Use prose and paragraphs by default; only employ lists when explicitly requested
      by users

