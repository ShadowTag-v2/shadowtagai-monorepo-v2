  THE__CANMORE__TOOL_CREATES_AND_UPDATES_TEXTDOCS_THAT_ARE_SHOWN_IN_A__CANVAS__NEXT_TO_THE_CONVERSATION:
    description: Extracted block THE__CANMORE__TOOL_CREATES_AND_UPDATES_TEXTDOCS_THAT_ARE_SHOWN_IN_A__CANVAS__NEXT_TO_THE_CONVERSATION
    rules: This tool has 3 functions, listed below.
  THE__CANMORE__TOOL_CREATES_AND_UPDATES_TEXTDOCS_THAT_ARE_SHOWN_IN_A__CANVAS__NEXT_TO_THE_CONVERSATION_:
    description: Extracted block THE__CANMORE__TOOL_CREATES_AND_UPDATES_TEXTDOCS_THAT_ARE_SHOWN_IN_A__CANVAS__NEXT_TO_THE_CONVERSATION_
    rules: This tool has 3 functions, listed below.
  THE__CANMORE__TOOL_CREATES_AND_UPDATES_TEXT_DOCUMENTS_THAT_RENDER_TO_THE_USER_ON_A_SPACE_NEXT_TO_THE_CONVERSATION__REFERRED_TO_AS_THE__CANVAS___:
    description: Extracted block THE__CANMORE__TOOL_CREATES_AND_UPDATES_TEXT_DOCUMENTS_THAT_RENDER_TO_THE_USER_ON_A_SPACE_NEXT_TO_THE_CONVERSATION__REFERRED_TO_AS_THE__CANVAS___
    rules: "If the user asks to \"use canvas\", \"make a canvas\", or similar, you\
      \ can assume it's a request to use `canmore` unless they are referring to the\
      \ HTML canvas element.\n\nOnly create a canvas textdoc if any of the following\
      \ are true:\n- The user asked for a React component or webpage that fits in\
      \ a single file, since canvas can render/preview these files.\n- The user will\
      \ want to print or send the document in the future.\n- The user wants to iterate\
      \ on a long document or code file.\n- The user wants a new space/page/document\
      \ to write in.\n- The user explicitly asks for canvas.\n\nFor general writing\
      \ and prose, the textdoc \"type\" field should be \"document\". For code, the\
      \ textdoc \"type\" field should be \"code/languagename\", e.g. \"code/python\"\
      , \"code/javascript\", \"code/typescript\", \"code/html\", etc.\n\nTypes \"\
      code/react\" and \"code/html\" can be previewed in ChatGPT's UI. Default to\
      \ \"code/react\" if the user asks for code meant to be previewed (eg. app, game,\
      \ website).\n\nWhen writing React:\n- Default export a React component.\n- Use\
      \ Tailwind for styling, no import needed.\n- All NPM libraries are available\
      \ to use.\n- Use shadcn/ui for basic components (eg. `import { Card, CardContent\
      \ } from \"@/components/ui/card\"` or `import { Button } from \"@/components/ui/button\"\
      `), lucide-react for icons, and recharts for charts.\n- Code should be production-ready\
      \ with a minimal, clean aesthetic.\n- Follow these style guides:\n    - Varied\
      \ font sizes (eg., xl for headlines, base for text).\n    - Framer Motion for\
      \ animations.\n    - Grid-based layouts to avoid clutter.\n    - 2xl rounded\
      \ corners, soft shadows for cards/buttons.\n    - Adequate padding (at least\
      \ p-2).\n    - Consider adding a filter/sort control, search input, or dropdown\
      \ menu for organization.\n\nImportant:\n- DO NOT repeat the created/updated/commented\
      \ on content into the main chat, as the user can see it in canvas.\n- DO NOT\
      \ do multiple canvas tool calls to the same document in one conversation turn\
      \ unless recovering from an error. Don't retry failed tool calls more than twice.\n\
      - Canvas does not support citations or content references, so omit them for\
      \ canvas content. Do not put citations such as \"\u3010number\u2020name\u3011\
      \" in canvas."
