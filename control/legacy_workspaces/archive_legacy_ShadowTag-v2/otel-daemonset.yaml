apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-monkeys
  namespace: penal-colony
  labels:
    app: otel-monkeys
spec:
  selector:
    matchLabels:
      app: otel-monkeys
  template:
    metadata:
      labels:
        app: otel-monkeys
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: otel
        image: otel/opentelemetry-collector-contrib:0.94.0
        args: ["--config=/conf/otel-collector-config.yaml"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        resources:
          limits:
            cpu: 200m
            memory: 400Mi
          requests:
            cpu: 100m
            memory: 200Mi
        ports:
        - containerPort: 4317 # OTLP gRPC
        - containerPort: 4318 # OTLP HTTP
        - containerPort: 8888 # Metrics
        volumeMounts:
        - name: config
          mountPath: /conf
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: otel-monkeys-config
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-monkeys-config
  namespace: penal-colony
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
      prometheus:
        config:
          scrape_configs:
            - job_name: "monkeys7"
              scrape_interval: 10s
              static_configs:
                - targets: ["localhost:8080"]
    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_mib: 200
        spike_limit_mib: 50
      resourcedetection:
        detectors: [gcp]
        timeout: 2s
      resource:
        attributes:
        - key: service.name
          value: "monkeys7-penal"
        - key: colony.mode
          value: "PENAL"
    exporters:
      googlecloud:
        project: "shadowtag-omega-v4"
        log:
          default_log_name: "opentelemetry.io/collector-logs"
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, batch, resourcedetection, resource]
          exporters: [googlecloud]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resourcedetection, resource]
          exporters: [googlecloud]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch, resourcedetection, resource]
          exporters: [googlecloud]
