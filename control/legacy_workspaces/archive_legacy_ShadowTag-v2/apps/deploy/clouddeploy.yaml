# ANTIGRAVITY :: Cloud Deploy Pipeline Configuration
# Deploy FlyingMonkeys + Oracle to Cloud Run
# Project: acquired-jet-478701-b3

apiVersion: deploy.cloud.google.com/v1
kind: DeliveryPipeline
metadata:
  name: antigravity-pipeline
description: ANTIGRAVITY FlyingMonkeys + Oracle deployment pipeline
serialPipeline:
  stages:
    - targetId: dev
      profiles: [dev]
    - targetId: staging
      profiles: [staging]
    - targetId: prod
      profiles: [prod]
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: dev
description: Development Cloud Run environment
run:
  location: projects/acquired-jet-478701-b3/locations/us-central1
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: staging
description: Staging Cloud Run environment
run:
  location: projects/acquired-jet-478701-b3/locations/us-central1
---
apiVersion: deploy.cloud.google.com/v1
kind: Target
metadata:
  name: prod
description: Production Cloud Run environment
run:
  location: projects/acquired-jet-478701-b3/locations/us-central1
