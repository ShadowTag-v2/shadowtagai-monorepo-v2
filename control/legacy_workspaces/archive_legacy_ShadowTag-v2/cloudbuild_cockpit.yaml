# cloudbuild_cockpit.yaml
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/infra/antigravity:latest'
      - '-f'
      - 'Dockerfile.cockpit'
      - '.'
    id: 'Build Cockpit'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/infra/antigravity:latest'
    id: 'Push Cockpit'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/infra/antigravity:latest'
timeout: '2400s' # Extended timeout for big desktop installs
