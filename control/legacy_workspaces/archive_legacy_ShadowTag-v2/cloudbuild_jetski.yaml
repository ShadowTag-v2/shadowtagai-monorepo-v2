steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      ['build', '-t', 'gcr.io/$PROJECT_ID/jetski-sidecar:latest', '-f', 'Dockerfile.jetski', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/jetski-sidecar:latest']
images:
  - 'gcr.io/$PROJECT_ID/jetski-sidecar:latest'
