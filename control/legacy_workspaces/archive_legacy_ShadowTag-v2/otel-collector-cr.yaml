apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: penal-cluster
  namespace: penal-colony
spec:
  mode: deployment
  config: |
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
      prometheus:
        config:
          scrape_configs:
            - job_name: "monkeys7"
              scrape_interval: 10s
              static_configs:
                - targets: ["localhost:8080"]
    processors:
      batch: {}
      memory_limiter:
        check_interval: 1s
        limit_mib: 200
        spike_limit_mib: 50
      resourcedetection:
        detectors: [gcp]
        timeout: 2s
      resource:
        attributes:
        - key: service.name
          value: "monkeys7-penal"
        - key: colony.mode
          value: "PENAL"
    exporters:
      googlecloud:
        project: "shadowtag-omega-v4"
        log:
          default_log_name: "opentelemetry.io/collector-logs"
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, batch, resourcedetection, resource]
          exporters: [googlecloud]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resourcedetection, resource]
          exporters: [googlecloud]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch, resourcedetection, resource]
          exporters: [googlecloud]
