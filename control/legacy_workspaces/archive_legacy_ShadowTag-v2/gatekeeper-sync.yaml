apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gatekeeper-sync
  namespace: gatekeeper-system
spec:
  interval: 10m
  path: './infra/gatekeeper'
  prune: true
  sourceRef:
    kind: GitRepository
    name: penal-policies
  postBuild:
    substitute:
      bundle_url: 'gs://penal-bundles'
