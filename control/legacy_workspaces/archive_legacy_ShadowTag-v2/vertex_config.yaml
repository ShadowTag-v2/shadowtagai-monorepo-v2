# pinkln Agent Architecture System - Vertex AI Configuration
# Copy this file to vertex_config.local.yaml and customize with your settings

# Google Cloud Project Configuration
google_cloud:
  project_id: "your-project-id"
  location: "us-central1"  # or your preferred region

  # Available regions for Claude on Vertex AI:
  # - us-central1
  # - us-east5
  # - europe-west1
  # - europe-west4

# Claude Model Configuration
claude:
  # Available models on Vertex AI:
  # - claude-3-5-sonnet-v2@20241022 (Recommended)
  # - claude-3-5-haiku@20241022
  # - claude-3-opus@20240229
  default_model: "claude-3-5-sonnet-v2@20241022"

  # Model parameters
  max_tokens: 4096
  temperature: 1.0
  top_p: 1.0
  top_k: 0

# pinkln Agent System Configuration
pinkln:
  # Reasoning strategy selection
  reasoning:
    # Complexity thresholds for strategy selection
    basic_threshold: 0.3      # Use Chain of Thought
    exploratory_threshold: 0.6  # Use Tree of Thoughts
    collaborative_threshold: 0.9  # Use Multi-Agent Debate
    # Above 0.9: Use Debate-Train-Evolve

  # Validation settings
  validation:
    enable_boy_scout_rule: true
    max_iterations: 10
    excellence_threshold: 0.85

  # Skills registry
  skills:
    enabled:
      - ResearchExplorerSkill
      - DesignCriticSkill
      - CopyConverterSkill
      - MonetizationArchitectSkill
      - WorkflowRefinerSkill
      - PromptCraftSkill

# Vertex AI Workbench Configuration
workbench:
  # Instance configuration
  instance_type: "n1-standard-4"  # or your preferred instance type
  disk_size_gb: 100

  # GPU configuration (optional)
  accelerator:
    type: ""  # e.g., "NVIDIA_TESLA_T4"
    count: 0

  # Notebook kernel
  kernel: "python3"
  python_version: "3.10"

# Cost Optimization Settings
cost_optimization:
  # Use preemptible instances for development
  use_preemptible: false

  # Auto-shutdown after inactivity (minutes)
  idle_shutdown_timeout: 120

  # Caching settings
  enable_semantic_cache: true
  cache_ttl_seconds: 3600

# Monitoring and Logging
monitoring:
  enable_logging: true
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR

  # Track token usage
  track_token_usage: true

  # Performance metrics
  track_latency: true
  track_complexity_scores: true

# Security Settings
security:
  # Use Workload Identity for authentication
  use_workload_identity: true

  # Service account (if not using Workload Identity)
  service_account_email: ""

  # IAM roles required:
  # - roles/aiplatform.user
  # - roles/serviceusage.serviceUsageConsumer

# Development Settings
development:
  # Enable debug mode
  debug: false

  # Verbose output
  verbose: true

  # Save intermediate results
  save_checkpoints: true
  checkpoint_dir: "./checkpoints"

# Marketplace Settings (for superpowers marketplace feature)
marketplace:
  enabled: true

  # Registry configuration
  registry:
    local_path: "./pinkln/registry"
    remote_url: ""  # Optional: remote marketplace registry

  # Component discovery
  discovery:
    auto_discover_skills: true
    auto_discover_agents: true
    scan_paths:
      - "./pinkln/skills"
      - "./pinkln/agents"
