name: Build & Trigger Rollout
on:
  push:
    branches: [main]
    paths: ['Dockerfile', 'src/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/my-repo/api:${{ github.sha }}

      - name: Trigger Infra Rollout
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_PAT }}
          repository: YOURORG/infrastructure-live-gcp
          event-type: cloud-run-rollout
          client-payload: |
            {
              "environment": "prod",
              "image_tag": "us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT }}/my-repo/api:${{ github.sha }}"
            }
