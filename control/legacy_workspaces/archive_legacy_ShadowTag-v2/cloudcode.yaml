# Cloud Code Configuration
# This file configures the Cloud Code extension to use Buildpacks and Secret Manager by default.

common:
  build:
    builder: "gcr.io/buildpacks/builder:v1"
    buildpackEnv:
      GOOGLE_ENTRYPOINT: "python3 -m agents.flying_monkeys"

  deploy:
    cloudRun:
      serviceName: "flying-monkeys-swarm"
      region: "us-central1"
      allowUnauthenticated: false
      serviceAccount: "sa-flyingmonkeys@acquired-jet-478701-b3.iam.gserviceaccount.com"
      annotations:
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: "gen2"
        run.googleapis.com/sessionAffinity: "true"


  debug:
    cloudRun:
      enableDebugging: true
      debugPort: 9229

profiles:
  - name: "prod"
    activation:
      - os: darwin
    build:
      target: "prod"
    deploy:
      cloudRun:
        serviceName: "flying-monkeys-swarm"
        minInstances: 1
        resources:
          limits:
            memory: "8Gi"
            cpu: "4"

  - name: "utilities"
    deploy:
      cloudRun:
        serviceName: "gcr-cleaner"
        image: "us-docker.pkg.dev/gcr-cleaner/gcr-cleaner/gcr-cleaner-cli"
