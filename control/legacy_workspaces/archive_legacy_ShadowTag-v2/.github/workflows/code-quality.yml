name: Code Quality Auto-Improvement

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 2 * * 1"  # Weekly Monday 2am UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refactor-analysis:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          npm install
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Code Quality Analysis
        id: analyze
        run: |
          # Analyze key orchestrator files
          node tools/orchestrator/ace_with_refactor.mjs analyze tools/orchestrator/ace_orchestrator.mjs || true
          node tools/orchestrator/ace_with_refactor.mjs analyze tools/orchestrator/ace_with_refactor.mjs || true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ACE_REFACTOR_FOCUS: readability,best-practices,performance
        continue-on-error: true

      - name: Auto-refactor (moderate)
        id: refactor
        run: |
          # Refactor key files with moderate aggressiveness
          node tools/orchestrator/ace_with_refactor.mjs refactor tools/orchestrator/ace_orchestrator.mjs --aggressiveness moderate || true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ACE_REFACTOR_FOCUS: readability,best-practices,performance,technical-debt
          ACE_REFACTOR_AGGRESSIVENESS: moderate
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit improvements
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "Refactor Bot"
          git config user.email "refactor-bot@users.noreply.github.com"
          git add -A
          git commit -m "chore(quality): automated code quality improvements [bot]

          Automated refactoring applied:
          - Readability improvements
          - Best practices enforcement
          - Performance optimizations
          - Technical debt reduction

          Generated by code-refactorer-agent workflow."

      - name: Push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git push origin HEAD:${{ github.head_ref }}

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔧 Code Quality Improvements Applied

              Automated refactoring has been applied to improve code quality.

              **Changes include:**
              - Readability improvements
              - Best practices enforcement
              - Performance optimizations
              - Technical debt reduction

              **Review:** Please review the changes before merging.

              _Powered by Code Refactorer Agent_`
            });

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-analysis
          path: .ace/*
          retention-days: 30
