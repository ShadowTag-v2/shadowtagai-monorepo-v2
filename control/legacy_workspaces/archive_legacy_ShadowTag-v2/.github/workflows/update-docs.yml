name: Update Documentation

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"  # Weekly on Monday at 9 AM UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Check for stale docs
        id: check
        run: |
          # Check if README or key docs are out of date with recent changes
          LAST_DOC_UPDATE=$(git log -1 --format=%ct README.md || echo "0")
          LAST_CODE_UPDATE=$(git log -1 --format=%ct --all -- '*.py' '*.ts' '*.mjs' || echo "0")

          if [ "$LAST_CODE_UPDATE" -gt "$LAST_DOC_UPDATE" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate documentation updates
        if: steps.check.outputs.needs_update == 'true'
        run: |
          # Placeholder: In production, use AI to generate/update docs
          # For now, add a simple timestamp update
          echo "<!-- Last auto-update: $(date -u +%FT%TZ) -->" >> README.md

      - name: Create PR if changes exist
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "Docs Bot"
          git config user.email "docs-bot@users.noreply.github.com"

          BRANCH="docs/auto-update-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add README.md
          git commit -m "docs: automated documentation update [bot]" || exit 0

          git push -u origin "$BRANCH"

          gh pr create \
            --title "docs: Automated documentation update" \
            --body "$(cat <<EOF
## Automated Documentation Update

This PR contains automated updates to documentation based on recent code changes.

### Changes
- Updated README.md timestamp
- (Additional updates would be generated by AI in production)

### Review Checklist
- [ ] Verify accuracy of updated content
- [ ] Check for broken links
- [ ] Ensure examples are current

_Auto-generated by update-docs workflow_
EOF
)" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
