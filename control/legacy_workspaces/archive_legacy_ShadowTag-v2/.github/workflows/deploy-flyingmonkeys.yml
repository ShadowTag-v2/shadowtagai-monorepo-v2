name: Deploy FlyingMonkeys to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'agents/flying_monkeys.py'
      - 'bin/flyingmonkeys-server'
      - 'flyingmonkeys-server.Dockerfile'
      - 'requirements.txt'
      - 'src/aiyou/**'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  PROJECT_ID: acquired-jet-478701-b3
  REGION: us-central1
  REPOSITORY: flyingmonkeys
  IMAGE: server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/215390634092/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-actions@acquired-jet-478701-b3.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:latest \
            -f flyingmonkeys-server.Dockerfile .
          docker push --all-tags us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE

      - name: Deploy to Cloud Run (Dev)
        if: github.event.inputs.environment != 'prod'
        run: |
          gcloud run deploy flyingmonkeys-server-dev \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --memory 2Gi \
            --cpu 2 \
            --set-env-vars PYTHONPATH=/app

      - name: Deploy to Cloud Run (Prod)
        if: github.event.inputs.environment == 'prod'
        run: |
          gcloud run deploy flyingmonkeys-server \
            --image us-central1-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --memory 2Gi \
            --cpu 2 \
            --set-env-vars PYTHONPATH=/app

      - name: Output Service URL
        run: |
          SERVICE_NAME=${{ github.event.inputs.environment == 'prod' && 'flyingmonkeys-server' || 'flyingmonkeys-server-dev' }}
          URL=$(gcloud run services describe $SERVICE_NAME --region $REGION --format 'value(status.url)')
          echo "## Deployed to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "Service URL: $URL" >> $GITHUB_STEP_SUMMARY
