name: Test AiYouJR Extension

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    name: Validate YAML/JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install validation tools
        run: |
          pip install pyyaml jsonschema
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Validate extension.yaml
        run: |
          yamllint extension.yaml
          python -c "import yaml; yaml.safe_load(open('extension.yaml'))"

      - name: Validate playbook.json
        run: |
          python -c "import json; json.load(open('playbook.json'))"

      - name: Check YAML syntax
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 120}}}' extension.yaml

  test-gptram:
    name: Test GPTRAM Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn pydantic pytest httpx

      - name: Create test file
        run: |
          cat > test_gptram.py <<'EOF'
          import pytest
          from fastapi.testclient import TestClient
          import sys
          import os

          # Add tools directory to path
          sys.path.insert(0, os.path.join(os.path.dirname(__file__), 'tools'))

          # Import after path adjustment
          from gptram_service import app

          client = TestClient(app)

          def test_health_check():
              """Test root endpoint returns healthy status"""
              response = client.get("/")
              assert response.status_code == 200
              data = response.json()
              assert data["service"] == "GPTRAM Cache"
              assert data["status"] == "healthy"

          def test_put_and_get():
              """Test storing and retrieving a cache item"""
              # Put item
              put_response = client.post("/put", json={
                  "key": "test:key:1",
                  "text": "This is a test decision",
                  "meta": {"author": "test_user"}
              })
              assert put_response.status_code == 200
              assert put_response.json()["ok"] is True

              # Get item
              get_response = client.post("/get", json={
                  "key": "test:key:1"
              })
              assert get_response.status_code == 200
              data = get_response.json()
              assert data["key"] == "test:key:1"
              assert data["text"] == "This is a test decision"
              assert data["meta"]["author"] == "test_user"

          def test_search_bm25():
              """Test BM25-lite search functionality"""
              # Put multiple items
              items = [
                  {"key": "search:1", "text": "FastAPI web framework for Python"},
                  {"key": "search:2", "text": "SQLite database for local storage"},
                  {"key": "search:3", "text": "BM25 algorithm for text search"}
              ]
              for item in items:
                  client.post("/put", json=item)

              # Search
              search_response = client.post("/fetch_top_k", json={
                  "query": "database storage",
                  "k": 5
              })
              assert search_response.status_code == 200
              data = search_response.json()
              assert data["query"] == "database storage"
              assert len(data["items"]) > 0
              # Should find the SQLite item
              keys = [item["key"] for item in data["items"]]
              assert "search:2" in keys

          def test_delete():
              """Test deleting a cache item"""
              # Put item
              client.post("/put", json={
                  "key": "delete:test",
                  "text": "Item to be deleted"
              })

              # Delete item
              delete_response = client.delete("/delete", json={
                  "key": "delete:test"
              })
              assert delete_response.status_code == 200
              assert delete_response.json()["ok"] is True

              # Verify deletion
              get_response = client.post("/get", json={
                  "key": "delete:test"
              })
              assert get_response.status_code == 404

          def test_stats():
              """Test statistics endpoint"""
              response = client.get("/stats")
              assert response.status_code == 200
              data = response.json()
              assert "total_items" in data
              assert "latest_timestamp" in data
              assert isinstance(data["total_items"], int)

          def test_bm25_scoring():
              """Test BM25 scoring function directly"""
              from gptram_service import bm25_score

              # Exact match should score higher
              score1 = bm25_score("database", "SQLite is a database")
              score2 = bm25_score("database", "Python is a programming language")
              assert score1 > score2

              # Multiple term matches should score higher
              score3 = bm25_score("database storage", "SQLite database for local storage")
              score4 = bm25_score("database storage", "SQLite database system")
              assert score3 > score4

              # Empty query/text should return 0
              assert bm25_score("", "some text") == 0.0
              assert bm25_score("query", "") == 0.0
          EOF

      - name: Run tests
        run: |
          pytest test_gptram.py -v --tb=short

      - name: Test service startup
        run: |
          # Start service in background
          python tools/gptram_service.py &
          SERVICE_PID=$!

          # Wait for service to start
          sleep 3

          # Test health endpoint
          curl -f http://127.0.0.1:8765/ || (echo "Service failed to start" && exit 1)

          # Cleanup
          kill $SERVICE_PID

  lint-safety:
    name: Lint & Safety Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install linting tools
        run: |
          pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 tools/ --max-line-length=120 --ignore=E501,W503

      - name: Check code formatting (black)
        run: |
          black --check tools/ || echo "Code formatting issues found (non-blocking)"

      - name: Check prohibited patterns
        run: |
          # Check for external HTTP calls (except localhost)
          ! grep -r "requests\.get\|requests\.post" tools/ | grep -v "127\.0\.0\.1" || \
            (echo "ERROR: External HTTP calls detected (violates privacy-first principle)" && exit 1)

          # Check for eval/exec
          ! grep -r "eval(" tools/ || \
            (echo "ERROR: eval() detected (security risk)" && exit 1)
          ! grep -r "exec(" tools/ || \
            (echo "ERROR: exec() detected (security risk)" && exit 1)

          # Check for hardcoded secrets (common patterns)
          ! grep -r "api_key.*=.*['\"][^'\"]\{20,\}['\"]" tools/ || \
            (echo "WARNING: Possible hardcoded API key detected" && exit 0)
          ! grep -r "password.*=.*['\"][^'\"]\{8,\}['\"]" tools/ || \
            (echo "WARNING: Possible hardcoded password detected" && exit 0)

      - name: Verify privacy configuration
        run: |
          # Ensure service binds to localhost only
          grep -q "host=\"127.0.0.1\"" tools/gptram_service.py || \
            (echo "ERROR: Service must bind to 127.0.0.1 only" && exit 1)

          # Ensure no telemetry in extension.yaml
          ! grep -i "telemetry\|analytics\|tracking" extension.yaml || \
            (echo "ERROR: Telemetry/analytics detected in extension.yaml" && exit 1)

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run bandit security scan
        run: |
          bandit -r tools/ -f json -o bandit-report.json || true
          bandit -r tools/ -ll -f screen

      - name: Check dependencies for vulnerabilities
        run: |
          pip install fastapi uvicorn pydantic
          safety check --json || echo "Safety check completed (non-blocking)"

      - name: SQL injection check
        run: |
          # Verify all SQL queries use parameterized queries
          grep -n "execute(" tools/gptram_service.py | while read line; do
            echo "Checking: $line"
            # This is a basic check - manual review recommended
          done

          # Check for string formatting in SQL (potential SQL injection)
          ! grep -r "execute(.*%.*)" tools/ || \
            (echo "WARNING: Potential SQL injection via string formatting" && exit 0)
          ! grep -r "execute(.*\.format(" tools/ || \
            (echo "WARNING: Potential SQL injection via .format()" && exit 0)

      - name: Upload security report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  compliance-check:
    name: Compliance Framework Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Verify playbook.json structure
        run: |
          python3 <<EOF
          import json

          with open('playbook.json') as f:
              playbook = json.load(f)

          # Verify required sections
          assert 'governance' in playbook, "Missing 'governance' section"
          assert 'layers' in playbook['governance'], "Missing 'layers' in governance"
          assert 'routines' in playbook, "Missing 'routines' section"
          assert 'compliance_mappings' in playbook, "Missing 'compliance_mappings'"

          # Verify three-layer model
          layers = playbook['governance']['layers']
          assert 'purpose' in layers, "Missing 'purpose' layer"
          assert 'reason' in layers, "Missing 'reason' layer"
          assert 'brakes' in layers, "Missing 'brakes' layer"

          # Verify compliance frameworks
          mappings = playbook['compliance_mappings']
          assert 'soc2' in mappings, "Missing SOC2 mappings"
          assert 'iso27001' in mappings, "Missing ISO 27001 mappings"
          assert 'nist800-53' in mappings, "Missing NIST 800-53 mappings"

          print("✅ Playbook structure validated")
          EOF

      - name: Check compliance evidence
        run: |
          # Verify all compliance mappings have evidence
          python3 <<EOF
          import json

          with open('playbook.json') as f:
              playbook = json.load(f)

          frameworks = playbook['compliance_mappings']
          missing_evidence = []

          for framework, controls in frameworks.items():
              for control_id, control_data in controls.items():
                  if 'evidence' not in control_data or not control_data['evidence']:
                      missing_evidence.append(f"{framework} {control_id}")

          if missing_evidence:
              print(f"⚠️  Controls missing evidence: {', '.join(missing_evidence)}")
              # Non-blocking for now
          else:
              print("✅ All controls have evidence")
          EOF

  integration:
    name: End-to-End Integration Test
    runs-on: ubuntu-latest
    needs: [validate, test-gptram, lint-safety, security]
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install all dependencies
        run: |
          pip install fastapi uvicorn pydantic httpx

      - name: Start GPTRAM service
        run: |
          python tools/gptram_service.py &
          sleep 3

      - name: Run integration tests
        run: |
          # Test full workflow: log decision → search → retrieve

          # 1. Store decision
          RESPONSE=$(curl -s -X POST http://127.0.0.1:8765/put \
            -H "Content-Type: application/json" \
            -d '{"key": "integration:test:1", "text": "Integration test decision", "meta": {"test": true}}')
          echo "Store response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || (echo "Failed to store decision" && exit 1)

          # 2. Retrieve decision
          RESPONSE=$(curl -s -X POST http://127.0.0.1:8765/get \
            -H "Content-Type: application/json" \
            -d '{"key": "integration:test:1"}')
          echo "Retrieve response: $RESPONSE"
          echo "$RESPONSE" | grep -q 'Integration test decision' || (echo "Failed to retrieve decision" && exit 1)

          # 3. Search for decision
          RESPONSE=$(curl -s -X POST http://127.0.0.1:8765/fetch_top_k \
            -H "Content-Type: application/json" \
            -d '{"query": "integration test", "k": 5}')
          echo "Search response: $RESPONSE"
          echo "$RESPONSE" | grep -q 'integration:test:1' || (echo "Failed to find decision in search" && exit 1)

          # 4. Check stats
          RESPONSE=$(curl -s http://127.0.0.1:8765/stats)
          echo "Stats response: $RESPONSE"
          echo "$RESPONSE" | grep -q 'total_items' || (echo "Failed to get stats" && exit 1)

          echo "✅ Integration tests passed"

      - name: Cleanup
        if: always()
        run: |
          pkill -f gptram_service.py || true
          rm -f gptram.sqlite

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [validate, test-gptram, lint-safety, security, compliance-check, integration]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "🎉 All test jobs completed"
          echo "   ✅ Validation"
          echo "   ✅ GPTRAM Service Tests"
          echo "   ✅ Lint & Safety Checks"
          echo "   ✅ Security Scan"
          echo "   ✅ Compliance Framework Check"
          echo "   ✅ End-to-End Integration"
