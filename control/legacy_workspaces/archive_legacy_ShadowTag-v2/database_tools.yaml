tools:
  - name: query_cosmos
    description: Query Azure Cosmos DB graph via Gremlin
    command: npx
    args: ["ts-node", "/Users/pikeymickey/.gemini/antigravity/Monorepo-Uphillsnowball/scripts/cosmos_query.ts"]
    env:
      COSMOS_GREMLIN_ENDPOINT: "shadowtag-graph.gremlin.cosmos.azure.com"
      COSMOS_GREMLIN_KEY: "${AZURE_COSMOS_KEY}"
  - name: query_lancedb
    description: Query local LanceDB vector store
    command: python3
    args: ["/Users/pikeymickey/.gemini/antigravity/Monorepo-Uphillsnowball/scripts/query_lancedb_sync.py"]
    env:
      LANCEDB_URI: "/Users/pikeymickey/.gemini/antigravity/Monorepo-Uphillsnowball/lancedb_data"
