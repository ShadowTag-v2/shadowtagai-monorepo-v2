groups:
- name: penal-anomaly
  rules:
  - alert: HighCPUKill
    expr: rate(container_cpu_usage_seconds_total{job="monkeys7"}[5m]) > 0.9
    for: 1m
    annotations:
      summary: "R-kill CPU anomaly {{ $labels.pod }}"
      runbook_url: "SIGTERM-self-kill"
    labels: {severity: critical}
  - alert: DeadManSwitch  # E2E test
    expr: vector(1)
    labels: {severity: none}
  - alert: MLAnomalyKill
    expr: anomaly(container_cpu_usage_seconds_total{job="monkeys7"}) > 0.95
    for: 30s
    annotations: {action: "r-kill pod={{ $labels.pod }}"}
