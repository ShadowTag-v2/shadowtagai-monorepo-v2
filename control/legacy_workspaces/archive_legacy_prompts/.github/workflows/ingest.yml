name: Ingestion (hourly)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/60 * * * *"

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install deps
        run: |
          python -m pip install --upgrade pip pyyaml

      - name: Sync policy (strict v3)
        run: |
          mkdir -p policy/config
          curl -fsSL -o policy/config/strict_policy.yml \
            https://raw.githubusercontent.com/ehanc69/ShadowTag-v2-policy/refs/heads/main/policy/config/strict_policy.yml

      - name: Ingest sources
        run: |
          python tools/ingest/ingest_sources.py

      - name: Commit new data (if any)
        run: |
          git add data policy/config/strict_policy.yml
          if ! git diff --cached --quiet; then
            git config user.name  "ShadowTag-v2-ci"
            git config user.email "ShadowTag-v2-ci@users.noreply.github.com"
            git commit -m "data: hourly ingest + policy sync"
            git push
          else
            echo "No changes"
