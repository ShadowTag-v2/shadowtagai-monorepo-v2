version: '3.8'

services:
  # Cor.17 FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cor17-api
    ports:
      - "8000:8000"
      - "9090:9090"  # Prometheus metrics
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GCP_REGION=${GCP_REGION:-us-central1}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/aiyou
      - MONGO_URI=mongodb://mongo:27017/aiyou
    depends_on:
      - redis
      - postgres
      - mongo
    volumes:
      - ./data:/data
      - ./app:/app/app
    networks:
      - cor17-network
    restart: unless-stopped

  # Redis for GPTRAM memory
  redis:
    image: redis:7-alpine
    container_name: cor17-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cor17-network
    restart: unless-stopped

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: cor17-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aiyou
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cor17-network
    restart: unless-stopped

  # MongoDB for document storage
  mongo:
    image: mongo:7
    container_name: cor17-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - cor17-network
    restart: unless-stopped

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: cor17-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./deployment/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - cor17-network
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  mongo-data:
  prometheus-data:

networks:
  cor17-network:
    driver: bridge
