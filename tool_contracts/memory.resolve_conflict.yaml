# tool_contracts/memory.resolve_conflict.yaml — P1 Operational Contract
tool_id: "memory.resolve_conflict"
description: "Detects and resolves conflicting memory atoms during session-handoff."
risk_level: "medium"
enforcement: "enforced_by_script"
preconditions:
  - ".memory/atoms/ must contain at least one atom"
  - "scripts/session-handoff.sh must detect duplicate/conflicting atoms by title"
postconditions:
  - "No two atoms in .memory/atoms/ share identical titles"
  - "Conflict resolution logged to .memory/events.ndjson"
enforcement_script: "scripts/session-handoff.sh"
ci_gate: ".github/workflows/monorepo-os-gates.yml#memory-integrity"
evidence_requirements:
  - type: "log"
    path: ".memory/events.ndjson"
reuse_queries: []
