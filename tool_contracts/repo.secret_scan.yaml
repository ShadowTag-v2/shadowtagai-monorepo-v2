# Tool Contract: repo.secret_scan
#
# Supersedes: tool_contracts/secret_scan.yaml (retained for compatibility)
#
# Scan staged changes, working tree, and optionally Git history for secrets.
# Betterleaks is the primary scanner. Gitleaks is retained only as a legacy
# fallback during migration. TruffleHog is the deep verification scanner for
# full-history, release, and incident workflows.

name: repo.secret_scan
risk: high

description: >
  Scan staged changes, working tree, and optionally Git history for secrets.
  Betterleaks is the primary scanner. Gitleaks is retained only as a legacy
  fallback during migration. TruffleHog is the deep verification scanner for
  full-history, release, and incident workflows.

primary:
  tool: betterleaks
  reason: >
    Faster successor to Gitleaks with agent-oriented workflows,
    CEL-based validation, BPE tokenization, and drop-in compatibility.

fallback:
  tool: gitleaks
  reason: Mature legacy compatibility while Betterleaks migration stabilizes.
  deprecation_status: compatibility_only

deep_verification:
  tool: trufflehog
  reason: >
    Verified credential scanning across Git, GitHub, cloud storage,
    Docker, filesystems, and CI sources. 700+ credential detectors.

modes:
  staged:
    preferred:
      - >-
        betterleaks git --pre-commit --staged --redact
        --report-path=.reports/secrets/betterleaks-staged.json
        --report-format=json
    fallback:
      - >-
        gitleaks git --redact
        --report-path=.reports/secrets/gitleaks-staged.json
        --report-format=json
    required_before:
      - commit
      - autolint_push

  working_tree:
    preferred:
      - >-
        betterleaks dir --redact
        --report-path=.reports/secrets/betterleaks-dir.json
        --report-format=json .
    fallback:
      - >-
        gitleaks dir --redact
        --report-path=.reports/secrets/gitleaks-dir.json
        --report-format=json .
    required_before:
      - github.push
      - artifact.upload

  full_history:
    preferred:
      - >-
        betterleaks git --log-opts="--all" --redact
        --report-path=.reports/secrets/betterleaks-history.json
        --report-format=json .
    fallback:
      - >-
        gitleaks git --log-opts="--all" --redact
        --report-path=.reports/secrets/gitleaks-history.json
        --report-format=json .
    deep_verification:
      - >-
        trufflehog git file://. --only-verified --json
        > .reports/secrets/trufflehog-history.json
    required_before:
      - force_push
      - history_rewrite
      - release
      - public_repo_transition

blocks:
  - verified_live_secret
  - private_key
  - service_account_json
  - github_token
  - oauth_client_secret
  - env_file
  - unredacted_secret_report

evidence:
  - scanner
  - mode
  - report_path
  - finding_count
  - verified_count_if_available
  - redacted
