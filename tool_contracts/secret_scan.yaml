# Tool Contract: repo.secret_scan
# Governs secret scanning operations before push/deploy.

tool_id: repo.secret_scan
description: >
  Scan the repository diff for leaked secrets using Betterleaks.
  Required before any push or deploy operation.
risk_level: medium

preconditions:
  - name: betterleaks_installed
    type: file_exists
    path: .betterleaksignore
    description: Betterleaks ignore file must exist (confirms tool is configured).

  - name: scan_target_specified
    type: context_key_present
    key: scan_target
    description: Must specify what to scan (diff, staged, full).

evidence_requirements:
  - type: log_scan_result
    description: Log findings count and severity to .beads/issues.jsonl
  - type: log_false_positives
    description: Record any suppressed findings with justification

reuse_queries:
  - type: script_exists
    value: gitleaks_guardian
    description: Check if the Gitleaks Guardian workflow already handles scanning.
