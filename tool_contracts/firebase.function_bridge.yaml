# tool_contracts/firebase.function_bridge.yaml
#
# Client-side bridge from Firebase AI Logic function calls to approved app functions.

name: firebase.function_bridge
risk: medium

description: >
  Client-side bridge from Firebase AI Logic function calls to approved app
  functions. Maps Firebase function calling to Monorepo OS ToolGateway contracts.
  The model proposes; the app executes.

requires:
  - function_registered
  - descriptive_function_declaration
  - typed_parameters
  - active_tool_bundle_under_review_threshold
  - argument_validation
  - toolgateway_risk_classification
  - function_response_returned_to_model

limits:
  preferred_active_tools: 10
  review_required_above: 20

defaults:
  temperature: 0.0
  rationale: deterministic_function_arguments

confirmation_required_for:
  - purchase
  - deployment
  - data_delete
  - data_write_sensitive
  - github_push
  - external_api_mutation
  - money_movement
  - user_notification_broadcast

evidence:
  - function_name
  - args_hash
  - risk_tier
  - confirmation_required
  - confirmation_received
  - execution_result_summary

package: packages/firebase_tool_bridge/

chat_loop:
  note: >
    Firebase function calling should use chat-style interaction.
    The SDK handles function-calling thought signatures where supported.
    Each function call requires an additional request to return the result.
