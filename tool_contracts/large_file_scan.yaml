# Tool Contract: repo.large_file_scan
# Governs large file detection before commit/push.

tool_id: repo.large_file_scan
description: >
  Scan for files exceeding the repository's size threshold (>5MB).
  Large binaries must use Git LFS or be excluded.
risk_level: medium

preconditions:
  - name: scan_scope_defined
    type: context_key_present
    key: scan_scope
    description: Must specify scan scope (staged, all, path).

evidence_requirements:
  - type: log_large_files
    description: Log any files exceeding the size threshold with paths and sizes
  - type: log_lfs_status
    description: Record whether Git LFS is configured for detected large files

reuse_queries:
  - type: script_exists
    value: repo_doctor
    description: Check if repo_doctor already includes large file scanning.
