# tool_contracts/beads.update.yaml — P1 Operational Contract
tool_id: "beads.update"
description: "Ensures .beads/ task tracking is updated on every commit cycle."
risk_level: "medium"
enforcement: "enforced_by_ci"
preconditions:
  - ".beads/issues.jsonl must exist and be valid NDJSON"
  - "At least one bead entry must reference the current work session"
postconditions:
  - ".beads/issues.jsonl must have been modified or verified within the current session"
enforcement_script: "scripts/beads-health.sh"
ci_gate: ".github/workflows/monorepo-os-gates.yml#beads-health"
evidence_requirements:
  - type: "log"
    path: ".beads/evidence/beads_update.jsonl"
reuse_queries: []
