version: 1

workspace:
  name: Monorepo-Uphillsnowball
  root: /Users/pikeymickey/.gemini/antigravity/Monorepo-Uphillsnowball
  policy: latest-only
  source_of_truth: monorepo_manifest.yaml

repo_roots:
  # ─── Canonical (verified on disk) ───
  - name: aiyou-fastapi-services
    status: canonical
    path: apps/aiyou_stack/aiyou-fastapi-services
    notes: Primary live backend root.

  - name: cosmic-crab-payload
    status: canonical
    path: apps/aiyou_stack/cosmic-crab-payload
    notes: Canonical payload/runtime support root.

  - name: Pipeline
    status: canonical
    path: apps/aiyou_stack/Pipeline
    notes: Live canonical root for Pipeline.

  - name: nascent-apollo
    status: canonical
    path: apps/aiyou_stack/nascent-apollo
    notes: Live canonical root for nascent-apollo.

  # ─── Folded-in (labs/data/control) ───
  - name: uphillsnowball
    status: folded-in
    path: labs/uphillsnowball

  # ─── Shared Libraries ───
  - name: ui
    status: canonical
    path: libs/ui
    notes: "Invariant #92. Shared Button, layout CSS, design tokens. All apps import from here."

  - name: lancedb
    status: folded-in
    path: data/lancedb
    notes: Local vector store.

  - name: drive_ingest
    status: folded-in
    path: data/drive_ingest
    notes: Google Drive ingestion daemon.

  - name: sovereign_mlx
    status: folded-in
    path: data/sovereign_mlx
    notes: MLX model weights and configs.

  - name: erik-hancock-llm-memory
    status: folded-in
    path: memory/erik-hancock-llm-memory
    notes: Institutional memory archive.

  - name: counselconduit
    status: folded-in
    path: apps/counselconduit
    notes: Operational backend for KovelAI. Retained as development alias.

control_plane:
  canonical_mcp_config: /Users/pikeymickey/.gemini/antigravity/Monorepo-Uphillsnowball/antigravity-mcp-config.json
  deprecated_mcp_configs:
    - /Users/pikeymickey/.gemini/antigravity/mcp_config.json
    - /Users/pikeymickey/.gemini/antigravity/Monorepo-Uphillsnowball/.vscode/cline_mcp_settings.json

products:
  kovelai:
    root: apps/kovelai
    runtime: google-cloud
    model: gemini-3.1-flash-lite-preview
    project: shadowtag-omega-v4
    business_role: mvp-commercial-wedge
    notes: CounselConduit renamed. Billing gateway + S.E.U. proxy. No intelligence factor.

  uphillsnowball:
    root: labs/uphillsnowball
    runtime: local-apple-silicon
    model: gemini-3.1-flash-lite-preview
    project: shadowtag-omega-v4
    business_role: internal-rd-lab

completion_rule:
  canonicalization_complete_when:
    - all_target_repos_have_status_canonical_or_archived
    - no_repo_has_status_unresolved
    - control_plane_has_single_canonical_mcp_config
    - deprecated_mcp_configs_are_demoted

highest_value_opportunities:
  - 'Fix truth surfaces first: canonical repo roots and one canonical MCP control plane.'
  - 'Operationalize recovered code: green loop, CSP collector, retriever eval, feature flags, pricing model, OCR summaries, Drive-ingest daemon.'
  - KovelAI (formerly CounselConduit) is the Google Cloud billing gateway product. uphillsnowball is the independent local R&D lab. They remain completely detached.
