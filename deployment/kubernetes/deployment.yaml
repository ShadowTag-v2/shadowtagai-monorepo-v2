apiVersion: apps/v1
kind: Deployment
metadata:
  name: kosmos-orchestrator
  labels:
    app: kosmos
    component: orchestrator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kosmos
      component: orchestrator
  template:
    metadata:
      labels:
        app: kosmos
        component: orchestrator
    spec:
      serviceAccountName: kosmos-sa
      containers:
      - name: orchestrator
        image: gcr.io/PROJECT_ID/kosmos-orchestrator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: GOOGLE_CLOUD_PROJECT
          value: "PROJECT_ID"
        - name: GCP_LOCATION
          value: "us-central1"
        - name: FIRESTORE_DATABASE
          value: "(default)"
        - name: STORAGE_BUCKET
          value: "PROJECT_ID-kosmos-artifacts"
        - name: AGENTOPS_API_KEY
          valueFrom:
            secretKeyRef:
              name: kosmos-secrets
              key: agentops-api-key
        - name: ENABLE_TELEMETRY
          value: "true"
        - name: DAILY_BUDGET
          value: "2000.0"
        - name: MONTHLY_BUDGET
          value: "60000.0"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "16Gi"
            cpu: "8"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kosmos-service
  labels:
    app: kosmos
spec:
  type: LoadBalancer
  selector:
    app: kosmos
    component: orchestrator
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kosmos-sa
  annotations:
    iam.gke.io/gcp-service-account: kosmos-sa@PROJECT_ID.iam.gserviceaccount.com
