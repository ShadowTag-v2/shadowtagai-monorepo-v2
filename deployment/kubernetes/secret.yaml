apiVersion: v1
kind: Secret
metadata:
  name: cor17-secrets
  namespace: cor17
type: Opaque
stringData:
  # GCP Project ID (replace with your actual project ID)
  GCP_PROJECT_ID: "your-gcp-project-id"

  # GCS Bucket Names
  GCS_BUCKET_NAME: "aiyou-data-bucket"
  GCS_MODEL_BUCKET: "aiyou-models-bucket"

  # Database URLs (update with actual credentials)
  DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/aiyou"
  MONGO_URI: "mongodb://mongo:27017/aiyou"

  # Redis Password (if needed)
  REDIS_PASSWORD: ""

  # Content Safety Threshold
  GOOGLE_CONTENT_SAFETY_THRESHOLD: "BLOCK_MEDIUM_AND_ABOVE"
