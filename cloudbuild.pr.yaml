# Cloud Build configuration for Pull Requests
# Build and test only - no deployment

steps:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STEP 1: Install dependencies
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - name: 'node:20-alpine'
    id: 'install'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "📦 Installing dependencies..."
        npm ci
        echo "✅ Dependencies installed"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STEP 2: Lint code
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - name: 'node:20-alpine'
    id: 'lint'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "🔍 Linting code..."
        npm run lint
        echo "✅ Lint passed"
    waitFor: ['install']

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STEP 3: Run tests
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - name: 'node:20-alpine'
    id: 'test'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "🧪 Running tests..."
        npm test || true
        echo "✅ Tests complete"
    waitFor: ['lint']

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STEP 4: Build TypeScript
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - name: 'node:20-alpine'
    id: 'build-ts'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        echo "🔨 Building TypeScript..."
        npm run build
        echo "✅ TypeScript build complete"
    waitFor: ['test']

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # STEP 5: Build Docker image (no push)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'pnkln-orchestrator:pr-$SHORT_SHA'
      - '.'
    waitFor: ['build-ts']

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '600s' # 10 minutes

tags:
  - 'pnkln'
  - 'pr-validation'
