name: Cloud Deploy Canary Rollout (Pulumi)
on:
  workflow_dispatch:
    inputs:
      stack:
        description: Stack (dev or prod)
        required: true
        default: prod
        type: choice
        options: [dev, prod]
      image_tag:
        description: Full image tag
        required: true
  repository_dispatch:
    types: [cloud-run-rollout]

jobs:
  rollout:
    runs-on: ubuntu-latest
    environment: ${{ inputs.stack || github.event.client_payload.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.PULUMI_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Create Cloud Deploy Release
        run: |
          ENV="${{ inputs.stack || github.event.client_payload.environment }}"
          IMAGE="${{ inputs.image_tag || github.event.client_payload.image_tag }}"
          gcloud deploy releases create "release-${GITHUB_SHA::8}" \
            --project=${{ vars.GCP_PROJECT }} \
            --region=us-central1 \
            --delivery-pipeline="lawtrack-api-${ENV}-pipeline" \
            --images="api=${IMAGE}"
      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "#infra-deploys"
            text: "${{ job.status == 'success' && '✅' || '❌' }} Pulumi Cloud Run rollout ${{ job.status }}: ${{ inputs.image_tag || github.event.client_payload.image_tag }}"
