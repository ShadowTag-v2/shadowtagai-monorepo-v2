name: Terragrunt Plan (PR)
on:
  pull_request:
    paths: ['terraform/infrastructure-live-gcp/**']

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: mise-action/mise-action@v2
        with:
          working_directory: terraform/infrastructure-live-gcp
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.TF_SERVICE_ACCOUNT }}
      - uses: gruntwork-io/terragrunt-action@v1
        with:
          tofu_version: "1.9.0"
          tg_version: "0.67.0"
          tg_dir: terraform/infrastructure-live-gcp/non-prod
          tg_command: run-all plan
          tg_comment: true
